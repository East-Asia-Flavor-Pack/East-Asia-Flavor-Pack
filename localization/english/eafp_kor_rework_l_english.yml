 eafp_modi_catholic_plague: "Ideological Crisis"
 eafp_modi_catholic_plague_desc: "A sense of crisis is spreading throughout the court that the eastward movement of the so-called Western Learning could erode the existing philosophical order based on Neo-Confucianism. The coefficient of this [concept_modifier] is calculated based on the proportion of Catholics in the country, initially increasing steeply with small percentage changes, but the rate of increase slows as the value grows."

 ### concept_bio

 concept_bio_yi_hong: "Yi Hong"
 concept_bio_yi_hong_desc: "#tooltip_header Sunjong, King Munan Mujeong Heongyeong Seonghyo#!\n$TOOLTIP_DELIMITER$\n#v July 29, 1790#! Born at Jipbokheon, Changgyeong Palace, Hanseong\n#v December 13, 1834#! Died at Hoesangjeon, Gyeonghui Palace, Hanseong\n\nSunjong, the 23rd King of Joseon, ascended to the throne at the tender age of 11 following the sudden passing of his predecessor, King Jeongjong. Although mild-mannered and intelligent by nature, his ability to exercise strong royal authority was limited by his youth and the illnesses that plagued him throughout his life.\nHis reign marked the entrenchment of so-called 'Sedo Politics,' in which specific families monopolized state affairs. Ironically, the late King's request to Kim Jo-sun to protect his young son became the seed of tragedy, allowing the Andong Kim clan to seize control of the government."

