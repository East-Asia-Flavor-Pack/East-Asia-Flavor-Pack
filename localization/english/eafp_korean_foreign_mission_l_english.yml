l_english:

 je_korean_foreign_mission: "Foreign Mission"
 je_korean_foreign_mission_reason: "The court can no longer understand the outside world through rumor and interpreters' reports alone. Trusted officials must be sent abroad to observe foreign institutions, armies, industry, and diplomacy."
 je_korean_foreign_mission_complete_header: "Mission Returned"
 je_korean_foreign_mission_on_complete_header: "Mission Report"
 kor_foreign_mission_status_leader: "The mission leader has been chosen and the delegation is preparing to depart"
 kor_foreign_mission_status_leader_and_location: "The mission is circling the world and gathering observations"
 kor_foreign_mission_status_returning_home: "The mission is returning home"
 kor_foreign_mission_status_returned_home: "The mission has returned and is preparing its report"
 kor_foreign_mission_returned_home_tt: "The mission has returned and submitted its report"
 kor_foreign_mission_report_depends_on_leader_and_route_tt: "The effects of the report depend on the mission leader and whether the world tour was completed"
 has_completed_korean_foreign_mission_je_tt: "#b $je_korean_foreign_mission$#! completed"

 eafp_scripted_button_kor_foreign_mission_start: "Dispatch Mission"
 eafp_scripted_button_kor_foreign_mission_start_desc: "Send trusted officials abroad to study foreign institutions, armies, and industry."
 eafp_scripted_button_kor_foreign_mission_recall: "Recall Mission"
 eafp_scripted_button_kor_foreign_mission_recall_desc: "Order the foreign mission to return ahead of schedule."
 eafp_scripted_button_kor_foreign_mission_recall_location_tt: "The mission is abroad"
 eafp_scripted_button_kor_foreign_mission_recall_not_returned_tt: "The mission is not already returning home or returned"
 eafp_scripted_button_kor_foreign_mission_recall_effect_tt: "The mission cuts its itinerary short and returns home"

 eafp_kor_foreign_mission.1.t: "Foreign Mission"
 eafp_kor_foreign_mission.1.d: "The court has resolved to dispatch a foreign mission to observe other countries' institutions, armies, and industry firsthand. The question now is who should lead it."
 eafp_kor_foreign_mission.1.f: "\"A map on a desk seems to contain the world, but to one who has crossed the sea it is only folded paper.\""
 eafp_kor_foreign_mission.1.a: "Entrust [SCOPE.sCharacter('kor_foreign_mission_leader_1').GetFullName]."
 eafp_kor_foreign_mission.1.b: "Entrust [SCOPE.sCharacter('kor_foreign_mission_leader_2').GetFullName]."
 eafp_kor_foreign_mission.1.c: "Entrust [SCOPE.sCharacter('kor_foreign_mission_leader_3').GetFullName]."
 eafp_kor_foreign_mission.1.e: "Entrust [SCOPE.sCharacter('kor_foreign_mission_leader_4').GetFullName]."

 eafp_kor_foreign_mission.2.t: "Departure for the World Tour"
 eafp_kor_foreign_mission.2.d: "The mission is ready to depart on a long circuit by sea and land. Rather than studying one country alone, it will observe the institutions, armies, industry, and diplomacy that sustain power across the world."
 eafp_kor_foreign_mission.2.f: "Before the ship left port, the attendants checked their brushes, paper, dictionaries, and the court's letter once more."
 eafp_kor_foreign_mission.2.a: "Approve the world tour itinerary."
 eafp_kor_foreign_mission.2.b: "Study military and diplomatic practice across the world."
 eafp_kor_foreign_mission.2.c: "Broaden diplomacy and observation through the wider world."

 eafp_kor_foreign_mission.3.t: "First Report"
 eafp_kor_foreign_mission.3.d: "The mission's first report has arrived. They have witnessed unfamiliar institutions, machines, trained armies, and new diplomatic rituals, and have begun to understand the scale of the world beyond Korea."
 eafp_kor_foreign_mission.3.f: "\"Only after seeing it with our own eyes did we understand: strength comes not from words, but from institutions, finance, learning, and machines.\""
 eafp_kor_foreign_mission.3.a: "Extend the route and complete the world tour."

 eafp_kor_foreign_mission.4.t: "Around the World"
 eafp_kor_foreign_mission.4.d: "The mission has taken the longer route, inspecting ports and capitals, factories and assemblies, barracks and schools. Its notes are no mere travel diary, but a report on Korea's place in the world."
 eafp_kor_foreign_mission.4.f: "Every harbor brought different flags, languages, laws, and machines, yet everywhere the mission found that power rested on institutions as much as wealth or arms."
 eafp_kor_foreign_mission.4.a: "Organize the world tour journals and return home."
 eafp_kor_foreign_mission.4.b: "Study laws and learning across the world."
 eafp_kor_foreign_mission.4.c: "Organize notes on military systems and diplomatic practice."

 eafp_kor_foreign_mission.5.t: "Return Home"
 eafp_kor_foreign_mission.5.d: "The mission has returned. Its records of unfamiliar institutions, machines, and diplomatic rituals are extensive enough to unsettle the court's old order."
 eafp_kor_foreign_mission.5.f: "The chests were full of foreign newspapers, law books, factory diagrams, military manuals, and journals copied by the attendants each night."
 eafp_kor_foreign_mission.5.a: "Have them submit the report."

 eafp_kor_foreign_mission.6.t: "Mission Report"
 eafp_kor_foreign_mission.6.d: "The foreign mission's report has been submitted to the court. We must now decide how to apply these observations to state policy."
 eafp_kor_foreign_mission.6.f: "\"Institutions cannot be transplanted overnight, but if the country keeps its eyes closed, it may one day live under another's institutions.\""
 eafp_kor_foreign_mission.6.a: "Adopt the institutional reform proposals."
 eafp_kor_foreign_mission.6.b: "Prioritize technical and military reports."
 eafp_kor_foreign_mission.6.c: "Use it to broaden diplomatic trust."

 eafp_kor_foreign_mission.10.t: "A Secret Study Tour"
 eafp_kor_foreign_mission.10.d: "As word of the mission spreads, scholars at home submit furious petitions against sending officials overseas. Some stratagem is needed to get the mission safely out of the country."
 eafp_kor_foreign_mission.10.f: "\"To board a Western ship is to walk willingly into barbarian deception. How can a land of the sages open such a path first?\""
 eafp_kor_foreign_mission.10.a: "Disguise them as secret inspectors."
 eafp_kor_foreign_mission.10.b: "Rebuke the shut-ins and send them proudly!"

 eafp_kor_foreign_mission.11.t: "Receive Them with the Highest Courtesy"
 eafp_kor_foreign_mission.11.d: "While receiving the head of state of [SCOPE.sCountry('kor_foreign_mission_host_country').GetName], the mission leader is startled by an unexpected entrance and prostrates himself in a full bow."
 eafp_kor_foreign_mission.11.f: "\"The robes were immaculate, but the etiquette differed. While the interpreter flushed, the room could not decide whether the deep bow was insult or reverence.\""
 eafp_kor_foreign_mission.11.a: "It is our most sincere courtesy."
 eafp_kor_foreign_mission.11.b: "Practice the Western handshake next time..."

 eafp_kor_foreign_mission.12.t: "A Light Kindled by Devilry"
 eafp_kor_foreign_mission.12.d: "At a factory in [SCOPE.sCountry('kor_foreign_mission_host_country').GetName], the mission sees electric lighting. With one switch the room shines like daylight, leaving the delegation stunned."
 eafp_kor_foreign_mission.12.f: "\"There was no lamp and no oil, yet night became day. One attendant whispered of devils; another wrote that heaven's principles had been caught in a machine.\""
 eafp_kor_foreign_mission.12.a: "This light must shine in Korea too!"

 eafp_kor_foreign_mission.13.t: "The Moving Room"
 eafp_kor_foreign_mission.13.d: "In a tall hotel in [SCOPE.sCountry('kor_foreign_mission_host_country').GetName], the mission boards an elevator. As the room lurches upward, several attendants collapse to the floor thinking an earthquake has struck."
 eafp_kor_foreign_mission.13.f: "\"The door closed and the room ran upward. One attendant clutched the floor, certain the whole building had been lifted into the sky.\""
 eafp_kor_foreign_mission.13.a: "Western machines are truly fearsome."

 eafp_kor_foreign_mission.14.t: "Strangers Fit for Portraits"
 eafp_kor_foreign_mission.14.d: "Crowds gather around the mission as it walks through [SCOPE.sCountry('kor_foreign_mission_host_country').GetName]. Newspapers rush to print illustrations of their hats and robes."
 eafp_kor_foreign_mission.14.f: "\"Children ran after the black hats, and illustrators struggled to capture the topknots. The gaze was sometimes mockery, sometimes unmistakable curiosity.\""
 eafp_kor_foreign_mission.14.a: "Let Korea's dignity be known."
 eafp_kor_foreign_mission.14.b: "Perhaps it is time to consider Western dress..."

 eafp_kor_foreign_mission.15.t: "The Fire-Breathing Arsenal"
 eafp_kor_foreign_mission.15.d: "At a vast arsenal in [SCOPE.sCountry('kor_foreign_mission_host_country').GetName], the mission watches steam machinery turn out guns and ammunition without rest."
 eafp_kor_foreign_mission.15.f: "\"Iron left the fire and entered the mouth of a machine; identical barrels were stacked in rows. Standard and steam were faster than any craftsman's hand.\""
 eafp_kor_foreign_mission.15.a: "We must build such an arsenal at once!"
 eafp_kor_foreign_mission.15.b: "The principle of the machine comes before the gun."

 eafp_kor_foreign_mission.17.t: "A Letter Across a Thousand Li"
 eafp_kor_foreign_mission.17.d: "Inspecting the post and telegraph offices of [SCOPE.sCountry('kor_foreign_mission_host_country').GetName], the mission marvels at a system that sends news across vast distances in moments."
 eafp_kor_foreign_mission.17.f: "\"The letter used neither horse nor ship. News came down a metal wire and landed on the bureau's desk.\""
 eafp_kor_foreign_mission.17.a: "A wondrous technology for the state's lifeblood."

 eafp_kor_foreign_mission.18.t: "A Night of Brush-Written Debate"
 eafp_kor_foreign_mission.18.d: "Unable to speak easily with scholars in [SCOPE.sCountry('kor_foreign_mission_host_country').GetName], the mission takes up paper and brushes to communicate through written characters. The night's exchange becomes a valuable report on foreign learning."
 eafp_kor_foreign_mission.18.f: "\"Their mouths were closed, but their brushes were busy. Classics, machines, and laws crossed the same sheet of paper.\""
 eafp_kor_foreign_mission.18.a: "The language of learning crosses borders."

