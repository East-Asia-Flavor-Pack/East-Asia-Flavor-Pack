 chi_war_dynamism.2.t: "[SCOPE.sState('target_state').GetName]的命运"
 chi_war_dynamism.2.d: "随着[SCOPE.sCountry('state_controller').GetName]军队占领[SCOPE.sState('target_state').GetName]足够长的时间，对[SCOPE.sState('target_state').GetName]的控制已经完全脱离了[SCOPE.sCountry('state_owner').GetName]的手中。因此，敌军的士气大增，而我军则明显出现了动摇。"
 chi_war_dynamism.2.a: "不！"

 chi_war_dynamism.3.t: "[SCOPE.sState('target_state').GetName]的命运"
 chi_war_dynamism.3.d: "随着[SCOPE.sCountry('state_controller').GetName]军队占领[SCOPE.sState('target_state').GetName]足够长的时间，[SCOPE.sCountry('state_controller').GetName]政府的影响力终于开始在一定程度上触及[SCOPE.sState('target_state').GetName]。我军对此感到非常高兴，而[SCOPE.sCountry('state_owner').GetName]军队则明显出现了动摇。"
 chi_war_dynamism.3.a: "胜利是我们的！"

 je_reunify_china_warlord: "军阀时代"
 je_reunify_china_warlord_reason: "随着中央政府权威的崩溃，各种军事势力在全中国各地涌现并开始竞争。要重建成为废墟的中国，必须成为超越简单的#bold $gov_warlord_state$#!的存在。\n\n在此[concept_journal_entry]激活期间，较弱的军阀州更有可能相互支持以对抗较强的州。"

