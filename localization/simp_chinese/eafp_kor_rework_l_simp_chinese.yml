 concept_eafp_regent_lv2_desc: "#V 效果#!\n• #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!可剥削地区，从而[concept_eafp_sedo_politics_pocket_money]资金并导致@eafp_state_adm![concept_eafp_landlvl_adm]下降。\n• #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!可剥削地区，从而[concept_eafp_sedo_politics_pocket_money]资金并导致@eafp_state_mil![concept_eafp_landlvl_mil]下降。\n• #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!可剥削地区，从而[concept_eafp_sedo_politics_pocket_money]资金并导致@eafp_state_civ![concept_eafp_landlvl_civ]下降。\n• #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!可挑起礼法之争，暂时降低[concept_legitimacy]。\n#weak 同样适用所有先前阶段的效果。#!"
