 eafp_kor_foreign_mission.1.t: "Foreign Mission"
 eafp_kor_foreign_mission.1.d: "The court has resolved to dispatch a foreign mission to observe other countries' institutions, armies, and industry firsthand. The question now is who should lead it."
 eafp_kor_foreign_mission.1.f: "\"A map on a desk seems to contain the world, but to one who has crossed the sea it is only folded paper.\""
 eafp_kor_foreign_mission.1.a: "Entrust [SCOPE.sCharacter('kor_foreign_mission_leader_1').GetFullName]."
 eafp_kor_foreign_mission.1.b: "Entrust [SCOPE.sCharacter('kor_foreign_mission_leader_2').GetFullName]."
 eafp_kor_foreign_mission.1.c: "Entrust [SCOPE.sCharacter('kor_foreign_mission_leader_3').GetFullName]."
 eafp_kor_foreign_mission.1.e: "Entrust [SCOPE.sCharacter('kor_foreign_mission_leader_4').GetFullName]."

 eafp_kor_foreign_mission.2.t: "Departure for the World Tour"
 eafp_kor_foreign_mission.2.d: "The mission is ready to depart on a long circuit by sea and land. Rather than studying one country alone, it will observe the institutions, armies, industry, and diplomacy that sustain power across the world."
 eafp_kor_foreign_mission.2.f: "Before the ship left port, the attendants checked their brushes, paper, dictionaries, and the court's letter once more."
 eafp_kor_foreign_mission.2.a: "Approve the world tour itinerary."
 eafp_kor_foreign_mission.2.b: "Study military and diplomatic practice across the world."
 eafp_kor_foreign_mission.2.c: "Broaden diplomacy and observation through the wider world."

 eafp_kor_foreign_mission.3.t: "First Report"
 eafp_kor_foreign_mission.3.d: "The mission's first report has arrived. They have witnessed unfamiliar institutions, machines, trained armies, and new diplomatic rituals, and have begun to understand the scale of the world beyond Korea."
 eafp_kor_foreign_mission.3.f: "\"Only after seeing it with our own eyes did we understand: strength comes not from words, but from institutions, finance, learning, and machines.\""
 eafp_kor_foreign_mission.3.a: "Extend the route and complete the world tour."

 eafp_kor_foreign_mission.4.t: "Around the World"
 eafp_kor_foreign_mission.4.d: "The mission has taken the longer route, inspecting ports and capitals, factories and assemblies, barracks and schools. Its notes are no mere travel diary, but a report on Korea's place in the world."
 eafp_kor_foreign_mission.4.f: "Every harbor brought different flags, languages, laws, and machines, yet everywhere the mission found that power rested on institutions as much as wealth or arms."
 eafp_kor_foreign_mission.4.a: "Organize the world tour journals and return home."
 eafp_kor_foreign_mission.4.b: "Study laws and learning across the world."
 eafp_kor_foreign_mission.4.c: "Organize notes on military systems and diplomatic practice."

 eafp_kor_foreign_mission.5.t: "Return Home"
 eafp_kor_foreign_mission.5.d: "The mission has returned. Its records of unfamiliar institutions, machines, and diplomatic rituals are extensive enough to unsettle the court's old order."
 eafp_kor_foreign_mission.5.f: "The chests were full of foreign newspapers, law books, factory diagrams, military manuals, and journals copied by the attendants each night."
 eafp_kor_foreign_mission.5.a: "Have them submit the report."

 eafp_kor_foreign_mission.6.t: "Mission Report"
 eafp_kor_foreign_mission.6.d: "The foreign mission's report has been submitted to the court. We must now decide how to apply these observations to state policy."
 eafp_kor_foreign_mission.6.f: "\"Institutions cannot be transplanted overnight, but if the country keeps its eyes closed, it may one day live under another's institutions.\""
 eafp_kor_foreign_mission.6.a: "Adopt the institutional reform proposals."
 eafp_kor_foreign_mission.6.b: "Prioritize technical and military reports."
 eafp_kor_foreign_mission.6.c: "Use it to broaden diplomatic trust."

