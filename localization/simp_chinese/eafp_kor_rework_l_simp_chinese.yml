 je_samjeong_ijeongcheong_reason: "在全国骚乱之后，为了解决[SCOPE.GetRootScope.GetCountry.GetRuler.GetFullName]统治下三政的弊端，设立了机构“三政釐整厅”。其评价将取决于它能否在期限内稳定税政、军役、民生、财政与王权。\n\n#bold 改革目标#!：#v [SCOPE.GetRootScope.GetCountry.MakeScope.ScriptValue('samjeong_ijeongcheong_goals_completed')|0]#!/#v 9#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_adm_stable')] [concept_eafp_landlvl_adm]达到$land_problem_lvl_4$以上\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_mil_stable')] [concept_eafp_landlvl_mil]达到$land_problem_lvl_4$以上\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_civ_stable')] [concept_eafp_landlvl_civ]达到$land_problem_lvl_4$以上\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_bureaucracy')] [concept_bureaucracy]至少为#v 100#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_radicals')] [Concept('concept_radical', '$concept_radicals$')]比例不高于10%\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_gdp')] [concept_gdp]比三政釐整厅设立时增长至少25%\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_sedo_balance')] [concept_eafp_sedo_politics_balance]不高于50\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_lower_sol')] 平均[concept_sol]至少为9\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_fiscal_health')] 资[concept_gold_reserves]不低于上限的10%，且每周收入不低于0"

