 chinese_westernization.1.t: "Establishment of Zongli Yamen"
 chinese_westernization.1.d: "Due to successive conflicts with Western nations, the imperial court established a new institution to handle diplomacy with the West and introduce their technology: the Zongli Geguo Shiwu Yamen, or Zongli Yamen for short."
 chinese_westernization.1.f: "\"The truth of the world is that when exhausted, one changes; having changed, one passes through. Today's literati mock Western technology as evil tricks, but when war breaks out, they are helplessly astounded by its power.\n\nNow, if China is to strengthen itself, we must learn the barbarians' weapons. Only by acquiring machines to make machines and treating technicians well will talented people gather like clouds to become the strength of the nation.\""
 chinese_westernization.1.a: "Is the world changing?"
 chinese_westernization.101.t: "Emergence of Militia Forces"
 chinese_westernization.101.d: "While rebellions continue in the south, people in various places are arming themselves to suppress the uprisings. Rumor has it that even Westerners are joining them."
 chinese_westernization.101.a: "Could we make use of that?"
 chinese_westernization.101.tt: "You can now mobilize militias in the Decisions tab."
 chi_militia_has_emerged: "Militia Forces Emerged"
