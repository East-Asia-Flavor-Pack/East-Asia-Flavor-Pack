l_simp_chinese:
 je_eafp_joseon_qing_war: "朝清战争"
 je_eafp_joseon_qing_war_reason: "朝鲜与清国之间爆发了战争。这并非单纯的边境冲突，而是旧有朝贡秩序将崩塌还是再次强化的分水岭。"
 je_eafp_joseon_qing_war_goal: "结束与清国的战争，并避免成为清国的附庸。"

 eafp_joseon_qing_war_events.1.t: "鸭绿江彼岸的炮声"
 eafp_joseon_qing_war_events.1.d: "朝鲜与清国之间的战争开始了。"
 eafp_joseon_qing_war_events.1.f: "备边司的灯火彻夜未熄。北方驿骑带来了边境炮声的消息，大臣们彼此打量。有人仍想起礼部的文书，也有人说朝鲜已不能再以册封之名低头。"
 eafp_joseon_qing_war_events.1.a: "天下秩序正在动摇。"

 eafp_joseon_qing_war_events.2.t: "重立国体"
 eafp_joseon_qing_war_events.2.d: "与清国的战争结束了，朝鲜没有落入清国支配之下。"
 eafp_joseon_qing_war_events.2.f: "战尘落定后，朝廷开始寻找新秩序的语言。旧礼不再如往昔那般稳固，百姓也开始谈论朝鲜凭自身撑过了此战。"
 eafp_joseon_qing_war_events.2.a: "朝鲜将自立于世。"

 eafp_joseon_qing_war_events.3.t: "社稷蒙羞"
 eafp_joseon_qing_war_events.3.d: "与清国的战争以朝鲜屈服告终。"
 eafp_joseon_qing_war_events.3.f: "战争已经结束，但朝廷的沉默更深了。人们追问败战之责，街巷中屈辱与愤怒几乎成了同一个词。"
 eafp_joseon_qing_war_events.3.a: "这份耻辱将长久留存。"

 eafp_joseon_qing_war_events.10.t: "义州补给路"
 eafp_joseon_qing_war_events.10.d: "北方前线的补给问题摆在了朝廷面前。"
 eafp_joseon_qing_war_events.10.f: "通往义州的道路上，运粮车与逃难人群混杂在一起。军报说粮草不足，地方官则哀诉百姓已被征发到难以承受。"
 eafp_joseon_qing_war_events.10.a: "将粮草集中送往前线。"
 eafp_joseon_qing_war_events.10.b: "让地方承担更多。"
 eafp_joseon_qing_war_events.10.c: "必须保全朝廷财政。"

 eafp_joseon_qing_war_events.11.t: "难民与军粮"
 eafp_joseon_qing_war_events.11.d: "战乱中的难民与军粮需求发生了冲突。"
 eafp_joseon_qing_war_events.11.f: "饥民聚集在官衙门前，军营里也在喊着明日之米已不足。救一方，似乎另一方就会倒下。"
 eafp_joseon_qing_war_events.11.a: "发放赈济粮。"
 eafp_joseon_qing_war_events.11.b: "军粮优先。"
 eafp_joseon_qing_war_events.11.c: "借助乡村组织。"

 eafp_joseon_qing_war_events.12.t: "义兵与上疏"
 eafp_joseon_qing_war_events.12.d: "反清舆论和义兵动员正在要求朝廷回应。"
 eafp_joseon_qing_war_events.12.f: "各地儒生与乡吏纷纷上疏，壮丁也自愿拿起刀枪。这股热情既可能支撑战争，也可能化作朝廷控制之外的火焰。"
 eafp_joseon_qing_war_events.12.a: "鼓励义兵。"
 eafp_joseon_qing_war_events.12.b: "接纳上疏。"
 eafp_joseon_qing_war_events.12.c: "严格管控武装。"

 eafp_joseon_qing_war_events.13.t: "冬将军"
 eafp_joseon_qing_war_events.13.d: "严寒笼罩了北方前线。"
 eafp_joseon_qing_war_events.13.f: "大雪吞没道路，士卒以冻僵的手摆弄火绳。敌军尚未攻营，冬天已经先一步发动了进攻。"
 eafp_joseon_qing_war_events.13.a: "优先发放御寒物资。"
 eafp_joseon_qing_war_events.13.b: "允许就地征发。"
 eafp_joseon_qing_war_events.13.c: "放缓攻势。"

 eafp_joseon_qing_war_events.14.t: "炮弹中的沙子"
 eafp_joseon_qing_war_events.14.d: "劣质军需品与采购舞弊被揭露了。"
 eafp_joseon_qing_war_events.14.f: "炮弹被打开时，先落下的不是铁片，而是沙子。军营愤怒，官署试图藏起文书，工厂主则把一切归咎于战时混乱。"
 eafp_joseon_qing_war_events.14.a: "严惩相关人员。"
 eafp_joseon_qing_war_events.14.b: "暂且掩盖。"
 eafp_joseon_qing_war_events.14.c: "改革军需采购。"

 eafp_joseon_qing_war_events.15.t: "败将自尽"
 eafp_joseon_qing_war_events.15.d: "一名将领打算以死承担败战责任。"
 eafp_joseon_qing_war_events.15.f: "军帐中的剑已经出鞘。[SCOPE.sCharacter('defeated_general').GetFullName]称败战之罪无法以余生偿还。朝廷必须决定，是将其死记录为忠节，还是化作军制改革的理由。"
 eafp_joseon_qing_war_events.15.a: "表彰其忠节。"
 eafp_joseon_qing_war_events.15.b: "以此开启军制改革。"
 eafp_joseon_qing_war_events.15.c: "悄悄掩盖败战。"

 eafp_joseon_qing_war_events.16.t: "大火"
 eafp_joseon_qing_war_events.16.d: "战乱之中，一场大火蔓延开来。"
 eafp_joseon_qing_war_events.16.f: "火焰不分仓库与民居。没人能确定它来自炮击、纵火，还是逃难者的失误。对站在灰烬中的百姓而言，救济比追究原因更加迫切。"
 eafp_joseon_qing_war_events.16.a: "优先救济与灭火。"
 eafp_joseon_qing_war_events.16.b: "先保住军需仓。"
 eafp_joseon_qing_war_events.16.c: "惩办责任者。"

