 heavenly.101.t: "不熟悉的大海"
 heavenly.101.d: "[ROOT.GetCountry.GetName]正在崛起，但在海运方面存在困难。 我们的大部分军队来自华南内陆，平时没有接触过大海。"
 heavenly.101.f: "\"我们都是农民出身。 升帆和掌舵对我们来说很陌生。 如果努力的话，也许能让一艘船航行，但再多就难了。\""
 heavenly.101.a: "先把满洲人打倒再说。"
 taiping_unfamiliar_sea: "陌生的海洋"

 heavenly.102.t: "厘金"
 heavenly.102.d: "最近有官员实行向商人收取捐款以充实军费的方案。如果将此制度化，对商品的流通征税，将是弥补税收不足的好方法。"
 heavenly.102.f: "臣日夜思索，寻求既不损害百姓，又有益于军饷，并且可以长期方便百姓的方法，认为莫如商人捐厘之法最为合适。里下河地区稻米丰富且价格低廉，曾派遣官员前往扬州城附近的仙女庙、邵伯、宜陵、张网沟等镇，略微模仿前总督林则徐的一文愿之法，劝说米行捐厘助饷，每石米捐钱五十文，每升仅捐半文，对民生毫无影响，但积少成多。自去年九月至今，仅这几个镇，米行就捐了近二万石。此法既不扰民，又不累商，数月以来，商民相安无事。\n\n臣认为此法对商民都有利，且细水长流，源源不断，对军需有实际帮助，因此现在再次将此法推广到里下河各州县的米行，以及各大商铺，一律照捐，大约每百分之一分，甚至有不到一分的，令各州县会同官员斟酌商议，禀明出示起捐，小商铺和手艺人等一律免除，以示体恤，现在仙女庙各商铺均已商议妥当，已于三月初十日起捐，并将该镇所立章程刊刻印刷，发给各州县照办，待里下河各处劝齐起捐，究竟可以收捐多少，自应随时据实奏闻，如果数额较多，不仅臣营可以用于守御，还可以协助济琦善军需。"
 heavenly.102.a: "真是个好主意。"

 heavenly.103.t: "南洋诸国的脱离"
 heavenly.103.d: "随着太平天国之乱的持续，[ROOT.GetCountry.GetName]被迫将所有资源集中于平定内乱。结果，南洋各个朝贡国开始脱离[ROOT.GetCountry.GetName]的影响圈。"
 heavenly.103.f: "大臣奏曰：\"贼寇扰乱江南，民心惶惶，朝廷兵力分散各地。因此，南洋诸国不再进贡，与西洋夷人勾结。安南与暹罗等已开始无视朝廷权威，夷人正在这些地区扩张势力。\""
 heavenly.103.a: "平定内乱后，我们将重新收服南洋。"

 heavenly.1003.t: "陌生的海洋"
 heavenly.1003.d: "在[ROOT.GetCountry.GetName]崛起之际，海军力量的运用存在困难。因为我们的大部分士兵都来自华南内陆，平时没有接触过海洋的经验。"
 heavenly.1003.f: "“儒学的教义常常充满虚荣和荒谬。士人崇拜文昌和魁星的偶像，恳求他们的庇护，以拓宽他们的知识，加快他们的智力，以便在科举考试中名列前茅。\n\n既然每个人都崇拜这两个偶像，那么为什么会有这么多人从小就学习和参加考试，直到七八十岁仍然没有通过最低级别的考试，更不用说通过更高级别的考试了？\n\n由此可见，这些儒生被他们的野心所迷惑和痴迷，所以他们执着于他们的妄想，崇拜这些偶像，而不是以谦卑的心崇拜天地之主，统治整个世界及其所有财富和荣耀的上帝，从而符合大道的圣洁原则。”"
 heavenly.1003.a: "先把满洲人打倒再说。"
 departure_of_south_sea_nations_modifier: "南洋诸国脱离"

 heavenly.1002.t: "天国的分裂"
 heavenly.1002.d: "太平天国内部权力斗争结束后，天国二号人物东王被暗杀，无法控制的混乱持续不断。"
 heavenly.1002.f: "早在拜上帝会刚成立时，东王就与天王一起，受到领导的信任，掌握了很大的权力。然而，随着势力的增长，他逐渐堕落，开始专横跋扈。起初是从小小的傲慢开始，逐渐发展到不仅无视其他几位王，甚至想要凌驾于天王之上。\n\n因此，天王判断不能再放任不管，秘密命令北王讨伐已经严重偏离轨道的东王。然而，天王没有想到的是，麾下将领之间的矛盾比他想象的还要深，北王在讨伐东王的过程中，甚至屠杀了东王的数万士兵。\n\n天国的内讧现在已经到了连天王都难以轻易控制的地步。"
 heavenly.1002.a: "长江被鲜血染红。"
 internal_conflict_in_tpg: "太平天国的内讧"
 taiping_coup_aftermath_modifier: "天国政变的余波"

 heavenly.1004.t: "渐熄的革命之火"
 heavenly.1004.d: "支撑太平天国的热忱已经消散。在清朝被逐出之前，信仰与胜利的许诺先行崩塌。"
 heavenly.1004.f: "\"起初，所有人都相信天命。但战争拖得太久，应许的新世界迟迟未至。如今士兵互相猜疑，百姓只以沉默回应。\""
 heavenly.1004.a: "天国原来立在沙上。"

 heavenly.1005.t: "天国大义"
 heavenly.1005.d: "清朝已无法阻挡太平天国的道路。在革命热忱消失之前，我们震动了中原，证明了天国的大义。"
 heavenly.1005.f: "\"胜利的消息传到各营时，士兵高举旗帜。长久侵蚀我们的疑虑被欢呼掩盖，天国之名再次获得力量。\""
 heavenly.1005.a: "看啊，天命已转向何处。"

 heavenly.1008.t: "天国政变"
 heavenly.1008.d: "趁着天王的正统性与威望崩塌，显赫将领和不满领袖开始夺取权力。宫廷与军营发出互相冲突的命令，军队已不知道该向谁效忠。"
 heavenly.1008.f: "\"比城外敌人更可怕的，是城内传来的两道命令。一个谈论天意，另一个以刀剑说话。\""
 heavenly.1008.a: "军队将锋刃指向了天国之心。"

 # 第1次鸦片战争

 je_qing_opium_obsession: "鸦片论争"
 je_qing_opium_obsession_status: "皇帝的最终决定将左右[JournalEntry.GetCountry.GetName]的命运。"
 je_qing_opium_obsession_reason: "鸦片问题已经到了威胁国家存亡的地步。随着鸦片进口急剧增加，白银外流达到了严重水平，百姓的健康和社会秩序正在崩溃。\n\n在朝廷内部，为了解决这个问题，#bold 两种截然相反的立场#!正在激烈对立。\n\n主张#bold 弛禁论（厘金论）#!的臣子们提出了务实的方法。通过合法化鸦片并征收重税来提高价格，自然减少消费，同时增加国库收入以解决白银外流问题。\n\n另一方面，领导#bold 严禁论#!的大臣们将其视为道德问题。鸦片是必须消除的“恶”，警告如果不加抑制，国家将没有种地的农民、交税的百姓、学习的学子和打仗的士兵。"

 first_opium_war.1.t: "鸦片危机"
 first_opium_war.1.d: "尽管自 1799 年以来颁布了多项法令，但鸦片的蔓延丝毫没有停止的迹象。"
 first_opium_war.1.f: "用夷人的泥土换取中国的白银，真是令人遗憾。而且可以肯定的是，国内的人民会四处流浪，四处乞讨，浪费时间，失去生计。"
 first_opium_war.1.a: "必须采取新的措施。"

 first_opium_war.2.t: "许乃济的奏疏"
 first_opium_war.2.d: "太常寺少卿许乃济上疏奏请鸦片事宜。他说，对鸦片的管制越严厉，由此产生的弊端就越广泛，并紧急要求改变鸦片制度。"
 first_opium_war.2.f: "所有西方国家都向他们的船只开放市场超过一千年，只有英国人是鸦片商人，为了阻止英国的贸易而切断与所有其他国家的贸易是错误的。此外，沿海数十万人的生计完全依赖贸易，我们应该如何对待他们？更重要的是，公海上的外国船只可以选择任何岛屿作为锚地进行修理，船只可以在那里与他们会面，因此我们无法切断贸易。近年来，外国船只访问了福建、浙江、江南、山东的所有港口，甚至天津和满洲，以销售鸦片。据说，虽然他们被地方当局暂时驱逐，但他们销售的数量并不少。因此，我们应该切断广州的贸易，但我们似乎无法阻止走私。\n\n现在关闭港口不是答案，而且鸦片法相当无效，所以剩下的唯一方法是恢复以前的制度，允许外国商人支付鸦片的关税并将其作为药物进口，在通过海关后，只将其作为商品交付给公行，而不支付任何款项。一旦外国人意识到他们需要支付的关税金额低于他们现在行贿的金额，他们就会愿意遵守。外国货币应被视为与元宝相同，其外流也应同样被禁止。如果罪犯被抓获，他们可能拥有的鸦片应被彻底摧毁，钱财应被没收以进行惩罚。"
 first_opium_war.2.a: "鸦片的危害已经昭然若揭，即便如此，怎么能允许这种毒药存在呢？"

 first_opium_war.3.t: "袁玉麟的奏疏"
 first_opium_war.3.d: "江南道御史袁玉麟上疏关于鸦片问题。他强烈反对最近朝廷内抬头的弛禁论，承认禁烟政策的困难，但警告开放禁令才是招致更大灾难的做法。"
 first_opium_war.3.f: "今日之弊，百事皆以“不能”三字为借口，其中最懂变通敷衍的，莫过于鸦片解禁之议。解禁鸦片无异于撤去藩篱，豢养虎狼。鸦片进口税的征收额每年不过十至二十万两，对税银贡献甚微。反之，若放宽禁令，吸食鸦片的人会越来越多，鸦片进口会增加，结果白银的外流也会增加。此外，如果允许在中国种植罂粟，愚民为了追求利益会放弃农业，肥沃的土地将变成鸦片田。即使每天禁止士兵吸食，最终完全禁止的日子也永远不会到来。天下之患，最莫大于一发不可收拾。"
 first_opium_war.3.a: "此人的话也有些道理。"

 first_opium_war.4.t: "许球的奏疏"
 first_opium_war.4.d: "兵科给事中许球上疏关于鸦片问题。他指出了主张放宽禁令同时加以控制的弛禁论的矛盾。"
 first_opium_war.4.f: "臣听闻弛禁论者的主张，深感担忧。放宽鸦片禁令，既然已经不禁止买卖，又如何能禁止人们吸食？如果只禁止官僚和士兵，官员和士兵都出自百姓，又如何能提前防范？更何况，明知是毒物，却允许其流行，怎么能再对其征税？在这伟大的天朝，不应有这样的政治。用毒物养育百姓，并从毒物中获取利益，这难道是圣人的政治吗？"
 first_opium_war.4.a: "你是说弛禁论有很多矛盾吗？"

