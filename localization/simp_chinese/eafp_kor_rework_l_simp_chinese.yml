 je_korean_land_problem_reason: "曾经朝鲜引以为傲的优秀官僚体系，在经过两乱和数百年的岁月后，逐渐崩溃，曾经支撑行政和民生的东西，现在反而成了束缚百姓的枷锁，正在腐烂。\n\n要革除弊端，匡正国家纲纪，为此，必须细致地处理构成社会的三大平衡轴。"
