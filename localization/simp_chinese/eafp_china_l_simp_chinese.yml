 chinese_westernization.501.t: "伟大的收复"
 chinese_westernization.501.d: "经过多年的斗争，我们终于成功收回了所有失去的领土。[ROOT.GetCountry.GetNameNoFlag]结束了外国统治，并在世界舞台上恢复了作为一个引人注目的力量的地位。"
 chinese_westernization.501.f: "中国在外国列强的魔爪下受了多久的苦，有多少土地和资源被他们掠夺。但今天，一切都改变了。今天，载着最后一批外国人的船离开了[ROOT.GetCountry.GetAdjectiveNoFormatting]的海岸。\n\n一名男子站在离海岸大约两里的山丘上，看着这艘船起航驶向公海。就在它消失在地平线的那一刻，他知道，这场胜利对整个中国来说仅仅是个开始。凭借坚定的决心和新的目标感，中国将在世界强国中重获其应有的地位。"
 chinese_westernization.501.a: "我们绝不再四分五裂。"
 chi_the_restoration_of_land_sovereignty: "恢复领土主权"

 chinese_westernization.502.t: "唇亡齿寒"
 chinese_westernization.502.d: "随着[SCOPE.sCountry('kor_scope').GetName]成为[ROOT.GetCountry.GetAdjectiveNoFormatting]的完全藩属国，[ROOT.GetCountry.GetNameNoFlag]的防线变得更加稳固。"
 chinese_westernization.502.f: "中国所锺爱的国家，无有如朝鲜者。朝鲜之隶我藩服，已历千年。中国之以德绥之，以恩怀之，初未尝有一毫觊觎其土地人民之意，此天下之所共信也。按西国通例，两国交战，局外之国，当守中立，不得偏助一方，惟属国则为例外。今日朝鲜事大，固当倍加奋勉，使天下之人，知朝鲜与我为一家。" # 조선책략
 chinese_westernization.502.a: "东方安宁了。"
 chiwes502a: "朝鲜降服"

 chinese_westernization.503.t: "丧失朝鲜"
 chinese_westernization.503.d: "失去[SCOPE.sCountry('kor_scope').GetName]使[ROOT.GetCountry.GetAdjectiveNoFormatting]的防线岌岌可危。"
 chinese_westernization.503.f: "长期作为清朝朝贡国的朝鲜宣布了完全独立。“如此依附中华的国家竟会这般反叛，清朝难道注定要灭亡了吗？”礼部的一位官员这样哀叹道。\n\n此外，这也给清朝的边防造成了巨大的漏洞。无论是陆路还是海路，都更容易受到敌人的入侵。"
 chinese_westernization.503.a: "满洲现在更加危险了。"
 chiwes503a: "丧失朝鲜"

 chinese_westernization.504.t: "越南降服"
 chinese_westernization.504.d: "随着[SCOPE.sCountry('dai_scope').GetName]成为[ROOT.GetCountry.GetAdjectiveNoFormatting]的完全藩属国，[ROOT.GetCountry.GetNameNoFlag]的防线变得更加稳固。"
 chinese_westernization.504.a: "南方安宁了。"
