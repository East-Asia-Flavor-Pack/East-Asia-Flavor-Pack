 eafp_taiwan_survey_decision: "考察台湾航路"
 eafp_taiwan_survey_decision_desc: "动用琉球港口与朝鲜水军，调查台湾的水路、港口与市集联络网，提高台湾影响力。"
 button_je_eafp_taiwan_demand: "要求割让台湾"
 button_je_eafp_taiwan_demand_desc: "凭借台湾影响力，向$STATE_FORMOSA$的现有所有国要求移交行政权。接受的国家只会移交其所拥有的台湾部分，拒绝的国家则只会给予朝鲜对其所拥有台湾部分的宣称。\n\n当前优先目标接受概率：#v [GetPlayer.MakeScope.ScriptValue('eafp_taiwan_demand_acceptance_chance_value')|v0]%#!\n基础#v 50%#!。现有所有国的海军力量投射低于朝鲜时#p +35%#!，高于朝鲜时#n -35%#!。现有所有国处于战争时#p +15%#!。若台湾被分割，各所有国会分别接受或拒绝。"
 eafp_taiwan_influence_100_tt: "台湾影响力已达到#v 100#!"
 eafp_taiwan_survey_force_effect_tt: "台湾影响力#P +20#!，国库支出增加，与现有所有国关系恶化"
 eafp_taiwan_survey_careful_effect_tt: "台湾影响力#P +12#!，国库支出增加，与琉球关系改善"
 eafp_taiwan_demand_acceptance_chance_tt: "若朝鲜海军更强，或目标国正处于战争，对方更可能接受要求。"
 eafp_taiwan_demand_refusal_chance_tt: "若目标国拒绝，朝鲜将获得对台湾的宣称，关系也会恶化。"
 eafp_taiwan_demand_accepted_tt: "朝鲜接收$STATE_FORMOSA$"
 eafp_taiwan_demand_rejected_tt: "朝鲜获得对$STATE_FORMOSA$的宣称"
 eafp_taiwan_route_documents: "台湾航路文书"
 eafp_taiwan_route_documents_desc: "台湾的水路、港口与通译记录正在支撑朝鲜对南方海域的治理。"
 eafp_ryukyu.6.t: "考察台湾水路"
 eafp_ryukyu.6.d: "驶往台湾的考察船从琉球港口出发，开始搜集水路、港口与通译记录。"
 eafp_ryukyu.6.f: "通往台湾的海域并非地图上的空白。\n\n琉球水手讲述风向转变的时节，朝鲜军官记下暗礁与港口。译官将闽南语与琉球语并排转写，商人则询问哪处市集收纳白银与木材。\n\n朝廷的命令并非单纯考察。知晓台湾水路的国家，也能在台湾问题上更有力地发言。"
 eafp_ryukyu.6.a: "强势推进水路。"
 eafp_ryukyu.6.b: "雇用琉球向导与书吏。"
 eafp_ryukyu.7.t: "台湾割让要求"
 eafp_ryukyu.7.d: "朝鲜以台湾航路与当地联络网为依据，要求移交台湾行政权。"
 eafp_ryukyu.7.f: "文书很短，但其背后的航海记录却很厚。\n\n琉球港口、台湾港口、市集语言、通译账册被连成一行。朝鲜并非只是索要岛屿。它同时送去了自己已经往来此海、支付成本并承担风险的事实。\n\n台湾的现有所有国如今必须阅读这些句子。更准确地说，是阅读句子背后的船只与航路。"
 eafp_ryukyu.7.a: "移交台湾，避免冲突。"
 eafp_ryukyu.7.b: "拒绝。文书并不会变成土地。"
 eafp_ryukyu.8.t: "接收台湾"
 eafp_ryukyu.8.d: "现有所有国接受了朝鲜的要求，台湾行政权转交给朝鲜。"
 eafp_ryukyu.8.f: "台湾文书渡海而归。\n\n这一次，它不再是调查报告，而是写明港口、官署与税册应随哪一枚印玺的文书。\n\n朝廷欣喜，却并未轻笑。获得一座岛屿，便是获得一条航路；获得一条航路，便意味着每年都要投入人员、船只与国库。\n\n南方海域如今更近了。因此也更沉重了。"
 eafp_ryukyu.8.a: "接收台湾账册。"
 eafp_ryukyu.9.t: "被拒绝的台湾文书"
 eafp_ryukyu.9.d: "台湾现有所有国拒绝了朝鲜的割让要求，朝廷则将这一拒绝转化为名分。"
 eafp_ryukyu.9.f: "回信冷淡而简短。\n\n台湾的现有所有国不承认朝鲜的航海记录。他们举出旧账册与既有官署，断言岛屿行政权绝不能移交。\n\n朝廷并未收起文书。拒绝不是失败，而是下一句话的第一行。\n\n如今，朝鲜不再只是提出台湾要求的国家，而是将带着被拒绝的要求再次归来的国家。"
 eafp_ryukyu.9.a: "将拒绝留下为名分。"
