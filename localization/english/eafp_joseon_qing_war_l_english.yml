l_english:
 je_eafp_joseon_qing_war: "The Joseon-Qing War"
 je_eafp_joseon_qing_war_reason: "War has broken out between Joseon and the Qing. This is no mere border dispute, but a struggle over whether the old tributary order will collapse or be reinforced."
 je_eafp_joseon_qing_war_goal: "End the war with the Qing without becoming a Qing subject."

 eafp_joseon_qing_war_events.1.t: "Gunfire Across the Yalu"
 eafp_joseon_qing_war_events.1.d: "War has begun between Joseon and the Qing."
 eafp_joseon_qing_war_events.1.f: "The lamps in the council offices burned through the night. Couriers from the north brought word of cannon fire along the border, while ministers studied one another's faces. Some still thought of investiture from the Board of Rites. Others said Joseon could no longer bow under that name."
 eafp_joseon_qing_war_events.1.a: "The order under heaven trembles."

 eafp_joseon_qing_war_events.2.t: "A Polity Restored"
 eafp_joseon_qing_war_events.2.d: "The war with the Qing is over, and Joseon has not fallen under Qing rule."
 eafp_joseon_qing_war_events.2.f: "As the dust settled, the court searched for a language fit for the new order. The old rites no longer seemed unshakeable, and the people spoke of a country that had stood by itself."
 eafp_joseon_qing_war_events.2.a: "Joseon shall stand on its own."

 eafp_joseon_qing_war_events.3.t: "Humiliation Before the Altars"
 eafp_joseon_qing_war_events.3.d: "The war with the Qing has ended in Joseon's submission."
 eafp_joseon_qing_war_events.3.f: "The war was over, but the silence in the court only deepened. People demanded responsibility for the defeat, and in the streets humiliation and anger became almost the same word."
 eafp_joseon_qing_war_events.3.a: "This shame will endure."

 eafp_joseon_qing_war_events.10.t: "The Uiju Supply Road"
 eafp_joseon_qing_war_events.10.d: "The northern front's supply problem has reached the court."
 eafp_joseon_qing_war_events.10.f: "The road to Uiju filled with grain carts and refugees. Reports from the army demanded more provisions, while local officials warned that the people had already been pressed beyond endurance."
 eafp_joseon_qing_war_events.10.a: "Concentrate supplies at the front."
 eafp_joseon_qing_war_events.10.b: "Make the provinces bear more of the burden."
 eafp_joseon_qing_war_events.10.c: "The treasury must be spared."

 eafp_joseon_qing_war_events.11.t: "Refugees and Rations"
 eafp_joseon_qing_war_events.11.d: "The needs of displaced civilians and the army's demand for grain are colliding."
 eafp_joseon_qing_war_events.11.f: "Hungry people gathered before the magistrate's office, while the camps cried out that even tomorrow's rice was lacking. Saving one side seemed to imperil the other."
 eafp_joseon_qing_war_events.11.a: "Release relief grain."
 eafp_joseon_qing_war_events.11.b: "The army must eat first."
 eafp_joseon_qing_war_events.11.c: "Rely on village networks."

 eafp_joseon_qing_war_events.12.t: "Righteous Armies and Memorials"
 eafp_joseon_qing_war_events.12.d: "Anti-Qing sentiment and volunteer militias are demanding the court's attention."
 eafp_joseon_qing_war_events.12.f: "Scholars and local notables sent memorials from every province, while young men came forward to take up arms. Their fervor could sustain the war, or become a fire outside the court's control."
 eafp_joseon_qing_war_events.12.a: "Encourage the righteous armies."
 eafp_joseon_qing_war_events.12.b: "Accept the memorials."
 eafp_joseon_qing_war_events.12.c: "Strictly control private arms."

 eafp_joseon_qing_war_events.13.t: "General Winter"
 eafp_joseon_qing_war_events.13.d: "Bitter cold has fallen over the northern front."
 eafp_joseon_qing_war_events.13.f: "Snow swallowed the roads, and soldiers handled their matchlocks with frozen hands. Before the enemy could attack the camp, winter had already done so."
 eafp_joseon_qing_war_events.13.a: "Prioritize winter supplies."
 eafp_joseon_qing_war_events.13.b: "Permit local requisition."
 eafp_joseon_qing_war_events.13.c: "Slow the offensive."

 eafp_joseon_qing_war_events.14.t: "Sand in the Shells"
 eafp_joseon_qing_war_events.14.d: "Shoddy munitions and procurement fraud have been exposed."
 eafp_joseon_qing_war_events.14.f: "When the shells were opened, sand spilled out before iron fragments. The camps were furious, the offices tried to hide their papers, and the factory owners blamed the confusion of war."
 eafp_joseon_qing_war_events.14.a: "Punish those responsible."
 eafp_joseon_qing_war_events.14.b: "Cover it up for now."
 eafp_joseon_qing_war_events.14.c: "Reform military procurement."

 eafp_joseon_qing_war_events.15.t: "A Defeated General's Suicide"
 eafp_joseon_qing_war_events.15.d: "A commander intends to take responsibility for defeat through death."
 eafp_joseon_qing_war_events.15.f: "The sword in the commander's tent had already been drawn. [SCOPE.sCharacter('defeated_general').GetFullName] said that the crime of defeat could not be repaid in life. The court had to decide whether to record the death as loyalty, or turn it into an argument for military reform."
 eafp_joseon_qing_war_events.15.a: "Honor that loyalty."
 eafp_joseon_qing_war_events.15.b: "Make this the start of military reform."
 eafp_joseon_qing_war_events.15.c: "Keep the defeat quiet."

 eafp_joseon_qing_war_events.16.t: "The Great Fire"
 eafp_joseon_qing_war_events.16.d: "A great fire has spread amid the chaos of war."
 eafp_joseon_qing_war_events.16.f: "The flames made no distinction between warehouses and homes. No one could say whether the cause was shellfire, arson, or a refugee's mistake. For the people standing amid the ashes, relief mattered more than blame."
 eafp_joseon_qing_war_events.16.a: "Prioritize relief and firefighting."
 eafp_joseon_qing_war_events.16.b: "Save the military depot first."
 eafp_joseon_qing_war_events.16.c: "Punish those responsible."

