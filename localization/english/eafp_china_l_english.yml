 chinese_westernization.501.t: "The Great Recovery"
 chinese_westernization.501.d: "After years of struggle, we have finally succeeded in reclaiming all the land lost to foreign nations. [ROOT.GetCountry.GetNameNoFlag] has ended foreign domination and restored its position as a notable power on the world stage."
 chinese_westernization.501.f: "How long has China suffered in the grasp of foreign powers, how much land and resources were stolen for their benefit. But today, everything has changed. Today, the ship carrying the last foreigners leaves the shores of [ROOT.GetCountry.GetAdjectiveNoFormatting].\n\nA man stands on a hill about two li from the coast, watching the ship set sail and head out to the open sea. And the moment it disappears over the horizon, he knows that this victory is merely the beginning for all of China. With firm resolve and a newfound sense of purpose, China will reclaim its rightful place among the world powers."
 chinese_westernization.501.a: "We shall never be divided again."
 chi_the_restoration_of_land_sovereignty: "Restoration of Territorial Sovereignty"
 chinese_westernization.502.t: "Lips and Teeth"
 chinese_westernization.502.d: "With [SCOPE.sCountry('kor_scope').GetName] becoming a complete vassal of [ROOT.GetCountry.GetAdjectiveNoFormatting], [ROOT.GetCountry.GetNameNoFlag]'s defense has become more solid."
 chinese_westernization.502.f: "There is no country China loves more than Joseon. It has already been a thousand years since Joseon became our tributary. It is universally believed that China only comforts them with virtue and embraces them with grace, and has never coveted their land or people. According to Western norms, when two countries are at war, outside countries must remain neutral and cannot assist one side, but vassals are an exception. Today, Joseon must serve China with even greater effort than before, to let the people of the world know that Joseon and we are like one family."
 chinese_westernization.502.a: "The East is secured."
 chiwes502a: "Subjugation of Joseon"
 chinese_westernization.503.t: "Loss of Joseon"
 chinese_westernization.503.d: "The loss of [SCOPE.sCountry('kor_scope').GetName] has jeopardized the defense of [ROOT.GetCountry.GetAdjectiveNoFormatting]."
 chinese_westernization.503.f: "Joseon, a long-time tributary of the Qing dynasty, has declared full independence. \"If a country that followed Zhonghua so closely has rebelled like that, isn't the Qing dynasty also destined to fall?\" a Board of Rites official lamented.\n\nMoreover, this has created a major vulnerability in Qing's border defenses. It has become easier to suffer enemy invasions, both by land and sea."
 chinese_westernization.503.a: "Manchuria will be in greater danger now."
 chiwes503a: "Loss of Joseon"
