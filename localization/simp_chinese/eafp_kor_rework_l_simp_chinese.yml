 je_korean_imsul_boom_reason: "现有社会体系的矛盾已达到极限，地方民众开始积极行动。\n\n他们的要求很明确，但为了安抚民众，需要坚定的改革意志和承诺，以及最重要的，平息事态的时间。\n\n镇定度过半后，可以实施各种积极的应对措施，达到最大值时，可以派遣按核使来结束事件，使其进入收拾局面。每次扩散度达到最大值时，都可能因民乱激化而发生额外的附带损害，或起义蔓延到周边地区。"
