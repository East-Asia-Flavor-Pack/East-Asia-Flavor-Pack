l_korean:
 eafp_ryukyu.1.t: "유구의 틈"
 eafp_ryukyu.1.d: "일본과 청이 유구를 두고 다투는 사이, 조선 조정에도 해협 남쪽의 질서를 묻는 장계가 올라왔다."
 eafp_ryukyu.1.f: "유구의 사신은 작은 섬의 예법으로 큰 나라들의 문을 두드렸다.\n\n일본은 남쪽 바다를 자기 울타리로 보려 했고, 청은 오래된 책봉의 문장을 쉽게 버리려 하지 않았다. 두 나라가 서로의 손을 밀어내는 동안, 유구의 조정은 어느 도장이 내일의 명령이 될지 알 수 없었다.\n\n한성의 관원들은 실학의 이름으로 바다를 다시 읽자고 했다. 항로, 물산, 문서, 통역, 포구의 풍향이 모두 나라의 힘을 묻는 증거가 되었다.\n\n물러서면 유구의 일은 남의 다툼으로 남는다. 나서면 조선은 동아시아의 바다 질서에 자기 문장을 쓰게 된다."
 eafp_ryukyu.1.a: "유구 문제에 조선의 이름을 올려라."
 eafp_ryukyu.1.b: "해협의 다툼에서 물러서라."
 eafp_ryukyu.2.t: "유구의 새 문서"
 eafp_ryukyu.2.d: "일본과 청이 유구를 붙들지 못하자, 유구 조정은 조선의 보호 아래 들어가는 문서를 받아들였다."
 eafp_ryukyu.2.f: "수리의 문서는 오래 망설인 끝에 봉해졌다.\n\n일본의 압박은 끝까지 닿지 못했고, 청의 책봉은 예전의 무게를 되찾지 못했다. 작은 조정은 어느 큰 나라의 그림자도 완전히 믿을 수 없었다.\n\n조선 사절은 독립의 빈말을 약속하지 않았다. 그는 항로의 안전, 조공의 예, 상인의 통행, 분쟁 때의 보호를 한 장의 문서에 묶었다.\n\n유구는 홀로 서는 이름을 버리지 않았다. 그러나 그 이름은 이제 한성의 장부와 함께 읽힌다."
 eafp_ryukyu.2.a: "남쪽 바다의 문서를 받아들여라."
 eafp_ryukyu.3.t: "대만으로 가는 물길"
 eafp_ryukyu.3.d: "유구가 조선의 조공 질서에 들어오자, 조정은 더 남쪽 바다와 대만의 항로를 조사할 수 있게 되었다."
 eafp_ryukyu.3.f: "유구의 항구는 이제 먼 섬의 이름만 적은 지도가 아니었다.\n\n상인들은 계절풍을 말했다. 역관들은 유구 말과 민남 말을 한 장부에 나란히 적었다. 수군 장교들은 대만 동쪽 물살이 거칠다고 보고했고, 호조 관원들은 그 물길이 곧 곡물과 목재와 은의 길이 될 수 있다고 말했다.\n\n반대도 있었다. 한 신하는 바다의 욕심이 육지의 세금을 삼킨다고 꾸짖었다. 다른 신하는 유구를 붙잡고도 더 남쪽을 보지 못하면, 조선은 자기 손으로 얻은 문을 닫는 셈이라고 맞섰다.\n\n왕명은 짧았다. 유구의 항구를 발판으로 삼아 대만의 물길을 재고, 사람을 보내고, 장차 쓸 명분을 남겨라."
 eafp_ryukyu.3.a: "해협의 다음 장부를 열어라."
 eafp_ryukyu.4.t: "대만 항로의 문서"
 eafp_ryukyu.4.d: "조선의 조사와 항로 정비가 결실을 맺으며, 대만에 대한 조선의 명분이 조정의 문서에 들어갔다."
 eafp_ryukyu.4.f: "첫 보고서는 젖은 종이 냄새를 품고 한성에 도착했다.\n\n유구의 선원들은 암초와 물살을 말했다. 조선의 관원들은 그 말을 지도로 옮겼고, 상인들은 어느 포구가 바람을 피할 수 있는지 적었다.\n\n청의 장부에는 오래된 이름이 있었다. 그러나 바다는 이름만으로 지켜지지 않았다. 사람이 오가고, 물자가 쌓이고, 위험을 감당한 나라가 다음 문장을 쓰기 시작했다.\n\n대만은 아직 조선의 땅이 아니다. 그러나 이제 조선은 그 섬을 두고 말할 문서와, 그 문서를 지킬 항로를 얻었다."
 eafp_ryukyu.4.a: "대만의 명분을 장부에 올려라."
 eafp_ryukyu.5.t: "끊어진 남쪽 항로"
 eafp_ryukyu.5.d: "유구에 대한 조선의 조공권이 흔들리자, 대만 개척 계획은 항로와 거점을 잃고 중단되었다."
 eafp_ryukyu.5.f: "유구의 항구에서 오던 장계가 끊겼다.\n\n통역은 돌아오지 않았고, 선박은 더 먼 항로를 피해 북쪽으로 돌았다. 대만을 향한 조사는 아직 문서가 되었으나, 그 문서를 지킬 발판은 사라졌다.\n\n조정의 논쟁은 빠르게 식었다. 바다를 넓히자는 말보다, 이미 잃은 문서를 누가 책임질 것인지 묻는 말이 더 크게 들렸다.\n\n남쪽 바다는 다시 남의 장부로 넘어갔다."
 eafp_ryukyu.5.a: "남쪽 계획을 접어라."
 je_eafp_taiwan_pioneer: "대만 개척"
 je_eafp_taiwan_pioneer_reason: "유구가 조선의 조공 질서에 들어온 지금, 조선은 유구의 항구와 선원을 발판으로 대만 항로를 조사하고 현지 영향력을 쌓아 장차 섬의 행정을 요구할 수 있다."
 je_eafp_taiwan_pioneer_goal: "대만 영향력을 100까지 진행"
 je_eafp_taiwan_pioneer_status: "유구 항로를 따라 대만의 포구와 물길을 조사하고 있다."
 je_eafp_taiwan_pioneer_status_ready: "대만 영향력이 충분하니, 조정은 현 소유국에 행정 양도를 요구할 수 있다."
 button_je_eafp_ryukyu_dispatch_envoys: "해협 사절 파견"
 button_je_eafp_ryukyu_dispatch_envoys_desc: "유구와 주변 항구에 조선 사절을 보내 조선의 보호 명분을 키웁니다."
 button_je_eafp_ryukyu_arm_harbors: "유구 항만 무장"
 button_je_eafp_ryukyu_arm_harbors_desc: "조선 수군과 군수품을 동원해 유구 항만 방비를 돕고, 일본과 청이 유구를 붙잡기 어렵게 만듭니다."
 eafp_ryukyu_intervention_effect_tt: "$je_ryukyu_rivalry$에 조선이 개입국으로 참여함"
 eafp_ryukyu_non_intervention_effect_tt: "조선은 $je_ryukyu_rivalry$에 개입하지 않음"
 eafp_ryukyu_tributary_outcome_tt: "유구가 조선의 조공국이 됨"
 eafp_ryukyu_independence_progress_not_complete_tt: "$je_ryukyu_rivalry_progress_bar$ 진행도가 100 미만임"
 eafp_ryukyu_arm_harbors_ship_tt: "해군 전력 투사 50 이상"
 eafp_ryukyu_dispatch_envoys_effect_tt: "$je_ryukyu_rivalry_progress_bar$ 진행도 #P +10#!"
 eafp_ryukyu_arm_harbors_effect_tt: "$je_ryukyu_rivalry_progress_bar$ 진행도 #P +20#!"
 eafp_taiwan_pioneer_start_tt: "$je_eafp_taiwan_pioneer$ 일지가 시작됨"
 eafp_taiwan_pioneer_complete_tt: "조선이 $STATE_FORMOSA$ 문제를 결산함"
 eafp_taiwan_pioneer_failed_tt: "$je_eafp_taiwan_pioneer$ 일지가 실패함"
 eafp_taiwan_pioneer_resolved_tt: "$STATE_FORMOSA$ 문제가 수락 또는 거절로 결산됨"
 eafp_taiwan_survey_decision: "대만 항로 답사"
 eafp_taiwan_survey_decision_desc: "유구 항구와 조선 수군을 동원해 대만의 물길, 포구, 장시 연락망을 조사하고 대만 영향력을 높인다."
 button_je_eafp_taiwan_demand: "대만 양도 요구"
 button_je_eafp_taiwan_demand_desc: "대만 영향력을 바탕으로 $STATE_FORMOSA$의 현 소유국들에게 행정 양도를 요구한다. 수락한 국가는 자신이 보유한 대만만 넘기고, 거절한 국가는 자신이 보유한 대만에 대한 명분만 내준다.\n\n현재 우선 대상 수락 확률: #v [GetPlayer.MakeScope.ScriptValue('eafp_taiwan_demand_acceptance_chance_value')|v0]%#!\n기본 #v 50%#!. 현 소유국의 해군 전력 투사가 조선보다 낮으면 #p +35%#!, 높으면 #n -35%#!. 현 소유국이 전쟁 중이면 #p +15%#!. 대만이 나뉘어 있으면 각 소유국이 따로 승인하거나 거부한다."
 eafp_taiwan_influence_100_tt: "대만 영향력이 #v 100#!에 도달함"
 eafp_taiwan_survey_force_effect_tt: "대만 영향력 #P +20#!, 국고 지출 증가, 현 소유국과 관계 악화"
 eafp_taiwan_survey_careful_effect_tt: "대만 영향력 #P +12#!, 국고 지출 증가, 유구와 관계 개선"
 eafp_taiwan_demand_acceptance_chance_tt: "상대국은 조선의 해군력이 더 강하거나 자신들이 전쟁 중일수록 요구를 받아들일 가능성이 높다."
 eafp_taiwan_demand_refusal_chance_tt: "상대국이 요구를 거부하면 조선은 대만에 대한 명분을 얻고 관계는 악화된다."
 eafp_taiwan_demand_accepted_tt: "조선이 $STATE_FORMOSA$를 넘겨받음"
 eafp_taiwan_demand_rejected_tt: "조선이 $STATE_FORMOSA$에 대한 명분을 얻음"
 eafp_taiwan_route_documents: "대만 항로 문서"
 eafp_taiwan_route_documents_desc: "대만의 물길과 포구와 통역 기록이 조선의 남쪽 바다 통치를 뒷받침하고 있다."
 eafp_ryukyu.6.t: "대만 물길 답사"
 eafp_ryukyu.6.d: "대만으로 향한 답사선이 유구 항구를 떠나 물길, 포구, 통역 기록을 모으기 시작했다."
 eafp_ryukyu.6.f: "대만으로 가는 바다는 지도 위의 빈 공간이 아니었다.\n\n유구의 선원은 바람이 바뀌는 때를 말했고, 조선의 장교는 암초와 포구를 적었다. 역관은 민남 말과 유구 말을 나란히 옮겼고, 상인은 어느 장시가 은과 목재를 받아들이는지 물었다.\n\n조정의 명령은 단순한 답사가 아니었다. 대만의 물길을 아는 나라가 대만을 두고 말할 권리도 더 세게 쥔다."
 eafp_ryukyu.6.a: "거칠게 밀고 들어가라."
 eafp_ryukyu.6.b: "유구 길잡이와 장부를 사라."
 eafp_ryukyu.7.t: "대만 양도 요구"
 eafp_ryukyu.7.d: "조선이 대만 항로와 현지 연락망을 근거로 대만의 행정 양도를 요구했다."
 eafp_ryukyu.7.f: "문서는 짧았지만, 그 뒤에 놓인 항해 기록은 두꺼웠다.\n\n유구의 항구, 대만의 포구, 장시의 말, 통역의 장부가 한 줄로 묶였다. 조선은 섬을 달라고만 쓰지 않았다. 조선이 이미 그 바다를 오가고, 비용을 치르고, 위험을 감당했다는 사실을 함께 보냈다.\n\n대만의 현 소유국은 이제 문장을 읽어야 했다. 더 정확히 말하면, 문장 뒤의 배와 항로를 읽어야 했다."
 eafp_ryukyu.7.a: "대만을 넘겨 충돌을 피하라."
 eafp_ryukyu.7.b: "거부하라. 문서가 땅이 되지는 않는다."
 eafp_ryukyu.8.t: "넘겨받은 대만"
 eafp_ryukyu.8.d: "현 소유국이 조선의 요구를 받아들이며 대만의 행정권이 조선으로 넘어왔다."
 eafp_ryukyu.8.f: "대만의 문서는 바다를 건너 돌아왔다.\n\n이번에는 조사 보고서가 아니었다. 포구와 관청과 세금 장부가 어느 도장을 따라야 하는지를 적은 문서였다.\n\n조정은 기뻐했지만 가볍게 웃지는 않았다. 섬을 얻는 일은 항로를 얻는 일이고, 항로를 얻는 일은 매년 사람과 배와 국고를 요구하는 일이었다.\n\n남쪽 바다는 이제 더 가까워졌다. 그래서 더 무거워졌다."
 eafp_ryukyu.8.a: "대만 장부를 받아들여라."
 eafp_ryukyu.9.t: "거절된 대만 문서"
 eafp_ryukyu.9.d: "대만의 현 소유국이 조선의 양도 요구를 거부하며, 조정은 그 거절을 명분으로 바꾸었다."
 eafp_ryukyu.9.f: "답신은 차갑고 짧았다.\n\n대만의 현 소유국은 조선의 항해 기록을 인정하지 않았다. 그들은 옛 장부와 기존 관청을 내세웠고, 섬의 행정은 넘길 수 없다고 못박았다.\n\n조정은 문서를 접지 않았다. 거절은 실패가 아니라 다음 문장의 첫 줄이 되었다.\n\n이제 조선은 대만을 요구한 나라가 아니라, 거절당한 요구를 들고 다시 돌아올 나라가 되었다."
 eafp_ryukyu.9.a: "거절을 명분으로 남겨라."
