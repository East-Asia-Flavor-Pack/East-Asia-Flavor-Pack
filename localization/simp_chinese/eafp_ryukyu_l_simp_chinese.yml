l_simp_chinese:
 eafp_ryukyu.1.t: "琉球的缝隙"
 eafp_ryukyu.1.d: "日本与大清围绕琉球相争之际，一份奏疏也递至朝鲜朝廷，询问海峡以南应由何种秩序统御。"
 eafp_ryukyu.1.f: "琉球使臣以小国之礼叩响大国之门。\n\n日本试图将南方海域视作自家藩篱，而大清也不愿轻易放弃旧有册封的辞章。两国彼此推拒之时，琉球朝廷并不知道哪一枚印玺会成为明日的命令。\n\n汉城的官员以实学之名主张重新审视海洋。航路、物产、文书、通译、港口风向，皆成为衡量国力的证据。\n\n若退让，琉球之事便只是他国之争。若挺身而出，朝鲜便能在东亚海上秩序中写下自己的句子。"
 eafp_ryukyu.1.a: "将朝鲜之名写入琉球问题。"
 eafp_ryukyu.1.b: "退出海峡彼端的纷争。"
 eafp_ryukyu.2.t: "琉球的新文书"
 eafp_ryukyu.2.d: "日本与大清未能掌握琉球后，琉球朝廷接受了置身朝鲜保护之下的文书。"
 eafp_ryukyu.2.f: "首里的文书在长久犹豫后终于封缄。\n\n日本的压力未能贯彻到底，大清的册封也未能恢复旧日分量。这个小朝廷已无法完全信任任何一个大国的阴影。\n\n朝鲜使臣并未许诺空泛的独立。他将航路安全、朝贡礼仪、商旅通行以及纷争时的保护，合写进一纸文书。\n\n琉球没有舍弃自立之名。然而这个名字，如今将与汉城的账册并列而读。"
 eafp_ryukyu.2.a: "接受南方海域的文书。"
 eafp_ryukyu.3.t: "通往台湾的水路"
 eafp_ryukyu.3.d: "琉球进入朝鲜的朝贡秩序后，朝廷得以调查更南方的海域与通往台湾的航路。"
 eafp_ryukyu.3.f: "琉球的港口不再只是远方地图上的名称。\n\n商人谈论季风。译官将琉球语与闽南语并列写入账册。水军军官报告台湾以东水流险急，户曹官员则称这条水路也可能成为谷物、木材与白银之路。\n\n反对之声亦有。一名臣僚斥责海上的贪欲会吞噬陆上的税赋。另一名臣僚则反驳道，若握有琉球却仍不向更南方望去，朝鲜便是在亲手关上自己打开的门户。\n\n王命简短：以琉球港口为立足点，测量台湾水路，派遣人员，并留下日后可用的名分。"
 eafp_ryukyu.3.a: "打开海峡的下一本账册。"
 eafp_ryukyu.4.t: "台湾航路文书"
 eafp_ryukyu.4.d: "朝鲜的调查与航路整备结出成果，对台湾的朝鲜名分被写入朝廷文书。"
 eafp_ryukyu.4.f: "第一份报告带着潮湿纸张的气味抵达汉城。\n\n琉球水手讲述暗礁与水流。朝鲜官员将这些话绘成地图，商人则记下哪些港口可以避风。\n\n大清账册中有古老的名称。然而海洋并非仅凭名称便可守住。往来人员、积聚物资、承担风险的国家，开始写下下一句。\n\n台湾尚非朝鲜之地。但朝鲜如今已有可谈论此岛的文书，也有可守护这份文书的航路。"
 eafp_ryukyu.4.a: "将台湾的名分列入账册。"
 eafp_ryukyu.5.t: "断裂的南方航路"
 eafp_ryukyu.5.d: "朝鲜对琉球的朝贡权动摇后，台湾开拓计划失去了航路与据点，被迫中止。"
 eafp_ryukyu.5.f: "来自琉球港口的奏报断绝了。\n\n通译没有归来，船只也避开更远的航路，折向北方。通往台湾的调查虽已成文书，但能够守护这份文书的立足点已经消失。\n\n朝廷的争论迅速冷却。比起拓展海洋之言，追问谁应为已失去的文书负责的声音更为响亮。\n\n南方海域再次落入他人的账册。"
 eafp_ryukyu.5.a: "收起南方计划。"
 je_eafp_taiwan_pioneer: "台湾开拓"
 je_eafp_taiwan_pioneer_reason: "如今琉球已进入朝鲜的朝贡秩序，朝鲜可以借助琉球港口与水手调查台湾航路，积累当地影响力，并在将来要求该岛的行政权。"
