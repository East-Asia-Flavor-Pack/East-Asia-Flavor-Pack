 chi_flavor.205.t: "A Grim Incident"
 chi_flavor.205.d: "A [SCOPE.sCountry('missionary_country').GetAdjectiveNoFormatting] officer stationed in [SCOPE.sState('missing_state').GetName] has been found murdered. As tensions rise, [SCOPE.sCountry('missionary_country').GetName] demand justice for their fallen countryman."
 chi_flavor.205.f: "In the bustling heart of [SCOPE.sState('missing_state').GetName], whispers of the murdered officer grow louder. "He was here just yesterday," mutters a local merchant, the worry evident in his eyes."
 chi_flavor.205.a: "$CHI_missionaries.6.a$"
 chi_flavor.205.b: "$CHI_missionaries.6.b$"
 chi_flavor.205.c: "$CHI_missionaries.6.c$"
 chi_flavor.205.e: "$CHI_missionaries.6.d$"
 chi_flavor.206.t: "Unexpected Tragedy"
 chi_flavor.206.d: "Word has reached us that our officer has been found murdered in a local region of [SCOPE.sState('missing_state').GetName]. "
 chi_flavor.206.d1: "In response to this occurrence, the [SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting] authorities promptly apprehended murderers. We must denounce this horrible act and demand that those responsible face justice."
 chi_flavor.206.d2: "In response to this occurrence, the [SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting] authorities arrested murderers and fired local officials who failed to halt it. We must denounce this horrible act and demand that those responsible face justice."
 chi_flavor.206.d3: "In response to this occurrence, the [SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting] authorities arrested murderers and fired local officials who failed to halt it. They also offered to compensate us."
 chi_flavor.206.d4: "Despite this tragedy, the [SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting] authorities did nothing. We must denounce this horrible act and demand that those responsible face justice."
 chi_flavor.206.f: "\"The atrocious crimes committed against our heroic officers on remote [SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting] territory are devastating at a time when the globe is unified under the banner of civilization and progress, and we, as a bulwark of justice, must ensure that the offender is paid the maximum for his deeds. This is about more than just seeking payback for an officer's tragic death. It is also about preserving the safety and dignity of our fellow citizens stationed abroad. [ROOT.GetCountry.GetName] must stay firm, insisting on justice and fairness values, and seek sufficient compensation for this awful loss.\""
 chi_flavor.206.a: "$CHI_missionaries.7.a$"
 chi_flavor.206.b: "$CHI_missionaries.7.b$"
 # Taiping Heavenly Kingdom
 je_taiping_progress: "Currently, there are [SCOPE.sCountry('taiping_scope').MakeScope.Var('num_unincorporated_states_in_china_proper').GetValue] [Concept('concept_state','$concept_states$')] within [concept_china_proper] that are owned and controlled by [SCOPE.sCountry('taiping_scope').GetName] with the [GetStaticModifier('recently_conquered_state').GetName] modifier, and [Concept('concept_state','$concept_states$')] within [concept_china_proper] that are owned by [SCOPE.GetRootScope.GetCountry.GetName] but controlled by [SCOPE.sCountry('taiping_scope').GetName].\n\nCurrently, there are [SCOPE.sCountry('taiping_scope').MakeScope.Var('num_claimed_states_in_china_proper').GetValue] [Concept('concept_state','$concept_states$')] within [concept_china_proper] that are owned and controlled by [SCOPE.GetRootScope.GetCountry.GetName] with the [GetStaticModifier('recently_conquered_state').GetName] modifier, and [Concept('concept_state','$concept_states$')] within [concept_china_proper] that are owned by [SCOPE.sCountry('taiping_scope').GetName] but controlled by [SCOPE.GetRootScope.GetCountry.GetName].\n\nAccordingly, the following effects apply to [SCOPE.sCountry('taiping_scope').GetName]:\n\n#variable $taiping_unincorporated_states_modifier$#!\n#variable [Multiply_CFixedPoint(Subtract_CFixedPoint(SCOPE.sCountry('taiping_scope').MakeScope.Var('num_unincorporated_states_in_china_proper').GetValue,SCOPE.sCountry('taiping_scope').MakeScope.Var('num_claimed_states_in_china_proper').GetValue),'(CFixedPoint)-0.2')|%1+=]#! $unit_offense_mult$\n#variable [Multiply_CFixedPoint(Subtract_CFixedPoint(SCOPE.sCountry('taiping_scope').MakeScope.Var('num_unincorporated_states_in_china_proper').GetValue,SCOPE.sCountry('taiping_scope').MakeScope.Var('num_claimed_states_in_china_proper').GetValue),'(CFixedPoint)-0.2')|%1+=]#! $unit_defense_mult$\n#variable [Multiply_CFixedPoint(Subtract_CFixedPoint(SCOPE.sCountry('taiping_scope').MakeScope.Var('num_unincorporated_states_in_china_proper').GetValue,SCOPE.sCountry('taiping_scope').MakeScope.Var('num_claimed_states_in_china_proper').GetValue),'(CFixedPoint)0.2')|%1-=]#! $unit_morale_loss_mult$\n#variable [Multiply_CFixedPoint(Subtract_CFixedPoint(SCOPE.sCountry('taiping_scope').MakeScope.Var('num_unincorporated_states_in_china_proper').GetValue,SCOPE.sCountry('taiping_scope').MakeScope.Var('num_claimed_states_in_china_proper').GetValue),'(CFixedPoint)-0.2')|%1+=]#! $unit_morale_recovery_mult$\n#variable [Multiply_CFixedPoint(Subtract_CFixedPoint(SCOPE.sCountry('taiping_scope').MakeScope.Var('num_unincorporated_states_in_china_proper').GetValue,SCOPE.sCountry('taiping_scope').MakeScope.Var('num_claimed_states_in_china_proper').GetValue),'(CFixedPoint)-0.2')|%1+=]#! $unit_morale_damage_mult$"
