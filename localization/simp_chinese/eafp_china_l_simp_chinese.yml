 je_chinese_rule: "中原之影"
 je_chinese_rule_reason: "在漫长的岁月里，这片广袤的土地一直依照[SCOPE.GetRootScope.GetCountry.GetOverlord.GetCapital.GetCityHubName]的意志运转。皇帝任命的将军驻扎于此，监管着我们的一切，每年都有大量的贡物和资源流向中原。\n\n然而，时代正在变化。随着[SCOPE.GetRootScope.GetCountry.GetName]在西方列强的压力下动摇，一条新的道路或许会为我们开启。我们是永远作为帝国的边陲之地而存在？还是开创属于我们自己的命运？"
 je_home_of_the_manchus: "龙兴之地"
 je_home_of_the_manchus_reason: "这里曾是我们八旗军统领天下的根本，是[SCOPE.GetRootScope.GetCountry.GetName]之龙腾飞的神圣之地。然而，昔日的荣光已成过往。皇帝的目光停留在紫禁城，而我们的家乡，作为执行[SCOPE.GetRootScope.GetCountry.GetOverlord.GetCapital.GetCityHubName]意志的将军们统治下的边疆，正直接暴露于俄罗斯南下的威胁之下。我们能否在这片寒冷的土地上守住祖先的气概？"
 je_southern_zoufan: "朝贡之路的尽头"
 je_southern_zoufan_reason: "数百年来，我们的使者们满载大象和珍宝，踏上了前往遥远中国的漫长旅程。这种朝贡是一种至关重要的外交礼仪，它保障了我们的独立性，并使我们在邻国间获得了正统性。\n\n如今，来自海洋彼岸西方的蒸汽船正在叩响我们的港口。但[SCOPE.GetRootScope.GetCountry.GetPowerBloc.GetLeader.GetCapital.GetCityHubName]之龙相距太远，并且看起来只是衰老而疲惫。"

