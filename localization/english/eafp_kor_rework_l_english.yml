 je_samjeong_ijeongcheong: "Samjeong Ijeongcheong"
 je_samjeong_ijeongcheong_reason: "After the disturbance that stirred the entire country, the 'Samjeong Ijeongcheong' was established according to the will of [SCOPE.GetRootScope.GetCountry.GetRuler.GetFullName] to address the corruption in the three administrations. Its legacy will depend on how well it stabilizes taxation, military service, livelihoods, finance, and royal authority before its mandate expires.\n\n#bold Reform Goals#!: #v [SCOPE.GetRootScope.GetCountry.MakeScope.ScriptValue('samjeong_ijeongcheong_goals_completed')|0]#!/#v 9#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_adm_stable')] [concept_eafp_landlvl_adm] is $land_problem_lvl_4$ or higher\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_mil_stable')] [concept_eafp_landlvl_mil] is $land_problem_lvl_4$ or higher\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_civ_stable')] [concept_eafp_landlvl_civ] is $land_problem_lvl_4$ or higher\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_bureaucracy')] [concept_bureaucracy] is at least #v 100#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_radicals')] [Concept('concept_radical', '$concept_radicals$')] are 10% or lower\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_gdp')] [concept_gdp] has grown by at least 25% since the Samjeong Ijeongcheong was established\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_sedo_balance')] [concept_eafp_sedo_politics_balance] is 50 or lower\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_lower_sol')] Average [concept_sol] is at least 9\n• [SCOPE.GetRootScope.GetCountry.GetCustom('samjeong_checkbox_fiscal_health')] [concept_gold_reserves] are at least 10% of the limit and weekly income is at least 0"

