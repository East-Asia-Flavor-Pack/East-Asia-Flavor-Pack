 # After Chinese Westernization
 je_chinese_water_system: "Water System Reconstruction"
 je_chinese_water_system_reason: "The Yellow and Yangtze rivers flow through the heart of this vast empire, yet they remain untamed forces of nature and massive untapped resources. A massive development project must be undertaken to fully utilize the power of these rivers for industry and agriculture and protect millions of people from chronic floods and droughts."
 je_chinese_water_system_grand_canal: "Water System Reconstruction: Grand Canal"
 je_chinese_water_system_grand_canal_reason: "For centuries, the Grand Canal was China's economic lifeline. However, decades of neglect and mismanagement have left it in ruins, becoming a massive obstacle to logistics and trade. Restoring and modernizing this vital inland waterway is essential for efficiently transporting goods within China."
 je_chinese_water_system_yellow_river: "Water System Reconstruction: Yellow River"
 je_chinese_water_system_yellow_river_reason: "Called 'China's Sorrow' for thousands of years, the Yellow River's periodic flooding has threatened millions of lives and devastated the land. However, by utilizing modern technology and industrial infrastructure, permanently controlling the Yellow River will become possible."
 je_chinese_water_system_yangtze_river: "Water System Reconstruction: Yangtze River"
 je_chinese_water_system_yangtze_river_reason: "The Yangtze River, China's economic backbone, must be reborn as the main artery of modern industry. Through large-scale flood control projects, we must enable the passage of ocean-going vessels, and build ports and industrial facilities along the Yangtze River basin to maximize China's logistics and production capacity."
 je_chinese_water_system_pearl_river: "Water System Reconstruction: Pearl River"
 je_chinese_water_system_pearl_river_reason: "The time has come to stabilize and develop the Pearl River basin, the economic hub of the south. Guangzhou must be rebuilt into a world-class port, and the major waterways of the Pearl River Delta, including the West River and North River, must be improved to solve chronic flooding issues."
 building_chinese_water_system: "Water Management Facilities"
