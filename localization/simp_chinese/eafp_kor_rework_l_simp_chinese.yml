 concept_eafp_regent_lv5: "#color:{0.5,0.8,1.0} $concept_eafp_sedo_politics_balance$#! #V 阶段5#!"
 concept_eafp_regent_lv5_desc: "#V 效果#!\n• #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!可[concept_eafp_sedo_politics_pocket_money]@coin11!大规模的[concept_treasury]资金。\n• #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!可[concept_eafp_sedo_politics_pocket_money]@coin11!大规模的[concept_investment_pool]资金。\n• $head_of_sedo_family$ [concept_popularity] #N +100#!。\n• [concept_authority] #N -25%#!。\n• 每隔#V 4年#!，一项符合#color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!利益的法案可能会被#N强行通过。#!。\n#weak 同样适用所有先前阶段的效果。#!"

