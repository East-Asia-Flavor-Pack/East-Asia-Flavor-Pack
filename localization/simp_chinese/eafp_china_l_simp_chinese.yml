 first_opium_war.9.t: "皇帝的决断"
 first_opium_war.9.d: "在分裂了朝廷数个月的严禁论与弛禁论的对立之后，只剩下皇帝的最终决定。"
 first_opium_war.9.f: "\"鸦片是让我们百姓生病，抽走国家白银的毒药。然而，如何处理它是一个必须慎重决定的问题。\""
 first_opium_war.9.a: "选择严禁论。派林则徐去广东！"
 first_opium_war.9.b: "选择弛禁论。鸦片合法化并征税。"

