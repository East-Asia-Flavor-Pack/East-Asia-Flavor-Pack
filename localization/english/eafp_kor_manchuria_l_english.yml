l_english:
 eafp_manchuria_outcome_manchurian_settlement_tt: "An event will fire to settle Manchurian management"

 je_eafp_manchurian_policy: "Manchurian Policy"
 je_eafp_manchurian_policy_reason: "Once Korea has advanced along the road to wealth and military strength, the northern frontier can no longer remain a distant question. Korea will press its claims on Manchuria and prepare to secure the region."

 je_eafp_manchurian_management: "Managing Manchuria"
 je_eafp_manchurian_management_reason: "All Manchuria is in Korean hands, but the north must be held through urban development, settlement, and tax administration."
 je_eafp_manchurian_management_status: "Raise Manchuria's total urbanization, ensure at least 10% Korean population in each Manchurian state, and keep each state's tax capacity at or above tax capacity usage."

 eafp_manchuria_management_ready_tt: "Manchurian development, settlement, and administration conditions are complete"
 eafp_manchuria_development_ready_tt: "Total urbanization across Shengjing, Southern Manchuria, and Northern Manchuria is at least #v 60#!"
 eafp_manchuria_settlement_ready_tt: "Korean population share is at least #v 10%#! in Shengjing, Southern Manchuria, and Northern Manchuria"
 eafp_manchuria_administration_ready_tt: "Tax capacity is at least tax capacity usage in Shengjing, Southern Manchuria, and Northern Manchuria"

 button_je_eafp_manchuria_settlement: "Encourage Korean Settlement"
 button_je_eafp_manchuria_settlement_desc: "Move part of a Korean peasant or laborer pop from the Korean peninsula into a Manchurian state."
 button_je_eafp_manchuria_expand_arable_land: "Develop the Manchurian Frontier"
 button_je_eafp_manchuria_expand_arable_land_desc: "Increase arable land in Shengjing, Southern Manchuria, and Northern Manchuria."

 eafp_manchuria.10.t: "The Northern Policy"
 eafp_manchuria.10.d: "The court has formally asserted Korea's claims beyond the Yalu."
 eafp_manchuria.10.f: "The road to wealth and military strength changed the state's horizon. A stronger army and a deeper ledger made a farther frontier imaginable.\n\nShengjing, Southern Manchuria, and Northern Manchuria are no longer only names beyond the border. They have begun to enter the records as a northern question Korea may one day answer."
 eafp_manchuria.10.a: "Assert the claims to Manchuria."

 eafp_manchuria.11.t: "All Manchuria Secured"
 eafp_manchuria.11.d: "Korea now holds Shengjing, Southern Manchuria, and Northern Manchuria."
 eafp_manchuria.11.f: "The line on the map has finally moved according to Korea's will. Yet taking territory and governing territory are not the same task.\n\nThe roads, villages, markets, and taxes of Manchuria now pose a question that Korean administration must answer. The north has been gained. Now it must be held."
 eafp_manchuria.11.a: "The north must now be governed."

 eafp_manchuria.12.t: "The Management of Manchuria"
 eafp_manchuria.12.d: "With all Manchuria under Korean rule, the court begins the work of binding the north into real administration."
 eafp_manchuria.12.f: "The army opened the road first, but offices, ledgers, villages, and fields are what remain on that road.\n\nManchuria cannot remain only occupied territory. Korea must build cities, encourage settlement, and make a northern administration that can truly collect taxes and govern."
 eafp_manchuria.12.a: "Manage Manchuria."

 eafp_manchuria.20.t: "The Settlement of Manchuria"
 eafp_manchuria.20.d: "The cities, villages, and tax ledgers of Manchuria are entering Korea's governing order."
 eafp_manchuria.20.f: "Lines and garrisons first held the north, but lasting rule rested on roads, taxes, villages, and offices.\n\nRegisters from Shengjing now travel to Hanseong, Korean speech appears in the villages of Southern Manchuria, and Northern Manchuria's roads carry the marks of new administration. Manchuria is no longer only the result of conquest. It has become a northern country governed in Korea's daily order."
 eafp_manchuria.20.a: "Bind the north into Korea's administrative order."

 eafp_manchurian_administration: "Manchurian Administration"
 eafp_manchurian_administration_desc: "Offices and ledgers for Manchuria are binding northern rule more tightly."
 eafp_manchurian_settlement_state: "Manchurian Settlements"
 eafp_manchurian_settlement_state_desc: "Korean villages and market roads are supporting northern rule through population and daily life."
 eafp_manchurian_integrated_state: "Integrated Manchurian Administration"
 eafp_manchurian_integrated_state_desc: "Offices, registers, taxes, and courts are drawing Manchuria into Korea's administrative order."
