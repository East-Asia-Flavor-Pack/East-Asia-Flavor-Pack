 je_taiping_internal_conflict: "Internal Conflict of the Taiping Heavenly Kingdom"
 je_taiping_internal_conflict_reason: "Many have joined the Taiping Heavenly Kingdom for our sacred cause, but their unity is still fragile. The lower the Heavenly King's legitimacy and [concept_prominence] fall, and the more generals and interest group leaders combine high [concept_prominence] with low loyalty, the more unstable the Kingdom's power becomes.\n\nIf [ROOT.GetCountry.GetRuler.GetFullName] cannot prove Heaven's favor, ambitious generals and disgruntled factions will turn their blades toward the throne. If internal conflict pressure reaches its limit, a coup will erupt and leave the army gravely damaged."
