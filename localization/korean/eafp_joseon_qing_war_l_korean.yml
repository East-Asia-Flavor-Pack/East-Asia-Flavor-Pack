 eafp_joseon_qing_war_events.1.t: "압록강을 넘은 포성"
 eafp_joseon_qing_war_events.1.d: "조선과 청 사이의 전쟁이 시작되었습니다. 전시 국정 결속은 전황, 전쟁 기간, 재정과 민심에 따라 매달 변합니다. 강화의 실제 결과와 종전 시 결속이 전후 정치를 함께 결정할 것입니다."
 eafp_joseon_qing_war_events.1.f: "비변사의 뜰에는 밤새 등불이 꺼지지 않았다. 파발은 북쪽 길을 달려와 국경의 포성을 고했고, 대신들은 서로의 얼굴을 살폈다. 누군가는 아직 예부의 문서를 떠올렸고, 누군가는 이제 더는 책봉의 이름으로 머리를 숙일 수 없다고 말했다."
 eafp_joseon_qing_war_events.1.a: "천하의 질서가 흔들리는구나."

 eafp_joseon_qing_war_events.2.t: "전쟁 뒤의 국체"
 eafp_joseon_qing_war_events.2.d.victory.3: "조선의 요구가 청에 관철되었고 조정과 백성도 굳건히 결집했습니다. 이 대승은 새로운 국제적 지위와 오랜 국내 안정을 함께 가져올 것입니다."
 eafp_joseon_qing_war_events.2.d.victory.2: "전쟁 목표는 달성했으나 국정과 민심의 상처가 깊습니다. 승전의 위신은 남겠지만 모든 불만을 덮지는 못할 것입니다."
 eafp_joseon_qing_war_events.2.d.victory.1: "조선은 강화에서 승리했지만 국내의 전시 질서는 거의 무너졌습니다. 승전보 뒤에는 피로와 분노가 길게 남았습니다."
 eafp_joseon_qing_war_events.2.d.defense.3: "청은 어떤 요구도 관철하지 못한 채 물러났고 조선의 전시 질서도 굳건했습니다. 백성들은 나라가 스스로 국체를 지켜냈다고 받아들였습니다."
 eafp_joseon_qing_war_events.2.d.defense.2: "청의 요구는 저지했으나 전쟁의 비용이 컸습니다. 조선은 버텨냈지만 전후 조정은 상처 입은 민심부터 수습해야 합니다."
 eafp_joseon_qing_war_events.2.d.defense.1: "청의 요구를 막아냈다는 사실만이 남았습니다. 국정은 소진되었고 휴전의 안도보다 전쟁이 남긴 혼란이 더 크게 느껴집니다."
 eafp_joseon_qing_war_events.2.d.compromise.3: "양국이 서로의 일부 요구를 관철했지만 조선은 질서 있게 강화를 받아들였습니다. 유리한 타협은 조정의 권위를 크게 해치지 않았습니다."
 eafp_joseon_qing_war_events.2.d.compromise.2: "양국 모두 강화에서 양보를 얻었지만 조선 안에서는 얻은 것보다 잃은 것을 묻는 목소리가 커지고 있습니다."
 eafp_joseon_qing_war_events.2.d.compromise.1: "강화는 전쟁을 끝냈을 뿐 조정의 권위를 회복시키지 못했습니다. 상호 양보라는 말 아래 사실상의 굴욕과 국내 혼란이 남았습니다."
 eafp_joseon_qing_war_events.2.f: "전쟁의 먼지가 가라앉자 조정은 새 질서의 언어를 찾기 시작했다. 오래된 의례는 더는 예전처럼 굳건하지 않았고, 백성들은 조선이 스스로 버텨냈다는 사실을 이야기했다."
 eafp_joseon_qing_war_events.2.a: "이제 전후를 수습하라."

 eafp_joseon_qing_war_events.3.t: "무너진 사직의 체면"
 eafp_joseon_qing_war_events.3.d.3: "패전은 피하지 못했지만 전시 행정과 민심은 마지막까지 유지되었습니다. 조정은 비교적 질서 있게 충격을 수습할 수 있습니다."
 eafp_joseon_qing_war_events.3.d.2: "전쟁과 함께 국정도 크게 흔들렸습니다. 광범위한 급진화와 충성파의 이탈이 전후 정치를 압박할 것입니다."
 eafp_joseon_qing_war_events.3.d.1: "장기전과 패전이 겹치며 나라의 결속은 무너졌습니다. 정치운동은 극단화되고 조정의 권위는 오랫동안 회복되지 못할 것입니다."
 eafp_joseon_qing_war_events.3.f: "전쟁은 끝났지만 조정의 침묵은 더 깊어졌다. 사람들은 패전의 책임을 물었고, 거리에는 굴욕과 분노가 같은 말처럼 떠돌았다."
 eafp_joseon_qing_war_events.3.a: "이 치욕은 오래 남을 것이다."

 eafp_joseon_qing_war_events.10.t: "의주의 보급로"
 eafp_joseon_qing_war_events.10.d: "북방 전선의 보급 문제가 조정의 결정 앞에 놓였습니다."
 eafp_joseon_qing_war_events.10.f: "의주로 향하는 길에는 군량 수레와 피난 행렬이 뒤섞였다. 장계는 군량이 모자란다고 했고, 지방관은 백성들이 이미 감당할 수 없을 만큼 징발되었다고 호소했다."
 eafp_joseon_qing_war_events.10.a: "군량을 전선에 집중하라."
 eafp_joseon_qing_war_events.10.b: "지방에서 더 부담하게 하라."
 eafp_joseon_qing_war_events.10.c: "운송망부터 정비하라."

 eafp_joseon_qing_war_events.11.t: "동장군"
 eafp_joseon_qing_war_events.11.d: "혹한이 북방 전선을 덮쳤습니다."
 eafp_joseon_qing_war_events.11.f: "눈은 길을 삼켰고, 얼어붙은 손으로 화승을 다루는 병사들은 말없이 하늘을 올려다보았다. 적보다 먼저 겨울이 군영을 공격하고 있었다."
 eafp_joseon_qing_war_events.11.a: "방한 물자를 우선 보급하라."
 eafp_joseon_qing_war_events.11.b: "현지 징발을 허용하라."
 eafp_joseon_qing_war_events.11.c: "공세를 늦추자."

 eafp_joseon_qing_war_events.12.t: "포탄 속의 모래"
 eafp_joseon_qing_war_events.12.d: "부실 군수품과 납품 비리가 드러났습니다."
 eafp_joseon_qing_war_events.12.f: "포탄을 열자 쇳조각보다 모래가 먼저 쏟아졌다. 군영은 분노했고, 관청은 서류를 숨기려 했으며, 공장 주인은 전시의 혼란을 핑계로 삼았다."
 eafp_joseon_qing_war_events.12.a: "관련자를 엄벌하라."
 eafp_joseon_qing_war_events.12.b: "전쟁이 끝날 때까지 은폐하라."
 eafp_joseon_qing_war_events.12.c: "군수 조달을 개편하라."

 eafp_joseon_qing_war_events.13.t: "패장의 자결"
 eafp_joseon_qing_war_events.13.d: "패전의 책임을 지겠다며 한 장수가 죽음을 택하려 합니다."
 eafp_joseon_qing_war_events.13.f: "군막 안에 놓인 검은 이미 뽑혀 있었다. [SCOPE.sCharacter('defeated_general').GetFullName](은)는 패전의 죄를 살아서 갚을 수 없다고 말했다. 조정은 그 죽음을 충절로 기록할지, 살아서 책임지게 할지 결정해야 했다."
 eafp_joseon_qing_war_events.13.a: "그 충절을 기려라."
 eafp_joseon_qing_war_events.13.b: "죽음보다 살아서 책임지게 하라."
 eafp_joseon_qing_war_events.13.c: "패전은 조용히 덮어라."

 eafp_joseon_qing_war_events.14.t: "북방의 피난 행렬"
 eafp_joseon_qing_war_events.14.d: "전쟁 피해를 피해 남쪽으로 향하는 북방 백성들의 행렬이 관군의 보급로와 뒤엉켰습니다."
 eafp_joseon_qing_war_events.14.f: "짐을 등에 진 노인과 아이들이 눈과 진창을 헤치고 내려왔다. 지방관은 창고가 비어 간다고 아뢰었고 군영은 보급 수레가 막힌다고 호소했다. 조정은 군량과 백성의 생계를 같은 길 위에서 저울질해야 했다."
 eafp_joseon_qing_war_events.14.a: "국가가 피난민을 구호하라."
 eafp_joseon_qing_war_events.14.b: "군수 수송을 우선하라."
 eafp_joseon_qing_war_events.14.c: "각 지방에 나누어 수용하라."

