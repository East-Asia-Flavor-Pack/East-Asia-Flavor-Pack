 # Seizure of State Ownership
 chi_war_dynamism.2.t: "The Fate of [SCOPE.sState('target_state').GetName]"
 chi_war_dynamism.2.d: "As enough time has passed since the [SCOPE.sCountry('state_controller').GetName] army occupied [SCOPE.sState('target_state').GetName], control of [SCOPE.sState('target_state').GetName] has completely slipped from the hands of [SCOPE.sCountry('state_owner').GetName]. As a result, the enemy's morale has greatly increased, while our army is clearly wavering."
 chi_war_dynamism.2.a: "No!"
 chi_war_dynamism.3.t: "The Fate of [SCOPE.sState('target_state').GetName]"
 chi_war_dynamism.3.d: "As enough time has passed since the [SCOPE.sCountry('state_controller').GetName] army occupied [SCOPE.sState('target_state').GetName], the influence of the [SCOPE.sCountry('state_controller').GetName] government has finally begun to reach [SCOPE.sState('target_state').GetName] to some extent. Our army is greatly overjoyed by this fact, while the [SCOPE.sCountry('state_owner').GetName] army is clearly wavering."
 chi_war_dynamism.3.a: "Victory is ours!"
 je_reunify_china_warlord: "Warlord Era"
 je_reunify_china_warlord_reason: "As the authority of the central government collapsed, various military factions arose across China and began to compete. To rebuild ruined China, you must become more than just a #bold $gov_warlord_state$#!.\n\nWhile this [concept_journal_entry] is active, less powerful warlord states have a higher chance of supporting each other against more powerful states."
