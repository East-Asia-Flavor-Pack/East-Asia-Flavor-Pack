 # 将军府事件

 lift_of_the_manchurian_containment_decision: "废除封禁令"
 lift_of_the_manchurian_containment_decision_desc: "最初颁布封禁令是为了在清皇室失去中原时将其作为后方基地，但在各种外国势力侵占满洲的今天，必须接受移民进入满洲，以防止领土进一步被蚕食。"

 xinjiang_headquarter_decision: "废除伊犁将军府"
 xinjiang_headquarter_decision_desc: "在阿古柏领导的叛乱之后，很明显，以前用来统治伊犁的体制已经不再有效了。"
 manchu_headquarter_decision: "设立东三省"
 manchu_headquarter_decision_desc: "随着外国势力侵占满洲以及随后汉人的大量移民，不再需要单独管理东北地区了。"
 mongol_headquarter_decision: "吞并外蒙古"
 mongol_headquarter_decision_desc: "最好直接统治外蒙古，让蒙古人完全服从清朝皇帝的权威。"
 # It would be better to rule Outer Mongolia directly, making the Mongols completely subservient to the Qing Emperor's authority.

 chi_military_headquarters.101.t: "废除伊犁将军府"
 chi_military_headquarters.101.d: "在阿古柏领导的叛乱之后，很明显，以前用来统治伊犁的体制已经不再有效了。"
 chi_military_headquarters.101.f: "官员们聚集在房间里开会，空气中弥漫着明显的紧迫感。为了解决阿古柏叛乱留下的后果，人们纷纷提出各自的方法，声音此起彼伏。\n\n“我们不能再依赖旧的方法了。”一位官员坚定地说。“将军府让我们失望了，我们需要一个新的直接行政机构来纠正错误。”\n\n另一位官员点了点头。“必须建立行省，以防止再次发生这样的叛乱。”"
 chi_military_headquarters.101.a: "不会再有叛乱了。"

 chi_military_headquarters.102.t: "设立东三省"
 chi_military_headquarters.102.d: "随着外国势力侵占满洲以及随后汉人的大量移民，不再需要单独管理东北地区了。"
 chi_military_headquarters.102.f: "随着外国势力为了经济利益和领土而侵犯边境，满洲的和平宁静被打破了。随着外国军队确立统治地位，该地区变成了战场。此后，汉族移民涌入满洲寻求避难和新的机会。\n\n随着汉族移民扎根，发生了巨大的变化。随着定居者开垦土地，村庄和城市繁荣起来，满洲和汉族之间的界限变得模糊。政府认识到包容的必要性，调整了行政政策以适应这些变化。"
 chi_military_headquarters.102.a: "关外将会变得更加安全。"

 chi_military_headquarters.103.t: "吞并外蒙古"
 chi_military_headquarters.103.d: "清朝开始直接统治外蒙古，蒙古人完全服从清朝皇帝的权威。"
 # The Qing establishes direct rule over Outer Mongolia, leading to the complete submission of the Mongols to the authority of the Qing emperor.
 chi_military_headquarters.103.f: "当带着直接统治诏书的清朝使团抵达时，广阔的蒙古大草原上弥漫着敬畏感。以尚武精神和自豪的传统而闻名的蒙古人，面临着一个重大的决定：是跪在清朝皇帝面前，牺牲他们的自治和传统，还是在这个不断变化的世界中接受所承诺的稳定和保护。\n\n经过深思熟虑，蒙古领导人聚集在一个庄严的仪式上。他们带着敬畏和恐惧交织的表情，跪在清朝使臣面前，象征性地放下权力，宣誓效忠清朝皇帝。"
 # A sense of awe permeates the vast expanse of the Mongolian steppes as emissaries from the Qing Dynasty arrive, bearing the imperial decree of direct rule. The Mongols, renowned for their warrior spirit and proud heritage, find themselves facing a momentous decision: to bow before the Qing emperor, sacrificing their autonomy and traditions, or embrace the promised stability and protection in an ever-changing world.\n\nAfter deliberation and contemplation, the Mongol leaders gather in a solemn ceremony. With a mixture of reverence and trepidation, they kneel before the Qing emissaries, symbolically laying down their power and pledging allegiance to the Qing emperor.
 chi_military_headquarters.103.a: "对蒙古的统治得到了巩固。"

 # 中国风味事件

 torching_of_the_summer_palace_decision: "火烧圆明园"
 torching_of_the_summer_palace_decision_desc: "被称为万园之园的圆明园是清朝的皇家园林，保存着清皇室的各种珍贵宝物和动植物。烧毁这一中国文化的精髓将对他们的士气造成沉重打击。"

 chi_flavor.1.t: "新天子" # 系统上的自然死亡
 chi_flavor.1.d: "在新皇帝即位之际，文武百官叩首高呼万岁。先皇[SCOPE.sCharacter('former_emperor').GetFullName]已经驾崩，新皇帝[SCOPE.sCharacter('new_emperor').GetFullName]的时代开始了。"
 chi_flavor.1.a: "吾皇万岁万岁万万岁！"

 # 2,3 空白

 chi_flavor.4.t: "圆明园被毁"
 chi_flavor.4.d: "占领北京的[SCOPE.sCountry('occupying_country').GetName]军队洗劫了圆明园。这座以花园、建筑和艺术品而闻名的宫殿，在短短三天内化为灰烬。"
 chi_flavor.4.f: "随着夜幕降临，笼罩在日渐加深的恐惧阴云下的北京，这清楚地提醒着人们，正是[SCOPE.sCountry('occupying_country').GetAdjectiveNoFormatting]军队最近洗劫了宏伟的圆明园，玷污了这座城市。然而，破坏并没有就此结束。沉迷于征服的敌军指挥官要求彻底摧毁圆明园。随着命令的下达，一场大火燃起，宫殿瞬间变成了地狱。火势猛烈地肆虐了可怕的三天，将宏伟的建筑化为灰烬和废墟。曾经作为辉煌象征的圆明园，如今只剩下记忆和灰烬。"
 # A heavy pall of fear cloaked Beijing, deepening as dusk fell, a stark reminder of the [SCOPE.sCountry('occupying_country').GetAdjectiveNoFormatting] troops that had recently desecrated the city, pillaging the regal Summer Palace. The devastation, on the other hand, was far from over. The enemy's commander, relentless in his conquest, demanded the utter obliteration of the royal residence. As the order echoed, a cataclysmic blaze ignited, the palace surrendering to a fateful inferno. The flames danced manically for three harrowing days, reducing the once grand edifice to mere embers and debris. The Summer Palace, formerly an emblem of magnificence, was reduced to mere memory and ashes.
 chi_flavor.4.a: "眼泪止不住地流啊..."
 old_summer_palace_destroyed_ruler_modifier: "圆明园被毁的余波"

 chi_flavor.5.t: "冠礼"
 chi_flavor.5.d: "举行冠礼后，年轻的皇帝现在已经成年，准备直接统治帝国。"
 # Following a coming-of-age ceremony, the young emperor has reached the age of maturity and is ready to take direct control of the empire.
 chi_flavor.5.f: "随着接受垂帘听政的年轻皇帝长大，摄政时代也即将结束。紫禁城里已经准备了庆祝皇帝亲政的仪式，从今天开始，皇帝要直接行使权力的行政工作已经堆积如山。帝国期待着皇帝能创造一个更好的国家。"
 chi_flavor.5.a: "吾皇万岁万岁万万岁！"

 chi_flavor.6.t: "奔流不息的长江"
 chi_flavor.6.d: "随着工业化之风席卷全国，就连流淌了悠久岁月的长江之水也见证了变革的浪潮。一位与河流相伴一生的老船夫，心情复杂地看着这些变化。"
 chi_flavor.6.f: "在晨曦染红长江之际，被太阳晒黑的船夫看着不断扩大的工厂和喷吐着烟雾的烟囱破坏了故乡熟悉的风景。在充满烟尘的天空下，曾经充满活力的河流呈现出一种陌生的颜色。他抚摸着因几十年来的辛勤工作而变得光滑的船桨，对沉默的河流低语：“世界正在改变，老朋友。”\n\n随着正午的炎热降临，这条河变成了一条繁忙的水道，汽船和驳船来来往往，这是一排现代机械，与他童年时代的纯真相去甚远。这些钢铁巨兽震耳欲聋的轰鸣声，无情地用机械噪音取代了河流宁静的旋律。沉浸在怀旧之中的他，怀念着过去宁静的日子，那时他唯一的伙伴是一艘简陋的木船和广阔的长江的怀抱。\n\n黄昏降临时，夕阳将工业化的地平线染成了鲜艳的猩红和红色，在船夫的心中激起了涟漪。旧事物与新事物交织在一起，自然让位于人类进步的景象，唤起了一种既不安又着迷的混合情绪。陷入沉思的船夫喃喃自语：“我青春的长江已经变了，”然后思考着：“但也许多变才是唯一不变的。我只希望我们记得我们来自哪里，以及载我们到这里的河流。”"
 chi_flavor.6.a: "不尽长江滚滚来"

 # 7,8 空白

 chi_flavor.9.t: "万国公法"
 chi_flavor.9.d: "丁韪良翻译的《万国公法》出版了。这本翻译的书将为我们的官员和学者提供一个重要的框架，以理解在国家战败后变得越来越重要的国际法。"
 chi_flavor.9.f: "“昔涂山之会，执玉帛者万国，其何氏何国，不闻其详。疑史氏之辞不中，或并九州之外计之也。今九州外之国，林林总总，若非有法，何以图存。此丁教习韪良所以译《万国公法》也。韪良通华语，由江楚调至京师，属会同馆。余与钱君昕伯、李君昌华、方君骏谟、毛君宏图同在馆中，因与讲求是书，删润一过。韪良可谓好古博雅之士矣。”" # preface 1, Elements of International Law
 chi_flavor.9.a: "这是一本开阔我们狭隘视野的书。"
 chi_flavor.101.t: "[GetCurrentGameDate.Format('y')]年 黄河大改道"
 chi_flavor.101.d: "黄河向来以难以治理著称，自上古时代起就进行了无数次治水，但至今洪水依然不断。最终在[GetCurrentGameDate.Format('y')]年，[SCOPE.sState('henan_scope').GetName]省兰考县铜瓦厢决口，黄河河道改向[SCOPE.sState('shandong_scope').GetName]以北，发生了大改道。特别是因为这次洪水带来的泥沙堵塞了济宁到临清之间的大运河，使得会通河和通惠河无法通行。"
 chi_flavor.101.a: "哎呀。"

 chi_flavor.102.t: "[GetCurrentGameDate.Format('y')]年 黄河洪水"
 chi_flavor.102.d: "在[GetCurrentGameDate.Format('y')]年，黄河泛滥，给整个中国北方带来了广泛的破坏。这场洪水是中国历史上最严重的洪水之一，给该地区带来了深远的影响，造成了巨大的人员伤亡和财产损失。"
 # In [GetCurrentGameDate.Format('y')], the Yellow River flooded, causing widespread devastation throughout northern China. The flood was one of the worst in Chinese history, and it had a profound impact on the region, causing massive loss of life and property damage.
 chi_flavor.102.f: "黄河一直变幻莫测，但在[GetCurrentGameDate.Format('y')]年，它释放了如同神话中水神共工引发的巨大洪水。河水漫过堤岸，洪水席卷了整个乡村，冲走了一切。村庄和城镇被洪水吞没，留下了一条充满破坏和绝望的痕迹。\n\n随着洪水退去，灾难的全部程度变得清晰起来。数百万人失去了生命，无数人无家可归、一贫如洗。农作物被摧毁，牲畜死亡，许多人失去了生活来源。"
 # The Yellow River had always been unpredictable, but in [GetCurrentGameDate.Format('y')], it unleashed a tremendous flood like the mythical Gonggong caused. The river overflowed its banks, and the waters surged across the countryside, sweeping away everything in their path. Villages and towns were swallowed up by the floodwaters, leaving behind a trail of destruction and despair.\n\nAs the floodwaters receded, the full extent of the disaster became clear. Millions of people had lost their lives, and countless more were homeless and destitute. Crops had been destroyed, and livestock had perished, leaving many without a means of support.
 chi_flavor.102.a: "哎呀。"

 chi_flavor.103.t: "中国北方的干旱"
 chi_flavor.103.d: "最近的天气很不寻常。与往年相比，[SCOPE.sState('zhili_scope').GetName]、[SCOPE.sState('shandong_scope').GetName]和[SCOPE.sState('shanxi_scope').GetName]地区的降雨量极少，这是一个严重的问题，可能会影响整体收成。一些地区已经出现了饥荒的迹象。"
 chi_flavor.103.f: "干旱持续了很久。每次张某感受到那红红的太阳，那可怕的目光时，他的身体就忍不住发抖，更不用说田里的庄稼了，就连溪边的草和岸边的芦苇也都卷曲干枯了。\n\n仍然不愿放弃希望的张某向下看着稻田。水库底部几处积水只能勉强灌溉田地的一角，除此之外，稻田底部完全干涸发白。偶尔风吹过，树叶也会颤抖。"
 chi_flavor.103.a: "都不下雨啊..."
 jinyu_great_famine: "晋豫大饥荒"

 chi_flavor.104.t: "大干旱"
 chi_flavor.104.d: "最近发生的饥荒蔓延得更广了，扩散到了整个华北地区。制定缓解严重干旱影响的对策已成为当务之急。"
 chi_flavor.104.f: "“城门外，赤身裸体的男尸层层堆叠，就像屠宰场里看到的死猪一样。另一边，一堆女尸被剥光了衣服堆放着。她们的衣服都被当到当铺换取了食物。路边的树木都变成了灰白色，根部以上十到二十尺的树皮早已被剥光，作为饥民的食物。”"
 chi_flavor.104.a: "我们无能为力啊。"

