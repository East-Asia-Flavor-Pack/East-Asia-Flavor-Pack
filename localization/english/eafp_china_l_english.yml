 chinese_westernization.239.t: "Failure to Establish [SCOPE.sState('naval_academy_state').GetPortHubName] Naval Academy"
 chinese_westernization.239.d: "Despite their best efforts, the [SCOPE.sState('naval_academy_state').GetPortHubName] Naval Academy failed to open its doors to students and was forced to abandon its modernization plans."
 chinese_westernization.239.f: "The academy doors are locked and barred, and the only sound in the empty halls is the rustling of papers and occasional sighs. The academy's leaders sit at their desks, staring at their plans and wondering where they went wrong. Outside, the streets of [SCOPE.sState('naval_academy_state').GetPortHubName] are bustling with activity, but inside the academy, there is only a sense of defeat and disappointment. The future of the Qing navy looks bleak."
 chinese_westernization.239.a: "$chinese_westernization.139.a$"
 chinese_westernization.240.t: "Opening of the [SCOPE.sState('naval_academy_state').GetPortHubName] Naval Academy"
 chinese_westernization.240.d: "After months of hard work and dedication, the leaders of the [SCOPE.sState('naval_academy_state').GetPortHubName] Naval Academy successfully opened the institution to students and began implementing their modernization plans."
 chinese_westernization.240.f: "The doors of the academy opened wide, and eager students flooded in one by one, carrying bundles of books and wearing determined expressions. The academy's leaders stood at the entrance, watching with pride and satisfaction as their dream became a reality. The air was filled with chatter and laughter, the clanging of swords, and the marching of boots. The future of the Qing navy looks bright."
 chinese_westernization.240.a: "$chinese_westernization.140.a$"
 chiwes240a: "Opening of the Naval Academy"
 chinese_westernization.299.t: "Complete Modernization of the Navy"
 chinese_westernization.299.d: "After years of tireless work, the modernization of the [ROOT.GetCountry.GetAdjectiveNoFormatting] Navy has finally been completed. With this new fleet, we stand on the precipice of a maritime era, promising not only enhanced military prowess but also unprecedented opportunities for trade and exploration."
 # After years of tireless work, the modernization of [ROOT.GetCountry.GetAdjectiveNoFormatting] Navy has finally been completed. With this new fleet, we stand on the precipice of a maritime era, promising not only enhanced military prowess but also unprecedented opportunities for trade and exploration.
 chinese_westernization.299.f: "The bustling port is filled with a sense of accomplishment and anticipation. The first light of dawn shines on the newly launched ironclad, casting a brilliant glow over its intimidating hull.\n\nAn old admiral with a face weathered by years at sea looks upon the majestic fleet. \"Our ancestors dreamed of such power,\" he murmurs, his voice barely audible over the roar of the waves. \"Once, we had to beg for mercy from the sea and other nations. Now, we are an object of respect and fear.\" A young sailor standing nearby gazes up at the imposing iron armor. His eyes are full of admiration and hope. \"Look at that,\" he exhales in awe.\n\nAs the sun rises, a warm golden light illuminates the fleet, a symbol of [ROOT.GetCountry.GetAdjectiveNoFormatting] naval power and ready to face any challenges the future may hold."
 chinese_westernization.299.a: "It is time to advance across the seas!"
 chiwes299a: "Complete Modernization of the Navy: Overseas Expansion"
 chinese_westernization.299.b: "These seas belong to [ROOT.GetCountry.GetName]!"
 chiwes299b: "Complete Modernization of the Navy: Hegemon of the Seas"
 chinese_westernization.301.t: "The First Railroad"
 chinese_westernization.301.d: "The first railroad in [SCOPE.sCountry('chi_scope').GetName] has been laid in [SCOPE.sState('first_railroad_state').GetName]. This machine, which runs as fast as if it had wings without being pulled by horses or mules, will save an enormous amount of human labor."
 chinese_westernization.301.f: "By 1 PM, men and women of all ages had flocked to the train, and the seats were instantly filled. As the train prepared to depart, people surged forward like a wave. Taking the train was a journey, and people who had lived in [SCOPE.sState('first_railroad_state').GetCityHubName] and never left town all year brought their entire families just to see and ride this rare contraption.\n\nSince the train was an unprecedented marvel, naturally no one knew how dangerous it could be. Therefore, before departure, a bell was rung loudly to announce the departure, signaling that all passengers must be seated and no further boarding was possible. Then the whistle blew several times as the train gradually gained speed. The passengers' faces were filled with joy, and the people on both sides of the train watched with exclamations of awe.\n\nThe train accelerated and quickly disappeared into the distance. Most of the surrounding area of [SCOPE.sState('first_railroad_state').GetCityHubName] was cotton fields, and all the workers there stopped what they were doing and watched with mouths agape in astonishment."
 chinese_westernization.301.a: "What a truly wondrous contraption."
 chi_first_railroad: "China's First Railroad"
 chinese_westernization.302.t: "Fear of Railroads"
 chinese_westernization.302.d: "There is much opposition to the railroad currently being built in [SCOPE.sState('first_railroad_state').GetName]."
 chinese_westernization.302.f: "\"Building a railroad is like leaving the door open to invite thieves. In an emergency, it will be convenient for foreign armies to invade, and in peacetime, it will be easy for foreigners to bring their goods and cart away cheap Chinese goods, so that there will be no corner of the provinces unreached by the footsteps of Westerners.\"\n\n\"The West worships the Lord Jesus and knows not the gods of the mountains and rivers, but China has offered sacrifices to the great mountains and rivers through the ages. Therefore, destroying them, drilling tunnels, and ruining them for the sake of a railroad is an inauspicious act that disturbs the gods of the mountains and rivers.\""
 chinese_westernization.302.a: "Halt construction."
 chinese_westernization.302.b: "Proceed anyway."
 chiwes302b: "Fear of Railroads"
 chinese_westernization.303.t: "[SCOPE.sState('first_modern_mine_state').GetMineHubName] Mine"
 chinese_westernization.303.d: "A mine using Western technology to extract more ore using the power of machinery has opened in [SCOPE.sState('first_modern_mine_state').GetMineHubName]."
 chinese_westernization.303.f: "The miners had never seen such a sight. Enormous machines clanked and whirred, their gears and pistons moving ceaselessly. The machines could dig deeper and faster than any worker, and soon the mine was producing more ore than anyone thought possible. Working alongside the machines, the miners learned from them and used them to their advantage. The sound of the machinery, a testament to the power of technology, echoed through the tunnels. As the first shipment of ore left the mine, the workers couldn't help but feel a sense of pride in what they had achieved."
 chinese_westernization.303.a: "This is only the beginning."
 chi_first_modern_mine: "China's First Modern Mine"
 chinese_westernization.304.t: "[SCOPE.sState('first_modern_mine_state').GetCityHubName] Cotton Mill"
 chinese_westernization.304.d: "Construction of China's first modern textile mill is complete, heralding a new era of fabric production."
 chinese_westernization.304.f: "As news spread through the city, the streets buzzed with excitement. People from all walks of life gathered around the factory gates to catch a glimpse of the new machines from faraway lands. An air of anticipation hung in the air, as if the arrival of these machines heralded the birth of a new era.\n\nInside the factory, the sound of machinery filled the space. Countless factory workers stood in lines, their eyes fixed on the endless stream of cotton fibers flowing from the looms and spinning machines. For those seeing it for the first time, the rhythm of the machines was hard to get used to, but for others, it was an opportunity to be part of a new innovation."
 chinese_westernization.304.a: "A truly remarkable achievement."
 chi_first_modern_cotton_mill: "Mechanized Textile Bureau"
 chinese_westernization.305.t: "Transfer of Post"
 chinese_westernization.305.d: "Governor-General [SCOPE.sCharacter('viceroy_scope').GetFullName] actively embraced Western technology and spearheaded modernization. As a result, many modern facilities were established in [SCOPE.sState('former_post_state').GetName]. However, he has recently been transferred to another region. The problem is that he is attempting to move the facilities he built to [SCOPE.sState('state_scope').GetName]."
 chinese_westernization.305.f: "\"All of the [SCOPE.sBuilding('building_scope').GetName] must be moved to my new post. It would be a waste to leave those facilities in [SCOPE.sState('former_post_state').GetName].\""
 chinese_westernization.305.a: "We should accommodate his request. After all, they are his achievements."
 chinese_westernization.305.b: "We cannot allow him to act arbitrarily."
 chiwes305a_building: "A Missing Cog"
 chiwes305b: "Expend Authority"
 chinese_westernization.399.t: "Workshop of the World"
 chinese_westernization.399.d: "After relentless effort, reform, and investment, [ROOT.GetCountry.GetName] has successfully industrialized. The factories now churn vigorously, trains crisscross the landscape, and the economy is booming."
 chinese_westernization.399.f: "At dawn, as the sun's rays wash over the Yangtze, a boatman with a face tanned by the sun gazes at the changing landscape of his motherland. Here, where the vibrant river flows, towering factories and smokestacks now stand. A thick smog covers the sky, casting a gray haze over the once-familiar horizon. With calloused hands, he fingers his smooth, worn oar, an old relic now overshadowed by machines.\n\nBasking in the midday sun, the river seethes with the heat of steamboats and barges. The roaring of these iron giants rudely drowns out the river's peaceful symphony with mechanical noise. He misses the tranquil days when there was only his small wooden boat and the mighty Yangtze.\n\nAs twilight falls, the thick, crimson-glowing smog paints a picture in the sky that catches the boatman's eye. [ROOT.GetCountry.GetName], now an industrial giant, is humming with new life, but in the shadow of progress, the boatman's world has changed forever. Yet, in the boatman's eyes, he sees the Yangtze River, which has flowed ceaselessly since his childhood."
 chinese_westernization.399.a: "The endless Yangtze rolls on."
 chiwes399a: "Workshop of the World"
 chinese_westernization.401.t: "Establishment of Tongwenguan"
 chinese_westernization.401.d: "Following the establishment of the Zongli Yamen, the imperial court founded the Jingshi Tongwenguan, or Tongwenguan for short, an academy dedicated to foreign language education. The mission of the Tongwenguan is to train a new generation of diplomats and officials capable of communicating with foreign powers and representing [ROOT.GetCountry.GetName]'s interests on the world stage."
 chinese_westernization.401.f: "An imperial edict was issued to establish the Tongwenguan to teach the languages of the barbarians. Upon hearing this, [SCOPE.sCharacter('devout_leader').GetFullName], who is revered by many Confucian scholars, thought as follows:\n\n'It is no big deal.'\n\nSince ancient times, hasn't it been necessary to know the barbarians' language to deal with them? Although we suffered disasters like the previous one because they were blind and could not even communicate through writing, if we coax them well in their own language, we will be able to manage them again."
 chinese_westernization.401.a: "We will finally be able to communicate easily with the Westerners."
 chinese_westernization.402.t: "Ministry of Revenue Proposes Central Bank"
 chinese_westernization.402.d: "The Ministry of Revenue has submitted a memorial to the Emperor proposing the establishment of a bank. This bank, modeled after Western banks, would serve as a central institution to manage the empire's finances."
 chinese_westernization.402.f: "\"As the currency system is being reformed, it is urgent to establish a central bank as the hub for its implementation. We have carefully considered it and propose that the Ministry of Revenue introduce a bank, raise capital, refer to the statutes of banks in various countries, consider the pros and cons, and promptly start the bank as the general hub for financial transactions.\""
 # "As the currency system is being reformed, it is urgent to establish a central bank as the hub for its implementation. We have carefully considered it and propose that the Ministry of Revenue introduce a bank, raise capital, refer to the statutes of banks in various countries, consider the pros and cons, and promptly start the bank as the general hub for financial transactions."
 chinese_westernization.402.a: "Establish the Ta-Ching Bank!"
 # Found the Great Qing Bank!
 chinese_westernization.403.t: "Adjustment of Tongwenguan Curriculum"
 chinese_westernization.403.d: "The imperial court decided to include Western subjects such as astronomy and mathematics in the Tongwenguan's curriculum and mandated that officials of the fifth rank and below study there. In addition, Hanlin scholars were also instructed to participate in learning these new subjects. However, this decision faced fierce opposition from the literati class."
 chinese_westernization.403.f: "\"The barbarians are our enemies. Yet now you take these intelligent and robust individuals, whom the state should nurture and keep for its own use, and transform them to follow the barbarians. The righteous spirit will not spread, and only the evil aura will flare up. In a few years, everyone in China will become barbarians. Please retract your previous decree immediately and uphold the great nation. If you stop this unseen disaster in this way, the whole world will truly be at peace!\""
 chinese_westernization.403.a: "How truly noisy."
 chinese_westernization.404.t: "Fallen from the Horse"
 chinese_westernization.404.d: "[SCOPE.sCharacter('devout_leader').GetFullName], who adamantly opposed the court's decision, was eventually outmaneuvered."
 chinese_westernization.404.f: "\"The world is vast. Therefore, do not worry about a lack of talent. If we search widely, we will surely find someone well-versed in learning. Why must we insist on barbarians?\" Who knew these words would be a mistake? He was then told to bring someone well-versed in learning himself and build a school!\n\nThus, [SCOPE.sCharacter('devout_leader').GetFullName] found himself stepping into the murky waters of 'Western Affairs' (Yangwu) that he so despised. This was truly terrible. Every time he returned home, his face was pale, and he could not swallow tea or food properly.\n\nIn the end, [SCOPE.sCharacter('devout_leader').GetFullName] fell from the saddle."
 chinese_westernization.404.a: "It should be quieter now."
 chinese_westernization.404.tt: "The literati will become more moderate."
 chinese_westernization.405.t: "Centralization of Minting Completed"
 chinese_westernization.405.d: "After arduous efforts, we have completed the centralization of minting."
 chinese_westernization.405.f: "For a long time, local governments and major merchants had been minting their own currencies, causing monetary chaos and many difficulties in commerce. But now, the era of provinces and localities minting their own currencies has ended.\n\nWith this, we can unify our monetary policy, although pushback from some regional powers and major merchants is expected."
 chinese_westernization.405.a: "Finally!"
 chinese_westernization.406.t: "Imperial University of Peking"
 chinese_westernization.406.d: "For the first time in China, a university based on the Western education system rather than traditional education has been established."
 chinese_westernization.406.f: "'Chinese learning is the fundamental structure, while Western learning is for practical use; both are necessary, and neither should be lacking. If either is lacking, how can we cultivate talent? Furthermore, if we do not teach theory and lack fundamentals, a shallow imitation of Western learning will yield no understanding and only add bad habits. Therefore, we must emphasize both Chinese and Western learning, observe their connections, and abandon neither. Also, Western languages should be one subject at the academy, but not the entirety of the academy. Western languages are only a stepping stone to Western learning, not its final goal. This intent must be clearly understood and proclaimed to all provinces.'"
 chinese_westernization.406.a: "Using China's ethics and teachings as the foundation, and reinforcing them with the methods of wealth and power from foreign nations; how could this not be the best approach?"
 chi_imperial_university: "Imperial University of Peking"
 chinese_westernization.421.t: "Debate on the Future of Public Security"
 # Debate on the Future of Public Security
 chinese_westernization.421.d: "A heated debate has arisen among officials in the government regarding the future of the Baojia system, which has been used for centuries to maintain public security in the empire. Some argue that the system is outdated and in need of reform to create a modern police force, while others believe that it should be abolished altogether."
 # A heated debate has arisen among officials in the government regarding the future of the Baojia system, which has been used for centuries to maintain public security in the empire. Some argue that the system is outdated and in need of reform to create a modern police force, while others believe that it should be abolished altogether.
 chinese_westernization.421.f: "The debate raged on for hours, with each side passionately arguing their case. Those in favor of reforming the Baojia system argued that it was no longer effective in the face of changing times. They pointed out that it had become corrupted and was no longer serving its original purpose. They claimed that the system was being abused and proposed to use the Western policing system as a model to emulate.\n\nOn the other side of the debate, those passionately in favor of maintaining the Baojia system argued that this system had been in place for centuries and had proven effective in maintaining public order and safety. They believed that the key to improving the system was to provide better training to the Baojia leaders and strengthen communication between the Baojia groups and local authorities.\n\nAnd, the smallest group advocated for the complete abolition of the Baojia system. They believed that the Baojia system was irreparably flawed and needed to be abolished. While acknowledging that the transition to a new system would be difficult, they believed it was necessary to ensure the safety and prosperity of the empire in the long run."
 # The debate raged on for hours, with each side passionately arguing their case. Those in favor of reforming the Baojia system argued that it was no longer effective in the face of the changing times. They pointed out that it had become corrupted and was no longer serving its original purpose. They claimed that the system had been abused and proposed to use the Western policing system as a model to emulate.\n\nOn another side of the debate, those passionately in favor of maintaining the Baojia system argued that this system had been in place for centuries and had proven to be effective in maintaining public order and safety. They believed that the key to improving the system was to provide better training to the Baojia leaders and to strengthen the communication between the Baojia groups and the local authorities.\n\nAnd, the smallest group advocated for the complete abolition of the Baojia system. They believed that the Baojia system was irreparably flawed and needed to be abolished. While acknowledging that the transition to a new system would be difficult, they believed that it was necessary to ensure the safety and prosperity of the empire in the long run.
 chinese_westernization.421.a: "Leave it alone. We can just use both."
 baojia_system_retained_ig_landowners: "Baojia System Retained"
 baojia_system_retained_ig_intelligentsia: "Baojia System Retained"
 chinese_westernization.421.b: "Reform the system to collect taxes efficiently."
 baojia_system_reformed_tax: "Baojia System Reformed: Tax Collection"
 chinese_westernization.421.c: "Reform the system to efficiently defend rural areas."
 baojia_system_reformed_military: "Baojia System Reformed: Rural Defense"
 chinese_westernization.421.e: "Abolish it entirely!"
 baojia_system_abolished: "Baojia System Abolished"
 baojia_system_abolished_ig_landowners: "Baojia System Abolished"
 baojia_system_abolished_ig_intelligentsia: "Baojia System Abolished"
 chinese_westernization.422.t: "Debate on the Future of the Imperial Examination"
 chinese_westernization.422.d: "The future of the imperial examination is being hotly debated in [ROOT.GetCountry.GetName]. Some officials argue for its continued use, others suggest modifying only some subjects, while others call for its complete abolition."
 # The future of the imperial examination is being hotly debated in [ROOT.GetCountry.GetName]. Some officials argue for its continued use, others suggest modifying only some subjects, while others call for its complete abolition.
 chinese_westernization.422.f: "The argument over the imperial examination's future is heated. Many recognize the system's faults and argue that it is time for change. They say that the exam is not a fair or trustworthy measure of aptitude, that it is out of date, and that it does not reflect the demands of a changing society.\n\nOther officials, however, are divided. They argue that the examination is an important aspect of Chinese governance and that it must be preserved despite its flaws. They contend that the examination has been beneficial to the empire for centuries and that it is a valuable tradition that needs to be preserved.\n\nStill others believe that the system can be improved with some modifications. They propose adjustments to the subjects or the manner the exam is conducted to make it more fair and reliable. They claim that while the examination is an important tool for finding potential, it needs to be revised to reflect current demands."
 # The argument over the imperial examination's future is heated. Many leaders recognize the system's faults and argue that it is time to move on. They say that the exam is not a fair or trustworthy measure of aptitude, that it is out of date, and that it does not reflect the demands of a changing society.\n\nOther officials, however, are divided. They argue that the examination is an important aspect of the Chinese governance system and that it must be preserved, despite its flaws. They contend that the examination have been beneficial to the empire for centuries and that it is a valuable tradition that need to be preserved.\n\nStill others believe that the system can be improved with some modifications. They propose adjustments to the subjects or the manner the exam is conducted to make it more fair and reliable. They claim that while the examination is an important tool for finding potential, it need to be revised to reflect current demands.
 chinese_westernization.422.a: "Retain the imperial examination."
 imperial_examination_retained_ig_devout: "Imperial Examination Retained"
 imperial_examination_retained_country: "Imperial Examination Retained"
 chinese_westernization.422.b: "Perhaps a little reform is needed."
 imperial_examination_reformed: "Reformed Imperial Examination"
 imperial_examination_reformed_ig_devout: "Imperial Examination Reformed"
 imperial_examination_reformed_ig_landowners: "Imperial Examination Reformed"
 chinese_westernization.422.c: "Abolish it entirely!"
 imperial_examination_abolished_ig_devout: "Imperial Examination Abolished"
 imperial_examination_abolished_ig_landowners: "Imperial Examination Abolished"
