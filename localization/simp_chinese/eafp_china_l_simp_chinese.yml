 nian_army.1.t: "捻军"
 nian_army.1.d: "由于可怕的灾难，农民的不满情绪日益高涨，导致了叛乱。华北地区已经变成了战场。"
 nian_army.1.f: "“亳州城子四方方，财主官府蹓下乡；\n穷人粮食被逼净，居家老幼哭皇苍。\n亳州城子四方方，捻子起手涡河旁；\n杀财主，打官府，大户小户都有粮。”"
 nian_army.1.a: "立即镇压他们！"

 nian_army.2.t: "投降"
 nian_army.2.d: "经过长期征讨，扰乱华北的盗贼团伙已被歼灭。据说其首领已投江自尽。"
 nian_army.2.f: "饱受饥荒与剥削之苦的百姓，在车上挂起火把起事，其势如燎原之火，势不可挡。"
 nian_army.2.a: "对盗贼绝不能手软。"
 nian_army.2.b: "现在是恢复的时候了。"

 nian_army.3.t: "建制"
 nian_army.3.d: "华北地区爆发的叛乱已经到了无法控制的地步。据说已经有许多农民跟随叛军。"
 nian_army.3.f: "“张乐行与李老崩，东北西南两条龙，\n将旗遮天盖了地，穷人有粮吃不穷。”"
 nian_army.3.a: "事情闹大了。"

 nian_army.11.t: "掠夺粮仓"
 nian_army.11.d: "叛军袭击了粮仓，将粮食全部抢走。粮仓里已经空空如也。"
 nian_army.11.f: "“唉，这可怎么办！这可是下个月要运走的米粮，我真不知道该如何应对。现在我该怎么向上级汇报？”"
 nian_army.11.a: "被抢了也没办法。"
 nian_army.11.b: "必须想办法补齐。"

 nian_army.12.t: "保甲连坐"
 nian_army.12.d: "我们正在探讨通过保甲连坐制度来抑制捻军活动的方法。"
 nian_army.12.f: "“如果通过连坐制度来抑制叛乱，肯定会有效。如果有人企图参与叛乱，他们的邻居一定会阻止的。”\n\n“这有惩罚无辜者的风险。可能会引起百姓的反抗，所以必须慎重考虑。”"
 nian_army.12.a: "对于揪出叛乱分子很有用。"
 nian_army.12.b: "反抗会太强烈的。"

 nian_army.13.t: "被围困的城市"
 nian_army.13.d: "叛军突然包围了一座城市，城内的士兵和居民都感到恐惧。包围持续的时间越长，城内的粮食和资源就会越枯竭。"
 nian_army.13.f: "捻军的旗帜飘扬，无数士兵排列整齐。一名在城墙上站岗的士兵望着漫无边际的捻军阵型，深深地叹了口气。"
 nian_army.13.a: "立即派遣援军突破包围。"
 niaarm13a: "突破包围"
 nian_army.13.b: "他们会不会只是适度包围然后就撤退了？"

 nian_army.14.t: "不满的官员"
 nian_army.14.d: "部署军队以阻挡叛军的问题浮出水面。一名官员对军队部署表示了极大的不满。"
 nian_army.14.f: "“为什么只有这里不部署军队而空着？是想让盗贼们都聚集到这里来吗？你们怎么敢把这个地区当作诱饵！这里住着无数的百姓。如果继续这样下去，我们就会失去民心，引起更大的混乱。”"
 nian_army.14.a: "制定更安全的战略并部署军队。"
 niaarm14a: "乡村荒废"
 nian_army.14.b: "为了阻挡眼前的威胁，这也是没办法的事，照计划执行吧。"
 niaarm14b: "赈济负担"

 nian_army.15.t: "诱饵"
 nian_army.15.d: "农村地区因叛乱而遭受了巨大的破坏。为了防止这种情况，有人提出了清理山野的对策，但农民和地方官员的反对非常强烈。"
 nian_army.15.f: "“现在是农忙季节。我明白想要阻挡叛军的心情，但我们连农活都忙不过来，怎么可能抽出人手去干别的。”\n“大人，请您再考虑考虑。现在对我们来说最重要的是种地。在这种时候去做别的事情，我们靠什么生活啊？”"
 nian_army.15.a: "为了阻挡叛军，这是不可避免的，执行对策。"
 niaarm15a: "强制动员"
 nian_army.15.b: "向农民承诺补偿并继续执行。"
 niaarm15b: "有偿徭役"
 nian_army.15.c: "看来无法实施了。"

 nian_army.16.t: "招安"
 nian_army.16.d: "在与官军进行了激烈的交战后，部分叛军投降了。对于如何处置他们，引起了争议。"
 nian_army.16.f: "“关于如何处置投降者，这是一个非常重要的问题。处决他们固然是对的，但如果我们将他们招安，收编为我们的人，我们就可以利用他们的力量加快镇压叛乱的步伐。”"
 nian_army.16.a: "全部处决，将叛乱扼杀在摇篮里。"
 nian_army.16.b: "招安并将他们编入我们的军队。"

 nian_army.17.t: "约定"
 nian_army.17.d: "部分叛军相信了投降就能保住性命的承诺，于是投降了。"
 nian_army.17.f: "“如果我们违背了这个约定，以后还有谁会相信我们的话？保证他们性命的承诺必须遵守。”\n\n“如果不惩罚叛军，就会给其他人传递错误的信息。必须严惩他们。”"
 nian_army.17.a: "保证投降者的性命。"
 nian_army.17.b: "严惩不贷，绝不留下叛乱的火种。"

 nian_army.18.t: "骑兵奇袭"
 nian_army.18.d: "我军部队遭到叛军的奇袭，损失惨重。在意想不到的攻击中，许多士兵丧生，物资也大量损失。"
 nian_army.18.f: "“我们必须马上反击，消灭捻军骑兵。我们必须在他们再次发动奇袭之前，先发制人，使他们失去战斗力。”\n\n“此时最重要的是加强防御，将进一步的损失降到最低。草率的应对可能会招致更大的危险。”"
 nian_army.18.a: "立即追击并消灭叛军骑兵。"
 niaarm18a: "扫荡作战"
 nian_army.18.b: "集中精力加强防御，将损失降到最低。"
 niaarm18b: "巩固防御"

 nian_army.19.t: "公开处决"
 nian_army.19.d: "我们成功生擒了叛军的一名主要头目。"
 nian_army.19.f: "官军终于成功抓获了叛军的主要头目之一。此人在捻军内部具有很大的影响力，处决他将有助于打击捻军的士气，恢复朝廷的权威。"
 nian_army.19.a: "公开处决他以杀鸡儆猴。"
 nian_army.19.b: "秘密处决他以防止可能发生的反抗。"

