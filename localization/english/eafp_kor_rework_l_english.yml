 je_sedo_politics: "Sedo Politics"
 je_sedo_politics_reason: "Since the accession of the young king, state affairs have slipped from his hands and into the grip of a specific #bold consort clan#!. A few families, led by the Andong Kim clan, are monopolizing the key posts of the #bold Bibyeonsa#! (Border Defense Council), effectively privatizing the state's administration.\n\nRoyal authority has become nominal, the forum for public discourse has closed, and the rampant sale of public offices has paralyzed the government. The people's suffering has reached its peak due to the harsh #bold 'Corruption of the Three Administrations'#!, and the discontent of the #bold alienated Yangban scholar-officials#! is also deepening.\n\nAs long as the $je_sedo_politics$ [concept_journal_entry] is active, the [concept_leader] of the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant] will be the head of the Sedo family.\n\n#bold Ending Sedo Politics#!\nWhen the [concept_eafp_sedo_politics_balance] reaches #bold 0#!, Sedo Politics will end and the nation's discipline will be restored. Of course, the [Concept('concept_eafp_sedo_politics_pocket_money', 'corruption')] of the [concept_eafp_sedo_family] will also come to an end."
 je_sedo_politics_status: "[concept_eafp_sedo_politics_balance]: #tooltippable #tooltip:[GetPlayer.GetTooltipTag],je_sedo_politics_tooltip [GetPlayer.MakeScope.Var('eafp_var_je_sedo_politics_balance').GetValue|v2]#!#!\n[concept_eafp_sedo_family]'s Fortune: @money!#P [Character.GetCountry.MakeScope.Var('eafp_var_je_sedo_politics_account').GetValue|D]#!"
