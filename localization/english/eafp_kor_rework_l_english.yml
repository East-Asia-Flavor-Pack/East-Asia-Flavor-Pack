 concept_eafp_sedo_family: "Sedo Family"
 concept_eafp_sedo_family_desc: "The Sedo Family is the consort clan of the [concept_ruler], entrusted by the [concept_ruler] to seize power and govern the country. Originally, 'Sedo (世道)' meant the righteous way to govern the country, but during this period, it was corrupted into 'Sedo (勢道)', meaning politics by power."

 concept_eafp_sedo_politics_balance: "Power Balance"
 concept_eafp_sedo_politics_balance_desc: "Power Balance is a measure of the balance of power between the [Concept('concept_ruler', GetPlayer.GetRuler.GetPrimaryRoleTitle)] and the #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!. It is divided into five major levels indicating the degree of power leakage, and with each level increase, additional self-interest actions that the #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! can take are unlocked."

 concept_eafp_regent_lv1: "#color:{0.5,0.8,1.0} $concept_eafp_sedo_politics_balance$#! #V Level 1#!"
 concept_eafp_regent_lv1_desc: "#V Effects#!\n• The #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! can [concept_eafp_sedo_politics_pocket_money] a @coin3!small amount of funds from the [concept_treasury].\n• The #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! can [concept_eafp_sedo_politics_pocket_money] a @coin3!small amount of funds from the [concept_investment_pool].\n• If the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant] is not [concept_in_government], the [concept_ruler] gains @eafp_stress_gain!#N +1#! [concept_kor_stress] per month.\n• Each time the [concept_in_government] is reformed, the [concept_ruler] gains @eafp_stress_gain!#N +5#! [concept_kor_stress].\n• The #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! can temporarily increase the political strength of the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant].\n• The #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! can spend siphoned funds to shift the [concept_eafp_sedo_politics_balance] in their favor."
 concept_eafp_regent_lv2: "#color:{0.5,0.8,1.0} $concept_eafp_sedo_politics_balance$#! #V Level 2#!"
 concept_eafp_regent_lv2_desc: "#V Effects#!\n• The #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! can exploit regions, allowing them to [concept_eafp_sedo_politics_pocket_money] funds and decreasing @eafp_state_adm![concept_eafp_landlvl_adm].\n• The #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! can exploit regions, allowing them to [concept_eafp_sedo_politics_pocket_money] funds and decreasing @eafp_state_mil![concept_eafp_landlvl_mil].\n• The #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! can exploit regions, allowing them to [concept_eafp_sedo_politics_pocket_money] funds and decreasing @eafp_state_civ![concept_eafp_landlvl_civ].\n• The #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! can instigate Rite Controversies, temporarily decreasing [concept_legitimacy].\n#weak All effects from previous levels also apply.#!"
 concept_eafp_regent_lv3: "#color:{0.5,0.8,1.0} $concept_eafp_sedo_politics_balance$#! #V Level 3#!"
 concept_eafp_regent_lv3_desc: "#V Effects#!\n• The #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! can [concept_eafp_sedo_politics_pocket_money] a @coin7!medium amount of funds from the [concept_treasury].\n• The #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! can [concept_eafp_sedo_politics_pocket_money] a @coin7!medium amount of funds from the [concept_investment_pool].\n• Each time an [concept_army] is [Concept('concept_mobilize_army', '$concept_mobilize_army_mobilize$')], the [concept_ruler] gains @eafp_stress_gain!#N +5#! [concept_kor_stress].\n#weak All effects from previous levels also apply.#!"
 concept_eafp_regent_lv4: "#color:{0.5,0.8,1.0} $concept_eafp_sedo_politics_balance$#! #V Level 4#!"
 concept_eafp_regent_lv4_desc: "#V Effects#!\n• The #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! can appoint their cronies as commanders.\n• When the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant] is $ig_approval_angry$, +#N 25%#! $political_movement_radicalism_add$.\n• The #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! can interfere in official appointments, decreasing Bureaucracy.\n• Each time an independent [concept_diplomatic_play] is initiated, the [concept_ruler] gains @eafp_stress_gain!#N +10#! [concept_kor_stress].\n#weak All effects from previous levels also apply.#!"
 concept_eafp_regent_lv5: "#color:{0.5,0.8,1.0} $concept_eafp_sedo_politics_balance$#! #V Level 5#!"
 concept_eafp_regent_lv5_desc: "#V Effects#!\n• The #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! can [concept_eafp_sedo_politics_pocket_money] a @coin11!large amount of funds from the [concept_treasury].\n• The #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! can [concept_eafp_sedo_politics_pocket_money] a @coin11!large amount of funds from the [concept_investment_pool].\n• $head_of_sedo_family$ [concept_popularity] +#N 100#!.\n• [concept_authority] #N -25%#!.\n• Every #V 4 years#!, a law of the #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!'s choosing may be #N railroaded through.#!\n#weak All effects from previous levels also apply.#!"

