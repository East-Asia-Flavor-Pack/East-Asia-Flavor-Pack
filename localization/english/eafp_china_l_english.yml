 je_nian_army_fail: "The progress of the #bold Nian Army#! has increased to #bold 100%#!, spreading into a major rebellion"
 nian_army_drift_positive: "The progress of the #bold Nian Army#! has #bold increased#! by $VALUE|-vb$"
 nian_army_drift_negative: "The progress of the #bold Nian Army#! has #bold decreased#! by $VALUE|+vb$"
 nian_army.1.t: "Nian Army"
 nian_army.1.d: "A rebellion has broken out as peasants' discontent has accumulated due to terrible disasters. The North China region has already turned into a battlefield."
 nian_army.1.f: "\"The city of Bozhou is square, the rich are leaving,\nThe poor have their rice taken away, every household wails.\nThe city of Bozhou is square, the Nian Army rises,\nKill all the rich, every household becomes prosperous.\""
 nian_army.1.a: "Suppress them immediately!"
 nian_army.2.t: "Tuishen"
 nian_army.2.d: "After a long campaign, the bandits who were causing chaos in North China have been annihilated. It is said that their leader threw himself into the river."
 nian_army.2.f: "Exhausted by famine and exploitation, the people rise up with torches on their carts; their momentum is like a wildfire that cannot be stopped."
 nian_army.2.a: "There is no mercy for bandits."
 nian_army.2.b: "Now is the time to recover."
 nian_army.3.t: "Establishment"
 nian_army.3.d: "The rebellion that broke out in North China has spread out of control. It is said that many peasants are already following the rebels."
 nian_army.3.f: "\"Zhang Luoluo and Li Laofeng, the two dragons of the northeast and southwest,\nWhen the general's flag covers the sky, the people are saved.\""
 nian_army.3.a: "This is a serious matter."
 nian_army.11.t: "Looting the Granary"
 nian_army.11.d: "The rebels attacked the granary and stole all the grain. The warehouse is already empty."
 nian_army.11.f: "\"Sigh, how could this happen! This is the rice that must be shipped next month, and I am at a loss for how to deal with this. What should I say to my superiors right now?\""
 nian_army.11.a: "There's nothing we can do about the looting."
 nian_army.11.b: "We must somehow restock it."
 nian_army.12.t: "Baojia Collective Responsibility"
 nian_army.12.d: "We are considering ways to suppress the activities of the Nian Army through the Baojia collective responsibility system."
 nian_army.12.f: "\"It will be effective if we suppress rebellion through the collective responsibility system. If someone tries to join the rebellion, their neighbors will certainly stop them.\"\n\n\"This risks punishing innocent people. We must consider this carefully as it could cause a backlash from the people.\""
 nian_army.12.a: "It would be good for rooting out rebels."
 nian_army.12.b: "The backlash would be too severe."
 nian_army.13.t: "Besieged City"
 nian_army.13.d: "The rebels have suddenly besieged a city, and the soldiers and residents inside are in fear. The longer the siege lasts, the more the food and resources inside the city will be depleted."
 nian_army.13.f: "The flags of the Nian Army flutter, and countless soldiers are arranged in an orderly manner. A soldier standing guard on the city wall let out a deep sigh as he looked at the endlessly stretching formation of the Nian Army."
 nian_army.13.a: "Dispatch reinforcements immediately to break the siege."
 niaarm13a: "Break the Siege"
 nian_army.13.b: "Won't they just besiege it moderately and then retreat?"
 nian_army.14.t: "Disgruntled Official"
 nian_army.14.d: "The issue of deploying troops to stop the rebels has emerged. One official is expressing great dissatisfaction with the troop deployment."
 nian_army.14.f: "\"Why are we leaving this area empty instead of deploying troops? Are we trying to make the bandits flock here? How dare you use this area as bait! Countless people live here. If we continue like this, we will lose the hearts of the people and cause even greater chaos.\""
 nian_army.14.a: "Devise a safer strategy and deploy the troops."
 niaarm14a: "Rural Devastation"
 nian_army.14.b: "It can't be helped in order to stop the immediate threat; proceed as planned."
 niaarm14b: "Relief Burden"
 nian_army.15.t: "Bait"
 nian_army.15.d: "Rural areas are suffering great damage due to the rebellion. To prevent this, a measure to clear the hills was proposed, but the backlash from peasants and local officials is very severe."
 nian_army.15.f: "\"It is the busy farming season now. I understand wanting to stop the rebels, but we are too busy with farming to divert labor.\"\n\"Sir, please reconsider. What we need most right now is to farm. If we do other work at a time like this, what will we live on?\""
 nian_army.15.a: "It can't be helped in order to stop the rebels; execute the measure."
 niaarm15a: "Forced Mobilization"
 nian_army.15.b: "Proceed while promising compensation to the peasants."
 niaarm15b: "Compensated Corvée"
 nian_army.15.c: "It seems we cannot implement this."
 nian_army.16.t: "Appeasement"
 nian_army.16.d: "After fierce battles with the imperial army, some rebels surrendered. There is controversy over how to treat them."
 nian_army.16.f: "\"The discussion on what to do with those who surrendered is a very important issue. It would be right to execute them, but if we appease them and bring them to our side, we could use their strength to accelerate the suppression of the rebellion.\""
 nian_army.16.a: "Execute them all and nip the rebellion in the bud."
 nian_army.16.b: "Appease them and incorporate them into our forces."
 nian_army.17.t: "Promise"
 nian_army.17.d: "Some rebels surrendered, trusting the promise that their lives would be guaranteed if they did so."
 nian_army.17.f: "\"If we break this promise, who will believe our words in the future? The promise to guarantee their lives must be kept.\"\n\n\"If we do not punish the rebels, it will send the wrong signal to others. We must deal with them strictly.\""
 nian_army.17.a: "Guarantee the lives of those who surrendered."
 nian_army.17.b: "Punish them strictly so as not to leave any embers of rebellion."
 nian_army.18.t: "Cavalry Raid"
 nian_army.18.d: "Our troops suffered great damage from a surprise attack by the rebels. Many soldiers lost their lives and a large amount of supplies was lost in the unexpected attack."
 nian_army.18.f: "\"We must counterattack right now and wipe out the Nian Army cavalry. We must neutralize them with a preemptive strike before they launch another surprise attack.\"\n\n\"At this point, the most important thing is to strengthen our defenses and minimize further damage. A hasty response could invite greater danger.\""
 nian_army.18.a: "Immediately pursue and wipe out the rebel cavalry."
 niaarm18a: "Mopping-up Operation"
 nian_army.18.b: "Focus on strengthening defenses and minimizing damage."
 niaarm18b: "Solidifying Defenses"
 nian_army.19.t: "Public Execution"
 nian_army.19.d: "We succeeded in capturing a major leader of the rebellion alive."
 nian_army.19.f: "The imperial army finally succeeded in capturing one of the major rebel leaders. This leader was a figure of great influence within the Nian Army, and his execution will contribute to breaking the morale of the Nian Army and restoring the court's authority."
 nian_army.19.a: "Execute him publicly to make an example of him."
 nian_army.19.b: "Execute him secretly to prevent any potential backlash."
