 eafp_scripted_button_kor_foreign_mission_start_active_tt: "이미 진행 중인 해외 사절단이 없음"
 eafp_scripted_button_kor_foreign_mission_start_candidate_tt: "정부에 참여 중이며 파견 가능한 인물이 있음"
 eafp_scripted_button_kor_foreign_mission_recall: "귀국 명령"
 eafp_scripted_button_kor_foreign_mission_recall_desc: "해외에 나가 있는 사절단에 조기 귀국을 명합니다."
 eafp_scripted_button_kor_foreign_mission_recall_location_tt: "사절단이 해외에 있음"
 eafp_scripted_button_kor_foreign_mission_recall_not_returned_tt: "사절단이 아직 귀국 중이 아니며 귀국하지 않음"
 eafp_scripted_button_kor_foreign_mission_recall_effect_tt: "사절단이 일정을 줄이고 귀국함"

 eafp_kor_foreign_mission.1.t: "해외 사절단"
 eafp_kor_foreign_mission.1.d: "조정은 해외 사절단을 파견하여 각국의 제도와 군사, 상공업의 실상을 직접 살피기로 했다. 이제 문제는 누가 이 중대한 임무를 맡을 것인가이다."
 eafp_kor_foreign_mission.1.f: "\"책상 위의 지도는 천하를 다 담은 듯하나, 바다를 건너본 자의 눈에는 그저 접힌 종이에 불과하다.\""
 eafp_kor_foreign_mission.1.a: "[SCOPE.sCharacter('kor_foreign_mission_leader_1').GetFullName]에게 맡겨라."
 eafp_kor_foreign_mission.1.b: "[SCOPE.sCharacter('kor_foreign_mission_leader_2').GetFullName]에게 맡겨라."
 eafp_kor_foreign_mission.1.c: "[SCOPE.sCharacter('kor_foreign_mission_leader_3').GetFullName]에게 맡겨라."
 eafp_kor_foreign_mission.1.e: "[SCOPE.sCharacter('kor_foreign_mission_leader_4').GetFullName]에게 맡겨라."

 eafp_kor_foreign_mission.2.t: "세계일주의 출항"
 eafp_kor_foreign_mission.2.d: "사절단은 항구를 떠나 바다와 육로를 잇는 긴 순방에 오른다. 그들은 특정 한 나라의 제도만이 아니라, 세계 각지에서 작동하는 질서와 부강의 원리를 살필 것이다."
 eafp_kor_foreign_mission.2.f: "배가 항구를 떠나기 전, 수행원들은 붓과 종이, 외국어 사전, 그리고 조정의 국서를 다시 확인했다."
 eafp_kor_foreign_mission.2.a: "세계일주 항로를 승인하라."
 eafp_kor_foreign_mission.2.b: "세계 각지의 군기와 외교 실무를 익혀라."
 eafp_kor_foreign_mission.2.c: "더 넓은 세계와 교류하며 견문을 넓혀라."

 eafp_kor_foreign_mission.3.t: "첫 보고"
 eafp_kor_foreign_mission.3.d: "사절단의 첫 보고가 도착했다. 그들은 낯선 제도와 기계, 훈련받은 군대와 새로운 외교 의례를 목격하며 세계의 넓이를 실감하고 있다."
 eafp_kor_foreign_mission.3.f: "\"눈으로 본 뒤에야 비로소 알았습니다. 강약은 말에서 나는 것이 아니라 제도와 재정, 배움과 기계에서 납니다.\""
 eafp_kor_foreign_mission.3.a: "항로를 넓혀 세계일주를 완수하라."

 eafp_kor_foreign_mission.4.t: "세계를 한 바퀴 돌아"
 eafp_kor_foreign_mission.4.d: "사절단은 더 먼 항로를 택해 항구와 수도, 공장과 의회, 병영과 학교를 두루 둘러보았다. 그들이 모은 기록은 단순한 여행기가 아니라 조선이 세계 속에서 설 자리를 묻는 보고서가 되었다."
 eafp_kor_foreign_mission.4.f: "긴 항해 끝에 마주한 항구마다 서로 다른 깃발과 말, 법과 기계가 있었으나, 부강을 떠받치는 질서가 있다는 사실만은 어디서나 같았다."
 eafp_kor_foreign_mission.4.a: "세계일주 기록을 정리하고 귀국하라."
 eafp_kor_foreign_mission.4.b: "각국의 법제와 학술을 두루 살피라."
 eafp_kor_foreign_mission.4.c: "각지의 군사 제도와 외교 관행을 정리하라."

 eafp_kor_foreign_mission.5.t: "귀국"
 eafp_kor_foreign_mission.5.d: "사절단이 귀국했다. 낯선 제도와 기계, 외교 의례에 대한 기록은 조정의 낡은 질서를 흔들 만큼 방대하다."
 eafp_kor_foreign_mission.5.f: "상자에는 외국 신문과 법령집, 공장 도면, 군사 교범, 그리고 수행원들이 밤마다 베껴 쓴 견문록이 가득했다."
 eafp_kor_foreign_mission.5.a: "보고서를 올리게 하라."

 eafp_kor_foreign_mission.6.t: "견문 보고서"
 eafp_kor_foreign_mission.6.d: "사절단의 귀국 보고서가 조정에 제출되었다. 이제 이 견문을 어떤 방식으로 국정에 반영할지 결정해야 한다."
 eafp_kor_foreign_mission.6.f: "\"제도는 하루아침에 옮겨 심을 수 없으나, 나라가 눈을 감고 있으면 남의 제도 아래 놓이는 날이 올 것입니다.\""
 eafp_kor_foreign_mission.6.a: "제도 개혁안을 채택하라."
 eafp_kor_foreign_mission.6.b: "기술과 군사 보고서를 우선하라."
 eafp_kor_foreign_mission.6.c: "외교적 신뢰를 넓히는 데 활용하라."

 eafp_modi_kor_foreign_mission_institutional_report: "제도 시찰 보고서"
