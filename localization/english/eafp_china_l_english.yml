 first_opium_war.9.t: "The Emperor's Decision"
 first_opium_war.9.d: "After months of conflict between the strict prohibition and legalization factions dividing the court, only the Emperor's final decision remains."
 first_opium_war.9.f: "\"In recent years, the infection of opium smoke has grown deeper by the day, and the outflow of silver overseas has become ever more severe. Edicts have repeatedly ordered the governors and governors-general to investigate in earnest, yet old habits cannot be uprooted in a moment. If the source is not searched out, who can say where this calamity will end?\""
 # Source: 《清實錄道光朝實錄》, Daoguang edict dispatching Lin Zexu to Guangdong.
 first_opium_war.9.a: "I choose strict prohibition. Send Lin Zexu to Guangdong!"
 first_opium_war.9.b: "I choose legalization. Legalize and tax opium."
 first_opium_war.12.t: "British Ultimatum"
 first_opium_war.12.d: "[SCOPE.sCountry('opium_wars_aggressor_country').GetName] has demanded compensation for the seized opium and an end to trade restrictions. The court sees this as a challenge to national sovereignty."
 first_opium_war.12.f: "In his communication to the minister appointed by the Qing Emperor, Lord Palmerston wrote that Chinese officials had harmed British subjects in China and insulted the dignity of the British Crown; therefore the Queen had dispatched naval and land forces to the coast of China to seek redress. He acknowledged that Qing law prohibited the import of opium and declared such imports liable to seizure, yet argued that the Guangdong authorities had long tolerated the trade and profited from it before suddenly enforcing the law with severity.\n\nThe demands followed in numbered articles. The value of the goods seized under coercion must be repaid to those who surrendered them. Satisfaction must be given for the insult to the British superintendent. Future British merchants trading in China must be protected from oppression and loss. One island, or several, on the Chinese coast must be ceded permanently as a place of residence and commerce; the debts of failed Hong merchants must be repaid; and the cost of the expedition itself must be borne by the Qing. Britain, Palmerston warned, could not wait idly for an answer, and the fleet had already been ordered to blockade the sea ports and occupy convenient positions until the matter was settled."
 # Source: Lord Palmerston, "巴麥尊子爵致大清皇帝欽命宰相書", 1840.
 first_opium_war.12.a: "We cannot back down."
 first_opium_war.50.t: "War Begins"
 first_opium_war.50.d: "The British fleet begins military action against Qing."
 first_opium_war.50.f: "\"Because the officials have harassed the people of this country residing in China, and the said officials have profaned the dignified majesty of the Great British Nation, the Sovereign of Great Britain has dispatched naval and land forces to the maritime borders of China to demand satisfaction and redress from the Emperor.\""
 # Source: Viscount Palmerston, "Letter to the Minister of the Emperor of China", 1840. (Translated from the Chinese version presented to Qing)
 first_opium_war.50.a: "War can no longer be avoided."
