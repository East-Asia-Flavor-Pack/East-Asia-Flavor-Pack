 je_provisional_presidency_ysk: "临时大总统"
 je_provisional_presidency_ysk_reason: "就任临时大总统后，[ROOT.GetCountry.GetRuler.GetFullName]被赋予了统治新生的民国的重任。这是中国人第一次生活在一个没有天子的社会，各地都有拥有自己军队的军阀。如果不能妥善处理这种情况，这个脆弱的新体制将无助地崩溃。\n\n然而，还有另一种选择。那就是回到以前的体制，把自己放在最高位置。但这将引发强烈的反弹。"
