 first_opium_war.10.t: "林则徐赴广东"
 first_opium_war.10.d: "皇帝任命林则徐为钦差大臣，派往广东。他的任务是根绝鸦片走私，并迫使外国商人遵守清廷禁令。"
 first_opium_war.10.f: "\"一箱鸦片也不得流向海上。此事关乎百姓性命与国家白银，绝不可退让。\""
 first_opium_war.10.a: "就在广东决断此事。"
 first_opium_war.11.t: "广东没收鸦片"
 first_opium_war.11.d: "[SCOPE.sCountry('opium_wars_target_country').GetName]官员压迫广东的外国商馆，并销毁了大量没收的鸦片。商人们正在要求政府作出军事回应。"
 first_opium_war.11.f: "\"私人财产在皇帝的诏令下被焚毁。今日若对此默许，明日我们的全部贸易都将取决于他们的任意处置。\""
 first_opium_war.11.a: "这是对贸易的攻击。"
 first_opium_war.12.t: "英国最后通牒"
 first_opium_war.12.d: "[SCOPE.sCountry('opium_wars_aggressor_country').GetName]要求赔偿被没收的鸦片，并废除贸易限制。朝廷认为这是对国家主权的挑战。"
 first_opium_war.12.f: "\"若禁止毒物也算罪过，那么他们口中的法律与文明究竟是为谁服务？\""
 first_opium_war.12.a: "决不能退让。"
 first_opium_war.13.t: "主战舆论"
 first_opium_war.13.d: "[SCOPE.sCountry('opium_wars_target_country').GetName]的禁烟行动已经不再只是外交争端。议会和商人们主张必须用武力打开贸易。"
 first_opium_war.13.f: "\"若他们关闭港口、焚烧货物，我们就用大炮打开门户。\""
 first_opium_war.13.a: "派遣舰队。"

 # 第2次鸦片战争

