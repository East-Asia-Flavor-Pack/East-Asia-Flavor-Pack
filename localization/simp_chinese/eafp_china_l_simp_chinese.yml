 manchus_and_han_events.1.t: "满族和汉族"
 manchus_and_han_events.1.d: "$manchu$和$han$之间的冲突正在日益加剧。"
 manchus_and_han_events.1.f: "[ROOT.GetCountry.GetNameNoFormatting]的根基正在动摇。长期作为统治阶级的$manchu$和占据多数的$han$之间的冲突已经到了无法掩盖的地步。八旗军的权威下降，$han$官员的不满情绪高涨。如果这种情况继续下去，帝国的生存本身将岌岌可危。"
 manchus_and_han_events.1.a: "走着瞧吧。"

 manchus_and_han_events.101.t: "扩大的裂痕"
 manchus_and_han_events.101.d: "许多汉人开始觉醒民族主义概念，并产生了强烈的认同感。汉族主义者认为中国人必须团结起来保护自己的文化遗产，并宣布从[ROOT.GetCountry.GetName]独立。"
 manchus_and_han_events.101.f: "“我们汉人必须赶走满人，夺回作为中国正当主人的地位！”一位情绪激昂的汉族主义者领袖在拥挤的集会上宣布。“我们因为内部冲突和外部干涉分裂并削弱了太久。但现在不会了！我们必须作为一个骄傲的古代文明主张我们的主权并站起来。”"
 manchus_and_han_events.101.a: "这有使本就不稳定的[ROOT.GetCountry.GetName]变得更加不稳定的风险。"

 manchus_and_han_events.102.t: "同盟会"
 manchus_and_han_events.102.d: "革命团体在全中国各地如雨后春笋般涌现。最近有消息称，几个这样的革命团体联合成了“同盟会”。这些革命者希望[ROOT.GetCountry.GetName]摆脱外国的影响，不愿意等待[ROOT.GetCountry.GetName]君主制会提供什么样的改革。更令人担忧的是，一些地方军阀似乎在帮助他们。"
 manchus_and_han_events.102.f: "“驱除鞑虏，\n恢复中华，\n创立民国，\n平均地权。”"
 manchus_and_han_events.102.a: "必须消除他们的影响。"

 manchus_and_han_events.103.t: "[SCOPE.sState('revolt_state').GetName]的叛乱"
 manchus_and_han_events.103.d: "试图推翻[ROOT.GetCountry.GetAdjectiveNoFormatting]君主制的革命者在[SCOPE.sState('revolt_state').GetName]发动了叛乱。起初它似乎是从[SCOPE.sState('revolt_state').GetName]的地方工人抗议开始的，但逐渐变得暴力。现在是决定如何应对这种无理挑衅的时候了。"
 manchus_and_han_events.103.f: "“中国为中国人之中国。我同胞皆须自认自己的汉种中国人之中国。不许异种人沾染我中国丝毫权利。所有服从满洲人之义务一律取消。”" # \China is the China of the Chinese. You must all recognise the China of the Chinese of the Han race. Not to allow any alien race to lay their hands on the least rights of our China. Any obligations subordinating people to the Manchus will be one and all annulled.\ 中國為中國人之中國。我同胞皆須自認自己的漢種中國人之中國。不許異種人沾染我中國絲毫權利。所有服從滿洲人之義務一律取消。변형
 manchus_and_han_events.103.a: "我们将用武力镇压这场叛乱。"
 manchus_and_han_events.103.b: "实施一些改革来安抚他们。"
