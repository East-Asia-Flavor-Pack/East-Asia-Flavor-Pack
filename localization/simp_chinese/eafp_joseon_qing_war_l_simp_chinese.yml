 eafp_joseon_qing_war_events.1.t: "鸭绿江彼岸的炮声"
 eafp_joseon_qing_war_events.1.d: "朝鲜与清国之间的战争开始了。战时国政凝聚力会随占领、战争支持、财政、行政与民心逐月变化，并与客观战争结果共同决定战后局势。"
 eafp_joseon_qing_war_events.1.f: "备边司的灯火彻夜未熄。北方驿骑带来了边境炮声的消息，大臣们彼此打量。有人仍想起礼部的文书，也有人说朝鲜已不能再以册封之名低头。"
 eafp_joseon_qing_war_events.1.a: "天下秩序正在动摇。"

 eafp_joseon_qing_war_events.2.t: "战后的国体"
 eafp_joseon_qing_war_events.2.d.victory.3: "朝鲜的要求已强加于清国，朝廷与百姓也保持了坚定团结。这场大胜将同时带来新的国际地位与长期的国内稳定。"
 eafp_joseon_qing_war_events.2.d.victory.2: "战争目标已经实现，但国政与民心都伤痕累累。胜利的威望尚存，却无法压下所有不满。"
 eafp_joseon_qing_war_events.2.d.victory.1: "朝鲜在和约中获胜，国内战时秩序却几近崩溃。捷报背后留下了长久的疲惫与愤怒。"
 eafp_joseon_qing_war_events.2.d.defense.3: "清国未能强制实现任何要求便退兵，朝鲜的战时秩序也保持稳固。百姓认为国家依靠自身守住了国体。"
 eafp_joseon_qing_war_events.2.d.defense.2: "清国的要求虽被阻止，战争代价却十分沉重。朝鲜撑了下来，战后朝廷必须先安抚受创的民心。"
 eafp_joseon_qing_war_events.2.d.defense.1: "最终只剩下阻止清国要求这一事实。国政已被耗尽，比停战的安心更强烈的是战争留下的混乱。"
 eafp_joseon_qing_war_events.2.d.compromise.3: "两国都强制实现了部分要求，但朝鲜有序地接受了和约。这场有利妥协并未严重损害朝廷权威。"
 eafp_joseon_qing_war_events.2.d.compromise.2: "两国都在和约中得到让步，但朝鲜国内追问所得是否抵得上所失的声音正在扩大。"
 eafp_joseon_qing_war_events.2.d.compromise.1: "和约只结束了战争，却未能恢复朝廷权威。在相互让步的名义下，留下的是事实上的屈辱与国内混乱。"
 eafp_joseon_qing_war_events.2.f: "战尘落定后，朝廷开始寻找新秩序的语言。旧礼不再如往昔那般稳固，百姓也开始谈论朝鲜凭自身撑过了此战。"
 eafp_joseon_qing_war_events.2.a: "现在收拾战后局面。"

 eafp_joseon_qing_war_events.3.t: "社稷蒙羞"
 eafp_joseon_qing_war_events.3.d.3: "失败虽无法避免，但战时行政与民心维持到了最后。朝廷仍能较为有序地收拾局面。"
 eafp_joseon_qing_war_events.3.d.2: "国政与军队一同动摇。广泛的激进化和忠诚派流失将压迫战后政治。"
 eafp_joseon_qing_war_events.3.d.1: "长期战争与失败击碎了国家团结。政治运动趋向极端，朝廷权威也难以恢复。"
 eafp_joseon_qing_war_events.3.f: "战争已经结束，但朝廷的沉默更深了。人们追问败战之责，街巷中屈辱与愤怒几乎成了同一个词。"
 eafp_joseon_qing_war_events.3.a: "这份耻辱将长久留存。"

 eafp_joseon_qing_war_events.10.t: "义州补给路"
 eafp_joseon_qing_war_events.10.d: "北方前线的补给问题摆在了朝廷面前。"
 eafp_joseon_qing_war_events.10.f: "通往义州的道路上，运粮车与逃难人群混杂在一起。军报说粮草不足，地方官则哀诉百姓已被征发到难以承受。"
 eafp_joseon_qing_war_events.10.a: "将粮草集中送往前线。"
 eafp_joseon_qing_war_events.10.b: "让地方承担更多。"
 eafp_joseon_qing_war_events.10.c: "先整修运输网络。"

 eafp_joseon_qing_war_events.11.t: "冬将军"
 eafp_joseon_qing_war_events.11.d: "严寒笼罩了北方前线。"
 eafp_joseon_qing_war_events.11.f: "大雪吞没道路，士卒以冻僵的手摆弄火绳。敌军尚未攻营，冬天已经先一步发动了进攻。"
 eafp_joseon_qing_war_events.11.a: "优先发放御寒物资。"
 eafp_joseon_qing_war_events.11.b: "允许就地征发。"
 eafp_joseon_qing_war_events.11.c: "放缓攻势。"

 eafp_joseon_qing_war_events.12.t: "炮弹中的沙子"
 eafp_joseon_qing_war_events.12.d: "劣质军需品与采购舞弊被揭露了。"
 eafp_joseon_qing_war_events.12.f: "炮弹被打开时，先落下的不是铁片，而是沙子。军营愤怒，官署试图藏起文书，工厂主则把一切归咎于战时混乱。"
 eafp_joseon_qing_war_events.12.a: "严惩相关人员。"
 eafp_joseon_qing_war_events.12.b: "掩盖到战争结束为止。"
 eafp_joseon_qing_war_events.12.c: "改革军需采购。"

 eafp_joseon_qing_war_events.13.t: "败将自尽"
 eafp_joseon_qing_war_events.13.d: "一名将领打算以死承担败战责任。"
 eafp_joseon_qing_war_events.13.f: "军帐中的剑已经出鞘。[SCOPE.sCharacter('defeated_general').GetFullName]称败战之罪无法以余生偿还。朝廷必须决定，是将其死记录为忠节，还是令其活着承担责任。"
 eafp_joseon_qing_war_events.13.a: "表彰其忠节。"
 eafp_joseon_qing_war_events.13.b: "让他活着承担责任。"
 eafp_joseon_qing_war_events.13.c: "悄悄掩盖败战。"

 eafp_joseon_qing_war_events.14.t: "北方难民潮"
 eafp_joseon_qing_war_events.14.d: "为躲避战祸而南下的北方百姓与官军补给线挤在了一起。"
 eafp_joseon_qing_war_events.14.f: "老人背着行囊，孩子们穿过雪地与泥泞向南而行。地方官奏报仓储日渐空虚，军营则抱怨补给车受阻。朝廷不得不在同一条道路上权衡军粮与百姓生计。"
 eafp_joseon_qing_war_events.14.a: "由国家赈济难民。"
 eafp_joseon_qing_war_events.14.b: "优先保障军需运输。"
 eafp_joseon_qing_war_events.14.c: "分散安置到各地。"

