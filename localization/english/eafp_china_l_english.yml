 je_provisional_presidency_ysk: "Provisional President"
 je_provisional_presidency_ysk_reason: "Having assumed the position of Provisional President, [ROOT.GetCountry.GetRuler.GetFullName] has been given the heavy task of governing the newborn republic. This is the first time the Chinese people are living in a society without a Son of Heaven, and warlords with their own armies exist everywhere. If this situation is not handled properly, this new and fragile system will collapse helplessly.\n\nHowever, there is another option. That is to return to the previous system and place oneself at the top. But this will provoke intense backlash."
