 warlord_china_events.1.t: "起义"
 warlord_china_events.1.d: "有报告称[SCOPE.sState('revolt_state').GetCityHubName]爆发了叛乱。这似乎与以前发生的零星叛乱完全不同。"
 warlord_china_events.1.f: "“[SCOPE.sState('revolt_state').GetCityHubName]的成功确实出人意料。成功的最主要原因可能是因为[SCOPE.sCharacter('governor').GetFullName]逃跑了。”"
 warlord_china_events.1.a: "粉碎叛军！"

 warlord_china_events.2.t: "革命蔓延"
 warlord_china_events.2.d: "从[SCOPE.sState('revolt_state').GetCityHubName]开始的叛乱之火正在失控地蔓延。规模似乎与以往的任何叛乱都大不相同。"
 warlord_china_events.2.a: "令人担忧。"

 warlord_china_events.4.t: "藩属国的背叛"
 warlord_china_events.4.d: "中原大部分地区爆发了叛乱，政府军和革命军之间的内战仍在继续。因此，长期以来与清朝保持着微妙关系而生存下来的藩属国，现在已经摆脱了清朝中央政府的影响。"
 warlord_china_events.4.a: "这些叛徒！"

 warlord_china_events.5.t: "威逼"
 warlord_china_events.5.d: "[SCOPE.sCharacter('YSK_scope').GetFullName]在宫中向皇帝泣诉，敦促其退位。"
 warlord_china_events.5.f: "“那年冬天，也许就是在这个时候。寒风刺骨，天降大雪。16名皇室成员被拖了出来，只穿着单薄的衣服，在寒风中瑟瑟发抖。老百姓都在看热闹。时辰到了，行刑官一声令下，刽子手抓住罪人的脖子，拖到断头台上按倒。在那只能听到下雪声的时刻，只听得‘咔嚓’一声。\n\n没有法律规定我提到的法国皇帝遭遇的事情不能在这里发生。请仔细听取我的忠告。”"
 warlord_china_events.5.a: "别无选择，投降吧。"
 warlord_china_events.5.tta: "清朝灭亡。"
 warlord_china_events.5.b: "逃往满洲。"
 warlord_china_events.5.ttb: "清朝退往满洲。"
 warlord_china_events.5.c: "决不投降。"

 warlord_china_events.6.t: "空荡荡的军营"
 warlord_china_events.6.d: "随着革命的火焰蔓延到[ROOT.GetCountry.GetName]各地，军营里已经看不到一个士兵的影子。他们丢弃了武器、盔甲，甚至放弃了自己的岗位，逃之夭夭。留下的只有空荡荡的军营和[ROOT.GetCountry.GetName]崩塌的权威。"
 warlord_china_events.6.f: "“不如趁这个机会直接回家吧？要是为了战争献身，只会白白送命。”"
 warlord_china_events.6.a: "别无选择，投降吧。"
 warlord_china_events.6.tta: "清朝灭亡。"
 warlord_china_events.6.b: "逃往满洲。"
 warlord_china_events.6.ttb: "清朝退往满洲。"
 warlord_china_events.6.c: "决不投降。"

 warlord_china_events.21.t: "民国的诞生"
 # The Birth of a Republic
 warlord_china_events.21.d: "期盼已久的共和梦想终于实现了。"
 # The once-distant dream of a republican China has become a reality.
 warlord_china_events.21.f: "欢庆的人群聚集在[ROOT.GetCountry.GetCapital.GetCityHubName]的街道上，挥舞着新采用的五色国旗。在欢呼声中，临时舞台上的一位演讲者向人群发表讲话：\n\n“同志们，今天标志着我们深爱的中国进入了一个新时代！满洲野蛮人已经倒台，我们现在踏上了走向民主和自治的旅程。但前方的道路充满挑战；我们必须团结一致，坚强屹立。”"
 # Jubilant crowds have gathered in the streets of [ROOT.GetCountry.GetCapital.GetCityHubName], waving the newly adopted Five-Colored Flag of the Republic. Amidst the cheers, a passionate speaker atop a makeshift stage addresses the crowd:\n\n\"Comrades, today marks the dawn of a new era for our beloved China! The Manchu barbarians has fallen, and we now embark on a journey toward democracy and self-governance. But the road ahead is fraught with challenges; we must unite and stand strong.\"
 warlord_china_events.21.a: "民国万岁！"

 warlord_china_events.22.t: "妥协的结果"
 # The Result of a Compromise
 warlord_china_events.22.d: "根据先前的协议，[SCOPE.sCharacter('old_ruler').GetFullName]下台，[SCOPE.sCharacter('new_ruler').GetFullName]就任临时大总统。"
 warlord_china_events.22.f: "“各省衙门听着。\n\n民国建设的发端已经形成，[SCOPE.sCharacter('new_ruler').GetFullName]愿竭尽全力发扬共和精神，涤荡专制之瑕疵，谨守宪法，顺应民意，使国家安全稳固，五大民族同乐。\n\n此等志愿，必定达成。待国会召开，选出第一任大总统后，[SCOPE.sCharacter('new_ruler').GetFullName]将立即辞职，特此诚心诚意向各位同胞宣告！”" # 위안스카이 임시대총통 취임 때 연설
 warlord_china_events.22.a: "这是一个新时代的开始。"
 warchi22: "妥协的结果"
 warchi22char: "妥协的结果"

 warlord_china_events.23.t: "妥协的余波"
 warlord_china_events.23.d: "各地豪强拥兵自重，俨然成了割据一方的土皇帝。"
 warlord_china_events.23.f: "“现在是各显神通的时候了。中央指望不上，咱们只能靠自己。天高皇帝远，山中无老虎，猴子称大王，这难道不是理所当然的吗？”"
 warlord_china_events.23.a: "不管怎样，秩序终将恢复。"
 # Order will be restored, one way or another.

