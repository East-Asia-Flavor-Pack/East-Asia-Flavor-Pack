 concept_eafp_korean_regent: "Regency from Behind the Veil"
 concept_eafp_korean_regent_desc: "A political system of the Joseon Dynasty where, upon the accession of an immature monarch, the most senior elder of the royal family, $character_role_kor_grand_empress_dowager_title$, would lower a screen to assist the king and participate in governance."

 concept_eafp_grand_empress_dowager: "Grand Empress Dowager"
 concept_eafp_grand_empress_dowager_desc: "The #b Grand Empress Dowager#! is a title bestowed in the Joseon royal court to the former king's consort, the most senior member of the royal family. She historically exercised powerful influence, acting on behalf of the royal house when a newly ascended king was too young or unable to rule."

