 chinese_westernization.1.t: "设立总理衙门"
 chinese_westernization.1.d: "由于与西方国家接连发生冲突，皇室设立了一个新机构专门负责对西方的外交和引进其技术，即总理各国事务衙门，简称总理衙门。"
 chinese_westernization.1.f: "“天下之理，穷则变，变则通。如今的士大夫嘲笑西方技术为奇技淫巧，但一旦战争爆发，在它的威力面前却束手无策，惊骇不已。\n\n现在中国若要自强，就必须学习夷人的武器。只有寻求制造机器的机器并优待技术人员，人才才会如云般聚集，成为国家的力量。”"
 chinese_westernization.1.a: "世界在变吗？"

 chinese_westernization.101.t: "义勇部队的出现"
 chinese_westernization.101.d: "南方叛乱持续进行中，各地民众自发武装起来试图镇压叛乱。甚至有传言说洋人也加入了他们。"
 chinese_westernization.101.a: "我们可以利用这一点吗？"
 chinese_westernization.101.tt: "可以在决议标签页动员民兵了。"
