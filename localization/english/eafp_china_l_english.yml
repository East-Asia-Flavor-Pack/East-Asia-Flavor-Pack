 # Military Headquarters Events
 lift_of_the_manchurian_containment_decision: "Lift the Willow Palisade"
 lift_of_the_manchurian_containment_decision_desc: "Initially, the Willow Palisade was erected to keep Manchuria as a safe haven in case the Qing imperial family lost the Central Plains. However, with various foreign powers encroaching on Manchuria today, we must accept immigrants into Manchuria to prevent further territorial erosion."
 xinjiang_headquarter_decision: "Abolish Ili General's Headquarters"
 xinjiang_headquarter_decision_desc: "Following the rebellion led by Yakub Beg, it has become clear that the previous system used to govern Ili is no longer effective."
 manchu_headquarter_decision: "Establish Three Northeast Provinces"
 manchu_headquarter_decision_desc: "With foreign encroachment in Manchuria and the subsequent massive influx of Han immigrants, the need to separately administer the Northeast has disappeared."
 mongol_headquarter_decision: "Absorb Outer Mongolia"
 mongol_headquarter_decision_desc: "It would be better to rule Outer Mongolia directly, making the Mongols completely subservient to the Qing Emperor's authority."
 # It would be better to rule Outer Mongolia directly, making the Mongols completely subservient to the Qing Emperor's authority.
 chi_military_headquarters.101.t: "Abolition of Ili General's Headquarters"
 chi_military_headquarters.101.d: "Following the rebellion led by Yakub Beg, it has become clear that the previous system used to govern Ili is no longer effective."
 chi_military_headquarters.101.f: "A palpable sense of urgency filled the room as officials gathered for the meeting. Voices rose and fell, advocating for their respective approaches to resolving the aftermath of Yakub Beg's rebellion.\n\n\"We cannot continue to rely on the old ways,\" one official stated firmly. \"The General's Headquarters has failed us, and we need a new direct administrative body to set things right.\"\n\nAnother official nodded. \"We must establish a province so that such a rebellion never happens again.\""
 chi_military_headquarters.101.a: "There will be no more rebellions."
 chi_military_headquarters.102.t: "Establishment of Three Northeast Provinces"
 chi_military_headquarters.102.d: "With foreign encroachment in Manchuria and the subsequent massive influx of Han immigrants, the need to separately administer the Northeast has disappeared."
 chi_military_headquarters.102.f: "The peaceful tranquility of Manchuria was shattered as foreign powers encroached upon its borders seeking economic gain and territory. As foreign armies established dominance, the region became a battlefield. In the aftermath, Han immigrants flocked to Manchuria seeking refuge and new opportunities.\n\nGreat changes occurred as Han immigrants took root. As settlers cultivated the land, villages and cities flourished, blurring the boundaries between Manchuria and the Han. Recognizing the need for inclusion, the government adjusted its administrative policies to accommodate these changes."
 chi_military_headquarters.102.a: "Outside the pass will become safer."
 chi_military_headquarters.103.t: "Absorption of Outer Mongolia"
 chi_military_headquarters.103.d: "The Qing establishes direct rule over Outer Mongolia, leading to the complete submission of the Mongols to the authority of the Qing emperor."
 # The Qing establishes direct rule over Outer Mongolia, leading to the complete submission of the Mongols to the authority of the Qing emperor.
 chi_military_headquarters.103.f: "A sense of awe permeates the vast expanse of the Mongolian steppes as emissaries from the Qing Dynasty arrive, bearing the imperial decree of direct rule. The Mongols, renowned for their warrior spirit and proud heritage, find themselves facing a momentous decision: to bow before the Qing emperor, sacrificing their autonomy and traditions, or embrace the promised stability and protection in an ever-changing world.\n\nAfter deliberation and contemplation, the Mongol leaders gather in a solemn ceremony. With a mixture of reverence and trepidation, they kneel before the Qing emissaries, symbolically laying down their power and pledging allegiance to the Qing emperor."
 # A sense of awe permeates the vast expanse of the Mongolian steppes as emissaries from the Qing Dynasty arrive, bearing the imperial decree of direct rule. The Mongols, renowned for their warrior spirit and proud heritage, find themselves facing a momentous decision: to bow before the Qing emperor, sacrificing their autonomy and traditions, or embrace the promised stability and protection in an ever-changing world.\n\nAfter deliberation and contemplation, the Mongol leaders gather in a solemn ceremony. With a mixture of reverence and trepidation, they kneel before the Qing emissaries, symbolically laying down their power and pledging allegiance to the Qing emperor.
 chi_military_headquarters.103.a: "Mongolian rule is solidified."
 # China Flavor Events
 torching_of_the_summer_palace_decision: "Torch the Old Summer Palace"
 torching_of_the_summer_palace_decision_desc: "The Old Summer Palace, known as the Garden of Perfect Brightness, is the imperial garden of the Qing Dynasty and houses various precious treasures, flora, and fauna of the Qing imperial family. Burning this essence of Chinese culture will deal a heavy blow to their morale."
 chi_flavor.1.t: "A New Son of Heaven" # Natural death in system
 chi_flavor.1.d: "Upon the ascension of the new emperor, all civil and military officials bow their heads and shout 'Long live the Emperor!'. The former emperor [SCOPE.sCharacter('former_emperor').GetFullName] has passed away, and the era of the new emperor [SCOPE.sCharacter('new_emperor').GetFullName] has begun."
 chi_flavor.1.a: "Long live the Emperor!"
 # 2,3 empty
 chi_flavor.4.t: "Destruction of the Old Summer Palace"
 chi_flavor.4.d: "The [SCOPE.sCountry('occupying_country').GetName] army occupying Beijing has looted the Old Summer Palace. Renowned for its gardens, architecture, and art, this palace was reduced to ashes in just three days."
 chi_flavor.4.f: "A heavy pall of fear cloaked Beijing, deepening as dusk fell, a stark reminder of the [SCOPE.sCountry('occupying_country').GetAdjectiveNoFormatting] troops that had recently desecrated the city, pillaging the regal Summer Palace. The devastation, on the other hand, was far from over. The enemy's commander, relentless in his conquest, demanded the utter obliteration of the royal residence. As the order echoed, a cataclysmic blaze ignited, the palace surrendering to a fateful inferno. The flames danced manically for three harrowing days, reducing the once grand edifice to mere embers and debris. The Summer Palace, formerly an emblem of magnificence, was reduced to mere memory and ashes."
 # A heavy pall of fear cloaked Beijing, deepening as dusk fell, a stark reminder of the [SCOPE.sCountry('occupying_country').GetAdjectiveNoFormatting] troops that had recently desecrated the city, pillaging the regal Summer Palace. The devastation, on the other hand, was far from over. The enemy's commander, relentless in his conquest, demanded the utter obliteration of the royal residence. As the order echoed, a cataclysmic blaze ignited, the palace surrendering to a fateful inferno. The flames danced manically for three harrowing days, reducing the once grand edifice to mere embers and debris. The Summer Palace, formerly an emblem of magnificence, was reduced to mere memory and ashes.
 chi_flavor.4.a: "The tears will not stop..."
 old_summer_palace_destroyed_ruler_modifier: "Aftermath of the Destruction of the Old Summer Palace"
 chi_flavor.5.t: "Coming-of-Age Ceremony"
 chi_flavor.5.d: "Following a coming-of-age ceremony, the young emperor has reached the age of maturity and is ready to take direct control of the empire."
 # Following a coming-of-age ceremony, the young emperor has reached the age of maturity and is ready to take direct control of the empire.
 chi_flavor.5.f: "As the young emperor who had been under the regency grows older, the era of regency is coming to an end. A ceremony to commemorate the emperor's direct rule has been prepared in the Forbidden City, and the administrative work for the emperor to directly exercise his rights from today is already piling up. The empire looks forward to the emperor creating a better nation."
 chi_flavor.5.a: "Long live the Emperor!"
 chi_flavor.6.t: "The Restless Yangtze"
 chi_flavor.6.d: "As the winds of industrialization sweep across the country, even the ancient waters of the Yangtze River are witnessing the waves of change. A seasoned boatman, who has spent his life with the river, observes these changes with mixed feelings."
 chi_flavor.6.f: "As dawn colors the Yangtze, a sun-tanned boatman watches as growing factories and smoke-belching chimneys disrupt the familiar landscape of his hometown. Under a sky filled with soot, the once vibrant river has taken on an unfamiliar hue. Caressing the oars worn smooth by decades of dedication, he whispers to the silent river, \"The world is changing, old friend.\"\n\nAs the midday heat sets in, the river transforms into a bustling waterway traversed by steamboats and barges, a parade of modern machinery far removed from his childhood innocence. The deafening roar of these iron giants harshly replaces the river's peaceful melody with mechanical noise. Nostalgic, he yearns for the tranquil days when his only companions were a simple wooden boat and the vast embrace of the Yangtze.\n\nAt twilight, the setting sun paints the industrialized horizon in vivid hues of crimson and scarlet, stirring ripples in the boatman's heart. The old mingling with the new, nature yielding to human progress evokes a mix of unease and fascination. Lost in thought, the boatman mutters, \"The Yangtze of my youth is gone,\" and ponders, \"But perhaps change is the only constant. I only hope we remember where we came from, and the river that carried us here.\""
 chi_flavor.6.a: "The endless Yangtze River rolls on."
 # 7,8 empty
 chi_flavor.9.t: "Elements of International Law"
 chi_flavor.9.d: "The Elements of International Law, translated by William Martin, has been published. This translated book will provide an essential framework for our officials and scholars to understand international law, which has become increasingly important after the nation's defeat in war."
 chi_flavor.9.f: "'It is said that all nations brought jade and silk to the gathering at Tu Mountain, but we cannot hear the details of which clan or which nation it was. I suspect the historian's words were inaccurate or they included lands beyond the Nine Provinces. Today, there are as many nations beyond the Nine Provinces as there are trees in a forest. If there were no laws, how could these nations exist? This is why teacher W. A. P. Martin translated the Elements of International Law. Martin is fluent in Chinese, and he asked Chen Qin from Yicheng, Li Changhua from Zhengzhou, Fang Junshi from Dingyuan, and Mao Hongtu from Dazhu to revise and edit the text. Upon his return, Martin can be called a learned scholar who loves the old ways.'" # preface 1, Elements of International Law
 chi_flavor.9.a: "This book opens up our narrow view."
 chi_flavor.101.t: "Great Change of the Yellow River Course in [GetCurrentGameDate.Format('y')]"
 chi_flavor.101.d: "The Yellow River is known as a difficult river to control, and despite numerous flood control efforts since ancient times, floods have continued to occur. Finally, in [GetCurrentGameDate.Format('y')], a major change in course occurred as the river's path shifted to the north of [SCOPE.sState('shandong_scope').GetName] due to a breach at Tongwaxiang in Lankao County, [SCOPE.sState('henan_scope').GetName] Province. Notably, the sediment from this flood blocked the Grand Canal between Jining and Linqing, making passage through the Huitong River and Tonghui River impossible."
 chi_flavor.101.a: "Oh no."
 chi_flavor.102.t: "Yellow River Flood in [GetCurrentGameDate.Format('y')]"
 chi_flavor.102.d: "In [GetCurrentGameDate.Format('y')], the Yellow River flooded, causing widespread devastation throughout northern China. The flood was one of the worst in Chinese history, and it had a profound impact on the region, causing massive loss of life and property damage."
 # In [GetCurrentGameDate.Format('y')], the Yellow River flooded, causing widespread devastation throughout northern China. The flood was one of the worst in Chinese history, and it had a profound impact on the region, causing massive loss of life and property damage.
 chi_flavor.102.f: "The Yellow River had always been unpredictable, but in [GetCurrentGameDate.Format('y')], it unleashed a tremendous flood like the mythical Gonggong caused. The river overflowed its banks, and the waters surged across the countryside, sweeping away everything in their path. Villages and towns were swallowed up by the floodwaters, leaving behind a trail of destruction and despair.\n\nAs the floodwaters receded, the full extent of the disaster became clear. Millions of people had lost their lives, and countless more were homeless and destitute. Crops had been destroyed, and livestock had perished, leaving many without a means of support."
 # The Yellow River had always been unpredictable, but in [GetCurrentGameDate.Format('y')], it unleashed a tremendous flood like the mythical Gonggong caused. The river overflowed its banks, and the waters surged across the countryside, sweeping away everything in their path. Villages and towns were swallowed up by the floodwaters, leaving behind a trail of destruction and despair.\n\nAs the floodwaters receded, the full extent of the disaster became clear. Millions of people had lost their lives, and countless more were homeless and destitute. Crops had been destroyed, and livestock had perished, leaving many without a means of support.
 chi_flavor.102.a: "Oh no."
 chi_flavor.103.t: "A Drought in North China"
 chi_flavor.103.d: "The recent weather is unusual. Compared to average years, very little rain has fallen in [SCOPE.sState('zhili_scope').GetName], [SCOPE.sState('shandong_scope').GetName], and [SCOPE.sState('shanxi_scope').GetName], which is a serious problem that could affect overall crop yields. Signs of famine are already apparent in some areas."
 chi_flavor.103.f: "The drought continued for a long time. Whenever Mr. Zhang felt that red sun and that terrifying gaze, his body trembled. Not to mention the crops in the fields, even the grass by the stream and the reeds along the banks were all twisted and dried up.\n\nStill unable to give up hope, Mr. Zhang looked down at the paddy field. The water that had pooled in a few spots on the bottom of the reservoir could barely water one corner of the field; otherwise, the bottom of the paddy was completely dried and white. Occasionally, leaves trembled with a shudder in the blowing wind."
 chi_flavor.103.a: "It's not raining..."
 jinyu_great_famine: "Jinyu Great Famine"
 chi_flavor.104.t: "The Great Drought"
 chi_flavor.104.d: "The ongoing famine has spread more widely, extending throughout the entire North China region. Finding measures to alleviate the impact of the severe drought has become an urgent task."
 chi_flavor.104.f: "'Outside the city gates, the naked bodies of men were piled up in layers, much like dead pigs seen in a slaughterhouse. On another side, a pile of women's bodies lay stripped of their clothes. All their garments had been pawned in exchange for food. The trees along the road had all turned white, and their bark up to 10 or 20 chi above the roots had already been stripped away to be used as food by the starving.'"
 chi_flavor.104.a: "There is nothing we can do."
