 chi_manchu_vacancies.t: "满缺"
 chi_manchu_vacancies.d: "为了维持满族的政治优势，所有公职都是按民族分配的。初期，中央政府和地方政府内的所有主要公职都属于满族，但随着时间的推移，汉人逐渐开始进入。"
 chi_manchu_vacancies_1.t: "废除配额"
 chi_manchu_vacancies_1.d: "废除按民族分配的公职配额。"
 chi_manchu_vacancies_2.t: "满汉并用"
 chi_manchu_vacancies_2.d: "确保旗人和汉人平均占据主要公职。"
 chi_manchu_vacancies_3.t: "允许部分进入"
 chi_manchu_vacancies_3.d: "允许汉人占据部分主要公职。"
 chi_manchu_vacancies_4.t: "仅限满人"
 chi_manchu_vacancies_4.d: "所有主要公职由旗人垄断。"

 chi_manchu_cities.t: "满城"
 chi_manchu_cities.d: "世祖章皇帝占领中原后，为了维护满族身份并巩固统治，在主要城市内建立了“满城”。这是满族人居住的独立区域，汉人不得居住。"
 chi_manchu_cities_1.t: "解散满城"
 chi_manchu_cities_1.d: "完全取消限制，允许自由居住。"
 chi_manchu_cities_2.t: "部分解散满城"
 chi_manchu_cities_2.d: "解散部分失去作用的满城，允许汉人也居住。"
 chi_manchu_cities_3.t: "严格隔离"
 chi_manchu_cities_3.d: "完全分开满族和汉族的居住区。"

 chi_banner_armies.t: "八旗军"
 chi_banner_armies.d: "人数较少的满族人要统治汉人，唯一的办法就是保持军事优势。为此，所有满族家庭都被编入八旗之一进行服役。"
 chi_banner_armies_1.t: "事实上的解散"
 chi_banner_armies_1.d: "结束八旗军-绿营的双重体制，统一招募士兵。"
 chi_banner_armies_2.t: "解除职业限制"
 chi_banner_armies_2.d: "允许满人从事军人以外的职业。"
 chi_banner_armies_3.t: "建立地方汉人军队"
 chi_banner_armies_3.d: "在主力军之外建立地方汉人军队，以方便地方防御。"
 chi_banner_armies_4.t: "八旗军与绿营"
 chi_banner_armies_4.d: "以八旗军为核心进行军事行动，绿营作为辅助。"

 chi_banner_subsidies.t: "旗人俸禄"
 chi_banner_subsidies.d: "在旗籍的人会领取符合其等级的俸禄。这有助于维持旗人的政治优势。"
 chi_banner_subsidies_1.t: "无俸禄"
 chi_banner_subsidies_1.d: "仅仅因为在旗籍而没有俸禄。"
 chi_banner_subsidies_2.t: "名存实亡的俸禄"
 chi_banner_subsidies_2.d: "发放不足的俸禄以减少开支，并鼓励旗人从事其他职业。"
 chi_banner_subsidies_3.t: "最低生活俸禄"
 chi_banner_subsidies_3.d: "发放足够旗人维持生计的俸禄。"
 chi_banner_subsidies_4.t: "充足的俸禄"
 chi_banner_subsidies_4.d: "用充足的俸禄保障旗人的生计。"

 chi_manchurianization_policies.t: "满化政策"
 chi_manchurianization_policies.d: "圣祖仁皇帝下旨，不仅满人，汉人也要学习满族的语言和习俗。因此，汉人必须留和满族一样的发型，穿一样的衣服。"
 chi_manchurianization_policies_1.t: "剃发易服"
 chi_manchurianization_policies_1.d: "允许汉人随心所欲地留发型和穿衣服。"
 chi_manchurianization_policies_2.t: "放宽规定"
 chi_manchurianization_policies_2.d: "放宽规定，给予一定程度的自由。"
 chi_manchurianization_policies_3.t: "严厉惩罚"
 chi_manchurianization_policies_3.d: "强迫汉人效仿满人的行为举止。"

