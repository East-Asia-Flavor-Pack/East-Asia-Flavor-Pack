 manchus_and_han_events.1.t: "Manchus and Han"
 manchus_and_han_events.1.d: "The conflict between $manchu$ and $han$ is gradually intensifying."
 manchus_and_han_events.1.f: "The foundation of [ROOT.GetCountry.GetNameNoFormatting] is shaking. The conflict between the $manchu$, the long-time ruling class, and the $han$, who make up the majority, has reached a point where it can no longer be hidden. The authority of the Eight Banners Army has fallen, and the dissatisfaction of the $han$ officials is rising. If this continues, the very existence of the empire will be in jeopardy."
 manchus_and_han_events.1.a: "We shall see."
 manchus_and_han_events.101.t: "The Widening Crack"
 manchus_and_han_events.101.d: "Many Han people have begun to realize the concept of nationalism and developed a strong sense of identity. Han nationalists believe that the Chinese must unite to preserve their cultural heritage and declare independence from [ROOT.GetCountry.GetName]."
 manchus_and_han_events.101.f: "\"We Han people must drive out the Manchus and regain our rightful position as the masters of China!\" a fiery Han nationalist leader declared at a crowded rally. \"We have been divided and weakened for too long due to internal strife and external interference. But no more! We must rise and assert our sovereignty as a proud ancient civilization.\""
 manchus_and_han_events.101.a: "This risks making the already unstable [ROOT.GetCountry.GetName] even more unstable."
 manchus_and_han_events.102.t: "Tongmenghui"
 manchus_and_han_events.102.d: "Revolutionary groups are springing up throughout China. Recently, news arrived that several of these groups have united under the 'Tongmenghui' (United Allegiance Society). These revolutionaries want [ROOT.GetCountry.GetName] to break free from foreign influence and are unwilling to wait to see what reforms the [ROOT.GetCountry.GetName] monarchy will offer. What's more concerning is that some local warlords appear to be helping them."
 manchus_and_han_events.102.f: "'Expel the Tartars,\nRevive Zhonghua,\nEstablish a Republic,\nEqualize Land Rights.'"
 manchus_and_han_events.102.a: "We must neutralize their influence."
 manchus_and_han_events.103.t: "Rebellion in [SCOPE.sState('revolt_state').GetName]"
 manchus_and_han_events.103.d: "Revolutionaries seeking to overthrow the [ROOT.GetCountry.GetAdjectiveNoFormatting] monarchy have started a rebellion in [SCOPE.sState('revolt_state').GetName]. It apparently began as a local workers' protest in [SCOPE.sState('revolt_state').GetName] but gradually turned violent. Now it's time to decide how to respond to this unreasonable provocation."
 manchus_and_han_events.103.f: "\"China is the China of the Chinese. Our compatriots must all recognize the China of their own Han Chinese race. We cannot allow an alien race to tarnish even a sliver of the rights of our China. All obligations of subordination to the Manchus will be uniformly annulled.\""
 manchus_and_han_events.103.a: "We will suppress this rebellion by force."
 manchus_and_han_events.103.b: "Implement some reforms to appease them."
