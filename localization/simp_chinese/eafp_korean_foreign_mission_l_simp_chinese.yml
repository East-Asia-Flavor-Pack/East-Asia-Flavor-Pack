 kor_foreign_mission_report_depends_on_leader_and_route_tt: "归国报告的效果取决于使节团长与是否完成世界巡游"
 has_completed_korean_foreign_mission_je_tt: "#b $je_korean_foreign_mission$#!已完成"

 eafp_scripted_button_kor_foreign_mission_start: "派遣使节团"
 eafp_scripted_button_kor_foreign_mission_start_desc: "派遣可信官员出洋，考察外国的制度、军队与产业。"
 eafp_scripted_button_kor_foreign_mission_recall: "召回使节团"
 eafp_scripted_button_kor_foreign_mission_recall_desc: "命令正在海外的使节团提前归国。"
 eafp_scripted_button_kor_foreign_mission_recall_location_tt: "使节团正在海外"
 eafp_scripted_button_kor_foreign_mission_recall_not_returned_tt: "使节团尚未开始归国，也尚未归国"
 eafp_scripted_button_kor_foreign_mission_recall_effect_tt: "使节团将缩短行程并归国"

 eafp_kor_foreign_mission.1.t: "海外使节团"
 eafp_kor_foreign_mission.1.d: "朝廷决定派遣海外使节团，亲自考察各国的制度、军队与产业。现在的问题是，谁应当率领使节团。"
 eafp_kor_foreign_mission.1.f: "\"案上的地图似乎囊括天下，但在渡海之人眼中，它不过是一张折叠起来的纸。\""
 eafp_kor_foreign_mission.1.a: "委任[SCOPE.sCharacter('kor_foreign_mission_leader_1').GetFullName]。"
 eafp_kor_foreign_mission.1.b: "委任[SCOPE.sCharacter('kor_foreign_mission_leader_2').GetFullName]。"
 eafp_kor_foreign_mission.1.c: "委任[SCOPE.sCharacter('kor_foreign_mission_leader_3').GetFullName]。"
 eafp_kor_foreign_mission.1.e: "委任[SCOPE.sCharacter('kor_foreign_mission_leader_4').GetFullName]。"

 eafp_kor_foreign_mission.2.t: "启程环游世界"
 eafp_kor_foreign_mission.2.d: "使节团已经准备启程，经由海路与陆路展开漫长巡游。他们将观察维系世界各地强盛的制度、军队、产业与外交。"
 eafp_kor_foreign_mission.2.f: "船只离港之前，随员们再次检查笔墨纸张、外语词典以及朝廷的国书。"
 eafp_kor_foreign_mission.2.a: "批准世界巡游行程。"
 eafp_kor_foreign_mission.2.b: "考察世界各地的军事与外交实务。"
 eafp_kor_foreign_mission.2.c: "通过更广阔的世界扩展外交与见闻。"

 eafp_kor_foreign_mission.3.t: "第一份报告"
 eafp_kor_foreign_mission.3.d: "使节团的第一份报告已经抵达。他们目睹了陌生的制度、机器、受训军队与新的外交礼仪，也开始理解朝鲜之外世界的广阔。"
 eafp_kor_foreign_mission.3.f: "\"只有亲眼所见之后才明白：强弱不出于言辞，而出于制度、财政、学问与机器。\""
 eafp_kor_foreign_mission.3.a: "延长路线，完成世界巡游。"

 eafp_kor_foreign_mission.4.t: "环绕世界之后"
 eafp_kor_foreign_mission.4.d: "使节团选择了更远的航线，考察港口与首都、工厂与议会、军营与学校。他们的记录不再只是旅行记，而是一份关于朝鲜在世界中应如何立足的报告。"
 eafp_kor_foreign_mission.4.f: "每一处港口都有不同的旗帜、语言、法律与机器；但他们发现，强盛之本离不开制度。"
 eafp_kor_foreign_mission.4.a: "整理世界巡游记录并归国。"
 eafp_kor_foreign_mission.4.b: "考察各国的法律与学术。"
 eafp_kor_foreign_mission.4.c: "整理各地军事制度与外交惯例。"

 eafp_kor_foreign_mission.5.t: "归国"
 eafp_kor_foreign_mission.5.d: "使节团已经归国。关于陌生制度、机器与外交礼仪的记录，足以动摇朝廷的旧秩序。"
 eafp_kor_foreign_mission.5.f: "箱中装满外国报纸、法令集、工厂图纸、军事教范，以及随员们每夜誊写的见闻录。"
 eafp_kor_foreign_mission.5.a: "令其提交报告。"

 eafp_kor_foreign_mission.6.t: "使节团报告"
 eafp_kor_foreign_mission.6.d: "海外使节团的归国报告已经呈交朝廷。现在必须决定如何把这些见闻反映到国政之中。"
 eafp_kor_foreign_mission.6.f: "\"制度不能一夜之间移植，但若国家闭上眼睛，终有一日会置身他人的制度之下。\""
 eafp_kor_foreign_mission.6.a: "采纳制度改革建议。"
 eafp_kor_foreign_mission.6.b: "优先采用技术与军事报告。"
 eafp_kor_foreign_mission.6.c: "用于扩大外交信任。"

