 je_chinese_rule: "Shadow of the Central Plains"
 je_chinese_rule_reason: "For centuries, this vast land has moved according to the will of [SCOPE.GetRootScope.GetCountry.GetOverlord.GetCapital.GetCityHubName]. Generals appointed by the Emperor are stationed here, overseeing all our affairs, and vast tributes and resources flow to the Central Plains every year.\n\nBut times are changing. As [SCOPE.GetRootScope.GetCountry.GetName] falters under the pressure of the Western powers, a new path might open for us. Shall we remain merely a fringe of the empire forever? Or shall we forge our own destiny?"
 je_home_of_the_manchus: "Land of the Dragon's Rise"
 je_home_of_the_manchus_reason: "This is the foundation from which our Eight Banners army once commanded the world, and the sacred land where the Dragon of [SCOPE.GetRootScope.GetCountry.GetName] took flight. Yet, glory has become a tale of the past. The Emperor's gaze remains fixed on the Forbidden City, and our homeland, a frontier under the rule of generals executing the will of [SCOPE.GetRootScope.GetCountry.GetOverlord.GetCapital.GetCityHubName], is left exposed to the threat of Russian encroachment southward. Can we truly uphold the spirit of our ancestors in this cold land?"
 je_southern_zoufan: "The Edge of the Tribute Road"
 je_southern_zoufan_reason: "For hundreds of years, our envoys traveled a long journey to distant China, laden with elephants and precious treasures. This tribute was a crucial diplomatic ritual that ensured our independence and gained recognition for our legitimacy among neighboring nations.\n\nNow, steamships from the West across the sea are knocking at our ports. But the Dragon of [SCOPE.GetRootScope.GetCountry.GetPowerBloc.GetLeader.GetCapital.GetCityHubName] is too far away, and appears old and weary."
