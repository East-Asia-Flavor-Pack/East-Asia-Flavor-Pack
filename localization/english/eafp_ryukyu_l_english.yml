l_english:
 eafp_ryukyu.1.t: "The Ryukyu Opening"
 eafp_ryukyu.1.d: "As Japan and Qing contest Ryukyu, a memorial reaches the Korean court asking what order should govern the seas south of the strait."
 eafp_ryukyu.1.f: "Ryukyu's envoys knocked on the gates of larger states with the ceremonies of a small kingdom.\n\nJapan saw the southern sea as its own enclosure, while Qing would not easily abandon the language of investiture. Between them, the Ryukyuan court could not know whose seal would become tomorrow's command.\n\nOfficials in Hanseong argued that Silhak had taught the court to read the sea again. Routes, goods, papers, interpreters, and harbor winds had all become evidence of state power.\n\nIf Korea withdrew, Ryukyu would remain another country's quarrel. If Korea stepped forward, it would write its own sentence into East Asia's maritime order."
 eafp_ryukyu.1.a: "Put Korea's name into the Ryukyu question."
 eafp_ryukyu.1.b: "Withdraw from the quarrel across the strait."
 eafp_ryukyu.2.t: "A New Ryukyuan Document"
 eafp_ryukyu.2.d: "When Japan and Qing fail to secure Ryukyu, the Ryukyuan court accepts a document placing it under Korean protection."
 eafp_ryukyu.2.f: "The document in Shuri was sealed after long hesitation.\n\nJapanese pressure had not reached far enough, and Qing investiture had not recovered its old weight. The small court could no longer fully trust either great shadow.\n\nThe Korean envoy did not promise empty independence. He bound safe routes, tribute rites, merchant passage, and protection in disputes into a single document.\n\nRyukyu did not abandon its own name. Yet that name would now be read beside the ledgers of Hanseong."
 eafp_ryukyu.2.a: "Accept the document of the southern sea."
 eafp_ryukyu.3.t: "The Water Road to Taiwan"
 eafp_ryukyu.3.d: "With Ryukyu inside Korea's tributary order, the court can now survey the southern seas and the routes to Taiwan."
 eafp_ryukyu.3.f: "Ryukyu's harbors were no longer names on a distant map.\n\nMerchants spoke of monsoon winds. Interpreters wrote Ryukyuan and Minnan terms into the same ledger. Naval officers warned that the waters east of Taiwan were harsh, while treasury officials argued that the route could become a road for grain, timber, and silver.\n\nThere was opposition. One minister warned that hunger for the sea would swallow the taxes of the land. Another replied that if Korea held Ryukyu and still refused to look south, it would close a door it had opened by its own hand.\n\nThe royal order was brief. Use Ryukyu's ports as the foothold, survey the Taiwan route, send men, and leave a claim that can be used when the time comes."
 eafp_ryukyu.3.a: "Open the next ledger of the strait."
 eafp_ryukyu.4.t: "The Taiwan Route Document"
 eafp_ryukyu.4.d: "Korean surveys and route preparations bear fruit, placing a Korean claim to Taiwan in the court records."
 eafp_ryukyu.4.f: "The first report arrived in Hanseong smelling of wet paper.\n\nRyukyuan sailors spoke of reefs and currents. Korean officials turned their words into maps, and merchants recorded which harbors could shelter ships from the wind.\n\nQing ledgers held old names. Yet the sea was not held by names alone. The country that moved people, stored goods, and bore the risk began to write the next sentence.\n\nTaiwan is not yet Korean land. But Korea now has the document with which to speak of the island, and the route with which to defend that document."
 eafp_ryukyu.4.a: "Enter Taiwan's claim into the ledger."
 eafp_ryukyu.5.t: "The Broken Southern Route"
 eafp_ryukyu.5.d: "As Korea's tributary hold over Ryukyu falters, the Taiwan pioneer plan loses its route and foothold."
 eafp_ryukyu.5.f: "The memorials from Ryukyu's harbors stopped coming.\n\nInterpreters did not return, and ships turned north rather than hazard the longer route. The Taiwan survey still existed as paper, but the foothold that would defend the paper had disappeared.\n\nThe court debate cooled quickly. The demand to widen the sea was drowned by the question of who had lost the document already won.\n\nThe southern sea passed back into another country's ledger."
 eafp_ryukyu.5.a: "Close the southern plan."
 je_eafp_taiwan_pioneer: "Taiwan Pioneer"
 je_eafp_taiwan_pioneer_reason: "Now that Ryukyu has entered Korea's tributary order, Korea can use Ryukyuan harbors and sailors to survey Taiwan routes, build influence, and eventually demand the island's administration."
 je_eafp_taiwan_pioneer_goal: "Advance Taiwan influence to 100"
 je_eafp_taiwan_pioneer_status: "Korea is surveying Taiwan's harbors and sea roads through the Ryukyu route."
 je_eafp_taiwan_pioneer_status_ready: "Taiwan influence is sufficient. The court can demand administrative transfer from the island's current owner."
 button_je_eafp_ryukyu_dispatch_envoys: "Dispatch Strait Envoys"
 button_je_eafp_ryukyu_dispatch_envoys_desc: "Send Korean envoys to Ryukyu and nearby harbors to strengthen Korea's protective claim."
 button_je_eafp_ryukyu_arm_harbors: "Arm Ryukyuan Harbors"
 button_je_eafp_ryukyu_arm_harbors_desc: "Use Korean naval officers and military stores to strengthen Ryukyuan harbors, making it harder for Japan or Qing to secure the kingdom."
 eafp_ryukyu_intervention_effect_tt: "Korea becomes involved in $je_ryukyu_rivalry$"
 eafp_ryukyu_non_intervention_effect_tt: "Korea does not become involved in $je_ryukyu_rivalry$"
 eafp_ryukyu_tributary_outcome_tt: "Ryukyu becomes Korea's tributary"
 eafp_ryukyu_independence_progress_not_complete_tt: "$je_ryukyu_rivalry_progress_bar$ progress is below 100"
 eafp_ryukyu_arm_harbors_ship_tt: "Naval power projection is at least 50"
 eafp_ryukyu_dispatch_envoys_effect_tt: "$je_ryukyu_rivalry_progress_bar$ progress #P +10#!"
 eafp_ryukyu_arm_harbors_effect_tt: "$je_ryukyu_rivalry_progress_bar$ progress #P +20#!"
 eafp_taiwan_pioneer_start_tt: "Starts the $je_eafp_taiwan_pioneer$ Journal Entry"
 eafp_taiwan_pioneer_complete_tt: "Korea resolves the $STATE_FORMOSA$ question"
 eafp_taiwan_pioneer_failed_tt: "The $je_eafp_taiwan_pioneer$ Journal Entry fails"
 eafp_taiwan_pioneer_resolved_tt: "The $STATE_FORMOSA$ question is resolved by acceptance or refusal"
 eafp_taiwan_survey_decision: "Survey the Taiwan Route"
 eafp_taiwan_survey_decision_desc: "Use Ryukyuan harbors and Korean naval officers to survey Taiwan's waters, harbors, and market contacts, raising Taiwan influence."
 button_je_eafp_taiwan_demand: "Demand Taiwan"
 button_je_eafp_taiwan_demand_desc: "Use Taiwan influence to demand administrative transfer of $STATE_FORMOSA$ from its current owners. Each accepting country transfers only the part of Taiwan it owns; each refusing country gives Korea a claim only on the part it owns.\n\nCurrent priority target acceptance chance: #v [GetPlayer.MakeScope.ScriptValue('eafp_taiwan_demand_acceptance_chance_value')|v0]%#!\nBase #v 50%#!. If the current owner's naval power projection is lower than Korea's, #p +35%#!; if higher, #n -35%#!. If the current owner is at war, #p +15%#!. If Taiwan is split, each owner accepts or refuses separately."
 eafp_taiwan_influence_100_tt: "Taiwan influence has reached #v 100#!"
 eafp_taiwan_survey_force_effect_tt: "Taiwan influence #P +20#!, increased treasury cost, relations with the current owner worsen"
 eafp_taiwan_survey_careful_effect_tt: "Taiwan influence #P +12#!, increased treasury cost, relations with Ryukyu improve"
 eafp_taiwan_demand_acceptance_chance_tt: "The target is more likely to accept if Korea has stronger naval power or if the target is already at war."
 eafp_taiwan_demand_refusal_chance_tt: "If the target refuses, Korea gains a claim on Taiwan and relations worsen."
 eafp_taiwan_demand_accepted_tt: "Korea receives $STATE_FORMOSA$"
 eafp_taiwan_demand_rejected_tt: "Korea gains a claim on $STATE_FORMOSA$"
 eafp_taiwan_route_documents: "Taiwan Route Documents"
 eafp_taiwan_route_documents_desc: "Charts, harbor records, and interpreter notes from Taiwan are strengthening Korea's southern sea administration."
 eafp_ryukyu.6.t: "Surveying the Taiwan Waters"
 eafp_ryukyu.6.d: "The survey ships bound for Taiwan have left Ryukyuan harbors to gather records of waters, harbors, and interpreters."
 eafp_ryukyu.6.f: "The sea to Taiwan was not an empty space on the map.\n\nRyukyuan sailors spoke of the season when the wind turned, while Korean officers wrote down reefs and harbors. Interpreters placed Minnan and Ryukyuan words beside each other, and merchants asked which markets received silver and timber.\n\nThe court had not ordered a simple survey. The country that knew Taiwan's waters would also speak more forcefully over Taiwan."
 eafp_ryukyu.6.a: "Push hard into the waters."
 eafp_ryukyu.6.b: "Pay Ryukyuan pilots and clerks."
 eafp_ryukyu.7.t: "The Demand for Taiwan"
 eafp_ryukyu.7.d: "Korea has demanded the administrative transfer of Taiwan, citing its route surveys and local contacts."
 eafp_ryukyu.7.f: "The document was short, but the voyage records behind it were thick.\n\nRyukyuan harbors, Taiwanese ports, market speech, and interpreters' ledgers were bound into one line. Korea did not merely ask for the island. It sent proof that it had crossed the waters, paid the cost, and carried the risk.\n\nTaiwan's current owner now had to read the sentence. More precisely, it had to read the ships and routes behind the sentence."
 eafp_ryukyu.7.a: "Yield Taiwan and avoid conflict."
 eafp_ryukyu.7.b: "Refuse. Papers do not make land."
 eafp_ryukyu.8.t: "Taiwan Received"
 eafp_ryukyu.8.d: "The current owner has accepted Korea's demand, transferring Taiwan's administration to Korea."
 eafp_ryukyu.8.f: "The Taiwan document crossed the sea and returned.\n\nThis time it was not a survey report. It stated which seal the harbors, offices, and tax ledgers would follow.\n\nThe court was pleased, but it did not laugh lightly. To receive an island was to receive a route, and to receive a route was to commit ships, men, and treasury year after year.\n\nThe southern sea had come closer. That made it heavier."
 eafp_ryukyu.8.a: "Receive Taiwan's ledgers."
 eafp_ryukyu.9.t: "The Refused Taiwan Document"
 eafp_ryukyu.9.d: "Taiwan's current owner has refused Korea's demand, and the court has turned that refusal into a claim."
 eafp_ryukyu.9.f: "The reply was cold and short.\n\nTaiwan's current owner rejected Korea's voyage records. It raised old ledgers and existing offices, then stated that the island's administration would not be handed over.\n\nThe court did not fold the document away. Refusal was not failure. It became the first line of the next sentence.\n\nKorea was no longer only the country that demanded Taiwan. It was the country that would return with a refused demand in hand."
 eafp_ryukyu.9.a: "Leave the refusal as a claim."
