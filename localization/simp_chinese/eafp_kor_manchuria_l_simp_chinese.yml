l_simp_chinese:
 eafp_manchuria_outcome_manchurian_settlement_tt: "将发生满洲经营的最终定居事件"
 
 je_eafp_manchurian_policy: "满洲政策"
 je_eafp_manchurian_policy_reason: "我们不能再对鸭绿江以北的北方袖手旁观。必须开始为将来夺取那片土地做准备。"
 
 je_eafp_manchurian_management: "经营满洲"
 je_eafp_manchurian_management_reason: "虽然古老的疆域在数百年后回归，但仅靠地图上新划定的边界并不足以完全统治这片领土。改造广阔的满洲平原这一重大任务摆在我们面前。"
 
 button_je_eafp_manchuria_settlement: "鼓励朝鲜人移民"
 button_je_eafp_manchuria_settlement_desc: "将朝鲜半岛上的部分朝鲜族农民或劳工人群（POP）迁移到满洲的一个地区。"
 button_je_eafp_manchuria_expand_arable_land: "开拓满洲"
 button_je_eafp_manchuria_expand_arable_land_desc: "使盛京、南满洲和北满洲的可耕地各增加10。最多可执行5次。"
 
 eafp_manchuria.1.t: "提出北方政策"
 eafp_manchuria.1.d: "正式提出了朝鲜对鸭绿江彼岸满洲的权利。"
 eafp_manchuria.1.f: "“我发现自己坐在一朵巨大无比的木槿花上，这朵花有着绵延数万丈的枝丫，却不知自己从何处来，也未曾听闻。这朵花为何今日会变成这般模样？一片花瓣越过黄海、渤海覆盖了大陆，另一片花瓣穿过满洲垂挂在乌苏里江。为何今日这朵花会如此枯萎？”"
 eafp_manchuria.1.a: "建立对满洲的宣称。"
 
 eafp_manchuria.2.t: "天府金汤之地"
 eafp_manchuria.2.d: "成功将满洲全境纳入领土。"
 eafp_manchuria.2.f: "“间岛是天府金汤之地。这里肥沃的土地随处可见，无论走到哪里都可以务农，务农就会有充足的大米。这里森林茂密，不必为木材发愁。让我们务农，吃饱穿暖吧。我们将建起干净的茅草屋，读书识字，教导无知的农民，建设一个理想的村庄。”"
 eafp_manchuria.2.a: "寻求治理新领土的方法。"
 
 eafp_manchuria.3.t: "新屋顶"
 eafp_manchuria.3.d: "在满洲荒凉的平原上，一座宏伟的城市正在展露真容。"
 eafp_manchuria.3.f: "“虽然仍有一种正在建设中的感觉，但在新长出的浅绿色柳树之间，铺设着干净的混凝土房屋，从远处看到的那些大型建筑的东方风格屋顶也让人耳目一新。哲心想，这种新的建筑风格是否也是东方摆脱西方影响、努力创造属于自己事物的一种体现？”"
 eafp_manchuria.3.a: "在新大地上建立新秩序。"
 
 eafp_manchurian_settlement_state: "满洲定居点"
 eafp_manchurian_settlement_state_desc: "朝鲜村落和市场正在通过人口和生活支持对北方的统治。"
 eafp_manchurian_integrated_state: "合并的满洲行政区"
 eafp_manchurian_integrated_state_desc: "官府、户籍、税收和审判正在将满洲纳入朝鲜的行政秩序之中。"
