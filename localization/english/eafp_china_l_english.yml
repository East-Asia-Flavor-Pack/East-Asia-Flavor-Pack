 first_opium_war.1.t: "Opium Crisis"
 first_opium_war.1.d: "Despite issuing several edicts since 1799, there is no sign of the opium spread stopping."
 first_opium_war.1.f: "It is truly regrettable to exchange the mud of foreigners for China's silver. Furthermore, the people of the country will undoubtedly wander about, begging everywhere, wasting time and losing their livelihoods."
 # Source: Xu Naiji, "鴉片例禁愈嚴流弊愈大亟請變通辦理折", in 《籌辦夷務始末》卷一.
 first_opium_war.1.a: "New measures must be taken."
 first_opium_war.2.t: "Xu Naiji's Memorial"
 first_opium_war.2.d: "Xu Naiji, the Junior Guardian of the Heir Apparent, has submitted a memorial about opium. He states that the stricter the crackdown on opium, the more widely the resulting evil spreads, and urgently requests changes to the opium regulations."
 first_opium_war.2.f: "All Western countries have opened their markets to their ships for over a thousand years, and only the British are opium merchants. It is wrong to cut off trade with all other countries in order to cut off British trade. Moreover, hundreds of thousands of people living along the coast rely entirely on trade for their livelihood - how should they be dealt with? Furthermore, barbarian ships on the high seas can choose any island as an anchorage for repairs, and vessels can meet them there, so trade cannot be cut off. In recent years, foreign ships have visited all ports in Fujian, Zhejiang, Jiangnan, Shandong, and even Tianjin and Manchuria to sell opium. Although temporarily expelled by local authorities, the amount they sold was reportedly not small. Therefore, while we should cut off commerce in Guangdong, it seems impossible to prevent smuggling.\n\nNow, closing the ports is not the answer, and the laws on opium are quite ineffective, so the only remaining method is to return to the previous system and allow barbarian merchants to import opium as medicine by paying customs duties. After passing through customs, it should only be delivered to the Hong merchants as goods without payment. The barbarians will also willingly comply when they realize that the amount of customs duties they have to pay is less than what they now spend on bribes. Foreign money should be treated equally with silver ingots, and its outflow should be equally prohibited. When offenders are caught, the opium that may be theirs should be completely destroyed and their money confiscated as punishment."
 # Source: Xu Naiji, "鴉片例禁愈嚴流弊愈大亟請變通辦理折", in 《籌辦夷務始末》卷一.
 first_opium_war.2.a: "The harm of opium is already crystal clear, yet how could we allow such poison?"
 first_opium_war.3.t: "Yuan Yulin's Memorial"
 first_opium_war.3.d: "Jiangnan Censor Yuan Yulin has submitted a memorial regarding the opium issue. He strongly opposes the recent calls for legalization and taxation within the court, acknowledging the difficulties of prohibition but warning that lifting the ban would invite greater disasters."
 first_opium_war.3.f: "Today's evils consistently stem from the excuse of 'it cannot be done', but among these, the most dangerous compromise is the discussion of lifting the opium ban. Lifting the ban on opium is like removing the fence and raising tigers and wolves. The annual collection of opium import taxes is merely 100,000 to 200,000 taels, which contributes little to the silver revenue. Instead, if the ban is relaxed, the number of opium smokers will gradually increase, opium imports will rise, and consequently, the outflow of silver will also increase. Furthermore, if poppy cultivation is permitted in China, foolish people will abandon farming to pursue profit, and fertile lands will turn into opium fields. Even if we strictly prohibit soldiers from smoking daily, the day of complete eradication will never come. The greatest worry under heaven is something that cannot be contained once it begins."
 # Source: Yuan Yulin anti-opium memorial opposing 弛禁論; summarized and translated from Daoguang-era prohibition memorials.
 first_opium_war.3.a: "His words also make sense."
 first_opium_war.4.t: "Xu Qiu's Memorial"
 first_opium_war.4.d: "Supervising Censor of the Ministry of War Xu Qiu has submitted a memorial on the opium issue. He pointed out the contradiction of the legalization camp's argument to simultaneously relax the ban and control it."
 first_opium_war.4.f: "I am deeply concerned upon hearing the arguments of the legalization proponents. Relaxing the opium ban means no longer prohibiting its sale and purchase; how then can we prohibit people from smoking it? If we only prohibit officials and soldiers, they all come from the common people, so how can we prevent it beforehand? Moreover, knowing clearly that it is a poisonous substance, how can we allow it to become widespread and then tax it again? Such governance cannot exist in this great Celestial Empire. How could raising the people on poison and profiting from that poison be the governance of a sage?"
 # Source: Xu Qiu's argument against lifting the opium ban, quoted in 《鴉片事略》.
 first_opium_war.4.a: "Are you saying there are many contradictions in the legalization argument?"
 first_opium_war.5.t: "Huang Juezi's Memorial"
 first_opium_war.5.d: "Huang Juezi warns that unless opium smokers are punished severely, the state will lose both soldiers and silver."
 first_opium_war.5.f: "Since the fourteenth year of Daoguang, the silver leaking away has gradually reached as much as thirty million taels. With China's useful wealth we fill the bottomless ravines overseas, exchanging it for this thing that harms people; it has gradually become a worry that sickens the state. Day after day, year after year, your minister does not know where it will end!\n\nI request that Your Majesty issue a clear edict: from now on, grant a limit of one year, so that they may wash away their former offenses. If within one year they fully break the addiction, they are good subjects; if after one year they still smoke it, they are lawless and disorderly people, and should be punished with the utmost penalty."
 # Source: Huang Juezi, "嚴塞漏卮以培國本疏".
 first_opium_war.5.a: "Must we set a deadline and threaten severe punishment?"
