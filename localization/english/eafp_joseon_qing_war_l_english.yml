 eafp_joseon_qing_war_events.1.t: "Gunfire Across the Yalu"
 eafp_joseon_qing_war_events.1.d: "War has begun between Joseon and the Qing. The War Effort Evaluation changes monthly with the military and domestic situation; its final score and the war's duration determine the postwar reward."
 eafp_joseon_qing_war_events.1.f: "The lamps in the council offices burned through the night. Couriers from the north brought word of cannon fire along the border, while ministers studied one another's faces. Some still thought of investiture from the Board of Rites. Others said Joseon could no longer bow under that name."
 eafp_joseon_qing_war_events.1.a: "The order under heaven trembles."

 eafp_joseon_qing_war_events.2.t: "A Polity Restored"
 eafp_joseon_qing_war_events.2.d.4: "A swift and overwhelming victory has united the court and the people. Political movements will calm while loyalism surges."
 eafp_joseon_qing_war_events.2.d.3: "Joseon paid a considerable price but secured victory. The resulting national unity will sustain political stability for years."
 eafp_joseon_qing_war_events.2.d.2: "Victory was won, but the wounds of war run deep. A measure of unity remains, though it cannot silence every grievance."
 eafp_joseon_qing_war_events.2.d.1: "Despite military victory, exhaustion and anger remain at home. Joseon's prestige has risen, but its political wounds will be slow to heal."
 eafp_joseon_qing_war_events.2.f: "As the dust settled, the court searched for a language fit for the new order. The old rites no longer seemed unshakeable, and the people spoke of a country that had stood by itself."
 eafp_joseon_qing_war_events.2.a: "Joseon shall stand on its own."

 eafp_joseon_qing_war_events.3.t: "Humiliation Before the Altars"
 eafp_joseon_qing_war_events.3.d.4: "Defeat could not be avoided, but wartime administration and public order endured to the end. The court can contain the shock with some discipline."
 eafp_joseon_qing_war_events.3.d.3: "Humiliating defeat has inflamed political movements and created many radicals. Its consequences will linger for years."
 eafp_joseon_qing_war_events.3.d.2: "The state faltered alongside the army. Widespread radicalization and the loss of loyalists will weigh upon postwar politics."
 eafp_joseon_qing_war_events.3.d.1: "Protracted war and defeat have shattered national cohesion. Political movements are turning extreme, and the court's authority will not recover soon."
 eafp_joseon_qing_war_events.3.f: "The war was over, but the silence in the court only deepened. People demanded responsibility for the defeat, and in the streets humiliation and anger became almost the same word."
 eafp_joseon_qing_war_events.3.a: "This shame will endure."

 eafp_joseon_qing_war_events.10.t: "The Uiju Supply Road"
 eafp_joseon_qing_war_events.10.d: "The northern front's supply problem has reached the court."
 eafp_joseon_qing_war_events.10.f: "The road to Uiju filled with grain carts and refugees. Reports from the army demanded more provisions, while local officials warned that the people had already been pressed beyond endurance."
 eafp_joseon_qing_war_events.10.a: "Concentrate supplies at the front."
 eafp_joseon_qing_war_events.10.b: "Make the provinces bear more of the burden."
 eafp_joseon_qing_war_events.10.c: "Repair the transport network first."

 eafp_joseon_qing_war_events.11.t: "General Winter"
 eafp_joseon_qing_war_events.11.d: "Bitter cold has fallen over the northern front."
 eafp_joseon_qing_war_events.11.f: "Snow swallowed the roads, and soldiers handled their matchlocks with frozen hands. Before the enemy could attack the camp, winter had already done so."
 eafp_joseon_qing_war_events.11.a: "Prioritize winter supplies."
 eafp_joseon_qing_war_events.11.b: "Permit local requisition."
 eafp_joseon_qing_war_events.11.c: "Slow the offensive."

 eafp_joseon_qing_war_events.12.t: "Sand in the Shells"
 eafp_joseon_qing_war_events.12.d: "Shoddy munitions and procurement fraud have been exposed."
 eafp_joseon_qing_war_events.12.f: "When the shells were opened, sand spilled out before iron fragments. The camps were furious, the offices tried to hide their papers, and the factory owners blamed the confusion of war."
 eafp_joseon_qing_war_events.12.a: "Punish those responsible."
 eafp_joseon_qing_war_events.12.b: "Conceal it until the war is over."
 eafp_joseon_qing_war_events.12.c: "Reform military procurement."

 eafp_joseon_qing_war_events.13.t: "A Defeated General's Suicide"
 eafp_joseon_qing_war_events.13.d: "A commander intends to take responsibility for defeat through death."
 eafp_joseon_qing_war_events.13.f: "The sword in the commander's tent had already been drawn. [SCOPE.sCharacter('defeated_general').GetFullName] said that the crime of defeat could not be repaid in life. The court had to decide whether to record the death as loyalty or demand living accountability."
 eafp_joseon_qing_war_events.13.a: "Honor that loyalty."
 eafp_joseon_qing_war_events.13.b: "Make the general answer in life, not death."
 eafp_joseon_qing_war_events.13.c: "Keep the defeat quiet."

 eafp_joseon_qing_war_events.14.t: "The Great Fire"
 eafp_joseon_qing_war_events.14.d: "A great fire has spread amid the chaos of war."
 eafp_joseon_qing_war_events.14.d.coverup: "The faulty shells and corruption once concealed have returned as fire. Flames spreading from military facilities into civilian homes have made the court's responsibility difficult to deny."
 eafp_joseon_qing_war_events.14.f: "The flames made no distinction between warehouses and homes. No one could say whether the cause was shellfire, arson, or a refugee's mistake. For the people standing amid the ashes, relief mattered more than blame."
 eafp_joseon_qing_war_events.14.a: "Prioritize relief and firefighting."
 eafp_joseon_qing_war_events.14.b: "Save the military depot first."
 eafp_joseon_qing_war_events.14.c: "Punish those responsible."

