l_korean:
 eafp_manchuria_outcome_manchurian_settlement_tt: "만주 경영의 최종 정착 이벤트가 발생합니다"

 je_eafp_manchurian_policy: "만주 정책"
 je_eafp_manchurian_policy_reason: "부국강병의 길이 어느 정도 열렸다면 조선은 압록강 너머의 북방을 더 이상 먼 변경으로만 둘 수 없습니다. 만주에 대한 명분을 선제적으로 정리하고, 장차 그 땅을 차지할 준비를 시작해야 합니다."

 je_eafp_manchurian_management: "만주 경영"
 je_eafp_manchurian_management_reason: "만주 전역은 조선의 손에 들어왔지만, 북방을 실제 통치 질서 안에 붙들려면 도시화, 정착, 세무 행정이 모두 자리를 잡아야 합니다."
 je_eafp_manchurian_management_status: "만주의 총 도시화 합계가 충분히 높고, 각 만주 주의 조선인 인구 비율이 10% 이상이며, 각 주의 세금 역량이 세금 역량 사용량 이상이어야 합니다."

 eafp_manchuria_management_ready_tt: "만주의 개발, 정착, 행정 조건이 모두 충족됨"
 eafp_manchuria_development_ready_tt: "성경, 남만주, 북만주의 총 도시화 합계가 #v 60#! 이상"
 eafp_manchuria_settlement_ready_tt: "성경, 남만주, 북만주 내 조선인 인구 비율이 각각 #v 10%#! 이상"
 eafp_manchuria_administration_ready_tt: "성경, 남만주, 북만주의 세금 역량이 각각 세금 역량 사용량 이상"

 button_je_eafp_manchuria_settlement: "조선인 이주 장려"
 button_je_eafp_manchuria_settlement_desc: "한반도 내 조선인 농민 또는 노동자 POP 일부를 만주의 한 주로 이주시킵니다."
 button_je_eafp_manchuria_expand_arable_land: "만주 개척"
 button_je_eafp_manchuria_expand_arable_land_desc: "성경, 남만주, 북만주의 경작 가능 토지를 늘립니다."

 eafp_manchuria.10.t: "북방 정책의 제기"
 eafp_manchuria.10.d: "조정은 압록강 너머 만주에 대한 조선의 권리를 공식적으로 제기했습니다."
 eafp_manchuria.10.f: "부국강병의 길은 조선의 시선을 바꾸어 놓았습니다. 더 강한 군대와 더 깊은 장부를 가진 국가는 더 먼 국경을 상상할 수 있었습니다.\n\n성경, 남만주, 북만주는 이제 단순한 변경의 이름이 아니었습니다. 그것은 언젠가 조선이 책임져야 할 북방의 문제로 기록되기 시작했습니다."
 eafp_manchuria.10.a: "만주에 대한 명분을 세워라."

 eafp_manchuria.11.t: "만주 전역의 확보"
 eafp_manchuria.11.d: "조선은 성경, 남만주, 북만주를 모두 손에 넣었습니다."
 eafp_manchuria.11.f: "지도 위의 선은 마침내 조선의 의지대로 그어졌습니다. 그러나 영토를 차지하는 일과 영토를 다스리는 일은 같은 일이 아니었습니다.\n\n만주의 길과 마을, 시장과 세금은 이제 조선의 행정이 대답해야 할 질문이 되었습니다. 북방은 얻었습니다. 이제 붙들어야 합니다."
 eafp_manchuria.11.a: "이제 북방을 경영해야 한다."

 eafp_manchuria.12.t: "만주 경영의 시작"
 eafp_manchuria.12.d: "만주 전역이 조선의 통치 아래 들어오면서, 조정은 북방을 실제 행정 질서로 묶는 작업을 시작했습니다."
 eafp_manchuria.12.f: "군대가 먼저 길을 열었지만, 그 길에 오래 남는 것은 관청과 장부, 마을과 밭이었습니다.\n\n조정은 만주를 점령지로만 둘 수 없었습니다. 도시를 세우고, 조선인의 정착을 늘리며, 세금과 행정이 실제로 닿는 북방을 만들어야 했습니다."
 eafp_manchuria.12.a: "만주를 경영하라."

 eafp_manchuria.20.t: "만주 경영의 정착"
 eafp_manchuria.20.d: "만주의 도시, 마을, 세무 장부가 조선의 통치 질서 안으로 들어오고 있습니다."
 eafp_manchuria.20.f: "처음에는 선과 주둔지가 북방을 붙잡았습니다. 그러나 오래 버티는 통치는 길, 세금, 마을, 관청 위에 놓였습니다.\n\n성경의 장부가 한성으로 올라오고, 남만주의 마을에는 조선어가 섞이며, 북만주의 도로에는 새 행정의 표식이 세워졌습니다. 이제 만주는 정복의 결과가 아니라 조선 국가가 매일 관리하는 북방이 되었습니다."
 eafp_manchuria.20.a: "북방을 조선의 행정 질서 안에 묶어라."

 eafp_manchurian_administration: "만주 통리 행정"
 eafp_manchurian_administration_desc: "만주를 다루는 관청과 장부가 북방 통치를 더 단단히 묶고 있습니다."
 eafp_manchurian_settlement_state: "만주 정착촌"
 eafp_manchurian_settlement_state_desc: "조선인 마을과 시장길이 인구와 생활을 통해 북방 통치를 받치고 있습니다."
 eafp_manchurian_integrated_state: "편입된 만주 행정"
 eafp_manchurian_integrated_state_desc: "관청, 호적, 세금, 재판이 만주를 조선의 행정 질서 안으로 끌어들이고 있습니다."
