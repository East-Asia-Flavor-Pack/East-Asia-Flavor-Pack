 eafp_kor_mainline.1.mt: "Young King"
 eafp_kor_mainline.1.md: "The biting winds of the winter of his accession and the resolute eyes of his ministers remain vivid in [ROOT.GetCountry.GetRuler.GetFullName]'s mind."
 eafp_kor_mainline.1.mf: "I still remember the bitterly cold winter of that year when I sent off my grandfather and ascended to the throne. The ministers came to see me then and said thus:\n\n\"We opine that Your Majesty, at a tender age, has received a weighty charge, and Her Majesty the Queen Dowager, with the sage virtue of a female Yao, is holding the [Concept('concept_eafp_korean_regent', 'ceremony of drawing the curtain')], all are lifting their heads and wiping their eyes, hoping for a new and righteous governance. We, your foolish and deficient subjects, have survived somehow and tearfully awaited this moment, and beg leave to first briefly present the most urgent and pressing matters of today.\n\nLet the cautiousness in daily life be the foundation of diligence in studies, let the solemnity of the inner court be the foundation of blocking the avenues of illicit favour, and let the scrutiny of the people's hidden suffering be the foundation of thrift in expenditures. Yet, the great foundation of all this rests solely upon Your Majesty's true heart. We only wish that Your Sacred Intentions be deeply placed upon these matters, and that they not be neglected.\"\n\nSo perhaps I said:\n\n\"How could I dare not to engrave upon my heart all the articles that have been presented, which are so earnest and pressing?\""
 #"나는 아직도 내가 할아버지를 떠나보내고 용상에 올랐던 차디찬 그 해의 겨울의 일이 기억에 남는다. 그때 대신들이 날 보러 와서 그런 말을 했었지.\n\n\"생각건대, 우리 전하께서 어린 나이에 무거운 부탁을 받으시고 우리 자성 전하(慈聖殿下)께서 여요(女堯) 의 성덕(聖德)으로 염유(簾帷)를 드리우는 전례(典禮)를 거행하시니, 모두들 머리를 들고 눈을 닦으면서 새로운 정화(政化)를 바라고 있습니다. 신 등이 어리석고 모질어 구차하게 살아남아 눈물을 뿌리면서 등대(登對)하였으니, 청컨대 오늘날 가장 절실하고도 시급한 일을 간략하게 먼저 진달하겠습니다.\n\n......\n\n기거(起居)를 삼가시는 것을 근학(勤學)의 근본으로, 궁위(宮闈)를 엄숙하게 하는 것을 행문(倖門)을 막는 근본으로, 백성의 숨은 고통을 살피는 것을 재용(財用)을 절약하는 근본으로 삼으시되, 또 그 대본(大本)은 오로지 전하의 실심(實心)에 있는 것입니다. 오직 원하건대, 성의(聖意)를 이에 깊이 두시어 소홀함이 없도록 하소서.\"\n\n그래서 아마 내가 말했던가.\n\n\"아뢴 바의 모든 조항이 간절하고 절실하니, 감히 마음이 새겨 두지 않을 수 있겠는가?\""
 eafp_kor_mainline.1.oa: "I too will become a great king someday."
 eafp_kor_mainline.1.ob: "Boring... Shall I go play in the garden later?"
 eafp_kor_mainline.1.ta: "#lore Are those papers going to grandmother?#!"
 eafp_kor_mainline.1.tb: "#lore I want to eat another honey rice cake like the one I had earlier#!"

 eafp_kor_mainline.2.mt: "Frail Health"
 eafp_kor_mainline.2.md: "The freezing winter wind chilled the King's body."
 eafp_kor_mainline.2.mf: "*Cough cough*\n\n\"Your Majesty, are you alright?\"\n\n\"The winter wind is harsh, quickly escort His Majesty inside.\"\n\n\"Your Majesty, I will order the court ladies to prepare honey water.\"\n\nAh...*cough cough*"
 eafp_kor_mainline.2.oa: "It's a bit cold today..."
 eafp_kor_mainline.2.ob: "I'm... fine...."
 eafp_kor_mainline.2.ta: "#lore I should go inside quickly.#!"
 eafp_kor_mainline.2.tb: "#lore I can endure this much!#!"

 eafp_kor_mainline.3.mt: "Immature Royal Authority"
 eafp_kor_mainline.3.md: "Nam Eung-jung and Nam Gyeong-jung Interrogated and Executed"
 eafp_kor_mainline.3.mf: "Nam Eung-jung and Nam Gyeong-jung were interrogated and executed, while the informant Cheon Gi-yeong was rewarded and appointed as a commander of the Five Guards.\n\nNam Eung-jung's clan were all of good lineage, but he was cunning by nature, fond of swindling others' property, and had been plotting treason, appearing in and out of the capital using only deception.\n\nWhen the plot was discovered, knowing he could not escape, he fled to the Japanese trading post in Dongnae and fabricated extremely vicious and immoral claims in a letter to incite conflict between the two countries. However, even the Japanese did not believe him and captured him to hand over to our country.\n\nWhen interrogated at this time, he confessed along with Nam Gyeong-jung."
 eafp_kor_mainline.3.oa: "Oh my, that must hurt..."

 eafp_kor_mainline.6.mt: "Concerning Health Condition"
 eafp_kor_mainline.6.md: "The Royal Physicians conduct an examination."
 eafp_kor_mainline.6.mf: "The Royal Physicians conducted an examination at Gwanmulheon, and [SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName] said,\n\"According to the physicians who have recently examined Your Majesty, there is swelling on your face. Now, looking up at you, I can see some swelling, which makes your subjects extremely anxious. How are your bowel movements and urination, and how have you been feeling these days?\"\n\nThe King replied,\n\"My bowel movements and urination are quite regular, but there is still some swelling that has not yet fully subsided.\"\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName] asked,\n\"How much urine are you passing?\"\n\nThe King answered,\n\"Last night, it filled about one container.\"\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName] asked again,\n\"How is your sleep and appetite?\"\n\nHis Majesty replied,\n\"My sleep is quite comfortable and my appetite is as usual, but I feel some discomfort in my stomach after eating.\""
 eafp_kor_mainline.6.oa: "\"There is some swelling, but otherwise I feel somewhat better than before...\""

 eafp_kor_mainline.7.mt: "Critical Condition"
 eafp_kor_mainline.7.md: "All Royal Physicians are on duty."
 eafp_kor_mainline.7.mf: "The King commanded,\n\"The three directors of the Royal Pharmacy, the current and former ministers, and the various officials shall attend.\"\n\nAll came on duty, and prayers were offered at the Royal Ancestral Shrine, the Altar of Land and Grain, various palaces, and mountains and rivers, but the King's condition became gravely critical."
 eafp_kor_mainline.7.oa: "Afterwards, guarded the palace."

 eafp_kor_mainline.8.mt: "Uneasy Condition"
 eafp_kor_mainline.8.md: "The King proceeded to Huijeongdang. When the Royal Pharmacy entered for examination, the Chief Director, Director, Vice Director, Scribe, and Recorder prostrated themselves in order. The royal physicians prostrated themselves outside the pillars."
 eafp_kor_mainline.8.mf: "The King said, \"Divide the court historians to the left and right.\"\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName] came forward, inquired after the King's health, and then said, \"The royal physicians are waiting. Shall they enter for examination?\"\n\nThe King granted permission. Hong-nam and others took the pulse in turn and then retreated outside the pillars and prostrated themselves.\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName] said, \"Report on the pulse condition.\"\n\nHong-nam and others rose and prostrated themselves, saying, \"The pulse in all three positions on both sides is even and smooth.\"\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName] asked, \"Has the medicinal decoction Your Majesty has been taking recently been effective?\"\n\nThe King said, \"I have taken the decoction smoothly, but I cannot yet discern any notable effect.\"\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName] said, \"This is different from digestive medicine; only after taking it for a long time will you see its efficacy.\"\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName] added, \"After the illness improves slightly, the key is always in the moderation of food and living habits. You must be extremely careful, and we pray ten thousand times for your health.\""
 eafp_kor_mainline.8.oa: "\"I will do as you advise.\""

 eafp_kor_mainline.9.mt: "Critical Condition"
 eafp_kor_mainline.9.md: "The King's condition was already extremely critical, with his pulse showing no hope, and the ministers lined up in attendance, wailing."
 eafp_kor_mainline.9.mf: "[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName] looked at Chiyang and said, \"Quickly draft the royal decree for prayers.\"\n\nChiyang wrote the decree: \"Perform prayer ceremonies at the royal ancestral shrine, state altar, palace halls, royal palaces, and mountains and rivers without choosing a day, but on the same day.\"\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName] approached the sickbed and requested the final royal instructions be written.\n\nChiyang wrote the decree: \"Present the royal seal to the Queen Dowager.\"\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName] proclaimed the final instructions, and Chiyang read them aloud.\n\nIl-woo wrote the three characters meaning 'The King is critically ill,' and Haecheol took them out to display them throughout the outer court."
 eafp_kor_mainline.9.oa: "The Queen Dowager issued verbal orders through the messenger:\n\"Guard the palace.\""

 eafp_kor_mainline.19.mt: "Birth of the Heir Apparent"
 eafp_kor_mainline.19.md: "Today, Her Majesty the Queen Consort has safely given birth to the heir who will inherit the royal lineage. With this, the foundation of the ancestral shrine and the altar of state has been made firm, and there could be no greater joy throughout the land."
 eafp_kor_mainline.19.mf: "At dawn, the first cry of the baby broke the stillness of the palace. When the court eunuch, voice trembling, exclaimed, \"It is a prince!\", a wave of relieved sighs and joyful murmurs spread among the assembled officials who had been waiting anxiously for the news."
 eafp_kor_mainline.19.oa: "The foundation of the ancestral shrine and the state has been secured."

 eafp_kor_mainline.20.mt: "Official Report"
 eafp_kor_mainline.20.md: "The King read the official report on execution and fell into deep thought."
 eafp_kor_mainline.20.mf: "The King is overwhelmed with complex emotions as he reads the submitted report. The report details the harm caused by someone who greatly disrupted military affairs and states that execution is appropriate."
 eafp_kor_mainline.20.oa: "Examine again whether this person truly deserves death."
 eafp_kor_mainline.20.ob: "It would be better to meet him in person."
 eafp_kor_mainline.20.oc: "I will entrust this matter to the Queen Dowager."

 eafp_kor_mainline.21.mt: "Inspection"
 eafp_kor_mainline.21.md: "The ministers suggested that the King should look after the welfare of the people."
 eafp_kor_mainline.21.mf: "The Bongjowa, Yeongbusa, Yeonguijeong, Jwauijeong, and Uuijeong reported,\n\n\"Please examine the hidden sufferings of the people. The duty of a ruler is simply to preserve the people. Whenever officials from the provinces or local magistrates come on business, you must grant them an audience and question them, guiding them to speak fully. If the ears and eyes of those above are always on the people, and the innermost thoughts of the people are fully known to those above, how could there be any abuses that cannot be eliminated?\""
 eafp_kor_mainline.21.oa: "I will do so."
 eafp_kor_mainline.21.ob: "It is regrettable, but there are more urgent matters."

 eafp_kor_mainline.22.mt: "Financial Resources"
 eafp_kor_mainline.22.md: "As the treasury hit bottom, the ministers appealed to the king."
 eafp_kor_mainline.22.mf: "The Yeonguijeong, Jwauijeong, and Uuijeong reported,\n\n\"Please economize financial resources. Taxes are the lifeblood of the people, literally their blood and sweat. The foundation of our nation's establishment is based on the two characters of 'frugality'. Yet since recent times, we have not avoided the excesses of extravagance, from clothing, food etiquette, living quarters, and curtain furnishings to the number of court ladies and servants, all exceeding the old systems. If Your Majesty considers today's practices as they have always been, this would not be the way to establish your royal will.\""
 eafp_kor_mainline.22.oa: "Your words are right. I will lead by example in practicing frugality."
 eafp_kor_mainline.22.ob: "The royal family also has its laws and face, how can the ministers try to interfere with the royal family?"

 eafp_kor_mainline.23.mt: "Daily Routine"
 eafp_kor_mainline.23.md: "The ministers, concerned about the King's young age and health, advised self-care and stability."
 eafp_kor_mainline.23.mf: "The Bongjowa and Yeongbusa reported,\n\n\"Please be cautious in your daily routine. Since Your Majesty ascended to the throne at a young age, your divine constitution is not yet robust. You must particularly moderate your daily routine. Moreover, reading texts forcefully may harm your energy, and worrying deeply may easily strain your mind. Although learning cannot be neglected and state affairs are important, you must regulate them to ensure balance, never overexerting yourself and harming your divine constitution.\""
 eafp_kor_mainline.23.oa: "I will do so."
 eafp_kor_mainline.23.ob: "There are quite a few important matters..."

 eafp_kor_mainline.24.mt: "Education"
 eafp_kor_mainline.24.md: "The ministers appealed to the King to devote himself to learning."
 eafp_kor_mainline.24.mf: "The Bongjowa, Yeongbusa, Yeonguijeong, Jwauijeong, and Uuijeong reported,\n\n\"Please be diligent in your studies. The basis for governing the country and the world lies solely in the ruler's learning. If the ruler's learning is upright, all affairs will be upright, and if the ruler's learning is incorrect, all affairs will be incorrect. How can we not be cautious? Your Majesty must read the Six Classics and the histories daily, deeply considering their profound meanings and applying them practically, so that your sagely virtue may grow daily.\""
 eafp_kor_mainline.24.oa: "The foundation of studying is simply this."
 eafp_kor_mainline.24.ob: "I'm sick and tired of those books..."

 eafp_kor_mainline.25.mt: "Palace Walls"
 eafp_kor_mainline.25.md: "The ministers suggested that the King should block the path of flatterers."
 eafp_kor_mainline.25.mf: "The Yeonguijeong, Jwauijeong, and Uuijeong reported,\n\n\"Please maintain the strictness of the inner court. Since ancient times, the beginning of a nation's decline has always originated from the intervention of the inner court in state affairs and the meddling of eunuchs in authority. The gate of the inner court is deep and distant, and its strictness must be like that of heaven and earth. How can we allow the paths of flatterers to open and cause future calamities?\""
 eafp_kor_mainline.25.oa: "I will consider your words."
 eafp_kor_mainline.25.ob: "Who would be foolish enough to fall for the words of eunuchs?"

 eafp_kor_mainline.26.mt: "True Heart"
 eafp_kor_mainline.26.md: "The ministers concluded their long admonitions by requesting the King to govern with a sincere heart."
 eafp_kor_mainline.26.mf: "The Yeonguijeong, Jwauijeong, and Uuijeong finally reported,\n\n\"All of these rest solely upon Your Majesty's true heart. Even if your daily routine is cautious, if your true heart is lacking, it is mere outward appearance; even if you study diligently, if your true heart is lacking, it is merely reciting texts. The same goes for the strictness of the inner court, the moderation of expenditures, and the awareness of the people's hidden sufferings. We earnestly hope that Your Majesty will deeply establish your royal will and practice it with a true heart.\""
 eafp_kor_mainline.26.oa: "I will do so."

 # eafp_kor_mainline.27.mt: "정순왕후 김씨 승하"
 # eafp_kor_mainline.27.md: ""
 eafp_kor_mainline.28.mt: "End of Regency"
 eafp_kor_mainline.28.md: "The long curtain is finally lifted."
 eafp_kor_mainline.28.mf: "A memorial from the ministers states:\n\n\"Ah! Her Majesty the Queen Dowager, acting on behalf of the young King, has overcome numerous difficulties to stabilize the state, and now she is returning the government to Your Majesty. This is a blessing for the ancestral shrine and the altar of state, and a fortune for the subjects. May Your Majesty take Her Majesty the Queen Dowager's high virtue as an example and establish virtuous governance.\"\n\nNow, the burden of Joseon rests solely on [ROOT.GetCountry.GetRuler.GetFullName]'s shoulders."
 eafp_kor_mainline.28.oa: "A new era begins."

 # eafp_kor_mainline.29.mt: ""
 # eafp_kor_mainline.29.md: ""
 eafp_kor_mainline.30.mt: "Hong Gyeong-nae's Rebellion"
 eafp_kor_mainline.30.md: "Hong Gyeong-nae's rebellion in the Northwest region."
 eafp_kor_mainline.30.mf: "The people of Pyeongan Province, exhausted by the government's severe exploitation and discrimination against the Northwest region, have finally risen up. Under the leadership of Hong Gyeong-nae, the rebel army, calling themselves the 'Pyeongan Army', quickly occupied several towns north of the Cheongcheon River, gaining support from the peasants.\n\n\"The court has forsaken us! We will open a new world with our own hands!\" Their cries shake the entire Northwest region. The court must immediately devise a plan to suppress them."
 eafp_kor_mainline.30.oa: "Dispatch the suppression force immediately!"
 eafp_kor_mainline.30.ob: "Can we appease them through negotiation?"

 eafp_kor_mainline.31.mt: "Suppression of Hong Gyeong-nae's Rebellion"
 eafp_kor_mainline.31.md: "The court's suppression force defeated the rebel army and restored order in the Northwest region."
 eafp_kor_mainline.31.mf: "The court's suppression force engaged in a fierce battle with Hong Gyeong-nae's rebel army at Jeongju Castle. Despite the fierce resistance of the rebel army, they were ultimately unable to overcome the superior firepower and numbers of the government troops and were defeated. Hong Gyeong-nae died in battle, and the remnants were either captured or scattered.\n\n\"The rebellion has been suppressed, and peace has returned to the Northwest region. Your Majesty's grace is immeasurable.\" The memorial from the commander of the suppression force brings a sigh of relief, but the wounds left by the rebellion are deep, and soothing the hearts of the Northwest people remains a heavy task."
 eafp_kor_mainline.31.oa: "It's fortunate the rebellion is over."
 eafp_kor_mainline.31.ob: "The fundamental problems of the Northwest region must be solved..."

 eafp_kor_mainline.32.mt: "Defeat of the Suppression Force"
 eafp_kor_mainline.32.md: "The court's suppression force was defeated by Hong Gyeong-nae's rebel army."
 eafp_kor_mainline.32.mf: "The court's suppression force engaged in battle with Hong Gyeong-nae's rebel army but suffered a crushing defeat. The rebel army's morale soared after their victory, and they are expanding their influence with the momentum of splitting bamboo.\n\n\"The government troops have retreated, and the rebel army's momentum is unstoppable.\" The urgent report plunges the court into panic. The Northwest region is already in the hands of the rebel army, and their spearhead might aim at the capital, Hanyang. We must quickly reorganize the military and dispatch a new suppression force."
 eafp_kor_mainline.32.oa: "Reorganize the military immediately!"
 eafp_kor_mainline.32.ob: "It seems we have no choice but to negotiate..."

 eafp_kor_mainline.33.mt: "Return to Hanyang"
 eafp_kor_mainline.33.md: "The King finishes his inspection and returns to Hanyang."
 eafp_kor_mainline.33.mf: "Having observed the difficult lives of the people, the King pledges a new determination as he heads back to Hanyang.\n\n\"The people's suffering is deep. I must implement benevolent governance.\" [ROOT.GetCountry.GetRuler.GetFullName] resolves to root out the corruption in the court and reform the state affairs."
 eafp_kor_mainline.33.oa: "There's still a lot of work to do."

 eafp_kor_mainline.34.mt: "A Faint Cry"
 eafp_kor_mainline.34.md: "Prince Hyomyeong was born."
 eafp_kor_mainline.34.mf: "Today, Her Majesty the Queen Consort has safely given birth to the heir who will inherit the royal lineage. With this, the foundation of the ancestral shrine and the altar of state has been made firm, and there could be no greater joy throughout the land.\n\nAt dawn, the first cry of the baby broke the stillness of the palace. When the court eunuch, voice trembling, exclaimed, \"It is a prince!\", a wave of relieved sighs and joyful murmurs spread among the assembled officials who had been waiting anxiously for the news."
 eafp_kor_mainline.34.oa: "The foundation of the ancestral shrine and the state has been secured."

 eafp_kor_mainline.35.mt: "Coronation of Prince Hyomyeong"
 eafp_kor_mainline.35.md: "Prince Hyomyeong, despite his young age, shows exceptional intelligence and character."
 eafp_kor_mainline.35.mf: "The King, highly valuing the Prince's qualities, decides to crown him as the Crown Prince earlier than usual.\n\n\"The Prince is young, but he already understands the ways of the world and possesses virtues. Crowning him as the Crown Prince will ensure the continuity of the state and reassure the people's hearts.\"\n\nThe ministers all congratulate the coronation of the Crown Prince, looking forward to his future."
 eafp_kor_mainline.35.oa: "This is a great fortune for Joseon."

 eafp_kor_mainline.36.mt: "Regency of Crown Prince Hyomyeong"
 eafp_kor_mainline.36.md: "The King, whose health had deteriorated, entrusts the state affairs to Crown Prince Hyomyeong."
 eafp_kor_mainline.36.mf: "Crown Prince Hyomyeong ascends to the regency and begins to handle state affairs on behalf of his ailing father.\n\n\"I will serve His Majesty's will and govern the country righteously.\" The Crown Prince displays strong resolve. His regency brings a new breeze to the stagnant Joseon politics, and the people place great expectations on the young Crown Prince."
 eafp_kor_mainline.36.oa: "Please, relieve the burden on your father."

 eafp_kor_mainline.37.mt: "Prince Hyomyeong's Reform"
 eafp_kor_mainline.37.md: "Crown Prince Hyomyeong embarks on bold reforms."
 eafp_kor_mainline.37.mf: "Crown Prince Hyomyeong initiates strong reforms to strengthen royal authority and eliminate the abuses of Sedo politics. He widely employs talented individuals, irrespective of faction, and strictly punishes corrupt officials, striving to restore discipline to the state.\n\n\"The state exists for the people. A state that exploits the people cannot last long.\" His reforms gain support from the people but inevitably clash with the conservative Sedo families."
 eafp_kor_mainline.37.oa: "His ambition is truly grand."
 eafp_kor_mainline.37.ob: "His opposition to the Sedo families is concerning..."

 eafp_kor_mainline.38.mt: "Failure of Reform"
 eafp_kor_mainline.38.md: "Crown Prince Hyomyeong's reforms are thwarted by the resistance of the Sedo families."
 eafp_kor_mainline.38.mf: "The Sedo families, who felt threatened by Crown Prince Hyomyeong's radical reforms, unite to systematically obstruct his policies. They mobilize their connections in the court to block the Crown Prince's orders and fabricate charges against his close associates to remove them.\n\n\"The Crown Prince's reforms are shaking the foundation of the state.\" The Sedo families' resistance is stubborn, and the Crown Prince's reform drive gradually loses its momentum."
 eafp_kor_mainline.38.oa: "What a pity."

 eafp_kor_mainline.39.mt: "Sudden Death of Crown Prince Hyomyeong"
 eafp_kor_mainline.39.md: "Crown Prince Hyomyeong suddenly passes away."
 eafp_kor_mainline.39.mf: "Crown Prince Hyomyeong, who had devoted his passion to reform, suddenly falls ill and passes away at a young age.\n\n\"Ah, heaven is indifferent! How could you take away the future of Joseon!\" The King laments bitterly, and the whole nation is engulfed in sorrow. With his death, the hope for reform vanishes, and Joseon once again falls into the dark swamp of Sedo politics."
 eafp_kor_mainline.39.oa: "Joseon's hope has faded..."
 eafp_kor_mainline.39.ob: "Is this the fate of the nation..."

 eafp_kor_mainline.40.mt: "Birth of Heonjong"
 eafp_kor_mainline.40.md: "The Crown Princess Consort gives birth to a son."
 eafp_kor_mainline.40.mf: "Even amidst the profound sorrow of losing Crown Prince Hyomyeong, a new life has been born. The Crown Princess Consort has safely given birth to the late Crown Prince's son.\n\n\"This child is the only bloodline left by the Crown Prince. He must be raised well to carry on the royal lineage.\" The King, looking at his newborn grandson, sheds tears. The birth of this young life brings a small consolation to the sorrowful royal family."
 eafp_kor_mainline.40.oa: "He must carry on his father's will."

 eafp_kor_mainline.41.mt: "Ascension of Heonjong"
 eafp_kor_mainline.41.md: "Following Sunjong, the young Heonjong ascends to the throne."
 eafp_kor_mainline.41.mf: "With Sunjong's passing, his young grandson Heonjong inherits the throne. Due to Heonjong's young age, Queen Sunwon, the Queen Dowager, begins her regency behind the bamboo screen.\n\n\"The King is young, and the state's affairs are difficult. The Queen Dowager must assist the King and stabilize the state.\" As the young King and the Queen Dowager lead the government, the influence of the Sedo families grows even stronger."
 eafp_kor_mainline.41.oa: "Another young King..."

 eafp_kor_mainline.42.mt: "Gihae Persecution"
 eafp_kor_mainline.42.md: "A massive persecution against Catholics begins."
 eafp_kor_mainline.42.mf: "The court, judging that the spread of Catholicism threatens the foundation of the state, initiates a large-scale persecution.\n\n\"Western Learning is a wicked teaching that rejects parents and the King. All its followers must be eradicated.\" Under the court's strict orders, numerous Catholics are arrested, tortured, and martyred. The Gihae Persecution leaves a deep scar on the history of Catholicism in Joseon."
 eafp_kor_mainline.42.oa: "A tragic historical event."

 eafp_kor_mainline.43.mt: "French Fleet Appears"
 eafp_kor_mainline.43.md: "A French fleet appears in the waters off Joseon."
 eafp_kor_mainline.43.mf: "A French fleet, seeking accountability for the Gihae Persecution, appears in the waters off Joseon and demands the opening of ports and freedom of religion.\n\n\"The Western barbarians have invaded our waters! We must strengthen our defenses immediately!\" The court is thrown into a panic by the sudden appearance of the foreign fleet. This incident heralds that Joseon is being drawn into the turbulent waves of international relations."
 eafp_kor_mainline.43.oa: "The waves of the times are approaching."

 eafp_kor_mainline.44.mt: "Death of Heonjong"
 eafp_kor_mainline.44.md: "Heonjong passes away at a young age without leaving an heir."
 eafp_kor_mainline.44.mf: "Heonjong, who suffered from poor health throughout his life, eventually passes away without producing an heir.\n\n\"The King has passed away without an heir. What should we do about the future of the state?\" The court falls into deep concern over the issue of royal succession. The Sedo families begin maneuvering behind the scenes to install a King who serves their interests."
 eafp_kor_mainline.44.oa: "The royal lineage is severed..."

 eafp_kor_mainline.45.mt: "Cheoljong's Accession"
 eafp_kor_mainline.45.md: "Cheoljong, known as the 'Woodcutter of Ganghwa Island', ascends to the throne."
 eafp_kor_mainline.45.mf: "Following Heonjong's death, Cheoljong, a distant relative of the royal family who lived as a commoner on Ganghwa Island, is dramatically installed as King.\n\n\"From a woodcutter to a King overnight... Is this the will of heaven?\" Cheoljong ascends to the throne abruptly without receiving proper royal education, and Queen Sunwon begins her second regency. The Sedo families' arbitrary rule reaches its peak during Cheoljong's reign."
 eafp_kor_mainline.45.oa: "A puppet King has emerged."

 eafp_kor_mainline.46.mt: "Im-sul Peasant Uprising"
 eafp_kor_mainline.46.md: "Peasant uprisings break out simultaneously across the country."
 eafp_kor_mainline.46.mf: "The peasants, unable to endure the severe exploitation of the 'Three Administrations' by the Sedo families and corrupt officials, rise up simultaneously across the country.\n\n\"We can no longer live like this! Let's overthrow the corrupt officials!\" The angry peasants attack government offices and punish corrupt officials. The Im-sul Peasant Uprising vividly demonstrates the total failure of the Sedo politics and severely shakes the foundation of Joseon."
 eafp_kor_mainline.46.oa: "The anger of the people has exploded!"

 eafp_kor_mainline.47.mt: "Donghak Founded"
 eafp_kor_mainline.47.md: "Choe Je-u founds Donghak."
 eafp_kor_mainline.47.mf: "Amidst social chaos and the spread of Western Learning, Choe Je-u founds 'Donghak', advocating 'In Nae Cheon' (Man is Heaven).\n\n\"The mind of heaven is the mind of man. All people are equal.\" Donghak's teachings, emphasizing equality and nationalism, rapidly gain sympathy among the oppressed peasants. Donghak later grows into a massive social movement, bringing a huge storm to Joseon."
 eafp_kor_mainline.47.oa: "A new ideology has emerged."

 eafp_kor_mainline.48.mt: "Death of Cheoljong"
 eafp_kor_mainline.48.md: "Cheoljong passes away without an heir."
 eafp_kor_mainline.48.mf: "Cheoljong, who lived a miserable life as a puppet King, passes away without leaving an heir.\n\n\"The King has passed away again without an heir. We must urgently find the next King.\" The court is once again engulfed in the whirlwind of royal succession. In the process, the influence of Heungseon Daewongun, Yi Ha-eung, begins to emerge."
 eafp_kor_mainline.48.oa: "Who will be the next King?"

 eafp_kor_mainline.49.mt: "Ascension of Gojong"
 eafp_kor_mainline.49.md: "Young Gojong ascends to the throne, and Heungseon Daewongun seizes power."
 eafp_kor_mainline.49.mf: "Following Cheoljong's death, the young Gojong ascends to the throne, and his father, Heungseon Daewongun, seizes the real power.\n\n\"I will eradicate the Sedo families and restore royal authority!\" Heungseon Daewongun wields a powerful sword of reform, destroying the power of the Sedo families and pushing for various reform policies to strengthen royal authority. A new turning point has arrived in Joseon."
 eafp_kor_mainline.49.oa: "The era of Daewongun has begun."

 eafp_kor_mainline.50.mt: "Daewongun's Reform"
 eafp_kor_mainline.50.md: "Heungseon Daewongun pushes for powerful reforms."
 eafp_kor_mainline.50.mf: "Heungseon Daewongun implements powerful reform policies such as abolishing Seowon (Confucian academies), implementing the Hopo-je (household cloth tax), and reconstructing Gyeongbokgung Palace, to strengthen royal authority and stabilize national finances.\n\n\"I will thoroughly eradicate the abuses that have plagued the country!\" His reforms are initially welcomed by the people, but the forced reconstruction of Gyeongbokgung Palace and the issuance of Dangojeon (high-denomination coins) gradually invite the people's resentment."
 eafp_kor_mainline.50.oa: "An inevitable pain for reform."
 eafp_kor_mainline.50.ob: "His methods are too drastic..."

 eafp_kor_mainline.51.mt: "Isolationist Policy"
 eafp_kor_mainline.51.md: "Heungseon Daewongun enforces a strict isolationist policy."
 eafp_kor_mainline.51.mf: "In response to the Western powers' demands for opening ports, Heungseon Daewongun firmly refuses and enforces a strict isolationist policy.\n\n\"We will not yield a single inch of our land to the Western barbarians!\" He erects 'Chuckhwa-bi' (anti-appeasement steles) nationwide, demonstrating his strong will to defend the country. However, this policy ultimately results in Joseon falling behind the changing international situation."
 eafp_kor_mainline.51.oa: "We must protect Joseon's independence!"
 eafp_kor_mainline.51.ob: "Shouldn't we open up to the world?"

 eafp_kor_mainline.52.mt: "French Expedition to Korea"
 eafp_kor_mainline.52.md: "The French fleet attacks Ganghwa Island."
 eafp_kor_mainline.52.mf: "Using the Byeong-in Persecution as a pretext, a French fleet attacks Ganghwa Island.\n\n\"The Western barbarians have invaded! We must fight to the death!\" The Joseon army, although inferior in weapons, fights bravely against the French army and eventually forces them to retreat. However, during this process, the Oegyujanggak (royal library annex) is plundered, causing a great loss to the nation."
 eafp_kor_mainline.52.oa: "We successfully defended against the foreign invasion!"

 eafp_kor_mainline.53.mt: "Oppert's Grave Robbing Incident"
 eafp_kor_mainline.53.md: "A German merchant, Oppert, attempts to rob the grave of Namyeongun."
 eafp_kor_mainline.53.mf: "A German merchant, Oppert, attempts to rob the grave of Namyeongun, Heungseon Daewongun's father, to force the opening of ports, but fails.\n\n\"How dare they commit such a heinous act!\" This incident deeply enrages Heungseon Daewongun and the people of Joseon, further solidifying the isolationist policy."
 eafp_kor_mainline.53.oa: "An unforgivable atrocity!"

 eafp_kor_mainline.54.mt: "United States Expedition to Korea"
 eafp_kor_mainline.54.md: "The U.S. fleet attacks Ganghwa Island."
 eafp_kor_mainline.54.mf: "Using the General Sherman incident as a pretext, a U.S. fleet attacks Ganghwa Island.\n\n\"We will not surrender until the end!\" The Joseon army, led by General Eo Jae-yeon, fights valiantly at Gwangseongbo, but ultimately suffers a crushing defeat. However, the U.S. army, realizing that they cannot force the opening of ports through military power alone, eventually withdraws."
 eafp_kor_mainline.54.oa: "We shed noble blood..."

 eafp_kor_mainline.55.mt: "Fall of Daewongun"
 eafp_kor_mainline.55.md: "Gojong assumes direct rule, and Heungseon Daewongun steps down from power."
 eafp_kor_mainline.55.mf: "As Gojong reaches adulthood and assumes direct rule, Heungseon Daewongun is forced to step down from power under pressure from Queen Min and the reformist faction.\n\n\"Now, I will govern the country myself.\" With Gojong's direct rule, Joseon shifts its course from the isolationist policy towards opening its doors, greeting a new era."
 eafp_kor_mainline.55.oa: "The era of Daewongun is over."

 eafp_kor_mainline.56.mt: "Treaty of Ganghwa Island"
 kor_king_biography_6: "The King's sagely virtue and utmost goodness cannot be captured even one ten-thousandth by mere words, but if the way of heaven and earth can be summarized in one phrase, it would be as Zisi said: 'Only the utmost sincerity of the world can be profoundly intelligent and sagely to rule from above, broad-minded and gentle to tolerate the multitudes, vigorous and resolute to make decisions, solemn and upright to command respect, and meticulous in literary and reasoned observation to discern.' If these five qualities are used to express the King's pure virtue, they might barely capture its essence.\n\nAlas! Today, heaven has collapsed and the earth has cracked; what are the people to do? That a sage like Yao and Shun could not make these people like the people of Yao and Shun, is this also a matter of fate? Thinking back, the King's constant anxiety day and night for the sake of the ancestral shrine and the people moved heaven above, so that a sage ascended to the throne, continued the great mandate, and our nation's great enterprise of thousands of years became as peaceful as Mount Tai and a solid rock again; indeed, the King's sincerity opened the way for this. Alas! How magnificent!"

 kor_king_biography_7: "The 'Rites of Zhou' states, 'The punishments of a peaceful country apply laws that fit the golden mean,' and the King was truly like this. His profound and generous benevolence spread widely across the eight provinces, and his magnificent principles and articles will be passed down for eternity. This is all rooted in what the 'Book of Changes' calls, 'Possessing much is called the great enterprise, and renewing daily is called the sagely virtue.'\n\nThe 'Doctrine of the Mean' says, 'Great virtue will surely attain its position, surely attain its reward, surely attain longevity, and surely attain fame.' Looking at it through our King's virtue, some have been proven and some have not, so I dare not say whether heaven is absolutely predictable or absolutely unpredictable. Oh, heaven! How resentful!\n\nEven so, when the superior man acts, he becomes the way of the world; when he moves, he becomes the law of the world; when he speaks, he becomes the standard of the world. Thus, he is revered and honored by future kings, and rejoiced in and benefited by future people, making him unforgettable until death. This is indeed the King's magnificent achievements and virtuous transformation rooted in himself and proven to the common people. Ah! How beautiful!"

 kor_king_biography_8: "How can I bear to speak of the numerous people, lacking good fortune, mourning while caressing their bows and swords at their rural homes? Even the blue sky has become unreliable, and presenting jade bi at the vermilion steps is of no avail. He passed by like a wisp of cloud in the great void, so how can we comfort our lifelong yearning? Even the people living in remote coastal and mountainous areas are all grieving as if they had lost their parents.\n\nThe vermilion steps will be forever empty, and we mourn the fading of his voice and appearance. As the procession of the great bier is about to depart, we lament that time does not stand still. The morning clouds sincerely harmonize on the new mountain ridge, indeed the place to be the sage's resting place, and the auspicious snow is near the royal tomb; the divine path will rely on this here."

 kor_king_biography_9: "The King inherited the peaceful national destiny established by the benevolent virtues of previous generations and achieved a magnificent reign for his era. His brilliant and shining governance deeply saturated the multitude of people, and his great and gracious benefits covered the eight domains. His utmost goodness and sagely virtue are beyond what the people can express, and his great and beautiful norms cannot be fully recorded even in historical books.\n\nThe 'Book of Changes' says, 'What heaven helps is the one who follows the natural order; what people help is the one who has faith.' This is the reason why the King received the great mandate and welcomed great blessings."

 kor_king_biography_10: "As the auspicious day arrives and the carved bier is about to be drawn, the biting frost coldly coagulates on the white ropes of the bier, and the sorrowful whirlwind bleakly mixes with the mournful dirge. The rainbow banners flutter, stretching long, and the divine path is solemn, deep, and distant. The deep night is long and unending; how can we endure this eternal parting? Alas! How sorrowful.\n\nThat lush Eastern Tomb is vibrant with beautiful energy. Following the ancestral tomb, it connects the mountain ridges, and matching the utmost place, it shares the hill. The incense and fire will be received together in the sleeping hall, and the robes and crowns will be attended closely among the pines and catalpas. The stone figures guard the dark burial garments, and the Qing Wu Jing matches the pearl mound. Feeling that the dark and the light are one principle, he will rest here for thousands of autumns. Alas! How sorrowful.\n\nThat long and short are not the same is something the Master of Transformation cannot know, and the great destiny never stopping flows away day by day like water. What has an end but can remain forever? Only virtuous words will not cease. Though the departing divine carriage cannot be held back, the beautiful descendants will continue the achievements. Relying on the jade tablet to fully record them, they will not diminish even if the universe ends. Alas! How sorrowful."

 eafp_kor_mainline.100.mt1: "Ascension"
 eafp_kor_mainline.100.mt2: "Demise"
 eafp_kor_mainline.100.md11: "The King ascended to heaven at Junghuidang in Changdeokgung Palace."
 eafp_kor_mainline.100.md12: "The King ascended to heaven at Daejojeon in Changdeokgung Palace."
 eafp_kor_mainline.100.md13: "The King ascended to heaven at Gangnyeongjeon in Gyeongbokgung Palace."
 eafp_kor_mainline.100.md21: "The King passed away at Junghuidang in Changdeokgung Palace."
 eafp_kor_mainline.100.md22: "The King passed away at Daejojeon in Changdeokgung Palace."
 eafp_kor_mainline.100.md23: "The King passed away at Gangnyeongjeon in Gyeongbokgung Palace."
 eafp_kor_mainline.100.mf: ""

 eafp_kor_mainline.100.o1: "Hearing widely and being full of talent is called 'Heon (憲)',\nwe respectfully offer the temple name #V Heonjong#!."
 eafp_kor_mainline.100.o2: "Greatly clarifying the laws is called 'Jang (章)',\nwe respectfully offer the temple name #V Jangjong#!."
 eafp_kor_mainline.100.o3: "Conciliating the distant and submitting the near is called 'Hwa (和)',\nwe respectfully offer the temple name #V Hwajong#!."

 eafp_kor_mainline.100.o4: "Being wise, clear-sighted, and deeply intelligent is called 'Cheol (哲)',\nwe respectfully offer the temple name #V Cheoljong#!."
 eafp_kor_mainline.100.o5: "Sagely and good being widely known is called 'Seon (宣)',\nwe respectfully offer the temple name #V Seonjong#!."

 eafp_kor_mainline.100.o6: "Establishing the foundation and setting the standard is called 'Go (高)',\nwe respectfully offer the temple name #V Gojong#!."
 eafp_kor_mainline.100.o7: "The people being unable to describe in words is called 'Sin (神)',\nwe respectfully offer the temple name #V Sinjong#!."
 eafp_kor_mainline.100.o8: "Being cautious and vigilant from early morning till late night is called 'Gyeong (敬)',\nwe respectfully offer the temple name #V Gyeongjong#!."

 eafp_kor_mainline.100.o9: "Causing the people to be peaceful and joyful is called 'Gang (康)',\nwe respectfully offer the temple name #V Gangjong#!."
 eafp_kor_mainline.100.o10: "Revering virtue and radiating brilliance is called 'Hui (熙)',\nwe respectfully offer the temple name #V Huijong#!."
 eafp_kor_mainline.100.o11: "Being able to inherit the great achievements of predecessors is called 'Gwang (光)',\nwe respectfully offer the temple name #V Gwangjong#!."
 eafp_kor_mainline.100.o12: "Practicing righteousness and being followed by the people is called 'Won (元)',\nwe respectfully offer the temple name #V Wonjong#!."
 eafp_kor_mainline.100.o13: "Pioneering the territory and subjugating the distant is called 'Hwan (桓)',\nwe respectfully offer the temple name #V Hwanjong#!."
 eafp_kor_mainline.100.o14: "Having a gentle foundation and loving the people is called 'Hye (惠)',\nwe respectfully offer the temple name #V Hyejong#!."

 eafp_kor_mainline.100.o99: ""

 eafp_kor_mainline.101.mt: "The Bachelor of Ganghwa"
 eafp_kor_mainline.101.md: "The procession that left for Ganghwa Island returns to Hanyang."
 eafp_kor_mainline.101.mf: "Since that day, everything has changed.\n\nEven when numerous ministers flocked to the island to escort me, I thought it was my last day because of the traitorous bloodline of my family.\n\nBut I am no longer in the lineage of my grandfather, Prince Euneon, and have been adopted as the son of the late King. My name has also been newly changed to a single character, from #V Won-beom#! to #V Byeon#!.\n\nAnd now, overnight, I have ascended to the throne, bearing the immensely heavy burden of attending to state affairs and carrying on the royal lineage.\n\nBut even though I read two volumes of Tonggam and two volumes of Sohak early on..."
 eafp_kor_mainline.101.oa: "...I haven't read a single thing in recent years..."

 eafp_kor_mainline.102.mt: "Entering the Palace"
 eafp_kor_mainline.102.md: "The King proceeded to the Binjeon, received the Great Seal, and performed the coronation ceremony."
 eafp_kor_mainline.102.mf: "Entering the palace, my heavy shoulders feel even more crushed. Numerous subjects are bowing to me, but their eyes only feel terrifying. Father said, 'Now you must bear the destiny of Joseon,' but can I even know how heavy that burden is?\n\nMy hand holding the jade book trembled. Far away, I can see the Queen Dowager."
 eafp_kor_mainline.102.oa: "My body shivers at the cold energy of the palace..."

 eafp_kor_mainline.105.mt: "The Lifted Curtain"
 eafp_kor_mainline.105.md: "The Queen Dowager issues a decree to end the [concept_eafp_korean_regent]."
 eafp_kor_mainline.105.mf: "The Queen Dowager summoned the current and former ministers and issued a decree,\n\n\"Ending the regency behind the bamboo screen today was my intended decision when I reluctantly accepted the request initially. Waiting until today felt like a year for every day. His Majesty is in his prime, his sagely learning has matured enough to handle the myriad affairs of state, and my initial intention can be fulfilled. What could be more joyous than this?\"\n\nThen [SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName] said...\n\n\"His Majesty is in his prime and his sagely virtue is advancing, so he must now personally oversee all state affairs. Your compassionate decree has reached this point. Your reluctant acceptance of the multitude's request then was solely a great plan for the ancestral shrine, and your compassionate decree greatly extended to the multitude today is the eternal law of heaven and earth. We reverently praise it, collectively celebrate it, and have no other words to add.\"\n\nThe Panbusa and Uuijeong took turns expressing their reverent praise."
 eafp_kor_mainline.105.oa: "\"The curtain is lifted as of today.\""

 eafp_kor_mainline.106.mt: "The Lifted Curtain"
 eafp_kor_mainline.106.md: "The Queen Dowager ends the [concept_eafp_korean_regent]."
 eafp_kor_mainline.106.mf: "\"Since I ought to cease the regency behind the bamboo screen from today, I must issue an instruction. Who else in the world has faced circumstances like mine? I merely suppressed my feelings and endured sorrow as a plan for the ancestral shrine. His Majesty is now already in his prime and can oversee all government affairs. What could be more joyous and fortunate than this? His Majesty's personal oversight is a great joy for the nation; how could my joy have an end? I end my regency and instruction today, so all the ministers must properly assist our King.\"\n\n\"Did I wait for today in vain? You must not decline, but only think of the people and the country, be careful and cautious, and do well. Not only will my heart rejoice, but the spirits of the ancestors in heaven will also surely rejoice. Considering that your age is now mature and cannot be compared to before, what affairs can you not personally oversee? This is what I have thought deeply about, so you must govern well. Consider this, Your Majesty. These people are all looking up to the Great Hall; the country relies on the people, and the people rely on the country. If you always think of their suffering from severe cold, heat, or rain, how could you ever forget it? Keep this in mind, love them well, and care for them.\""
 eafp_kor_mainline.106.oa: "\"The curtain is lifted as of today.\""

 eafp_kor_mainline.107.mt: "The Lifted Curtain"
 eafp_kor_mainline.107.md: "The Queen Dowager ceases the [concept_eafp_korean_regent]."
 eafp_kor_mainline.107.mf: "\"Since ancient times, it has been a great misfortune for the nation when a queen directly handles the affairs of the court. Moreover, how could someone like me, lacking virtue and shallow in knowledge, dare to resemble the wise queens of the past? However, when the King passed away, causing great sorrow, the ministers cited the precedents of several successive reigns and tearfully implored me, and I too reluctantly agreed for the sake of the grand design of the royal shrine and the state altar.\"\n\n\"In recent times, the state's affairs have become more tangled, and the difficult and precarious lives of the people worsen day by day. Yet, the inability to rectify this is because I am unjustly occupying a position I should not be in. Above, I fail to align with the will of Heaven; below, I fail to inspire and encourage the moral principles of the world, gradually leading to this situation.\"\n\n\"Speaking of the present, the King is already in his prime, endowed with excellent qualities. His bright wisdom matures daily, he has become well-versed in important public affairs, and his studies are earnest. He is fully capable of overseeing all government affairs and directly handling complex matters. He can eternally carry on the royal legacy and will have a dignified tale to tell future generations.\""
 eafp_kor_mainline.107.oa: "\"From today, end the regency from behind the bamboo screen and let the King oversee all public affairs, large and small.\""

