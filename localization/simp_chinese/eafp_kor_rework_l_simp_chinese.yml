 concept_eafp_sedo_family: "势道家族"
 concept_eafp_sedo_family_desc: "势道家族是[concept_ruler]的外戚家族，受[concept_ruler]委托掌握政权并治理国家。‘世道’原意是治理世界的正道，但在此时期变质为‘势道’，意指以权力进行政治。"

 concept_eafp_sedo_politics_balance: "权力平衡"
 concept_eafp_sedo_politics_balance_desc: "权力平衡是衡量[Concept('concept_ruler', GetPlayer.GetRuler.GetPrimaryRoleTitle)]与#color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!之间权力平衡的指标。它分为五个主要等级，表示权力流失的程度，每升一级，#color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!可以采取的谋私行为将被解锁。"

