 concessions_in_china.1002.d1: "由于先前的条约，[SCOPE.sCountry('concession_owner_country').GetName]的租界地已在[ROOT.GetCountry.GetName]内建立。"
 concessions_in_china.1002.d2: "由于先前的条约，[SCOPE.GetValue('concession_gain_country_num')]个租界地已在[ROOT.GetCountry.GetName]内建立。"
 concessions_in_china.1002.f1: "... #bold 第17条 #!\n[SCOPE.sCountry('concession_owner_country').GetNameNoFormatting]国民，凡在各口岸，不拘何地居住、贸易者，均可租赁房屋、栈房，或租地自行建造房屋、礼拜堂、医院、坟墓。两国地方官应会同勘查，议定地段，俾租地之人，依议公平办理..."
 concessions_in_china.1002.f2: "... #bold 第17条 #!\n凡在各口岸，不拘何地居住、贸易者，均可租赁房屋、栈房，或租地自行建造房屋、礼拜堂、医院、坟墓。两国地方官应会同勘查，议定地段，俾租地之人，依议公平办理..."
 concessions_in_china.1002.a: "真是太可耻了。"
 concessions_in_china.1002.b: "一块毫无价值的土地。"

 concessions_in_china.1003.t: "失去租界地"
 concessions_in_china.1003.d1: "由于先前的条约，我们失去了在[SCOPE.sCountry('concession_target_country').GetName]的租界地。"
 concessions_in_china.1003.d2: "由于过去的条约，我们失去了[SCOPE.GetValue('concession_loss_country_num')]个租界。"
 concessions_in_china.1003.f1: "自从我们打开了[SCOPE.sCountry('concession_target_country').GetNameNoFormatting]的门户以来，寸草不生的不毛之地，在中国这个巨大的市场中，在敢于挑战的我们的资本和人力的推动下，已经转变为中国土地上最繁荣的宝石。尽管受到了反动和野蛮的中国人的抵抗和攻击，我们还是给这片土地带来了光明，并与他们分享。就这样，它成为了[SCOPE.sCountry('concession_owner_country').GetNameNoFormatting]的骄傲和历史。\n\n但现在已经不是了。超越了单纯的贸易据点，成为了一个工厂和市场的那个地方，开始被不知天高地厚的中国人觊觎。我们明明知道这一点，却重蹈覆辙，付出了惨痛的代价。[SCOPE.sCountry('concession_owner_country').GetNameNoFormatting]政府不知所措，[SCOPE.sCountry('concession_target_country').GetNameNoFormatting]迅速建立了有利的地位。今天，我们的特使签署了归还协定，我们[SCOPE.sCountry('concession_owner_country').GetNameNoFormatting]的对亚洲政策上，被刻上了屈辱的历史。"
 concessions_in_china.1003.f2: "自从我们打开了中国的门户以来，寸草不生的不毛之地，在中国这个巨大的市场中，在敢于挑战的我们的资本和人力的推动下，已经转变为中国土地上最繁荣的宝石。尽管受到了反动和野蛮的中国人的抵抗和攻击，我们还是给这片土地带来了光明，并与他们分享。就这样，它成为了[SCOPE.sCountry('concession_owner_country').GetNameNoFormatting]的骄傲和历史。\n\n但现在已经不是了。超越了单纯的贸易据点，成为了一个工厂和市场的那个地方，开始被不知天高地厚的中国人觊觎。我们明明知道这一点，却重蹈覆辙，付出了惨痛的代价。[SCOPE.sCountry('concession_owner_country').GetNameNoFormatting]政府不知所措，中国迅速建立了有利的地位。今天，我们的特使签署了归还协定，我们[SCOPE.sCountry('concession_owner_country').GetNameNoFormatting]的对亚洲政策上，被刻上了屈辱的历史。"
 concessions_in_china.1003.a: "政府到底在做什么？"

 concessions_in_china.1004.t: "收复租界地"
 concessions_in_china.1004.d: "由于过去的条约，我们收复了[SCOPE.sState('concession_target_state').GetName]内的租界地。"
 concessions_in_china.1004.f: "那里在一段时间内是[SCOPE.sCountry('concession_target_country').GetNameNoFormatting]的疆域，但同时又不是[SCOPE.sCountry('concession_target_country').GetNameNoFormatting]的土地。那片土地上的一切都属于我们，但又不属于我们，在那里生活呼吸的一切都不属于我们。[SCOPE.sCountry('concession_owner_country').GetNameNoFormatting]的官员照顾着生活在那片土地上的人们。[SCOPE.sCountry('concession_owner_country').GetNameNoFormatting]的士兵守护着那片土地。随着岁月的流逝，刻在那片土地上的历史和语言都不是我们的。灿烂飘扬的旗帜更不是我们的。软弱的过去的[SCOPE.sCountry('concession_target_country').GetNameNoFormatting]除了沉默别无选择。\n\n但现在已经不是了。来自中国内外全方位的压力迫使[SCOPE.sCountry('concession_owner_country').GetNameNoFormatting]屈服。他们提出的所谓“谈判”反而加强了[SCOPE.sCountry('concession_target_country').GetNameNoFormatting]归还的正当理由。终于，今天，[SCOPE.sCountry('concession_owner_country').GetNameNoFormatting]的特使签署了归还协定，[SCOPE.sState('concession_target_state').GetName]的租界重新回到了民族的怀抱。"
 concessions_in_china.1004.a: "[SCOPE.sCountry('concession_target_country').GetName]外交史上值得纪念的胜利。"

 concessions_in_china.1005.t: "租界地待遇问题"
 concessions_in_china.1005.d1: "我们获得的[SCOPE.sState('concession_state').GetName]受到了租界地的影响。"
 concessions_in_china.1005.d2: "我们获得的几个州受到了租界地的影响。"
 concessions_in_china.1005.d3: "完全占领了之前设置租界的州，租界地失效。"
 concessions_in_china.1005.f1: "“在我们的土地上行使我们的主权是理所当然的，不是吗？为了防止他们再次像以前那样肆意妄为，彻底控制和监督才是应该做的事情。”\n\n“总有一天要把所有的外来势力都赶出去，但现在还不是时候。如果我们现在就去收回那片土地，那些蛮夷会善罢甘休吗？”"
 concessions_in_china.1005.f2: "“为了得到这片土地，流了多少血，难道要眼睁睁地看着其他国家偷走这份代价吗？绝对不能容忍！”\n\n“来自中国的利益肯定会助长[ROOT.GetCountry.GetNameNoFormatting]的成长和影响力。但越是这种时候越要谨慎。在获得中国本土的时候，就已经吸引了其他国家的目光，没有必要故意激怒他们。”"
 concessions_in_china.1005.f3: ""
 concessions_in_china.1005.a: "全部废除。"
 concessions_in_china.1005.tta1: "对于在该州拥有[concept_concession]的所有国家，每没收一个租界地，[concept_relations]就会恶化-25"
 concessions_in_china.1005.tta2: "每没收一个租界地，[concept_infamy]就会增加#variable 5#!。总恶名增加量如下："
 concessions_in_china.1005.b: "就随它去吧。"
 concessions_in_china.1005.c: "明白了。"

 concessions_in_china.1006.t: "租界待遇问题"
 concessions_in_china.1006.d: "由于革命的胜利，我们得以获得之前由其他国家管理的租界。"
 concessions_in_china.1006.a: "明白了。"

 # 아편전쟁

 opium_wars.102.t: "鸦片战争"
 opium_wars.102.d: "越来越多的人对政府犹豫不决，不敢对[SCOPE.sCountry('opium_wars_target_country').GetName]采取行动，理由是之前的和平协议。"
 opium_wars.102.f: "\"有些人谴责所谓的鸦片贸易的“道德罪恶”。我想反问一句，你们凭什么阻止自由贸易和消费者的选择自由？因为存在需求，所以我们才提供。即使不是我们，其他国家也会通过敲诈[SCOPE.sCulture('opium_addicted_culture').GetNameNoFormatting]的鸦片成瘾者来积累财富。仅仅因为一些不负责任的笨蛋滥用鸦片，就剥夺所有人使用鸦片的权利，这难道是正确的吗？剥夺鸦片给我们国家带来的财富，剥夺[ROOT.GetCountry.GetAdjectiveNoFormatting]所有家庭的财富，这难道是正确的吗？\""
 opium_wars.102.a: "一张纸在堆积如山的财富面前有什么用？"
 opium_wars.102.b: "这似乎是一种非常卑鄙的行为。"

 opium_wars.103.t: "[SCOPE.sCountry('opium_wars_target_country').GetName]撕毁协议"
 opium_wars.103.d: "[SCOPE.sCountry('opium_wars_target_country').GetName]以荒谬的理由撕毁了之前的和平协议。"
 opium_wars.103.f: "鸦片之害，甚于洪水猛兽，榨取百姓膏血，致使国家病弱，实乃天下之大患。"
 opium_wars.103.a: "他们竟然说出这种荒唐的话？"

 # 中国传教士事件添加

 je_chinese_missions_complete_tt: "在过去的#Bold 12#!个月里，满足以下条件:"
 not_lost_war_tt: "这个[concept_country]最近没有在[concept_war]中失败#b!"

 CHI_missionaries.11.t: "外国传教士被杀"
 # Foreign Missionaries Murdered
 CHI_missionaries.11.d: "[SCOPE.sState('missionary_strife_state').GetCityHubName]的当地居民对[SCOPE.sCountry('missionary_country').GetAdjectiveNoFormatting]的[SCOPE.sCountry('missionary_country').GetStateReligion.GetName]传教士出现在他们的城市里感到愤怒，并杀害了他们。"
 # A group of [SCOPE.sCountry('missionary_country').GetAdjectiveNoFormatting] [SCOPE.sCountry('missionary_country').GetStateReligion.GetName] missionaries were killed in [SCOPE.sState('missionary_strife_state').GetCityHubName] by locals who resented their presence in the city.
 CHI_missionaries.11.f: "那天，[SCOPE.sState('missionary_strife_state').GetCityHubName]的街道被鲜血染红。愤怒的人群残忍地袭击手无寸铁的传教士，尖叫声和枪声在整个城市回荡。暴力事件立即升级，传教士被杀害。地方官员无法控制骚乱，情况很快引起了中央政府的注意。"
 # That day, the streets of [SCOPE.sState('missionary_strife_state').GetCityHubName] were splattered with blood. As furious crowds savagely attacked the defenseless missionaries, screams and gunfire resonated across the city. The violence immediately escalated, and the missionaries were killed. Local officials were unable to control the turmoil, and the situation quickly reached the attention of the central government.
 CHI_missionaries.11.a: "立即逮捕这场暴乱的煽动者。"
 CHImis11a: "找出罪魁祸首"
 CHI_missionaries.11.b: "……并解雇未能阻止这场灾难的官员。"
 CHImis11b: "行政真空"
 CHI_missionaries.11.c: "……并向[SCOPE.sCountry('missionary_country').GetName]支付赔偿金。"
 CHImis11c: "低头认错"
 CHImis11c2: ""
 CHImis11c2_recipient: ""
 CHI_missionaries.11.e: "好像什么都没发生过一样。"
 CHImis11d: "昂首挺胸"

 CHI_missionaries.12.t: "传教士的悲惨死亡"
 # Tragic Loss of a Missionary
 CHI_missionaries.12.d: "我们的传教士一生致力于在中国传播福音和帮助当地人民，却遭到残忍杀害。这种冷酷的暴力行为震惊并悲伤了我们所有人。\n\n"
 # Our missionary in China was brutally murdered after dedicating their life to sharing the Gospel and assisting the local people. This callous act of violence has shocked and saddened us all.
 CHI_missionaries.12.d1: "为了回应这一事件，[SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting]当局立即逮捕了暴乱头目。我们必须谴责这种可怕的行为，并要求将责任人绳之以法。"
 # In response to this occurrence, the [SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting] authorities promptly apprehended the riot leaders. We must denounce this horrible act and demand that those responsible face justice.
 CHI_missionaries.12.d2: "为了回应这一事件，[SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting]当局逮捕了暴乱头目，并解雇了未能阻止暴乱的当地官员。我们必须谴责这种可怕的行为，并要求将责任人绳之以法。"
 # In response to this occurrence, the [SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting] authorities arrested the riot leaders and fired local officials who failed to halt it. We must denounce this horrible act and demand that those responsible face justice.
 CHI_missionaries.12.d3: "为了回应这一事件，[SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting]当局逮捕了暴乱头目，并解雇了未能阻止暴乱的当地官员。他们还提出赔偿。"
 # In response to this occurrence, the [SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting] authorities arrested the riot leaders and fired local officials who failed to halt it. They also offered to compensate us.
 CHI_missionaries.12.d4: "尽管发生了这场悲剧，[SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting]当局却无所作为。我们必须谴责这种可怕的行为，并要求将责任人绳之以法。"
 # Despite this tragedy, the [SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting] authorities did nothing. We must denounce this horrible act and demand that those responsible face justice.
 CHI_missionaries.12.f: "“他们的去世消息让我们所有人都感到震惊。我们记得他们是善良无私的人，总是乐于帮助任何需要帮助的人。他们一生致力于传播上帝的福音，并在[SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting]人民的生活中做出积极的改变。他们的生命以如此残酷和暴力的方式被缩短，真是太可怕了。我们向他们的家人、朋友以及所有在[SCOPE.sCountry('chi_scope').GetName]受到他们生活影响的人表示哀悼。让我们为他们的安息和正义的实现祈祷。”"
 # The news of their passing has devastated us all. We remember them as nice and altruistic individuals who were always willing to assist anyone in need. They had dedicated their lives to preaching God's word and making a good difference in the lives of the [SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting] people. It's terrible that their lives were cut short in such a harsh and violent way. Our hearts go out to their family, friends, and everyone whose lives they impacted in [SCOPE.sCountry('chi_scope').GetName]. Pray for their repose and the administration of justice.
 CHI_missionaries.12.a: "真是太可怕了！"
 CHI_missionaries.13.t: "教堂纵火和抢劫"
 # Church Burning and Lootings
 CHI_missionaries.13.d: "一群暴徒将[SCOPE.sCountry('missionary_country').GetAdjectiveNoFormatting]教堂夷为平地，并抢劫了建筑物和周围地区。袭击期间，几名传教士及其家人受伤或死亡，另一些人设法逃脱。"
 # A group of mobs burned [SCOPE.sCountry('missionary_country').GetAdjectiveNoFormatting] church to the ground and looted the building and surrounding areas. During the attack, several missionaries and their families were injured or killed, while others managed to escape.
 CHI_missionaries.13.f: "燃烧的教堂的火焰照亮了夜空，刺鼻的烟味弥漫在空气中。当暴徒冲进建筑物时，玻璃破碎和木头断裂的声音在街道上回荡。多年来一直负责教堂的神父惊恐地看着他一生所从事的事业在他眼前被摧毁。他一直致力于传播上帝的福音，但现在他只能眼睁睁地看着他辛勤劳动的成果被愤怒的人群撕裂。当暴徒前往邻近的墓地抢劫纪念品时，神父只能为受害者的安全和该地区恢复和平祈祷。"
 # The flames of the burning cathedral lighted up the night sky, and the air was thick with the acrid scent of smoke. As the mob pushed its way through the building, the sound of shattered glass and splintered wood rang through the streets. The priest who had been in charge of the church for years watched in horror as his life's work was destroyed right in front of his eyes. He had dedicated himself to preaching God's word, but now he was witnessing the rewards of his labor being ripped away by an enraged mob. The priest could only pray for the safety of those impacted and the restoration of peace to the area as the mob proceeded on to the adjoining cemetery to pillage burial goods.
 CHI_missionaries.13.a: "$CHI_missionaries.11.a$"
 CHI_missionaries.13.b: "$CHI_missionaries.11.b$"
 CHI_missionaries.13.c: "$CHI_missionaries.11.c$"
 CHI_missionaries.13.e: "$CHI_missionaries.11.e$"

 CHI_missionaries.14.t: "传教士的悲惨损失"
 CHI_missionaries.14.d: "我们的传教士在中国被残忍谋杀，他们一生致力于分享福音和帮助当地人民。这种冷酷的暴力行为震惊了我们所有人。\n\n"
 CHI_missionaries.14.d1: "$CHI_missionaries.12.d1$"
 CHI_missionaries.14.d2: "$CHI_missionaries.12.d2$"
 CHI_missionaries.14.d3: "$CHI_missionaries.12.d3$"
 CHI_missionaries.14.d4: "$CHI_missionaries.12.d4$"
 CHI_missionaries.14.f: "\"他们去世的消息让我们所有人都感到悲痛。我们记得他们是善良和无私的人，总是愿意帮助任何需要帮助的人。他们一生致力于宣扬上帝的道，并在[SCOPE.sCountry('chi_scope').GetAdjectiveNoFormatting]人民的生活中做出好的改变。他们的生命以如此残酷和暴力的方式被缩短，真是太可怕了。我们向他们的家人、朋友以及所有在[SCOPE.sCountry('chi_scope').GetName]受到他们影响的人表示慰问。我们为他们的安息和正义的伸张祈祷。\""
 CHI_missionaries.14.a: "竟然发生了如此可怕的事情！"

 CHI_missionaries.15.t: "伪装入境"
 CHI_missionaries.15.d: "伪装成传教士入境的[SCOPE.sCountry('missionary_country').GetAdjective]间谍被抓获。[SCOPE.sCountry('missionary_country').GetName]抗议称无辜的传教士被拘留。"
 CHI_missionaries.15.f: "\"地图非常详细。不仅有道路和河流，还有军营的位置？他们就像在自己家里一样。\""
 CHI_missionaries.15.a: "立即处决，以儆效尤。"
 CHI_missionaries.15.b: "最好驱逐出境。"
 CHImis15b: "泄露军事机密"

 CHI_missionaries.16.t: "罪犯逃逸"
 CHI_missionaries.16.d: "一名罪犯在[SCOPE.sState('state_scope').GetName]犯下谋杀罪后，逃往[SCOPE.sCountry('treaty_port_owner').GetName]的租界。"
 CHI_missionaries.16.f: "TODO"
 CHI_missionaries.16.a: "要求[SCOPE.sCountry('treaty_port_owner').GetName]引渡罪犯。"
 CHI_missionaries.16.b: "让他们自己处理。"
 CHImis16b: "软弱的外交姿态"

 CHI_missionaries.17.t: "[SCOPE.sCountry('china_scope').GetName]的引渡要求"
 CHI_missionaries.17.d: "[SCOPE.sCountry('china_scope').GetName]的一名罪犯逃往我们的租界。[SCOPE.sCountry('china_scope').GetName]当局要求引渡罪犯。"
 CHI_missionaries.17.f: "“罪犯必须受到审判。我们恳请[ROOT.GetCountry.GetName]方面给予合作。”"
 CHI_missionaries.17.a: "将罪犯移交给[SCOPE.sCountry('china_scope').GetName]。"
 CHImis17a: "软弱的外交姿态"
 CHI_missionaries.17.b: "告知他们我们会自行处理。"

 CHI_missionaries.18.t: "[SCOPE.sCountry('treaty_port_owner').GetName]同意引渡罪犯"
 CHI_missionaries.18.d: "对于引渡罪犯的要求，[SCOPE.sCountry('treaty_port_owner').GetName]表示同意。"
 CHI_missionaries.18.f: "关于发生在[SCOPE.sState('state_scope').GetName]的谋杀案，罪犯逃往[SCOPE.sCountry('treaty_port_owner').GetName]租界一事，[SCOPE.sCountry('treaty_port_owner').GetName]已正式表态，将把罪犯移交给[ROOT.GetCountry.GetName]当局。此事或将成为[ROOT.GetCountry.GetName]与[SCOPE.sCountry('treaty_port_owner').GetName]外交关系中的积极转折点。"
 CHI_missionaries.18.a: "明白了。"

 CHI_missionaries.19.t: "拒绝引渡[SCOPE.sCountry('treaty_port_owner').GetName]的罪犯"
 CHI_missionaries.19.d: "[SCOPE.sCountry('treaty_port_owner').GetName]拒绝了引渡罪犯的要求。"
 CHI_missionaries.19.f: "“他们表现得好像这里是他们的地盘一样。我该如何忍受这种侮辱！”"
 CHI_missionaries.19.a: "真是该死的。"

 # 204 없음

 chi_flavor.205.t: "一起可怕的事件"
 chi_flavor.205.d: "一名驻扎在[SCOPE.sState('missing_state').GetName]的[SCOPE.sCountry('missionary_country').GetAdjectiveNoFormatting]军官被发现遇害。随着局势日益紧张，[SCOPE.sCountry('missionary_country').GetName]要求为他们遇害的同胞伸张正义。"
 chi_flavor.205.f: "在[SCOPE.sState('missing_state').GetName]繁华的中心地带，关于遇害军官的传言越来越响亮。“他昨天还在这里，”一位当地商人喃喃自语，眼中充满了担忧。"
