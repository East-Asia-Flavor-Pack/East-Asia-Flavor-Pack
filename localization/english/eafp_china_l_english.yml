 warlord_china_events.1.t: "Uprising"
 warlord_china_events.1.d: "There are reports of a rebellion breaking out in [SCOPE.sState('revolt_state').GetCityHubName]. It seems to be on a different level than the sporadic rebellions that occurred previously."
 warlord_china_events.1.f: "\"The success in [SCOPE.sState('revolt_state').GetCityHubName] is truly unexpected. The biggest reason for this success is likely because [SCOPE.sCharacter('governor').GetFullName] fled.\""
 warlord_china_events.1.a: "Crush the traitors!"
 warlord_china_events.2.t: "Spread of the Revolution"
 warlord_china_events.2.d: "The flames of rebellion that started in [SCOPE.sState('revolt_state').GetCityHubName] are spreading uncontrollably. The scale seems quite different from any rebellion thus far."
 warlord_china_events.2.a: "This is worrying."
 warlord_china_events.4.t: "Betrayal of the Tributaries"
 warlord_china_events.4.d: "Rebellions have broken out in most parts of the Central Plains, and a civil war continues between government forces and the revolutionary army. As a result, the tributaries that had survived by maintaining a delicate relationship with the Qing dynasty for a long time have now broken free from the influence of the Qing central government."
 warlord_china_events.4.a: "Those traitors!"
 warlord_china_events.5.t: "Intimidation"
 warlord_china_events.5.d: "[SCOPE.sCharacter('YSK_scope').GetFullName] wept before the Emperor in the palace, urging abdication."
 warlord_china_events.5.f: "\"That winter, perhaps right around this time. A biting wind blew and snow fell from the sky. Sixteen members of the imperial family were dragged out, wearing only a thin layer of clothing and trembling from the cold. The commoners were watching the spectacle. When the time came and the executioner gave the order, the executioner grabbed the sinners by the neck, dragged them to the guillotine, and pushed them down. At that moment when only the sound of falling snow could be heard, it was heard. The sound of a thud.\n\nThere is no law saying that what happened to the French Emperor I mentioned cannot happen here. Please listen closely to my advice.\""
 warlord_china_events.5.a: "There's no choice. We surrender."
 warlord_china_events.5.tta: "The Qing Dynasty falls."
 warlord_china_events.5.b: "Flee to Manchuria."
 warlord_china_events.5.ttb: "The Qing Dynasty retreats to Manchuria."
 warlord_china_events.5.c: "We cannot surrender."
 warlord_china_events.6.t: "Empty Barracks"
 warlord_china_events.6.d: "As the flames of revolution spread throughout [ROOT.GetCountry.GetName], not a single soldier can be seen in the barracks. They have fled, abandoning their weapons, armor, and even their posts. All that remains are empty barracks and the collapsed authority of [ROOT.GetCountry.GetName]."
 warlord_china_events.6.f: "\"How about we just go home using this opportunity? We'll just die a dog's death if we devote ourselves to the war.\""
 warlord_china_events.6.a: "There's no choice. We surrender."
 warlord_china_events.6.tta: "The Qing Dynasty falls."
 warlord_china_events.6.b: "Flee to Manchuria."
 warlord_china_events.6.ttb: "The Qing Dynasty retreats to Manchuria."
 warlord_china_events.6.c: "We cannot surrender."
 warlord_china_events.21.t: "Birth of the Republic"
 # The Birth of a Republic
 warlord_china_events.21.d: "The long-held dream of a republic has finally come true."
 # The once-distant dream of a republican China has become a reality.
 warlord_china_events.21.f: "Jubilant crowds have gathered in the streets of [ROOT.GetCountry.GetCapital.GetCityHubName], waving the newly adopted Five-Colored Flag. Amidst the cheers, a speaker atop a makeshift stage addresses the crowd:\n\n\"Comrades, today marks the dawn of a new era for our beloved China! The Manchu barbarians have fallen, and we now embark on a journey toward democracy and self-governance. But the road ahead is fraught with challenges; we must unite and stand strong.\""
 # Jubilant crowds have gathered in the streets of [ROOT.GetCountry.GetCapital.GetCityHubName], waving the newly adopted Five-Colored Flag of the Republic. Amidst the cheers, a passionate speaker atop a makeshift stage addresses the crowd:\n\n\"Comrades, today marks the dawn of a new era for our beloved China! The Manchu barbarians has fallen, and we now embark on a journey toward democracy and self-governance. But the road ahead is fraught with challenges; we must unite and stand strong.\"
 warlord_china_events.21.a: "Long live the Republic!"
 warlord_china_events.22.t: "Result of a Compromise"
 # The Result of a Compromise
 warlord_china_events.22.d: "In accordance with a prior agreement, [SCOPE.sCharacter('old_ruler').GetFullName] stepped down, and [SCOPE.sCharacter('new_ruler').GetFullName] has assumed the position of Provisional President."
 warlord_china_events.22.f: "\"Let the yamens of all provinces listen.\n\nThe foundation for building the Republic has been laid, and [SCOPE.sCharacter('new_ruler').GetFullName] wishes to do his utmost to foster the spirit of the republic, wash away the faults of autocracy, strictly observe the constitution, and follow the wishes of the people to make the nation safe and secure, so that the five great nationalities may rejoice together.\n\nSuch intentions must surely be achieved. When the National Assembly is convened and the first President is elected, I sincerely inform my compatriots that [SCOPE.sCharacter('new_ruler').GetFullName] will immediately resign!\""
 warlord_china_events.22.a: "It is the beginning of a new era."
 warchi22: "Result of a Compromise"
 warchi22char: "Result of a Compromise"
 warlord_china_events.23.t: "Aftermath of Compromise"
 warlord_china_events.23.d: "Various individuals across the regions have seized land and are acting like local kings."
 warlord_china_events.23.f: "\"It's every man for himself now. We can't rely on the central power, so we must defend ourselves. The mountains are high and the emperor is far away; isn't it only natural that the monkey becomes the overlord?\""
 warlord_china_events.23.a: "Order will be restored anyway."
 # Order will be restored, one way or another.
 ideology_tridemism: "Tridemism"
