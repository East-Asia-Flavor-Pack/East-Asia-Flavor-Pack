 # 中国西化之后

 je_chinese_water_system: "水利改造" # 水路改造
 je_chinese_water_system_reason: "黄河和长江流经这个庞大帝国的腹地，但它们仍然是未被驯服的自然力量和巨大的未开发资源。必须进行大规模的治理工程，以充分利用这些河流的力量发展工农业，并保护数百万百姓免受经常性的洪涝和干旱之苦。"
 je_chinese_water_system_grand_canal: "水利改造：大运河"
 je_chinese_water_system_grand_canal_reason: "数百年来，大运河一直是中国经济的生命线。然而，几十年的疏忽和管理不善使其沦为废墟，成为物流和贸易的巨大障碍。修复和现代化这条重要的内河航道，对于在中国国内高效运输货物至关重要。"
 je_chinese_water_system_yellow_river: "水利改造：黄河"
 je_chinese_water_system_yellow_river_reason: "几千年来，被称为“中国之殇”的黄河周期性的泛滥，威胁着数百万人的生命，蹂躏着这片土地。然而，利用现代技术和工业基础设施，永久治理黄河将成为可能。"
 je_chinese_water_system_yangtze_river: "水利改造：长江"
 je_chinese_water_system_yangtze_river_reason: "长江，作为中国的经济支柱，必须作为现代工业的大动脉重生。通过大规模的治水工程，我们必须使远洋船只能够通行，并沿着长江流域建立港口和工业设施，以最大化中国的物流和生产能力。"
 je_chinese_water_system_pearl_river: "水利改造：珠江"
 je_chinese_water_system_pearl_river_reason: "现在是时候稳定和开发南方经济中心珠江流域了。广州必须重建为世界级港口，包括西江和北江在内的珠江三角洲主要水道必须得到整治，以解决慢性洪水问题。"

 building_chinese_water_system: "水利设施"
 pmg_chinese_water_system: "$building_chinese_water_system$"
 pm_chinese_water_system: "$building_chinese_water_system$"

 je_chinese_water_system_advance: "推进$je_chinese_water_system$[concept_journal_entry]"
 je_chinese_water_system_goal: "完成4个$je_chinese_water_system$[Concept('concept_journal_entry', '$concept_journal_entries$')]"

 chinese_water_system.1.t: "治水大业完成"
 chinese_water_system.1.d: "随着洪水威胁的消除和水系的稳定，数十年来遭受蹂躏的河滨和泛滥平原变成了肥沃的农田。"
 chinese_water_system.1.f: "禹疏九河，瀹济漯，而注诸海 决汝汉，排淮泗，而注之江，然后中国可得而食也。" # 禹疏九河，瀹濟漯，而注諸海 決汝漢，排淮泗，而注之江，然後中國可得而食也。
 chinese_water_system.1.a: "我们成就了古代圣贤的伟业。"

 chinese_water_system.2.t: "治理黄河"
 chinese_water_system.2.d: "黄河的大规模治理工程终于圆满完成。"
 chinese_water_system.2.f: "黄河疯狂地咆哮着，水位涨到了离堤顶仅几尺的地方。然而，河水并没有偏离它指定的路线。\n\n夜去晨来，河水就像变戏法一样开始退去。堤坝坚不可摧。更令人惊讶的是，未泛滥的河水以惊人的速度流淌，自动冲刷着河床上的淤泥。\n\n在堤坝另一边的村庄里，空气中弥漫着清新的泥土气息，高粱在风中摇曳。"
 chinese_water_system.2.a: "浩浩黄河水，东流长不息。" # 浩浩黃河水 東流長不息

 chinese_water_system.3.t: "大陆的动脉"
 chinese_water_system.3.d: "长江的大规模治理工程终于结出硕果。"
 chinese_water_system.3.f: "一艘巨大的蒸汽船，密密麻麻地钉着钢铆钉，伴随着沉闷的汽笛声，停靠在汉口的码头上。从这艘巨轮的甲板下，卸下了从四川运来的成捆的丝绸和成箱的药材。紧接着，刚刚从下游工业区运来的棉织品和机器零件被装载上去。\n\n在江对岸，堆满煤炭的驳船队伍源源不断地向着上游驶去。它就像一条血管，通过新建的运河和船闸将动力输送到内陆深处。码头上的蒸汽起重机轰鸣着，吊起由火车从北方运来的粮食袋，装进船舱。"
 chinese_water_system.3.a: "不尽长江滚滚来。" # 不盡長江滾滾來

 chinese_water_system.4.t: "治理珠江"
 chinese_water_system.4.d: "珠江流域的大规模治理工程已圆满结束。"
 chinese_water_system.4.f: "在远处，曾经是一片泥泞沼泽的地方，可以看到一座新城市的轮廓。一望无际的稻田获得了稳定的供水，正在变成金黄色。在变深且水流平稳的江面上，喷吐着白烟的蒸汽船忙碌地穿梭往来，运送着货物。"
 chinese_water_system.4.a: "三杯软饱后，一枕黑甜余。" # 三杯軟飽後 一枕黑甜余

 chinese_water_system.5.t: "大运河的复兴"
 chinese_water_system.5.d: "废弃了几个世纪的大运河重建工程终于完成了。"
 chinese_water_system.5.f: "船伴随着沉闷的汽笛声从码头滑出。这不是他记忆中那条狭窄肮脏的水道。河道变宽了，两岸都用坚固的石材加固了。\n\n他们经过了古老的城市。水道沿线恢复了生机。用于疏浚工程的最新式蒸汽挖掘机现在正在码头装卸煤炭和粮食。"
 chinese_water_system.5.a: "画船箫鼓邗江闹，万艘漕粟集通州。" # 畫船簫鼓邗江鬧, 萬艘漕粟集通州
