 boxer_rebellion_events.101.t: "义和团运动蔓延"
 boxer_rebellion_events.101.d: "义和团运动已超出其发源地，蔓延至[SCOPE.sState('boxer_appeared_state').GetName]。义和团的旗帜已经随处可见，外国势力和当地盟友对日益加剧的动荡和暴力感到震惊。"
 boxer_rebellion_events.101.a: "希望什么都没发生。"

 boxer_rebellion_events.102.t: "[SCOPE.sState('boxer_state').GetName]发生针对外国人的袭击"
 boxer_rebellion_events.102.d: "义和团正在[SCOPE.sState('boxer_state').GetName]各地攻击西方势力。走私者、传教士、鸦片贩子，任何成为他们目标的人，要么被杀，要么为了保命而逃亡。"
 boxer_rebellion_events.102.f: "“神助拳，义和团，只因鬼子闹中原。劝奉教，自信天，不信神，忘祖仙。拆铁道，拔线杆，紧急毁坏火轮船。大法国，心胆寒，英美德俄尽消然。洋鬼子，尽除完，[ROOT.GetCountry.GetName]一统靖江山。”"
 boxer_rebellion_events.102.a: "假装没看见。"
 boxer_rebellion_events.102.b: "镇压他们。西方人是无害的。"

 boxer_rebellion_events.103.t: "攻击使馆区"
 boxer_rebellion_events.103.d: "义和团已经到达[ROOT.GetCountry.GetCapital.GetCityHubName]。他们一看到外国人就发动攻击。更令人震惊的是，他们包围了有数百名外国政要和商人的使馆区。如果[ROOT.GetCountry.GetName]不介入保护这些外国人，这可能被视为公开支持义和团并对列强宣战。但如果我们介入，他们可能会认为这是对他们事业的背叛并发动叛乱。"
 boxer_rebellion_events.103.f: "“弟子同心苦用功，遍地草木化成兵；愚蒙之体仙人艺，定灭洋人一扫平。”" # 弟子同心苦用功，遍地草木化成兵；愚蒙之體仙人藝，定滅洋人一掃平。
 boxer_rebellion_events.103.a: "宣布[ROOT.GetCountry.GetName]支持义和团。"
 boxer_rebellion_events.103.b: "保护使馆区。"

 boxer_rebellion_events.105.t: "义和团起义"
 boxer_rebellion_events.105.d: "对[ROOT.GetCountry.GetName]的背叛感到愤怒的义和团发动了针对政府的叛乱。"
 boxer_rebellion_events.105.f: "“吾今与同胞约曰：张九世复仇之义，作十年血战之期，磨吾刃，建吾旗，各出其九死一生之魄力，以驱除凌辱我之贼满人，压制我之贼满人，屠杀我之贼满人，好淫我之贼满人，以恢复我声明文物之祖国，以收回我天赋之权利，以挽回我有生以来之自由，以购取人人平等之幸福。”" # 吾今與同胞約曰：“張九世復仇之義，作十年血戰之期，磨吾刃，建吾旗，各出其九死一生之魄力，以驅除淩辱我之賊滿人，壓制我之賊滿人，屠殺我之賊滿人，好淫我之賊滿人，以恢復我聲明文物之祖國，以收回我天賦之權利，以挽回我有生以來之自由，以購取人人平等之幸福。”  변형
 boxer_rebellion_events.105.a: "处决叛徒！"

 boxer_rebellion_events.106.t: "义和团覆灭"
 boxer_rebellion_events.106.d: "所谓义和团的活动已经停止。"
 boxer_rebellion_events.106.f: "“这些不过是作乱的暴民，其罪当诛，必须严厉镇压。”"
 boxer_rebellion_events.106.a: "TODO"

 # 中国西化

 je_chinese_westernization: "龙之蜕变"
 je_chinese_westernization_reason: "唉，天下怎会变成这样？自乾隆末年以来，官员皆吸食鸦片成瘾，百姓被邪教蛊惑不知所措，而狡猾的洋人传播邪教、倾销鸦片、掠夺中国的白银，从东西方蜂拥而至觊觎天子的疆土。大清为何落得这般田地？康乾盛世到哪里去了？\n\n这样下去不行。前明之所以能抵御北虏南倭，全靠张居正的改革。大清的局势已经危急，如果不改变，昔日元朝的覆辙就会重演。为了生存，必须改变。"  
 je_chinese_westernization_goal: "完成5个龙之蜕变[Concept('concept_journal_entry', '$concept_journal_entries$')]"
 je_chinese_westernization_army: "龙之蜕变：陆军现代化"
 je_chinese_westernization_army_reason: "曾经引以为傲的八旗军如今已全部落后，在过去的叛乱中丑态百出。当强大的俄罗斯入侵西域时，我们的军队却沉醉在过去的荣耀中，枪尖生锈，保卫西北边疆的重任完全取决于陆军的重建。\n\n必须建立足够的学堂引进西方的军事技术，掌握足够的军事技能，然后将其应用于军队。这样才能抵御俄罗斯并稳定边疆，这就是塞防。"
 je_chinese_westernization_navy: "龙之蜕变：海军现代化"
 je_chinese_westernization_navy_reason: "昔日论述御夷之道的人，都对敌情了如指掌。现在地球九万里，没有船只到不了的地方，洋人正通过海洋入侵中国，我们怎能不师夷长技以制夷呢？\n\n制造坚固的火炮和船只组建舰队驻守东南沿海，国家就能安定，沿海百姓就能安枕无忧，洋人就不敢觊觎天子。这就是海防。"
 je_chinese_westernization_industry: "龙之蜕变：工业化"
 je_chinese_westernization_industry_reason: "今日机器的制造，是抵御洋人挑战的基础，是自强的根本。百工技艺完备，制造宫室器物，城池船舰的制度就会坚固，利用厚生都会得到充实，我们怎能不取洋人之长，化为中国之长呢？\n\n通过使用蒸汽动力的西方机器，一千名工匠的工作一天就能完成，制造纺织品、纸张和瓷器，开采铁矿制造武器，当我们变得强大时，谁敢入侵我们？这就是自强。"
 je_chinese_westernization_government_reform: "龙之蜕变：政府改革"
 je_chinese_westernization_government_reform_reason: "为什么一定要变法？变化是古今通理，《易经》说：“穷则变，变则通，通则久”。\n\n时代变了，万国日新月异地相互竞争。如果我们只死守旧法，坐着什么都不想，就会像印度一样，固守旧习不知变通，最终沦为殖民地。因此，我们必须自己变法，这就是变法。"
