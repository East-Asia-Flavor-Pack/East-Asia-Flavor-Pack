 je_dowager_cixi_reason: "Emperor Xianfeng died after the Second Opium War, leaving his young son to ascend the throne. Empress Dowager Cixi, Emperor Xianfeng's wife, rose to the title of Empress Dowager alongside Empress Dowager Ci'an. Officially, there were two Empress Dowagers, but in reality, Empress Dowager Cixi wielded absolute power. This solidified her position as the de facto ruler of the Qing Dynasty.\n\nHowever, the young Emperor could not be merely a puppet in her hands. Tensions between them escalated as he grew older and exerted his own control. While Empress Dowager Cixi was content to step down if she was comfortable with her position, she was hesitant to allow the Emperor, who posed a threat to her own power, to exert himself freely. Will she let him continue to challenge her authority, or will she find a way to maintain her hold on power?"
 # Emperor Xianfeng died after the Second Opium War, leaving his young son to ascend the throne. Empress Dowager Cixi, Emperor Xianfeng's wife, rose to the title of Empress Dowager alongside Empress Dowager Ci'an. Officially, there were two Empress Dowagers, but in reality, Empress Dowager Cixi wielded absolute power. This solidified her position as the de facto ruler of the Qing Dynasty.\n\nHowever, the young Emperor could not be merely a puppet in her hands. Tensions between them escalated as he grew older and exerted his own control. While Empress Dowager Cixi was content to move away if she was comfortable with her position, she was hesitant to allow the Emperor, who posed a threat to her own power, to exert himself freely. Will she let him continue to challenge her dominance, or will she find a way to keep her hold on power?
