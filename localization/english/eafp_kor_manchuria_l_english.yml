l_english:
 eafp_manchuria_outcome_manchurian_settlement_tt: "The final settlement event for the management of Manchuria will occur"
 
 je_eafp_manchurian_policy: "Manchurian Policy"
 je_eafp_manchurian_policy_reason: "We can no longer just watch the north across the Yalu River. We must begin preparing to claim that land in the future."
 
 je_eafp_manchurian_management: "Management of Manchuria"
 je_eafp_manchurian_management_reason: "Although our ancient territories have returned after hundreds of years, the newly drawn borders on the map are not enough to fully govern this territory. The momentous task of reforming the vast plains of Manchuria lies before us."
 
 button_je_eafp_manchuria_settlement: "Encourage Korean Migration"
 button_je_eafp_manchuria_settlement_desc: "Moves some of the Korean peasant or laborer POPs in the Korean peninsula to a state in Manchuria."
 button_je_eafp_manchuria_expand_arable_land: "Pioneer Manchuria"
 button_je_eafp_manchuria_expand_arable_land_desc: "Increases arable land in Shengjing, South Manchuria, and North Manchuria by 10 each. Possible up to 5 times."
 
 eafp_manchuria.1.t: "Proposing the Northern Policy"
 eafp_manchuria.1.d: "Korea's rights to Manchuria across the Yalu River have been officially proposed."
 eafp_manchuria.1.f: "\"I found myself sitting on a vast, wide flower of a great Rose of Sharon with branches stretching for thousands of miles, without hearing or seeing where this body came from. Why has this flower become like this today? One petal crossed the Yellow Sea and Bohai to cover the continent, and another passed through Manchuria and hung over Ussuri. Why has this flower withered so much today?\""
 eafp_manchuria.1.a: "Establish a justification for Manchuria."
 
 eafp_manchuria.2.t: "The Land of Natural Bounty"
 eafp_manchuria.2.d: "We have succeeded in incorporating all of Manchuria into our territory."
 eafp_manchuria.2.f: "\"Gando is a land of natural bounty. With its abundant fertile soil, you can farm wherever you go, and farming will bring plenty of rice. There are many forests, so there's no need to worry about wood. Let's farm, eat our fill, and live warmly. And we shall build clean thatched houses, read books, teach ignorant farmers, and build an ideal village.\""
 eafp_manchuria.2.a: "Seek a way to govern the new territory."
 
 eafp_manchuria.3.t: "New Roofs"
 eafp_manchuria.3.d: "A magnificent city is revealing itself above the bleak plains of Manchuria."
 eafp_manchuria.3.f: "\"There was still a feeling that it was under construction, but clean concrete houses were laid out among the freshly emerged light-green willows, and the oriental roofs of the large buildings seen from afar were new to the eyes. Cheol wondered if this new style of architecture was also a manifestation of the Orient's effort to break free from the influence of the West and create something of its own.\""
 eafp_manchuria.3.a: "A new order on the new land."
 
 eafp_manchurian_settlement_state: "Manchurian Settlement"
 eafp_manchurian_settlement_state_desc: "Korean villages and marketplaces are supporting the northern rule through population and livelihood."
 eafp_manchurian_integrated_state: "Integrated Manchurian Administration"
 eafp_manchurian_integrated_state_desc: "Government offices, family registers, taxes, and trials are bringing Manchuria into the administrative order of Korea."
