 principle_group_eafp_checkbong: "朝贡-册封关系"
 principle_group_eafp_checkbong_desc: "这是一个专门用于加强朝贡关系，促进所属国之间团结和共赢发展的特权。"
 principle_eafp_checkbong_1_desc: "藩国接受册封，与宗主国建立朝贡关系。这在东亚是理所当然的事情。"
 principle_eafp_checkbong_2_desc: "如果建立了足够信任的关系，可以允许更深入的朝贡贸易，以促进君臣之间的共赢。"
 principle_eafp_checkbong_3_desc: "掌握天下的地大物博之国，会贪图藩属国的蝇头小利吗？\n我们崇高的地位，正是那无形的资产，才是最好的利益。"

 principle_group_eafp_center_of_world: "世界中心"
 principle_group_eafp_center_of_world_desc: "这是一个专门为那些试图重新确立天命或扩张势力范围的天子国家设计的特权。"
 principle_eafp_center_of_world_1_desc: "天子的地位在思想上源于数千年的东亚哲学，在物质上源于对广阔中原的统治。"
 principle_eafp_center_of_world_2_desc: "这种秩序在我们的世界中被普遍认可，其成员获得合法的声望。"
 principle_eafp_center_of_world_3_desc: "因此，我们必须将其传播得更远，传播到整个已知的天下的每一个角落！"

