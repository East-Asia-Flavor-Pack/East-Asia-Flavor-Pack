 chi_manchu_vacancies.t: "Manchu Vacancies"
 chi_manchu_vacancies.d: "To maintain Manchu political dominance, all public offices are allocated by ethnicity. Initially, all major public offices in the central and local governments belonged to the Manchus, but over time, Han people have gradually begun to enter."
 chi_manchu_vacancies_1.t: "Abolish Quotas"
 chi_manchu_vacancies_1.d: "Abolishes public office quotas based on ethnicity."
 chi_manchu_vacancies_2.t: "Manchu and Han Equality"
 chi_manchu_vacancies_2.d: "Ensures that Bannermen and Han equally occupy major public offices."
 chi_manchu_vacancies_3.t: "Allow Partial Entry"
 chi_manchu_vacancies_3.d: "Allows Han people to occupy some of the major public offices."
 chi_manchu_vacancies_4.t: "Only Manchus"
 chi_manchu_vacancies_4.d: "All major public offices are monopolized by Bannermen."
 chi_manchu_cities.t: "Manchu Quarters"
 chi_manchu_cities.d: "After Emperor Shizu seized the Central Plains, he established 'Manchu Quarters' within major cities to protect Manchu identity and consolidate rule. These are separate areas for Manchus to reside in, where Han people are not allowed to live."
 chi_manchu_cities_1.t: "Dismantled Quarters"
 chi_manchu_cities_1.d: "Completely removes restrictions, allowing free residence."
 chi_manchu_cities_2.t: "Partial Dismantling"
 chi_manchu_cities_2.d: "Dismantles some quarters that have outlived their usefulness, allowing Han people to reside there as well."
 chi_manchu_cities_3.t: "Strict Segregation"
 chi_manchu_cities_3.d: "Completely separates the residential areas of Manchus and Han people."
 chi_banner_armies.t: "Eight Banners Army"
 chi_banner_armies.d: "In order for the small number of Manchus to rule over the Han, they must maintain military superiority. For this purpose, every Manchu household is assigned to one of the Eight Banners for military service."
 chi_banner_armies_1.t: "De Facto Disbandment"
 chi_banner_armies_1.d: "Ends the dual system of the Eight Banners and Green Standard Army, and recruits soldiers regardless."
 chi_banner_armies_2.t: "Lift Occupational Restrictions"
 chi_banner_armies_2.d: "Allows Manchus to have professions other than being soldiers."
 chi_banner_armies_3.t: "Establish Local Han Armies"
 chi_banner_armies_3.d: "Creates local Han armies separate from the main force to facilitate local defense."
 chi_banner_armies_4.t: "Eight Banners and Green Standard Army"
 chi_banner_armies_4.d: "The Eight Banners form the core to conduct military operations, while the Green Standard Army acts as auxiliaries."
 chi_banner_subsidies.t: "Bannerman Subsidies"
 chi_banner_subsidies.d: "Those registered under the banners receive a salary corresponding to their rank. This helps maintain the political superiority of the Bannermen."
 chi_banner_subsidies_1.t: "No Subsidies"
 chi_banner_subsidies_1.d: "No salary is received for simply being registered under the banners."
 chi_banner_subsidies_2.t: "Nominal Subsidies"
 chi_banner_subsidies_2.d: "Provides insufficient subsidies to reduce expenses and encourage Bannermen to seek other professions."
 chi_banner_subsidies_3.t: "Minimum Living Subsidies"
 chi_banner_subsidies_3.d: "Provides subsidies just enough for Bannermen to maintain their livelihood."
 chi_banner_subsidies_4.t: "Adequate Subsidies"
 chi_banner_subsidies_4.d: "Guarantees the livelihood of Bannermen with sufficient subsidies."
 chi_manchurianization_policies.t: "Manchurianization Policies"
 chi_manchurianization_policies.d: "Emperor Shengzu decreed that not only Manchus but also Han people should learn the language and customs of Manchuria. Accordingly, Han people must wear their hair and dress like the Manchus."
 chi_manchurianization_policies_1.t: "Free Hair and Dress"
 chi_manchurianization_policies_1.d: "Allows Han people to wear their hair and dress as they please."
 chi_manchurianization_policies_2.t: "Relaxed Regulations"
 chi_manchurianization_policies_2.d: "Loosens regulations to grant some degree of freedom."
 chi_manchurianization_policies_3.t: "Strict Punishment"
 chi_manchurianization_policies_3.d: "Forces Han people to imitate the behavior of the Manchus."
