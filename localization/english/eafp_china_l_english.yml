 call_up_local_militias_button_desc: "While rebellions continue in the south, people in various places are arming themselves to suppress the uprisings. Rumor has it that even Westerners are joining them."
 call_up_local_militias_modifier: "Called Up Local Militias"
 chinese_westernization.102.t: "[SCOPE.sState('first_modern_arsenal_state').GetCityHubName] Arsenal"
 chinese_westernization.102.d: "The latest weapons factory, applying Western technology, has opened in [SCOPE.sState('first_modern_arsenal_state').GetCityHubName]."
 chinese_westernization.102.f: "As the new weapons factory opened, officers looked on with pride. The Western engineer in charge spoke, \"We'll produce the best weapons.\"\n\n[SCOPE.sCharacter('intelligentsia_leader').GetFullName] agreed, emphasizing the need to learn from the West. Workers in blue overalls began their tasks with precision and dedication. The sound of machinery filled the air, marking a new beginning for the Qing."
 # As the new weapons factory opened, officers looked on with pride. The Western engineer in charge spoke, \We'll produce the best weapons.\ \n\n[SCOPE.sCharacter('intelligentsia_leader').GetFullName] agreed, emphasizing the need to learn from the West. Workers in blue overalls began their tasks with precision and dedication. The sound of machinery filled the air, marking a new beginning for Qing.
 chinese_westernization.102.a: "Using barbarians' skills to fend off barbarians; this is truly using barbarians to control barbarians!"
 chi_first_modern_arsenal: "China's First Modern Arsenal"
 chinese_westernization.103.t: "Unifying Military Training"
 # Unifying Military Training
 chinese_westernization.103.d: "Currently, military training in [ROOT.GetCountry.GetName] is conducted separately in each province, leading to inconsistent discipline and a lack of coordination between troops. To address this issue, the government has proposed a plan to unify military training and conduct it centrally. However, many provincial governors are opposing this plan, arguing that it infringes upon their autonomy and could lead to a loss of power."
 # Currently, military training of [ROOT.GetCountry.GetName] is conducted separately in each province, leading to inconsistent standards and a lack of coordination between troops. To address this issue, the government has proposed a plan to unify military training and conduct it centrally. However, many provincial governors are against this plan, arguing that it infringes upon their autonomy and could lead to a loss of power.
 chinese_westernization.103.f: "Within the Qing Dynasty, the dispute over centralizing military training has sparked a bitter political conflict. On the one hand, supporters claim that a unified army is required to safeguard the country from outside assault while maintaining internal stability. They see centralizing military training as a way to ensure consistent standards and improve troop coordination. Opponents, on the other hand, worry that the plan undermines provincial autonomy and could lead to a concentration of power in the central government. They are concerned that their provinces' military resources would be drained and their power weakened."
 # Within the Qing Dynasty, the dispute over centralizing military training has sparked a bitter political conflict. On the one hand, supporters of the idea claim that a unified army is required to safeguard the country from outside assault while also maintaining internal stability. They see centralizing military training as a way to ensure consistent standards and improve troop coordination. Opponents, on the other hand, worry that the plan undermines provincial autonomy and could lead to a concentration of power in the central government. They are concerned that their provinces' military resources would be drained and their power will be undermined.
 chinese_westernization.103.a: "Push it through."
 military_training_unified_ig_landowners: "Unifying Military Training"
 chinese_westernization.103.b: "Coax them."
 military_training_unified_country: "Unifying Military Training"
 chinese_westernization.103.c: "It is not yet time."
 chinese_westernization.121.t1: "Attempt to Establish Military Academy in [SCOPE.sState('military_academy_state').GetPortHubName]"
 chinese_westernization.121.t2: "Attempt to Establish Military Academy in [SCOPE.sState('military_academy_state').GetCityHubName]"
 chinese_westernization.121.d1: "Establish a military academy in [SCOPE.sState('military_academy_state').GetPortHubName] to modernize the army."
 chinese_westernization.121.d2: "Establish a military academy in [SCOPE.sState('military_academy_state').GetCityHubName] to modernize the army."
 chinese_westernization.121.f: "\"China selects generals when encountering the enemy, but the West bases the selection of generals on academies.\""
 chinese_westernization.121.a: "It is absolutely necessary."
 chinese_westernization.122.t: "Backlash from Bureaucrats"
 chinese_westernization.122.d1: "Conservative bureaucrats are opposing the attempt to establish a military academy in [SCOPE.sState('military_academy_state').GetPortHubName]."
 chinese_westernization.122.d2: "Conservative bureaucrats are opposing the attempt to establish a military academy in [SCOPE.sState('military_academy_state').GetCityHubName]."
 chinese_westernization.122.f: "\"We have the sacred texts of the sages, so how can we follow the West? This so-called 'military academy' is suited for the West, but not for us.\""
 chinese_westernization.122.a: "Have they forgotten what happened in the last war?"
 chinese_westernization.122.b: "I need to find a way to sweet-talk them."
 chinese_westernization.123.t: "Backlash from Soldiers"
 chinese_westernization.123.d1: "Soldiers are opposing the attempt to establish a military academy in [SCOPE.sState('military_academy_state').GetPortHubName]."
 chinese_westernization.123.d2: "Soldiers are opposing the attempt to establish a military academy in [SCOPE.sState('military_academy_state').GetCityHubName]."
 chinese_westernization.123.f: "\"The elite Eight Banners Army upholds the imperial dynasty, so I don't know why attention is drawn to such strange things. Our ancestors entered the pass and contributed to establishing the dynasty; are you trying to shake that up?\""
 chinese_westernization.123.a: "Have they forgotten what happened in the last war?"
 chinese_westernization.123.b: "I need to find a way to sweet-talk them."
 chinese_westernization.124.t: "Taxes and Bribes"
 chinese_westernization.124.d: "Local officials say that in order to build the academy, taxes... or bribes, must be paid."
 chinese_westernization.124.f: "\"Money is always necessary to get things done. Especially if we follow the ways of these barbarians, there will be many obstacles.\""
 chinese_westernization.124.a: "Pay the taxes."
 chinese_westernization.124.b: "Do not pay the taxes."
 chiwes124a: "Bribe"
 chinese_westernization.125.t: "Support from Foreign Officer Corps"
 chinese_westernization.125.d: "Some of the foreign officers who entered the country due to the previous war volunteer to serve as instructors at the academy."
 chinese_westernization.125.f: "\"A well-trained military is essential for stability and prosperity in any nation. With my expertise, it will help build a strong army.\""
 chinese_westernization.125.a: "This kind of support is welcome."
 chinese_westernization.125.b: "Can we entice more officers?"
 chinese_westernization.125.c: "Unfortunately, we have nothing to offer..."
 chiwes125a: "A Modest Reward"
 chiwes125b: "A Greater Reward"
 chinese_westernization.126.t: "Support from Regional Governors"
 chinese_westernization.126.d: "Several provincial governors have expressed their support for the academy."
 chinese_westernization.126.f: "The governors arrive in a grand carriage procession along with splendidly uniformed soldiers. \"We come from different places, but we hope to see the Qing Dynasty become stronger and more modernized,\" says one of the governors."
 chinese_westernization.126.a: "This is very good news!"
 chinese_westernization.127.t: "Criminal Allegations"
 chinese_westernization.127.d: "Rumors are circulating that one of the people involved in establishing the academy is implicated in a crime."
 chinese_westernization.127.f: "\"Did you hear the news? Well, the gentleman working on building that school harbored such evil intentions.\"\n\n\"Oh, I didn't see it that way, is that true?\"\n\n\"I wouldn't know. That's just the rumor going around.\""
 chinese_westernization.127.a: "It couldn't be. He is not that kind of person."
 chinese_westernization.127.b: "If we don't cut ties, it might cause a setback..."
 chinese_westernization.128.t: "Just a Rumor"
 chinese_westernization.128.d: "The rumor turned out to be just a rumor. However, it seems to have caught the government's attention."
 chinese_westernization.128.f: "\"Why is that story still going around? Thanks to that, I felt like dying from all the scrutiny. Phew, one wrong move and I almost died.\""
 chinese_westernization.128.a: "It's a relief it was just a rumor."
 chinese_westernization.129.t: "Gratitude"
 chinese_westernization.129.d: "The rumor turned out to be just a rumor. The person rumored to be involved in the crime expressed their gratitude."
 chinese_westernization.129.f: "\"Thanks to your protection, the rumors have subsided without incident. It's not much, but I'll contribute more to the construction of the academy.\""
 chinese_westernization.129.a: "It's a relief it was just a rumor."
 chinese_westernization.130.t: "A Bottomless Pit"
 chinese_westernization.130.d: "Funds keep pouring into the construction of the academy, but there seems to be little progress."
 chinese_westernization.130.f: "The overseer, his clothes stained with dust and sweat, looks around the sprawling construction site in frustration. \"It really feels like pouring water into a bottomless pit,\" he mutters as he watches another cart of materials being unloaded. The jingling sound of coins rings in his ears."
 chinese_westernization.130.a: "Why do we spend money so recklessly?"
 chinese_westernization.130.b: "We need more support."
 chiwes130b: "Additional Support"
 chinese_westernization.131.t: "Heavy Rain"
 chinese_westernization.131.d: "An unusual torrential downpour has turned the construction site into a muddy quagmire. The workers are doing their best, but it seems the heavens have their own plans."
 chinese_westernization.131.f: "Amidst the commotion of the rain-soaked construction site, a group of workers, covered head to toe in mud and rain, crouch under a makeshift shelter. Right beside them, a scholar exhausted by numerous delays stands watch. He sighs as he looks at the relentless rain. \"It seems today is Mother Nature's turn to teach us a lesson.\""
 chinese_westernization.131.a: "Construction will be delayed."
 chinese_westernization.131.b: "We need more support."
 chiwes131b: "Additional Support"
 chinese_westernization.132.t: "Generous Donation"
 chinese_westernization.132.d: "A wealthy patron has made a substantial donation to the academy, allowing for the purchase of new equipment and resources."
 # A wealthy patron has made a substantial donation to the academy, allowing for the purchase of new equipment and resources.
 chinese_westernization.132.f: "A crowd has gathered in front of the academy as a carriage pulls up, the wealthy patron's arrival heralded by the sound of horse hooves on cobblestones. The patron steps out of the carriage, holding a large bag of silver coins. \"I have heard of the great work you are doing here,\" the patron says, \"and I wish to offer my support.\" The generous donation will be put to good use."
 # A crowd has gathered in front of the academy as a carriage pulls up, the wealthy patron's arrival heralded by the sound of horses' hooves on cobblestones. The patron steps out of the carriage, holding a large bag of silver coins. "I have heard of the great work you are doing here,\" the patron says, \"and I wish to offer my support." The coins are counted, and the patron's generous donation will be put to good use.
 chinese_westernization.132.a: "We welcome all support!"
 # We welcome all support!
 chinese_westernization.132.b: "I'm suspicious of something..."
 # I'm suspicious of something...
 chinese_westernization.133.t: "Budget Cuts"
 chinese_westernization.133.d: "Due to financial difficulties, the imperial court has decided to cut funding to the academy, which could significantly delay or even halt the reform efforts."
 # Due to financial difficulties, the imperial court has decided to cut funding to the academy, which could significantly delay or even halt the reform efforts.
 chinese_westernization.133.f1: "The messenger delivers the news that the funding for the [SCOPE.sState('military_academy_state').GetPortHubName] Military Academy has been cut. You stare at the letter in disbelief. Without additional resources, the plan will be delayed indefinitely. \"How are we supposed to proceed?\" you ask yourself. \"We need funding to continue.\""
 # The messenger delivers the news that the funding for [SCOPE.sState('military_academy_state').GetPortHubName] Military Academy has been cut. You stare at the letter in disbelief. Without additional resources, the plan will be delayed indefinitely. \How are we supposed to proceed?" you ask yourself. \"We need funding to continue."
 chinese_westernization.133.f2: "The messenger delivers the news that the funding for the [SCOPE.sState('military_academy_state').GetCityHubName] Military Academy has been cut. You stare at the letter in disbelief. Without additional resources, the plan will be delayed indefinitely. \"How are we supposed to proceed?\" you ask yourself. \"We need funding to continue.\""
 # The messenger delivers the news that the funding for [SCOPE.sState('military_academy_state').GetCityHubName] Military Academy has been cut. You stare at the letter in disbelief. Without additional resources, the plan will be delayed indefinitely. \How are we supposed to proceed?" you ask yourself. \"We need funding to continue."
 chinese_westernization.133.a: "Lobby the government for additional funding."
 # Lobby the government for additional funding.
 chiwes133a: "Lobbying Activities"
 chinese_westernization.133.b: "Cut back on expenses and try to make the existing budget work."
 # Cut back on expenses and try to make the existing budget work.
 chinese_westernization.134.t: "Bureaucratic Roadblock"
 chinese_westernization.134.d: "The academy has hit a roadblock due to bureaucratic red tape and opposition from conservative officials."
 # The academy have hit a roadblock due to bureaucratic red tape and opposition from conservative officials.
 chinese_westernization.134.f: "The officials sit behind their desks, all wearing stern expressions. \"We understand you have ideas about reforms,\" one official says. \"However, we must inform you that everything needs to be approved through the proper channels.\""
 chinese_westernization.134.a: "Try to work to overcome the obstacles and push through the reforms."
 # Try to work to overcome the obstacles and push through the reforms.
 chinese_westernization.134.b: "Take a more confrontational approach and challenge the officials directly."
 # Take a more confrontational approach and challenge the officials directly.
 chiwes134b: "Overcoming Adversity"
 chinese_westernization.135.t: "Philanthropic Missionaries"
 chinese_westernization.135.d: "A group of Christian missionaries has offered to provide financial and material support to the academy."
 # A group of Christian missionaries have offered to provide financial and material support to the academy.
 chinese_westernization.135.f: "The missionaries are dressed in plain clothes and carry only small bags. \"We may not have much,\" one of them says, \"but we believe in the power of education and the potential of this academy to change lives.\""
 # The missionaries are dressed in plain clothes and carry only small bags with them. \We may not have much," one of them says, \but we believe in the power of education and the potential of this academy to change lives."
 chinese_westernization.135.a: "Accept the missionaries' offer."
 # Accept the missionaries' offer.
 chinese_westernization.135.b: "Decline the offer, citing concerns over potential religious conflicts."
 # Decline the offer, citing concerns over potential religious conflicts.
 chiwes135a: "Discontent of Confucian Scholars"
 chinese_westernization.136.t: "Terrible Rumors"
 chinese_westernization.136.d: "Rumors have spread throughout the capital that the academy's plans are actually a cover for a secret conspiracy against the government."
 # Rumors have spread throughout the capital that the academy's plans are actually a cover for a secret conspiracy against the government.
 chinese_westernization.136.f: "The crowd outside the academy gates grows louder and more agitated as time passes. \"I've heard that they're training revolutionaries here,\" one bystander says. \"I heard they want to overthrow the Qing government.\""
 # The crowd outside the academy gates grows louder and more agitated by the minute. \I've heard that they're training revolutionaries here,\ one of the bystanders says. \I heard they want to overthrow the Qing government.\
 chinese_westernization.136.a: "Work to dispel the rumors."
 # Work to dispel the rumors.
 chinese_westernization.136.b: "Let the rumors spread. They will disappear on their own."
 # Let the rumor spread. It will disappear on its own.
 chiwes136a: "Dispelling Rumors"
 chinese_westernization.137.t: "Imperial Edict"
 chinese_westernization.137.d: "The Qing court issues an edict supporting the military academy's mission to modernize the army. The edict promises funding and resources to support the academy."
 chinese_westernization.137.f: "The edict arrived at the academy carried in a ceremonial box by a delegation of officials and imperial guards. It was written in ornate calligraphy and stamped with the imperial seal. The edict promised additional funding and resources to support the academy's mission and reaffirmed the court's commitment to modernizing the army."
 chinese_westernization.137.a: "The whole world looks up to His Majesty's grace."
 chinese_westernization.138.t: "Attempted Sabotage"
 chinese_westernization.138.d: "Someone has attempted to damage the academy's equipment and facilities."
 # An anonymous saboteur has attempted to damage the academy's equipment and facilities.
 chinese_westernization.138.f: "People gather in the courtyard, looking at the damaged equipment and whispering quietly to one another. \"It's a cowardly act,\" says a general. \"But do they think this will stop us? We must find out who did this and ensure they are brought to justice.\""
 chinese_westernization.138.a: "Conduct a thorough investigation to identify the culprit."
 # Conduct a thorough investigation to identify the culprit.
 chinese_westernization.139.t1: "Failure to Establish [SCOPE.sState('military_academy_state').GetPortHubName] Military Academy"
 chinese_westernization.139.t2: "Failure to Establish [SCOPE.sState('military_academy_state').GetCityHubName] Military Academy"
 chinese_westernization.139.d1: "Despite their best efforts, the [SCOPE.sState('military_academy_state').GetPortHubName] Military Academy failed to open its doors to students and was forced to abandon its modernization plans."
 # Despite the best efforts of the academy's leaders, the [SCOPE.sState('military_academy_state').GetPortHubName] Military Academy failed to open its doors to students and was forced to abandon its modernization plans.
 chinese_westernization.139.d2: "Despite their best efforts, the [SCOPE.sState('military_academy_state').GetCityHubName] Military Academy failed to open its doors to students and was forced to abandon its modernization plans."
 # Despite the best efforts of the academy's leaders, the [SCOPE.sState('military_academy_state').GetCityHubName] Military Academy failed to open its doors to students and was forced to abandon its modernization plans.
 chinese_westernization.139.f1: "The academy doors are locked and barred, and the only sound in the empty halls is the rustling of papers and occasional sighs. The academy's leaders sit at their desks, staring at their plans and wondering where they went wrong. Outside, the streets of [SCOPE.sState('military_academy_state').GetPortHubName] are bustling with activity, but inside the academy, there is only a sense of defeat and disappointment. The future of the Qing army looks bleak."
 # The doors of the academy remained locked and barred, the only sound coming from within the empty halls was the rustling of papers and the occasional sigh. The leaders of the academy sat at their desks, staring at their plans and wondering where they went wrong. Outside, the streets of [SCOPE.sState('military_academy_state').GetPortHubName] were bustling with activity, but inside the academy, there was only a sense of defeat and disappointment. The future of the Qing army looked bleak.
 chinese_westernization.139.f2: "The academy doors are locked and barred, and the only sound in the empty halls is the rustling of papers and occasional sighs. The academy's leaders sit at their desks, staring at their plans and wondering where they went wrong. Outside, the streets of [SCOPE.sState('military_academy_state').GetCityHubName] are bustling with activity, but inside the academy, there is only a sense of defeat and disappointment. The future of the Qing army looks bleak."
 # The doors of the academy remained locked and barred, the only sound coming from within the empty halls was the rustling of papers and the occasional sigh. The leaders of the academy sat at their desks, staring at their plans and wondering where they went wrong. Outside, the streets of [SCOPE.sState('military_academy_state').GetCityHubName] were bustling with activity, but inside the academy, there was only a sense of defeat and disappointment. The future of the Qing army looked bleak.
 chinese_westernization.139.a: "How could this be."
 chinese_westernization.140.t1: "Opening of the [SCOPE.sState('military_academy_state').GetPortHubName] Military Academy"
 chinese_westernization.140.t2: "Opening of the [SCOPE.sState('military_academy_state').GetCityHubName] Military Academy"
 chinese_westernization.140.d1: "After months of hard work and dedication, the leaders of the [SCOPE.sState('military_academy_state').GetPortHubName] Military Academy successfully opened the institution to students and began implementing their modernization plans."
 # After months of hard work and dedication, the leaders of the [SCOPE.sState('military_academy_state').GetPortHubName] Military Academy successfully opened the institution to students and began implementing their modernization plans.
 chinese_westernization.140.d2: "After months of hard work and dedication, the leaders of the [SCOPE.sState('military_academy_state').GetCityHubName] Military Academy successfully opened the institution to students and began implementing their modernization plans."
 # After months of hard work and dedication, the leaders of the [SCOPE.sState('military_academy_state').GetCityHubName] Military Academy successfully opened the institution to students and began implementing their modernization plans.
 chinese_westernization.140.f: "The doors of the academy opened wide, and eager students flooded in one by one, carrying bundles of books and wearing determined expressions. The academy's leaders stood at the entrance, watching with pride and satisfaction as their dream became a reality. The air was filled with chatter and laughter, the clanging of swords, and the marching of boots. The future of the Qing army looks bright."
 # The doors of the academy opened wide, and a crowd of eager students flooded in, each one carrying a bundle of books and a sense of determination. The leaders of the academy stood at the entrance, watching with pride and satisfaction as their dream became a reality. The air was filled with the sounds of chatter and laughter, as well as the clanging of swords and the marching of boots. The future of the Qing army looked bright.
 chinese_westernization.140.a: "A magnificent achievement."
 chiwes140a: "Opening of the Military Academy"
 chinese_westernization.181.t: "Newly Created Army"
 chinese_westernization.181.d: "To modernize the military and counter the threat of foreign imperialism, the Newly Created Army, also known as the New Army, was formed."
 chinese_westernization.181.f: "Outside [ROOT.GetCountry.GetCapital.GetCityHubName], a new army has been formed in response to the threat of foreign imperialism and the need for modernization. Trained for months and equipped with modern weapons, the soldiers stood tall in their new uniforms, ready to defend China against those who seek to oppress it.\n\nLed by veterans of the Taiping Rebellion, the soldiers represented a new generation of Chinese patriots determined to protect their homeland and ensure its independence. As they marched to their barracks, they knew the path ahead would be difficult, but they were ready to face any challenges that came their way. They were the defenders of China, ready to do whatever it takes to secure their country's sovereignty and strength."
 chinese_westernization.181.a: "A tangible achievement."
 chinese_westernization.181.tt: "[SCOPE.gsInterestGroup('armed_forces').GetName] is renamed to #variable Beiyang Army#!"
 chi_triumphant_armed_forces: "Triumphant Armed Forces"
 chiwes181a: "Newly Created Army"
 chinese_westernization.199.t: "Complete Modernization of the Army"
 chinese_westernization.199.d: "[ROOT.GetCountry.GetName] has accomplished the remarkable feat of fully modernizing its army, bringing it up to the standards of the Western powers. The effort was a long and difficult process, but [ROOT.GetCountry.GetNameNoFlag] has finally succeeded in equipping its army with the latest weapons and technology."
 chinese_westernization.199.f: "As the sun sets over [ROOT.GetCountry.GetCapital.GetCityHubName], the sound of marching troops echoes through the city. The people gather in the streets to witness the parade of the newly modernized [ROOT.GetCountry.GetAdjectiveNoFormatting] army. The sight of the troops in their new uniforms and advanced weaponry is impressive, reflecting [ROOT.GetCountry.GetNameNoFlag]'s commitment to progress and modernization.\n\nThis outcome is a significant milestone reflecting China's ability to keep pace with a rapidly changing world. Equipped with the latest technology and weapons, the army is now better prepared to defend the Central Plains from any threat. This achievement is a source of immense pride for the Chinese people, who are celebrating it with enthusiasm and optimism for the future.\n\nThis achievement is a turning point in Chinese history. With these efforts, [ROOT.GetCountry.GetNameNoFlag] has demonstrated its willingness to adapt to changing times and take on new challenges. The Chinese people can look forward to a brighter future, knowing that China is better prepared to face the challenges ahead."
 chinese_westernization.199.a: "No one can invade [ROOT.GetCountry.GetAdjectiveNoFormatting] land!"
 chiwes199a: "Complete Modernization of the Army: Impregnable Defense"
 chinese_westernization.199.b: "The whole world will witness the majesty of the [ROOT.GetCountry.GetAdjectiveNoFormatting] army!"
 chiwes199b: "Complete Modernization of the Army: Hegemon of East Asia"
 chinese_westernization.201.t: "[SCOPE.sState('first_modern_shipyard_state').GetPortHubName] Shipyard"
 chinese_westernization.201.d: "A shipyard applying Western technology to build steel-hulled ships has opened in [SCOPE.sState('first_modern_shipyard_state').GetPortHubName]."
 chinese_westernization.201.f: "The sun was just beginning to rise over the horizon as the shipyard workers prepared for the day ahead. The sounds of hammers and saws, and the clanging of metal on metal filled the air. A delegation of government officials arrived, dressed in their finest robes, and the workers paused to bow. The officials smiled and nodded, deeply impressed by the progress made. They left wondering what the future would hold for the new Western-style shipyard."
 chinese_westernization.201.a: "We will finally see proper ships."
 chi_first_modern_shipyard: "China's First Modern Shipyard"
