l_korean:

 je_korean_foreign_mission: "해외 사절단"
 je_korean_foreign_mission_reason: "조정은 더 이상 바깥 세계를 역관의 전언과 풍문만으로 헤아릴 수 없다. 신임할 만한 관원을 보내 각국의 제도와 군사, 상공업과 외교의 실상을 살피게 해야 한다."
 je_korean_foreign_mission_complete_header: "사절단 귀국"
 je_korean_foreign_mission_on_complete_header: "견문 보고서"
 kor_foreign_mission_status_leader: "사절단장이 정해졌으며 출항을 준비하고 있음"
 kor_foreign_mission_status_leader_and_location: "사절단이 세계를 돌며 견문을 쌓고 있음"
 kor_foreign_mission_status_returning_home: "사절단이 귀국 중임"
 kor_foreign_mission_status_returned_home: "사절단이 귀국하여 보고서 제출을 준비하고 있음"
 kor_foreign_mission_returned_home_tt: "사절단이 귀국하여 보고서를 제출함"
 kor_foreign_mission_report_depends_on_leader_and_route_tt: "귀국 보고서의 효과는 사절단장과 세계일주 완수 여부에 따라 달라짐"
 has_completed_korean_foreign_mission_je_tt: "#b $je_korean_foreign_mission$#! 완료함"

 eafp_scripted_button_kor_foreign_mission_start: "사절단 파견"
 eafp_scripted_button_kor_foreign_mission_start_desc: "신임할 만한 관원을 해외에 보내 각국의 제도와 군사, 산업을 살피게 합니다."
 eafp_scripted_button_kor_foreign_mission_recall: "귀국 명령"
 eafp_scripted_button_kor_foreign_mission_recall_desc: "해외에 나가 있는 사절단에 조기 귀국을 명합니다."
 eafp_scripted_button_kor_foreign_mission_recall_location_tt: "사절단이 해외에 있음"
 eafp_scripted_button_kor_foreign_mission_recall_not_returned_tt: "사절단이 아직 귀국 중이 아니며 귀국하지 않음"
 eafp_scripted_button_kor_foreign_mission_recall_effect_tt: "사절단이 일정을 줄이고 귀국함"

 eafp_kor_foreign_mission.1.t: "해외 사절단"
 eafp_kor_foreign_mission.1.d: "조정은 해외 사절단을 파견하여 각국의 제도와 군사, 상공업의 실상을 직접 살피기로 했다. 이제 문제는 누가 이 중대한 임무를 맡을 것인가이다."
 eafp_kor_foreign_mission.1.f: "\"책상 위의 지도는 천하를 다 담은 듯하나, 바다를 건너본 자의 눈에는 그저 접힌 종이에 불과하다.\""
 eafp_kor_foreign_mission.1.a: "[SCOPE.sCharacter('kor_foreign_mission_leader_1').GetFullName]에게 맡겨라."
 eafp_kor_foreign_mission.1.b: "[SCOPE.sCharacter('kor_foreign_mission_leader_2').GetFullName]에게 맡겨라."
 eafp_kor_foreign_mission.1.c: "[SCOPE.sCharacter('kor_foreign_mission_leader_3').GetFullName]에게 맡겨라."
 eafp_kor_foreign_mission.1.e: "[SCOPE.sCharacter('kor_foreign_mission_leader_4').GetFullName]에게 맡겨라."

 eafp_kor_foreign_mission.2.t: "세계일주의 출항"
 eafp_kor_foreign_mission.2.d: "사절단은 항구를 떠나 바다와 육로를 잇는 긴 순방에 오른다. 그들은 특정 한 나라의 제도만이 아니라, 세계 각지에서 작동하는 질서와 부강의 원리를 살필 것이다."
 eafp_kor_foreign_mission.2.f: "배가 항구를 떠나기 전, 수행원들은 붓과 종이, 외국어 사전, 그리고 조정의 국서를 다시 확인했다." # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.2.a: "세계일주 항로를 승인하라." # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.2.b: "세계 각지의 군기와 외교 실무를 익혀라." # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.2.c: "더 넓은 세계와 교류하며 견문을 넓혀라." # AI작, 수정 필요, TODO

 eafp_kor_foreign_mission.3.t: "첫 보고"
 eafp_kor_foreign_mission.3.d: "사절단의 첫 보고가 도착했다. 그들은 낯선 제도와 기계, 훈련받은 군대와 새로운 외교 의례를 목격하며 세계의 넓이를 실감하고 있다."
 eafp_kor_foreign_mission.3.f: "\"눈으로 본 뒤에야 비로소 알았습니다. 강약은 말에서 나는 것이 아니라 제도와 재정, 배움과 기계에서 납니다.\"" # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.3.a: "항로를 넓혀 세계일주를 완수하라." # AI작, 수정 필요, TODO

 eafp_kor_foreign_mission.4.t: "세계를 한 바퀴 돌아"
 eafp_kor_foreign_mission.4.d: "사절단은 더 먼 항로를 택해 항구와 수도, 공장과 의회, 병영과 학교를 두루 둘러보았다. 그들이 모은 기록은 단순한 여행기가 아니라 조선이 세계 속에서 설 자리를 묻는 보고서가 되었다."
 eafp_kor_foreign_mission.4.f: "긴 항해 끝에 마주한 항구마다 서로 다른 깃발과 말, 법과 기계가 있었으나, 부강을 떠받치는 질서가 있다는 사실만은 어디서나 같았다." # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.4.a: "세계일주 기록을 정리하고 귀국하라." # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.4.b: "각국의 법제와 학술을 두루 살피라." # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.4.c: "각지의 군사 제도와 외교 관행을 정리하라." # AI작, 수정 필요, TODO

 eafp_kor_foreign_mission.5.t: "귀국"
 eafp_kor_foreign_mission.5.d: "사절단이 귀국했다. 낯선 제도와 기계, 외교 의례에 대한 기록은 조정의 낡은 질서를 흔들 만큼 방대하다."
 eafp_kor_foreign_mission.5.f: "상자에는 외국 신문과 법령집, 공장 도면, 군사 교범, 그리고 수행원들이 밤마다 베껴 쓴 견문록이 가득했다." # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.5.a: "보고서를 올리게 하라." # AI작, 수정 필요, TODO

 eafp_kor_foreign_mission.6.t: "견문 보고서"
 eafp_kor_foreign_mission.6.d: "사절단의 귀국 보고서가 조정에 제출되었다. 이제 이 견문을 어떤 방식으로 국정에 반영할지 결정해야 한다."
 eafp_kor_foreign_mission.6.f: "\"제도는 하루아침에 옮겨 심을 수 없으나, 나라가 눈을 감고 있으면 남의 제도 아래 놓이는 날이 올 것입니다.\"" # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.6.a: "제도 개혁안을 채택하라." # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.6.b: "기술과 군사 보고서를 우선하라." # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.6.c: "외교적 신뢰를 넓히는 데 활용하라." # AI작, 수정 필요, TODO

 eafp_kor_foreign_mission.10.t: "은밀한 유람단"
 eafp_kor_foreign_mission.10.d: "사절단 파견 계획이 알려지자, 국내 유생들이 지부상소를 올리며 극렬히 반대하고 있다. 사절단을 무사히 출국시키기 위한 묘안이 필요하다."
 eafp_kor_foreign_mission.10.f: "\"서양의 배에 몸을 싣는 것은 곧 오랑캐의 술수에 스스로 걸어 들어가는 일입니다. 어찌 성현의 나라가 먼저 길을 내겠습니까?\"" # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.10.a: "암행어사로 위장하여 조용히 다녀오라."
 eafp_kor_foreign_mission.10.b: "우물 안 개구리들을 꾸짖고 당당히 보내라!"

 eafp_kor_foreign_mission.11.t: "최고의 예법으로 모셔라"
 eafp_kor_foreign_mission.11.d: "[SCOPE.sCountry('kor_foreign_mission_host_country').GetName]의 국가 원수를 알현하는 자리에서, 예상치 못한 타이밍에 주인이 등장하자 사절단 대표가 당황한 나머지 바닥에 납작 엎드려 큰절을 올렸다."
 eafp_kor_foreign_mission.11.f: "\"의관은 정제되었으나 예법은 서로 달랐다. 통역관이 얼굴을 붉히는 사이, 좌중은 그 깊은 절이 모욕인지 경의인지 가늠하지 못했다.\"" # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.11.a: "우리의 가장 극진한 예의다."
 eafp_kor_foreign_mission.11.b: "다음부터는 서양식 악수를 연습하도록..."

 eafp_kor_foreign_mission.12.t: "마귀의 힘으로 켜지는 불"
 eafp_kor_foreign_mission.12.d: "[SCOPE.sCountry('kor_foreign_mission_host_country').GetName]의 한 공장을 방문한 사절단은 전기 조명을 목격했다. 스위치 하나로 태양처럼 방이 밝아지자 일행은 경악과 감탄을 금치 못했다."
 eafp_kor_foreign_mission.12.f: "\"등잔도 기름도 없는데 밤이 대낮처럼 밝아졌다. 누군가는 마귀의 조화라 속삭였고, 누군가는 하늘의 이치를 기계에 담은 것이라 적었다.\"" # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.12.a: "이 빛을 우리 조선에도 밝혀야 한다!"

 eafp_kor_foreign_mission.13.t: "움직이는 방과 지진 소동"
 eafp_kor_foreign_mission.13.d: "[SCOPE.sCountry('kor_foreign_mission_host_country').GetName]의 고층 호텔에서 승강기에 오른 사절단은 방이 요동치며 솟구치자 대지진이 난 줄 알고 바닥에 주저앉았다."
 eafp_kor_foreign_mission.13.f: "\"문이 닫히자 방이 위로 달렸다. 한 수행원은 바닥을 붙들었고, 다른 이는 이 건물이 통째로 하늘에 들리는 줄 알았다.\"" # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.13.a: "허허, 서양의 기계란 참으로 무섭구려."

 eafp_kor_foreign_mission.14.t: "초상화의 대상이 된 이방인들"
 eafp_kor_foreign_mission.14.d: "[SCOPE.sCountry('kor_foreign_mission_host_country').GetName]의 거리를 산책하는 사절단 주위로 구름 같은 인파가 몰려들었다. 유력 신문들은 갓과 한복을 차려입은 이들의 모습을 앞다투어 지면에 실었다."
 eafp_kor_foreign_mission.14.f: "\"아이들은 검은 갓의 그늘을 따라 뛰었고, 신문 삽화가는 상투를 그리려 애썼다. 낯선 시선은 때로 조롱이었으나, 때로는 분명한 호기심이었다.\"" # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.14.a: "조선의 위엄을 널리 알렸도다!"
 eafp_kor_foreign_mission.14.b: "서양식 복식을 도입할 때가 되었을지도..."

 eafp_kor_foreign_mission.15.t: "불을 뿜는 기계창"
 eafp_kor_foreign_mission.15.d: "[SCOPE.sCountry('kor_foreign_mission_host_country').GetName]의 거대한 무기 공장을 방문한 사절단은 증기기관이 쉬지 않고 총포와 탄약을 찍어내는 모습을 보고 큰 충격을 받았다."
 eafp_kor_foreign_mission.15.f: "\"쇠가 불 속에서 나오자마자 기계의 입으로 들어갔고, 같은 모양의 총신이 줄지어 쌓였다. 장인의 손보다 빠른 것이 규격과 증기였다.\"" # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.15.a: "우리도 당장 저런 기계창을 세워야 한다!"
 eafp_kor_foreign_mission.15.b: "총포보다 저 기계의 원리가 먼저다."

 eafp_kor_foreign_mission.17.t: "천 리를 가는 서신"
 eafp_kor_foreign_mission.17.d: "[SCOPE.sCountry('kor_foreign_mission_host_country').GetName]의 우체국과 전신국을 시찰한 사절단은 소식이 수백 리 밖까지 눈 깜짝할 새 전달되는 체계에 경탄했다."
 eafp_kor_foreign_mission.17.f: "\"편지는 역참을 지나지 않았고, 말도 배도 기다리지 않았다. 금속 줄을 타고 온 소식이 관청의 책상 위에 내려앉았다.\"" # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.17.a: "국가의 혈맥을 잇는 놀라운 기술이로다."

 eafp_kor_foreign_mission.18.t: "붓으로 나누는 밤샘 토론"
 eafp_kor_foreign_mission.18.d: "[SCOPE.sCountry('kor_foreign_mission_host_country').GetName]의 학자들과 말이 통하지 않아 어려움을 겪던 사절단은 종이와 붓을 꺼내 한자로 의사소통을 시도했다. 밤새 이어진 필담은 훌륭한 서양 문물 보고서가 되었다."
 eafp_kor_foreign_mission.18.f: "\"입은 서로 닫혀 있었으나 붓끝은 바빴다. 한 장의 종이에 경전의 글자와 기계의 이름, 나라의 법도가 어지럽게 오갔다.\"" # AI작, 수정 필요, TODO
 eafp_kor_foreign_mission.18.a: "학문의 언어는 국경을 초월하는 법."

