 eafp_joseon_qing_war_events.1.t: "Gunfire Across the Yalu"
 eafp_joseon_qing_war_events.1.d: "Full-scale war has broken out between Joseon and the Qing."
 eafp_joseon_qing_war_events.1.f: "\"At dusk, a biting wind swept across both banks of the Yalu River, snapping the military banners lined along the shore. As heavy war clouds hung over the frozen river, long lines of torches flared in the darkness, and armed soldiers waited silently for the command. In that suffocating calm before the storm, none could tell whether the thundering hooves signaled a march to invade or a desperate stand to defend the realm.\""
 eafp_joseon_qing_war_events.1.a: "The order under heaven trembles."

 eafp_joseon_qing_war_events.2.t: "The Polity After the War"
 eafp_joseon_qing_war_events.2.d.victory.3: "Through overwhelming victory, Joseon has achieved every war goal. The triumph over the Qing has united court and people while greatly elevating the country's prestige."
 eafp_joseon_qing_war_events.2.d.victory.2: "The war goals were achieved, but state and people alike bear deep wounds. Victory still carries prestige, though it cannot silence every grievance."
 eafp_joseon_qing_war_events.2.d.victory.1: "Joseon prevailed in the peace settlement, yet its wartime order nearly collapsed at home. The dispatches of victory conceal lasting exhaustion and anger."
 eafp_joseon_qing_war_events.2.d.fail: "The war has ended, but Joseon failed to alter its relationship with the Qing. With the old order intact despite immense sacrifice, both the court's authority and public confidence are faltering."
 eafp_joseon_qing_war_events.2.f.victory.3: "A Qing fortress fell and its fleet was destroyed, while in the north Joseon's great army advanced like the tide until not a single enemy horseman could be seen east of the Liao River. Before long, an envoy arrived to negotiate peace, and news of the peace treaty spread far and wide. When the Joseon army returned in triumph, the war suddenly ended, as though a great peng had folded its wings."
 # Source: Tokutomi Roka, "Hototogisu", Part Two, Chapter 7, Section 1.
 eafp_joseon_qing_war_events.2.f.victory.2: "\"Toward the end of the ninth month, news of victory in the Yellow Sea arrived, and a few days later she found her husband's name among the wounded. She did not sleep that night. Fortunately, she learned that his wound was not grave and that he was in the hospital. Her fear for his life eased, but as she thought of him and all she wished to do, resentment at the helplessness of her present circumstances once again filled her breast.\""
 # Source: Tokutomi Roka, Hototogisu, Middle Part, Chapter 4, Section 2, Aozora Bunko. https://www.aozora.gr.jp/cards/000280/files/1706_44742.html
 eafp_joseon_qing_war_events.2.f.victory.1: "With my attention wholly taken up by the sick and wounded, I failed to think of such things. Nothing had been prepared and care could not reach everyone, so we were kept desperately busy. We labored without five minutes' rest and without closing our eyes at night. Yet our instruments and medicines were inadequate, and many died for want of proper care; how could we possibly have spared any thought for spying on the enemy?"
 # Source: Kyoka Izumi, Kaijo Hatsuden, Section Three.
 eafp_joseon_qing_war_events.2.f.fail: "At my age, I have come all this way to war only to be killed for no reason, like a dog. First, I hate the Qing soldier who cut me down. Next, I hate the officer who sent us out to reconnoiter. Last, I hate Joseon and the Qing for starting such a war."
 # Source: Ryunosuke Akutagawa, Kubi ga Ochita Hanashi, Part One.
 eafp_joseon_qing_war_events.2.a: "Now settle the peace."

 eafp_joseon_qing_war_events.3.t: "Humiliation Before the Altars"
 eafp_joseon_qing_war_events.3.d.3: "Defeat could not be avoided, but wartime administration and public order endured to the end. The court can contain the shock with some discipline."
 eafp_joseon_qing_war_events.3.d.2: "The state faltered alongside the army. Widespread radicalization and the loss of loyalists will weigh upon postwar politics."
 eafp_joseon_qing_war_events.3.d.1: "Protracted war and defeat have shattered national cohesion. Political movements are turning extreme, and the court's authority will not recover soon."
 eafp_joseon_qing_war_events.3.f: "The war was over, but the silence in the court only deepened. People demanded responsibility for the defeat, and in the streets humiliation and anger became almost the same word."
 eafp_joseon_qing_war_events.3.a: "This shame will endure."

 eafp_joseon_qing_war_events.10.t: "The Uiju Supply Road"
 eafp_joseon_qing_war_events.10.d: "The northern front's supply problem has reached the court."
 eafp_joseon_qing_war_events.10.f: "The road to Uiju filled with grain carts and refugees. Reports from the army demanded more provisions, while local officials warned that the people had already been pressed beyond endurance."
 eafp_joseon_qing_war_events.10.a: "Concentrate supplies at the front."
 eafp_joseon_qing_war_events.10.b: "Make the provinces bear more of the burden."
 eafp_joseon_qing_war_events.10.c: "Repair the transport network first."

 eafp_joseon_qing_war_events.11.t: "General Winter"
 eafp_joseon_qing_war_events.11.d: "Bitter cold has fallen over the northern front."
 eafp_joseon_qing_war_events.11.f: "Snow swallowed the roads, and soldiers handled their matchlocks with frozen hands. Before the enemy could attack the camp, winter had already done so."
 eafp_joseon_qing_war_events.11.a: "Prioritize winter supplies."
 eafp_joseon_qing_war_events.11.b: "Permit local requisition."
 eafp_joseon_qing_war_events.11.c: "Slow the offensive."

 eafp_joseon_qing_war_events.12.t: "Sand in the Shells"
 eafp_joseon_qing_war_events.12.d: "Shoddy munitions and procurement fraud have been exposed."
 eafp_joseon_qing_war_events.12.f: "When the shells were opened, sand spilled out before iron fragments. The camps were furious, the offices tried to hide their papers, and the factory owners blamed the confusion of war."
 eafp_joseon_qing_war_events.12.a: "Punish those responsible."
 eafp_joseon_qing_war_events.12.b: "Conceal it until the war is over."
 eafp_joseon_qing_war_events.12.c: "Reform military procurement."

 eafp_joseon_qing_war_events.13.t: "A Defeated General's Suicide"
 eafp_joseon_qing_war_events.13.d: "A commander intends to take responsibility for defeat through death."
 eafp_joseon_qing_war_events.13.f: "The sword in the commander's tent had already been drawn. [SCOPE.sCharacter('defeated_general').GetFullName] said that the crime of defeat could not be repaid in life. The court had to decide whether to record the death as loyalty or demand living accountability."
 eafp_joseon_qing_war_events.13.a: "Honor that loyalty."
 eafp_joseon_qing_war_events.13.b: "Make the general answer in life, not death."
 eafp_joseon_qing_war_events.13.c: "Keep the defeat quiet."

 eafp_joseon_qing_war_events.14.t: "The Northern Refugee Columns"
 eafp_joseon_qing_war_events.14.d: "Civilians fleeing south from the northern war zone have become entangled with the army's supply lines."
 eafp_joseon_qing_war_events.14.f: "The old carried bundles while children trudged south through snow and mud. Local officials reported empty granaries; the camps complained that supply carts could no longer pass. On the same road, the court had to weigh military provisions against civilian survival."
 eafp_joseon_qing_war_events.14.a: "Provide state relief for the refugees."
 eafp_joseon_qing_war_events.14.b: "Give military transport priority."
 eafp_joseon_qing_war_events.14.c: "Disperse them among the provinces."

