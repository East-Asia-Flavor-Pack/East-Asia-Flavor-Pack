 dowager_cixi_events.1.t: "Xinyou Coup"
 dowager_cixi_events.1.d: "By the will of the former emperor, eight ministers were to assist the young emperor who ascended the throne. However, the two Empress Dowagers and the ministers in charge, displeased with this, staged a coup and seized power."
 dowager_cixi_events.1.f: "While the young emperor struggled to understand the complexities of ruling a vast empire, plots were brewing in the shadows. With a cunning mind, Empress Dowager Cixi skillfully suppressed the ministers and consolidated her power. The imperial palace buzzed with rumors of her influence, and even the emperor himself seemed to shrink in her presence. Having firmly grasped the reins of power, Empress Dowager Cixi would go on to determine the fate of China for many years to come."
 dowager_cixi_events.1.a: "Has a new era arrived?"
 dowager_cixi_events.1.tt: "Empress Dowager Cixi and Prince Gong gain power."
 dowager_cixi_events.2.t: "Death of Empress Dowager Ci'an"
 dowager_cixi_events.2.d: "With the death of Empress Dowager Ci'an, there is no one left to stop Empress Dowager Cixi."
 dowager_cixi_events.2.f: "With the passing of Empress Dowager Ci'an, the principal wife of the former emperor and the only person in the imperial family to whom Empress Dowager Cixi had to show respect, Cixi's power became solid. Empress Dowager Cixi will continue to eliminate political opponents and maintain her position as the de facto ruler of the Qing Dynasty. But what are the emperor's thoughts? Will he fall in line with Empress Dowager Cixi's actions?"
 dowager_cixi_events.2.a: "The authority of the Son of Heaven is in jeopardy."
 dowager_cixi_events.2.tt: "Empress Dowager Cixi consolidates her power."
 dowager_cixi_events.3.t: "Peaceful Passing of Empress Dowager Cixi"
 # Peaceful Passing of Empress Dowager Cixi
 dowager_cixi_events.3.d: "After years of influential rule, Empress Dowager Cixi peacefully passed away."
 # After years of influential rule, Empress Dowager Cixi peacefully passed away.
 dowager_cixi_events.3.f: "In the dimly lit chamber, surrounded by loyal attendants and trusted advisors, Empress Dowager Cixi lies on her bed, her frail figure a stark contrast to the powerful presence she once commanded. As her breathing becomes faint, those gathered hold their breath, waiting for the inevitable moment.\n\nWith her last breath, Empress Dowager Cixi peacefully departs this world. A silence descends upon the palace, broken only by the soft sobs of those who were closest to her. Her last word is, \"Don't let a woman go into politics like me again.\"\n\nHer funeral is a grand spectacle, with a staggering sum of 1.2 million taels of silver expended and thousands of people mobilized to ensure a majestic ceremony. The procession for the funeral resemble a grand imperial parade, complete with paper dolls depicting court officials, similar to those seen in the tomb of Emperor Qin Shi Huang. Additionally, the procession features a myriad of unconventional items made from paper, including soldiers in modern military uniforms, paper clocks, paper automobiles, and paper European-style bicycles. All of these elaborate objects are cremated."
 # In the dimly lit chamber, surrounded by loyal attendants and trusted advisors, Empress Dowager Cixi lies on her bed, her frail figure a stark contrast to the powerful presence she once commanded. As her breathing becomes faint, those gathered hold their breath, waiting for the inevitable moment.\n\nWith her last breath, Empress Dowager Cixi peacefully departs this world. A silence descends upon the palace, broken only by the soft sobs of those who were closest to her. Her last word is, "Don't let a woman go into politics like me again."\n\nHer funeral is a grand spectacle, with a staggering sum of 1.2 million taels of silver expended and thousands of people mobilized to ensure a majestic ceremony. The procession for the funeral resemble a grand imperial parade, complete with paper dolls depicting court officials, similar to those seen in the tomb of Emperor Qin Shi Huang. Additionally, the procession features a myriad of unconventional items made from paper, including soldiers in modern military uniforms, paper clocks, paper automobiles, and paper European-style bicycles. All of these elaborate objects are cremated.
 dowager_cixi_events.3.a: "The end of an era."
 dowager_cixi_events.4.t: "Deposition of Empress Dowager Cixi"
 # Deposition of Empress Dowager Cixi
 dowager_cixi_events.4.d: "Empress Dowager Cixi, once a powerful figure in the Qing Dynasty, is stripped of her power and placed under house arrest."
 # Empress Dowager Cixi, once a powerful figure in the Qing Dynasty, is stripped of her power and placed under house arrest.
 dowager_cixi_events.4.f: "Empress Dowager Cixi, who wielded power by controlling the emperor, eventually fell from grace. This news spread like wildfire throughout the empire, causing shockwaves and uncertainty among the populace. The once supreme authority finds herself confined within the walls of her own palace. Guards stand watch, keeping an eye on her. The woman who had held immense power will now be forced to live a life of seclusion and introspection."
 # Empress Dowager Cixi, who wielded power by controlling an emperor, eventually fall off. This news spreads like wildfire throughout the empire, causing shockwaves and uncertainty among the populace. She, once the supreme authority, finds herself confined within the walls of her own palace. Guards stand watch, ensuring her compliance with the terms of her house arrest. The woman who had held immense power is now forced to live a life of seclusion and introspection.
 dowager_cixi_events.4.a: "The end of an era."
 dowager_cixi_events.5.t: "The Fall of the Emperor"
 dowager_cixi_events.5.d: "In a stunning coup, Empress Dowager Cixi seized control of the Qing Dynasty and placed the Emperor under house arrest."
 # In a stunning coup, Empress Dowager Cixi seizes control of the Qing Dynasty and places the Emperor under house arrest.
 dowager_cixi_events.5.f: "The news of the coup spreads like wildfire, sending shockwaves through the imperial court and beyond. The Emperor, once the symbol of authority, finds himself confined within the opulent walls of his own palace. His every move is monitored, his decisions overridden by the iron grip of the Empress Dowager."
 # The news of the coup spreads like wildfire, sending shockwaves through the imperial court and beyond. The Emperor, once the symbol of authority, finds himself confined within the opulent walls of his own palace. His every move is monitored, his decisions overridden by the iron grip of her.
 dowager_cixi_events.5.a: "The end of an era."
 dowager_cixi_events.6.t: "Empress Dowager Cixi Supports Reforms"
 dowager_cixi_events.6.d: "Amidst the deteriorating situation, Empress Dowager Cixi has begun to agree to modernization reforms."
 dowager_cixi_events.6.f: "For a long time, Empress Dowager Cixi sought to protect the traditions and rules of the Qing imperial court. However, as pressure from Western powers recently intensified, she gradually began to change her stance. The winds of change blow through the Qing government, which had been torn between tradition and modernization."
 dowager_cixi_events.6.a: "We have a long way to go."
 dowager_cixi_events.7.t: "Fall of Prince Gong"
 dowager_cixi_events.7.d: "Empress Dowager Cixi has ousted Prince Gong from power."
 dowager_cixi_events.7.f: "Prince Gong once joined hands with Empress Dowager Cixi to control the political situation of the Qing Dynasty. However, the two eventually fell out, and his fate changed. Soon, Prince Gong was dismissed from all his posts by Empress Dowager Cixi."
 dowager_cixi_events.7.a: "The political situation will become chaotic."
 dowager_cixi_events.11.t: "The Summer Palace Reconstruction Begins"
 # The Summer Palace Reconstruction Begins
 dowager_cixi_events.11.d: "The reconstruction of the Summer Palace officially began under the direction of Empress Dowager Cixi. The palace was severely damaged by foreign troops during a previous war. The restoration project aims to restore the palace to its former glory and includes the reconstruction of various halls, temples, and gardens."
 # The reconstruction of the Summer Palace officially began under the direction of Empress Dowager Cixi. The palace was severely damaged by the foreign troops during a previous war. The restoration project aimed to restore the palace to its former glory and included the reconstruction of various halls, temples, and gardens.
 dowager_cixi_events.11.f: "The reconstruction of the Summer Palace is a massive undertaking. Workers toil under the scorching sun to lay the foundations for the palace's majestic halls and pavilions. Empress Dowager Cixi watches from her throne as the work progresses, eagerly anticipating the day she can once again reside in her beloved palace."
 # The reconstruction of the Summer Palace is a massive undertaking. Workers toil under the scorching sun to lay the foundations for the palace's majestic halls and pavilions. Empress Dowager Cixi watches from her throne as the work progresses, eagerly anticipating the day she can once again reside in her beloved palace.
 dowager_cixi_events.11.a: "May this revive the dignity of the Great Qing."
 dowager_cixi_events.12.t: "Completion of the Reconstruction of the Summer Palace"
 # Completion of the Reconstruction of The Summer Palace
 dowager_cixi_events.12.d: "After years of hard work and dedication, the reconstruction of the Summer Palace has finally been completed."
 # After years of hard work and dedication, the reconstruction of The Summer Palace has finally been completed.
 dowager_cixi_events.12.f: "As the last brick is laid, the magnificent Summer Palace stands tall once again. Officials gather to admire the newly completed palace. The colors of the buildings and the intricacy of the carvings catch the eye of everyone present. Empress Dowager Cixi herself expresses her satisfaction at the lavish and grand appearance of the palace.\n\nAs the sun begins to set, the palace is illuminated by thousands of lanterns, casting a warm glow over the entire complex. Music fills the air as Empress Dowager Cixi and her guests celebrate the completion."
 # As the last brick is laid, the magnificent Summer Palace stands tall once again, and the officials gather to admire the newly completed palace. The colors of the buildings and the intricacy of the carvings catch the eye of everyone present. The Empress Dowager Cixi herself express her satisfaction at the lavish and grand appearance of the palace.\n\nAs the sun begin to set, the palace is illuminated by thousands of lanterns, casting a warm glow over the entire complex. Music fill the air as the Empress Dowager Cixi and her guests celebrate the completion of the project.
 dowager_cixi_events.12.a: "Very splendid."
 dowager_cixi_events.12.tt: "The Empress Dowager will be pleased."
 dowager_cixi_events.13.t: "Halt on the Reconstruction of the Summer Palace"
 # Halt on the Reconstruction of Summer Palace
 dowager_cixi_events.13.d: "Due to unforeseen circumstances, the reconstruction of the Summer Palace has been abruptly called off."
 # Due to unforeseen circumstances, the reconstruction of the Summer Palace is abruptly called off.
 dowager_cixi_events.13.f: "As the sound of the final hammer blow fades away at the Summer Palace, murmurs of confusion ripple through. Covered in dust and sweat, they blankly stare at the half-finished works and abandoned tools."
 dowager_cixi_events.13.a: "At least it won't cost money."
 dowager_cixi_events.21.t: "The Door Ring"
 dowager_cixi_events.21.d: "Eunuchs under Empress Dowager Cixi demand bribes."
 dowager_cixi_events.21.f: "\"I am here on the orders of Her Majesty the Empress Dowager. Open the door.\"\n\n\"Her Majesty is currently ill. She has ordered that no one be let in for the time being.\"\n\n\"What do you mean? I came running straight away on Her Majesty's orders. Open the door immediately.\"\n\n\"Then we will have to appease Her Majesty's mood. We will prepare Her Majesty's favorite food, so you just need to pay for the cost.\""
 dowager_cixi_events.21.a: "They act completely as they please."
 dowager_cixi_events.22.t: "Empress Dowager Cixi's Birthday"
 dowager_cixi_events.22.d: "The entire country is buzzing with preparations for Empress Dowager Cixi's birthday banquet."
 dowager_cixi_events.22.f: "The entire country is boiling with anticipation. The air is filled with the smell of lacquer, the echoes of hammers striking wood, and the sound of monks chanting. Artisans are busy decorating the streets by imperial order. All officials in the capital are busy preparing gifts to please the Empress Dowager."
 dowager_cixi_events.22.a: "Congratulations, Your Majesty."
 # Manchus and Han
 je_manchus_and_han: "Manchus and Han"
 je_manchus_and_han_reason: "Since the Mandate of Heaven of the Ming Dynasty declined and the order of the Manchus, the second after the Jin Dynasty, was established in the Central Plains, the Han and the Manchus experienced various conflicts early in the founding of the nation. However, as the political situation stabilized, these conflicts were somewhat patched up and maintained for hundreds of years.\n\nDespite this fact, the Qing Dynasty is a nation of the Manchus, and the superiority of the Manchus in various fields is legally specified. If the Mandate of Heaven of the Manchus is threatened, these underlying conflicts will come to the forefront and become a threat to the nation.\n\nIf you attempt to enact $lawgroup_citizenship$ laws, the groups that suffer will be #X very angry.#!"
