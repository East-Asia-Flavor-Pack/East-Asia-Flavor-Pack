l_korean:
 je_eafp_joseon_qing_war: "조청전쟁"
 je_eafp_joseon_qing_war_reason: "조선과 청 사이에 전쟁이 발발했습니다. 이 전쟁은 단순한 국경 분쟁이 아니라 오래된 사대 질서가 무너질지, 다시 강화될지를 가르는 분수령입니다."
 je_eafp_joseon_qing_war_goal: "청과의 전쟁을 끝내고 청의 종속국이 되지 마십시오."

 eafp_joseon_qing_war_events.1.t: "압록강을 넘은 포성"
 eafp_joseon_qing_war_events.1.d: "조선과 청 사이의 전쟁이 시작되었습니다."
 eafp_joseon_qing_war_events.1.f: "비변사의 뜰에는 밤새 등불이 꺼지지 않았다. 파발은 북쪽 길을 달려와 국경의 포성을 고했고, 대신들은 서로의 얼굴을 살폈다. 누군가는 아직 예부의 문서를 떠올렸고, 누군가는 이제 더는 책봉의 이름으로 머리를 숙일 수 없다고 말했다."
 eafp_joseon_qing_war_events.1.a: "천하의 질서가 흔들리는구나."

 eafp_joseon_qing_war_events.2.t: "다시 세운 국체"
 eafp_joseon_qing_war_events.2.d: "청과의 전쟁이 끝났고 조선은 청의 지배 아래 들어가지 않았습니다."
 eafp_joseon_qing_war_events.2.f: "전쟁의 먼지가 가라앉자 조정은 새 질서의 언어를 찾기 시작했다. 오래된 의례는 더는 예전처럼 굳건하지 않았고, 백성들은 조선이 스스로 버텨냈다는 사실을 이야기했다."
 eafp_joseon_qing_war_events.2.a: "조선은 스스로 서리라."

 eafp_joseon_qing_war_events.3.t: "무너진 사직의 체면"
 eafp_joseon_qing_war_events.3.d: "청과의 전쟁이 조선의 굴복으로 끝났습니다."
 eafp_joseon_qing_war_events.3.f: "전쟁은 끝났지만 조정의 침묵은 더 깊어졌다. 사람들은 패전의 책임을 물었고, 거리에는 굴욕과 분노가 같은 말처럼 떠돌았다."
 eafp_joseon_qing_war_events.3.a: "이 치욕은 오래 남을 것이다."

 eafp_joseon_qing_war_events.10.t: "의주의 보급로"
 eafp_joseon_qing_war_events.10.d: "북방 전선의 보급 문제가 조정의 결정 앞에 놓였습니다."
 eafp_joseon_qing_war_events.10.f: "의주로 향하는 길에는 군량 수레와 피난 행렬이 뒤섞였다. 장계는 군량이 모자란다고 했고, 지방관은 백성들이 이미 감당할 수 없을 만큼 징발되었다고 호소했다."
 eafp_joseon_qing_war_events.10.a: "군량을 전선에 집중하라."
 eafp_joseon_qing_war_events.10.b: "지방에서 더 부담하게 하라."
 eafp_joseon_qing_war_events.10.c: "조정의 재정을 아껴야 한다."

 eafp_joseon_qing_war_events.11.t: "피난민과 군량"
 eafp_joseon_qing_war_events.11.d: "전쟁으로 밀려난 피난민과 군량 수요가 충돌하고 있습니다."
 eafp_joseon_qing_war_events.11.f: "관아 앞에는 굶주린 이들이 모여들었고, 군영에서는 내일 쓸 쌀도 모자라다고 아우성쳤다. 한쪽을 살리면 다른 한쪽이 무너질 듯했다."
 eafp_joseon_qing_war_events.11.a: "구휼미를 풀어라."
 eafp_joseon_qing_war_events.11.b: "군량이 먼저다."
 eafp_joseon_qing_war_events.11.c: "향촌의 힘을 빌리자."

 eafp_joseon_qing_war_events.12.t: "의병과 상소"
 eafp_joseon_qing_war_events.12.d: "반청 여론과 의병 동원이 조정의 통제를 요구하고 있습니다."
 eafp_joseon_qing_war_events.12.f: "각지의 유생과 향리들이 상소를 올리고, 장정들은 스스로 창칼을 들겠다고 나섰다. 그 열기는 전쟁을 지탱할 힘이 될 수도, 조정의 손을 벗어난 불길이 될 수도 있었다."
 eafp_joseon_qing_war_events.12.a: "의병을 장려하라."
 eafp_joseon_qing_war_events.12.b: "상소를 받아들이자."
 eafp_joseon_qing_war_events.12.c: "무장을 엄격히 통제하라."

 eafp_joseon_qing_war_events.13.t: "동장군"
 eafp_joseon_qing_war_events.13.d: "혹한이 북방 전선을 덮쳤습니다."
 eafp_joseon_qing_war_events.13.f: "눈은 길을 삼켰고, 얼어붙은 손으로 화승을 다루는 병사들은 말없이 하늘을 올려다보았다. 적보다 먼저 겨울이 군영을 공격하고 있었다."
 eafp_joseon_qing_war_events.13.a: "방한 물자를 우선 보급하라."
 eafp_joseon_qing_war_events.13.b: "현지 징발을 허용하라."
 eafp_joseon_qing_war_events.13.c: "공세를 늦추자."

 eafp_joseon_qing_war_events.14.t: "포탄 속의 모래"
 eafp_joseon_qing_war_events.14.d: "부실 군수품과 납품 비리가 드러났습니다."
 eafp_joseon_qing_war_events.14.f: "포탄을 열자 쇳조각보다 모래가 먼저 쏟아졌다. 군영은 분노했고, 관청은 서류를 숨기려 했으며, 공장 주인은 전시의 혼란을 핑계로 삼았다."
 eafp_joseon_qing_war_events.14.a: "관련자를 엄벌하라."
 eafp_joseon_qing_war_events.14.b: "급한 대로 덮어라."
 eafp_joseon_qing_war_events.14.c: "군수 조달을 개편하라."

 eafp_joseon_qing_war_events.15.t: "패장의 자결"
 eafp_joseon_qing_war_events.15.d: "패전의 책임을 지겠다며 한 장수가 죽음을 택하려 합니다."
 eafp_joseon_qing_war_events.15.f: "군막 안에 놓인 검은 이미 뽑혀 있었다. [SCOPE.sCharacter('defeated_general').GetFullName](은)는 패전의 죄를 살아서 갚을 수 없다고 말했다. 조정은 그 죽음을 충절로 기록할지, 군제 개혁의 명분으로 삼을지 결정해야 했다."
 eafp_joseon_qing_war_events.15.a: "그 충절을 기려라."
 eafp_joseon_qing_war_events.15.b: "이 죽음을 군제 개혁의 계기로 삼아라."
 eafp_joseon_qing_war_events.15.c: "패전은 조용히 덮어라."

 eafp_joseon_qing_war_events.16.t: "대화재"
 eafp_joseon_qing_war_events.16.d: "전쟁의 혼란 속에서 큰 화재가 번졌습니다."
 eafp_joseon_qing_war_events.16.f: "불길은 창고와 민가를 가리지 않고 번졌다. 포성인지 방화인지, 혹은 피난민의 실수인지 아무도 확신하지 못했다. 다만 잿더미 위에 서 있는 백성들에게는 원인보다 당장의 구호가 절실했다."
 eafp_joseon_qing_war_events.16.a: "구호와 진화를 우선하라."
 eafp_joseon_qing_war_events.16.b: "군수창부터 지켜라."
 eafp_joseon_qing_war_events.16.c: "책임자를 처벌하라."

