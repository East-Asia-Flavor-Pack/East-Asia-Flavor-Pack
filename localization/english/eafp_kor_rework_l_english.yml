 eafp_kor_mainline.111.mt: "Audience"
 eafp_kor_mainline.111.md: "The Queen Dowager grants an audience to the ministers."
 eafp_kor_mainline.111.mf: "\"Why is Heaven so cruel to do this? Why is Heaven so cruel to do this? How can the sorrow be this extreme?\"\n\nAs she spoke, [SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName] wailed and sobbed, saying,\n\n\"Who could have known that the five-hundred-year royal shrine would suddenly come to this today? I implore you, please generously restrain yourself.\"\n\nAnd Jeong Won-yong said,\n\n\"The grand design of the royal shrine is urgent. I implore you, generously restrain yourself and clearly issue an instruction so that we ministers may hear it in detail. This is a matter of the utmost gravity and cannot be handled by words alone. I implore you, write it down and hand it to us.\"\n\nThe Queen Dowager said,\n\n\"I have it written down here.\"\n\nJeong Won-yong asked again,\n\n\"How old is he now?\"\n\nShe answered,\n\n\"He is [SCOPE.GetValue('cheoljong_age')] years old.\"\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName] and others said,\n\n\"The grand design of the royal shrine is now settled, a matter of great fortune. This is an extremely grave matter, so it seems best to designate a few from the royal guard to go ahead and escort him from his residence.\""
 eafp_kor_mainline.111.oa: "\"The bloodline of King Yeongjo consists only of the current King and 'Yi Won-beom' living in Ganghwa, so I entrust the royal shrine to him; he is the third son of Gwang.\""

 eafp_kor_mainline.112.mt: "Escort"
 eafp_kor_mainline.112.md: "The Queen Dowager orders the escort ceremony to be held according to precedent."
 eafp_kor_mainline.112.mf: "She instructed,\n\n\"The escort procession will enter the palace sooner or later. Have the relevant ministry immediately carry out the conferment of the title, and propose the title of Prince Deokwan for him.\"\n\n\"Also, have the relevant ministry immediately carry out the restoration of titles for Prince Euneon and his wife today.\"\n\nThen, Left State Councillor Kim Do-hui reported,\n\n\"Receiving your instruction now, the entrustment of the royal shrine is already settled, which is boundlessly fortunate. Humbly considering, the way for the new King to become well-versed in state affairs depends entirely on the teachings Your Highness will provide by [Concept('concept_eafp_korean_regent', 'ruling from behind the bamboo screen')]. I implore you, quickly issue a decree to answer the feelings of the multitude.\"\n\nThe Queen Dowager instructed,\n\n\"I am over sixty years old and my mind is already dim, so how could I discuss this matter again now, but...\""
 eafp_kor_mainline.112.oa: "\"...the affairs of the state are extremely grave and there is nowhere left to defer them, so I will reluctantly comply.\""
 #

 eafp_kor_mainline.114.t: "Succession to the Throne"
 eafp_kor_mainline.114.d: "The Queen Dowager ordered the succession to the second legitimate son of Prince Heungseon, and dispatched Chief State Councillor [SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName] and Chief Royal Secretary Min Chi-sang to escort him from his private residence."
 eafp_kor_mainline.114.f: "The Queen Dowager said,\n\n\"I have decided to have Yi Myeong-bok, the second legitimate son of Prince Heungseon, succeed to the great lineage of the late King Ikjong.\"\n\nThen, the Queen Dowager produced a decree written in the vernacular script from behind the bamboo screen. Chief Royal Secretary Min Chi-sang received it, and after the ministers translated it into Classical Chinese and read it back to the Queen Dowager, they brought it out and promulgated it. Jeong Won-yong reported,\n\"Encountering such a perilous time for the nation, humbly seeing your decision from behind the bamboo screen, the foundation as solid as Mount Tai for ten thousand years begins from this. I cannot contain my joyous and fortunate feelings.\"\n\nChief State Councillor [SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName] reported,\n\n\"How old is Prince Ikseong this year?\"\n\nThe Queen Dowager said,\n\n\"He should be [SCOPE.GetValue('gojong_age')] years old.\"\n\nJeong Won-yong reported,\n\"Before respectfully welcoming him, it seems best to first dispatch a few units from each military camp to guard the perimeter of his residence.\"\n\nThe Queen Dowager said,"
 eafp_kor_mainline.114.o: "\"Do so.\""

 eafp_kor_mainline.115.t: "Entering the Palace"
 eafp_kor_mainline.115.d: "Escorting the succeeding King into the palace."
 eafp_kor_mainline.115.f: "Yeongjungchubusa Jeong Won-yong reported,\n\n\"When the nation's situation became perilous and people's minds were unsettled, fortunately, Your Compassionate Highness issued a decisive decree from behind the bamboo screen, ushering in an era of peace. Looking up to your spirit, bright as the sun in the sky, there is no one among the multitude who does not rejoice.\"\n\nThe Queen Dowager said,\n\n\"Even amidst such boundless sorrow, the great plan has already been settled. Moreover, Prince Ikseong, despite his young age, is mature in his manners and highly intelligent. This is truly very fortunate for the royal shrine and state altar.\"\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName] reported,\n\n\"When the King inherits the throne at a young age, there have previously been precedents of [Concept('concept_eafp_korean_regent', 'ruling from behind the bamboo screen')]. How about preparing according to the regulations this time as well?\"\n\nThe Queen Dowager said,\n\n\"How could I bear to do it? But today, the nation's situation is so isolated and perilous that it seems it cannot be preserved for even a day, so there is no time to consider anything else. I must simply endeavor to comply.\""
 eafp_kor_mainline.115.o: "Subsequently, she ordered the procedures for the regency from behind the bamboo screen to be carried out according to precedent."

 # 역사적 박해 이벤트

 eafp_kor_mainline.120.mt: "Yi Ji-yeon's Memorial"
 eafp_kor_mainline.120.md: "Right State Councillor Yi Ji-yeon petitions to thoroughly investigate the matter concerning the evil learning."
 eafp_kor_mainline.120.mf: "\"Recently, I heard that the number of evil learning criminals caught by the two police bureaus reaches several dozens. Some have been handed over to the Ministry of Punishments, but almost all of them are determined to die, deeply deluded, and very few are capable of being moved to repent. Even looking at those already exposed, one cannot know the number of those vicious and ugly mobs who have gathered and secretly made dens. The collapse of normal human relations and the gradual contamination of customs go without saying, and one cannot help but worry about troubles like the Yellow Turbans or the White Lotus. The current situation requires stricter investigation and thorough punishment for all, but with the intention of saving lives, we cannot aim solely to kill.\""
 eafp_kor_mainline.120.oa: "We must correct the disorderly mobs who recognize neither father nor King."
 eafp_kor_mainline.120.ob: "An edict to eradicate the evil learning will be issued in the name of the Queen Dowager."
 eafp_kor_mainline.120.oc: "Is this... the right thing to do?"
 large_scale_christian_persecution_modifier: "Persecution of Christians"
 ruler_protect_christians_modifier: "King Protects Christians"

 eafp_kor_mainline.121.mt: "The End of Persecution?"
 eafp_kor_mainline.121.md: "The Edict Rejecting Falsehood is promulgated."
 eafp_kor_mainline.121.mf: "'Why abandon the smooth path pursued together in this country and willingly accept the strange doctrines from tens of thousands of miles away, stepping into a trap yourselves? Alas! I do not know what the undiscovered ones will scheme next and what will become of their arrogance. Fathers must admonish their sons, elder brothers must admonish their younger brothers. Let it be known that the misguided must be enlightened, and those not yet fallen must be warned.'\n\nBy executing the Western priests who disturbed the customs for several months and edifying the people, the matter has been concluded for now.\n\nMeanwhile, somewhere in Joseon, there are rumors that Kim Dae-geon and Choe Yang-eop have embarked on a journey to study in China..."
 eafp_kor_mainline.121.oa: "This should quiet things down for a while."

 eafp_kor_mainline.122.mt: "The Case of Yun Sang-do"
 eafp_kor_mainline.122.md: "Suspicions of Kim Jeong-hui's involvement."
 eafp_kor_mainline.122.mf: "Recently, the story of Yun Sang-do's treason case has been brought up again, and Chusa Kim Jeong-hui has been implicated for allegedly drafting the memorial in which Yun Sang-do strongly criticized the Andong Kim faction.\n\nRight State Councillor Jo In-yeong of the Pungyang Jo clan, who has deep ties with him, submitted an earnest appeal. It seems Chusa's life might be spared, but a grueling journey to exile appears unavoidable."
 eafp_kor_mainline.122.oa: "It cannot be helped."
 eafp_kor_mainline.122.ob: "No, he is an indispensable talent!"

 eafp_kor_mainline.123.mt: "Impeachment of Yi Jae-hak"
 eafp_kor_mainline.123.md: "Yi Ji-yeon is impeached by the censors."
 eafp_kor_mainline.123.mf: "Led by Inspector General Yi Jae-hak and Censor General Yi Ui-jun, a memorial of impeachment was submitted, fiercely condemning Yi Jae-hak's unreasonable handling of affairs and his monopolization of power.\n\nCurrently, places like Myeongcheon in North Hamgyeong Province are being discussed as likely exile destinations, and given the atmosphere in the court, his exile seems to be a foregone conclusion."
 eafp_kor_mainline.123.oa: "He did get a lot of blood on his hands."
 eafp_kor_mainline.123.ob: "But who can deny his integrity!"

 eafp_kor_mainline.124.mt: "Pastoral Activities Discovered"
 eafp_kor_mainline.124.md: "Arrest at Baengnyeongdo Port."
 eafp_kor_mainline.124.mf: "His name is said to be Kim Dae-geon. At the age of 15, he fled to the Qing dynasty, entered Guangdong to learn the Western religion, and in the year of Gyemyo, colluded with Hyeon Seok-mun and others to secretly return and become a religious leader in the capital...\n\nCaptured by a person from the Haeseo region this spring, he insisted he was Chinese until finally confessing the truth from beginning to end...\n\nBeing in a position they call 'priest', which is unprecedented for someone of Joseon origin unlike previous cases...\n\nJudging this not to be taken lightly, it has been decided to escort him to Hanyang. We ask the court to make a wise judgment.\n-Haeju Provincial Office-"
 eafp_kor_mainline.124.oa: "The weight of the matter is indeed heavy."

 eafp_kor_mainline.125.mt: "Ominous Ship"
 eafp_kor_mainline.125.md: "The following letter arrived from Admiral Jean-Baptiste Cécille of the French dispatched fleet."
 eafp_kor_mainline.125.mf: "'Three noble figures of our kingdom, Bishop Imbert, Father Chastan, and Father Maubant, were unfortunately executed by you. Now we have come to ask you for what reason you killed them. You might say that your country's laws forbid unauthorized entry by foreigners, and because those three violated this law, they were executed. However, when Chinese, Manchurians, or Japanese enter Joseon, you dare not kill them but return them to their respective countries. Why then did you not treat the three people from our country like the Chinese, Manchurians, or Japanese? If they had committed murder, arson, or similar heinous crimes, it would have been proper to arrest and punish them, and we would have remained silent and acquiesced. But they were innocent, and your unjust execution of them is a grave insult to the French nation.'"
 eafp_kor_mainline.125.oa: "The insolence of the barbarians has reached this point."

 eafp_kor_mainline.126.mt: "Time for Decision"
 eafp_kor_mainline.126.md: "Discussing the matter of Kim Dae-geon."
 eafp_kor_mainline.126.mf: "The King asked,\n\"How shall we handle the matter of Kim Dae-geon?\"\n\nTo which Gwon Don-in replied,\n\"The matter of Kim Dae-geon cannot be pardoned even for a moment. He voluntarily relied on the evil religion to deceive and bewilder the public mind. If you clarify what he has done, it solely came from a scheme to deceive, bewilder, incite, and disrupt. Moreover, beyond his evil arts, he, inherently a Joseon person, betrayed his own country, violated the borders of another country, styled himself as part of the evil learning, and what he said seems to have accomplices. Thinking about it makes one's bones chill and gall tremble. If we do not punish him according to the law, it will only provide a pretext for others to find faults, and we will not avoid showing weakness.\""
 eafp_kor_mainline.126.oa: "Execute him."
 eafp_kor_mainline.126.ob: "Send him into exile."
 eafp_kor_mainline.126.oc: "Release him."

 eafp_kor_mainline.127.mt: "Hunting Down Believers of Western Learning"
 eafp_kor_mainline.127.md: "The Police Commanders carried out a hunt for Western Learning believers without the court's permission. They indiscriminately arrested believers, and during this process, policemen engaged in looting, causing a commotion."
 eafp_kor_mainline.127.mf: "Right Police Commander Sin Myeong-sun and Left Police Commander Im Tae-yeong arrested about 30 Western Learning believers and escorted them to Hanyang. Reports came in that during the arrest, the policemen committed unsavory atrocities such as looting property and arson. Consequently, Kim Byeong-gi, Commander of the Military Training Agency and Minister of Taxation, and Kim Byeong-un, Minister of Punishments, argued that the arrested believers should be released and the Police Commanders should resign."
 eafp_kor_mainline.127.oa: "Nothing short of atrocities. Order them to resign immediately."
 eafp_kor_mainline.127.ob: "Weren't they arrested because they were guilty?"

 eafp_kor_mainline.128.mt: "Sad News from the Great South (Vietnam)"
 eafp_kor_mainline.128.md: "News reached the court that the Great South was invaded under the pretext of suppressing Catholicism. As fear spreads that Joseon could also become a target of Western barbarian invasion, memorials demanding preemptive suppression of Catholicism are pouring in."
 eafp_kor_mainline.128.mf: "\"Since ancient times, if we speak of heretical doctrines eroding and harming people's minds, how could we count them all? But nothing is worse than the Western religion. And among barbarians causing disaster to other countries, how could we count them all? But again, none have been worse than the Western barbarians. Generally, the purpose of secretly infiltrating our country and widely spreading the evil learning is to increase their factions, respond to each other from within and without, spy on our country's situation, lead armies to invade, disrupt our cultural institutions, and plunder our nation's wealth and women, thereby satisfying their endless greed.\""
 eafp_kor_mainline.128.oa: "Execute and eliminate all the spies."

 # 이하 유학의 왕국 이벤트

 eafp_kor_mainline.170.mt: "Edification of [GetCurrentGameDate.Format('y')]"
 eafp_kor_mainline.170.md: "A large-scale arrest of the mobs following the evil learning."
 eafp_kor_mainline.170.mf: "Recently, reports have constantly come in from various provinces about rumors of mobs following subversive ideologies and Westerners encouraging them, so the civil and military officials could not help but worry. When the court ordered a strict crackdown, sure enough, it was confirmed that numerous mobs were operating in secret. Among them, it was also confirmed that there were Westerners who had secretly entered the country disguised as mourners without permission.\n\nMany of the pitiful people misled by them chose to abandon their false beliefs and return to their livelihoods. However, some believers still refused edification, and the foreign ringleaders all refused even repatriation despite compassionate measures and chose death, so there was no choice but to behead them all."
 eafp_kor_mainline.170.oa: "The more chaotic the times, the more we must upright the orthodox learning."
 eafp_kor_mainline.170.tt: "All active missionaries #N die#!."

 eafp_kor_mainline.171.mt: "A New Wave"
 eafp_kor_mainline.171.md: "Through the recent turbulent period, understanding of foreign ideologies and philosophies has deepened. Now, the perception that diverse beliefs and philosophies can coexist in our society as a whole is spreading, and these changes are opening new horizons for the development of domestic academia and arts."
 eafp_kor_mainline.171.mf: "\"In this vast world, diverse principles exist. Confucianism is undoubtedly the foundation of the royal shrine, but we must acknowledge that there is much to be learned from the ideologies of other countries as well.\""
 eafp_kor_mainline.171.oa: "Our wisdom will deepen further."

 #

 eafp_kor_mainline.200.mt: "Soil of Corruption"
 eafp_kor_mainline.200.md: "Rebuking the ministers for not punishing the magistrates."
 eafp_kor_mainline.200.mf: "The King proceeded to Junghuidang and granted an audience to the ministers and the officials of the Border Defense Council. The Queen Dowager instructed,\n\"Currently, there is no town in the eight provinces without deficits in the grain loan system, and these deficits arise entirely due to the petty officials. If those who become governors or magistrates are in the least bit corrupt and commit offenses first, how can it be prohibited, and how can it be said that there is a purpose in appointing governors and magistrates? Moreover, powerful people are never punished even if they commit many offenses time and again, and only the powerless minor officials and military officers are rebuked. Not only the governors and magistrates, but can you ministers also say you are completely upright in every matter? It has been three years since I began the regency behind the bamboo screen, yet I have not heard of any governor or magistrate being punished.\"\n\nTo this, Right State Councillor Bak Jong-hun said,\n\"As an unworthy person like me receives such an instruction, I have no words to humbly offer.\"\n\nThen the Queen Dowager instructed...\n\"I am not speaking of you alone, but that the whole world is like this.\""
 eafp_kor_mainline.200.oa: "(But... aren't they all from your family, grandmother...?)"

 eafp_kor_mainline.206.mt: "Deficits"
 eafp_kor_mainline.206.md: "Taxes from Jinju are not being properly submitted."
 eafp_kor_mainline.206.mf: "According to the 'Hogu Chongsu' (Comprehensive Census), Jinju is inherently fertile and populous, so about 40,000 seok of tax grain should be submitted annually. However, as the corrupt clerks' practice of siphoning off grain has gone on for a long time, the accumulated deficits beyond control have reached the scale of 60,000 seok.\n\nAs the court pressed for this, the local office passed the burden onto the people to immediately prepare the taxes to be sent up. In addition to the original taxes, additional collections of coins and cotton cloth snowballed daily, plunging the people's livelihood into misery."
 eafp_kor_mainline.206.oa: "Is it even possible to embezzle this much???"

 eafp_kor_mainline.207.mt: "Ipojingmin (Exacting Clerks' Deficits from the People)"
 eafp_kor_mainline.207.md: "The people who came up to Hanyang appeal their grievances."
 eafp_kor_mainline.207.mf: "The term 'Ipojingmin', meaning collecting the grain siphoned off by corrupt officials from innocent people, began circulating among the public. The people of Jinju, unable to endure any longer, flocked to Hanyang in groups and informed the Border Defense Council of their grievances.\n\nThe central government, acutely aware of the gravity of the matter, ordered those who siphoned off the tax grain to replenish it, and simultaneously discussed punishments for high-ranking officials.\n\nThe people rejoiced and returned to the provinces, but contrary to what was promised, the situation hardly changed. Consequently, the helpless people began deciding one by one to flee to other provinces to escape the tyranny.\n\nThe already stagnant water had festered hopelessly under the system of the Joseon state, where a simple order from above was useless to rectify it."
 eafp_kor_mainline.207.oa: "So... replacing the magistrate should do it?"

 eafp_kor_mainline.208.mt: "Dismissal of Official"
 eafp_kor_mainline.208.md: "Ordering the dismissal of the Pastor (Magistrate)."
 eafp_kor_mainline.208.mf: "As the situation in Jinju is serious, voices calling for the replacement of the magistrate rose within the court, so it was decided to send a new official to calm the masses and resolve the issue...."
 eafp_kor_mainline.208.oa: "This should soothe the public sentiment a bit."
 eafp_kor_mainline.208.ob: "Again?"

 eafp_kor_mainline.209.mt: "Dogyeol (Unified Tax Payment)"
 eafp_kor_mainline.209.md: "Deciding to collect the unpaid taxes."
 eafp_kor_mainline.209.mf: "\"Magistrate, what on earth does that mean? How can we prepare tens of thousands of seok of grain right now!\"\n\n\"It's not that I want to say this either, but even this is an order I barely negotiated with the court, getting them to write off 8,000 seok as a deficit.\"\n\n\"It is unavoidable that I have decided to add 6 nyang 5 jeon per gyeol to the Dogyeol this time, so I gather you here to seek your cooperation.\"\n\n\"Installment payment sounds good, but then where do we get our income in a lump sum? We've already suffered huge losses from what we've paid so far...\"\n\n\"Magistrate Hong, Lord Kim's reaction is somewhat natural. We don't want to be treated as misers either. But to raise such an amount, we would have to sell several patches of land and a few houses. But who could buy them in these times? Aren't all those with the wealth to live in this region already here?\"\n\n\"Then where did all the things we paid so far go? Into whose belly did they enter? If we raise the tenant rates further, those people will die. Frankly speaking, the truly responsible ones have already embezzled a fortune, undergone a superficial investigation, and were released to live in luxury far away. Aren't you just gathering us, the easy targets, to ask for 'cooperation'?\""
 eafp_kor_mainline.209.oa: "Everyone's circumstances are pitiful, but the court must keep running."

 eafp_kor_mainline.210.mt: "Conspiracy"
 eafp_kor_mainline.210.md: "The spark of resistance."
 eafp_kor_mainline.210.mf: "\"Did you hear? The government is collecting taxes again?\"\n\n\"What kind of bolt from the blue is this! What is left to squeeze out of us!\"\n\n\"Those noblemen in tile-roofed houses at least have houses and land, but for us who live day to day, it's just telling us to die.\"\n\n\"That's not all. Rumor has it that the military camp is also taking this opportunity to join in and collect tens of thousands of nyang in additional grain loan taxes. If it's true, who will end up bearing all of that!\"\n\n\"We can't live like this, it's time for collective action!\"\n\n\"Hey man, what can we do just by ourselves?\"\n\n\"Of course we can't do it alone. But rumor has it that a somewhat educated nobleman in this region is gathering people at the market these days...?\"\n\n\"Is that true? Let's hear more about that...\""
 eafp_kor_mainline.210.oa: "Oh my."

 eafp_kor_mainline.211.mt.1: "Jinju Peasant Uprising"
 eafp_kor_mainline.211.mt.2: "Hwaseong Peasant Uprising"
 eafp_kor_mainline.211.mt.3: "Iksan Peasant Uprising"
 eafp_kor_mainline.211.mt.4: "Jeongju Peasant Uprising"
 eafp_kor_mainline.211.mt.5: "Bukcheong Peasant Uprising"
 eafp_kor_mainline.211.mt.e: "Error: State not properly specified"
 eafp_kor_mainline.211.md: "#N Uprising#!"
 eafp_kor_mainline.211.mf.1: "When Yu Gye-chun, a reputable fallen nobleman in Jinju, acted as the spiritual focal point for the peasants, the local government deemed this dangerous and made the bad move of arresting him.\n\nConsequently, a mass rally took place in an area called Sucheongga, where a huge crowd of woodcutters, laborers, and others, known as the 'Chogun', gathered. The startled authorities released him.\n\nHowever, the crowd saw no further point in peaceful negotiations. Ultimately, when the crowd united around Yu Gye-chun resolved on a full-scale resistance, numerous forces swarmed like clouds centering around the marketplace, reaching thousands in number..."
 eafp_kor_mainline.211.mf.2: "When a reputable fallen nobleman in the region naturally spoke on behalf of the peasants and acted as their focal point, the local government deemed this dangerous and made the bad move of arresting him.\n\nConsequently, a mass rally took place on the local streets, where a huge crowd of woodcutters, laborers, and others, known as the 'Chogun', gathered. The startled authorities released him.\n\nHowever, the crowd saw no further point in peaceful negotiations. Ultimately, when the crowd united around the released nobleman resolved on a full-scale resistance, numerous forces swarmed like clouds centering around the marketplace, reaching thousands in number..."
 eafp_kor_mainline.211.oa: "Oh no"

 eafp_kor_mainline.212.mt: "Close the Market!"
 eafp_kor_mainline.212.md: "As the huge crowd gathered and organized, they carried out a strike by closing the market doors."
 eafp_kor_mainline.212.mf: "Circulars of disloyalty are circulating on the streets, and the once vibrant atmosphere has turned into anger.\n\nIn the town, the spark to break this eerie silence is settling down..."
 eafp_kor_mainline.212.oa: "Oh no"

 eafp_kor_mainline.213.mt: "Set the Fire!"
 eafp_kor_mainline.213.md: "Starting with a commotion that erupted in the middle of the night, the condensed anger soon turned into splendid flames and began to burn."
 eafp_kor_mainline.213.mf: "The crowd roamed the streets, burning and destroying the houses of the corrupt officials and clerks who had harshly persecuted the people, the rich and noblemen who turned a blind eye to their suffering and forgot their social duties, and the shameless ones who colluded with the corrupt officials relying on power.\n\nOnly a few of those extortioners who once ruled over the people in luxury could barely save their own lives and flee."
 eafp_kor_mainline.213.oa: "Oh no"

 eafp_kor_mainline.214.mt: "One Mind"
 eafp_kor_mainline.214.md: "As the long-suppressed dissatisfaction finally poured out, numerous residents, including the elderly and women, responded."
 eafp_kor_mainline.214.mf: "People are providing food and drink to feed the strong men, hiding them from officials and soldiers, and supporting them materially and morally.\n\nThe alienated public sentiment gathered even more crowds as time passed, even from neighboring towns, and the Chogun are marching with great momentum towards the government office where the magistrate is."
 eafp_kor_mainline.214.oa: "Oh no"

 eafp_kor_mainline.215.mt: "Informed of Their Sins!"
 eafp_kor_mainline.215.md: "The masses formed ranks, attacked the government office, and held an armed demonstration shouting slogans."
 eafp_kor_mainline.215.mf: "Only the magistrate himself, who came down from the central government by the King's order, could have his safety guaranteed. Even he, trembling with fear at the stern demand to abolish the Dogyeol, wrote out the document.\n\nHowever, the petty officials and clerks who had been tyrannizing right before their eyes could not escape punishment. They were dragged before the crowd, paid for their karma by being beaten and cursed, and condemned. The people cheered, shared the grain from the government office, and burned the land and slave documents that were the source of the abuses.\n\nYet, the most vicious among them managed to slip away like loaches and fled to the military camp. Upon confirming this, the masses began to march in pursuit."
 eafp_kor_mainline.215.oa: "Oh no"

 eafp_kor_mainline.216.mt: "Strike Them All!"
 eafp_kor_mainline.216.md: "A multitude numbering in the tens of thousands, wearing bandanas and armed with clubs and farming tools, reached the military camp and demanded the evil clerks be handed over. As they continuously recited all the tyrannical crimes of embezzling people's property and evading taxes, confidently rebuking them to their faces, the soldiers hearing this collectively disobeyed orders and joined the uprising."
 eafp_kor_mainline.216.mf: "The extortioners who dared to believe they could save their lives were dragged out by the very soldiers guarding them, found one by one, and killed. Those who incurred particularly deep resentment were beaten to death by the masses, and even their corpses were burned."
 eafp_kor_mainline.216.oa: "Oh no"

 eafp_kor_mainline.217.mt: "Wave of Resistance"
 eafp_kor_mainline.217.md.1.a: "Danseong Joins the Uprising"
 eafp_kor_mainline.217.md.1.b: "Changwon Joins the Uprising"
 eafp_kor_mainline.217.md.2.a: "Pyeongtaek Joins the Uprising"
 eafp_kor_mainline.217.md.2.b: "Jinwi Joins the Uprising"
 eafp_kor_mainline.217.md.3.a: "Gongju Joins the Uprising"
 eafp_kor_mainline.217.md.3.b: "Suncheon Joins the Uprising"
 eafp_kor_mainline.217.md.4.a: "Songnim Joins the Uprising"
 eafp_kor_mainline.217.md.4.b: "Taecheon Joins the Uprising"
 eafp_kor_mainline.217.md.5.a: "Hamheung Joins the Uprising"
 eafp_kor_mainline.217.md.5.b: "Sinpo Joins the Uprising"
 eafp_kor_mainline.217.md.e: "Error: Spreading state not properly specified"
 eafp_kor_mainline.217.mf.a: "Since the flames of chaos arose in [ROOT.GetState.GetName], yet another town has ultimately joined the procession of the uprising.\n\nUpon hearing the news from the neighboring area, the residents here also poured out their long-suppressed anger, attacking the government office and smashing the houses of the petty officials.\n\nNumerous houses are burning, the rich and officials are often caught and killed while fleeing, and the crowd is threatening the magistrate to demand tax reductions!"
 eafp_kor_mainline.217.mf.b: "A flood of anger is swallowing the entirety of [ROOT.GetState.GetName], and even more towns are successively rising up.\n\nIf suppression is achieved in one area, two more areas rise up shortly after, and already numerous government offices and military camps have fallen and lost their functions.\n\nIn some areas, even a former county magistrate became the ringleader and started the uprising, while in other areas, peasants who burned all existing government documents have formed their own autonomous organizations and are refusing to communicate!"
 eafp_kor_mainline.217.mf.e: "Error: Value of variable eafp_var_imsul_on_state is not 2 or 3, or variable does not exist"
 eafp_kor_mainline.217.oa: "Oh no"

 eafp_kor_mainline.218.mt.1: "Uprising Spreads to Gyeongsang Province!"
 eafp_kor_mainline.218.mt.2: "Uprising Spreads to Gyeonggi Province!"
 eafp_kor_mainline.218.mt.3: "Uprising Spreads to Jeolla Province!"
 eafp_kor_mainline.218.mt.4: "Uprising Spreads to Pyeongan Province!"
 eafp_kor_mainline.218.mt.5: "Uprising Spreads to Hamgyeong Province!"
 eafp_kor_mainline.218.mt.e: "Error: Spreading state not properly specified"
 eafp_kor_mainline.218.md.1: "Flames of resistance rise in Jinju"
 eafp_kor_mainline.218.md.2: "Flames of resistance rise in Hwaseong"
 eafp_kor_mainline.218.md.3: "Flames of resistance rise in Iksan"
 eafp_kor_mainline.218.md.4: "Flames of resistance rise in Jeongju"
 eafp_kor_mainline.218.md.5: "Flames of resistance rise in Bukcheong"
 eafp_kor_mainline.218.md.e: "Error: Spreading state not properly specified"
 eafp_kor_mainline.218.mf: "An urgent report has arrived from the provinces.\n\nAccording to the report, the unsettling news of the peasant revolt has flowed into the neighboring province, and the people of [ROOT.GetState.GetName] are gathering to join the rebellion!\n\nIf this continues, all eight provinces will be engulfed in chaos!"
 eafp_kor_mainline.218.oa: "Oh no"

 eafp_kor_mainline.219.mt: "Spread of Chaos"
 eafp_kor_mainline.219.md: "Anger out of control"
 eafp_kor_mainline.219.mf: "As the uprisings in the regions intensify and grow in scale, more and more groups are acting independently.\n\nIncreasingly fragmented mobs are spreading everywhere, aggravating regional chaos, and some of them are resorting to looting civilian houses, acting no differently than bandits!"
 eafp_kor_mainline.219.oa: "Oh no"

 eafp_kor_mainline.220.mt: "Fading Flames"
 eafp_kor_mainline.220.md: "Calming down"
 eafp_kor_mainline.220.mf: "Even fiercely burning flames do not last forever.\n\nWhether the people's anger has sufficiently dissipated, or our sincerity has been accepted, the uprising is now gradually entering a phase of pacification.\n\nSoon, if the administrative system is restored to some extent, we can appoint a capable Special Inspector to comfort the people and discuss the earnest resolution of the situation."
 eafp_kor_mainline.220.oa: "Thank goodness..."

 eafp_kor_mainline.221.mt: "Resolution"
 eafp_kor_mainline.221.md: "[SCOPE.sCharacter('eafp_char_park_gyusu').GetFullName] emerges as a candidate for Special Inspector"
 eafp_kor_mainline.221.mf: "With the situation somewhat calmed, discussions are ongoing about who would be best to dispatch as the Special Inspector to begin reconstruction and cleanup.\n\nConsequently, [SCOPE.sCharacter('eafp_char_park_gyusu').GetFullName], who recently returned from Rehe, has been agreed upon by the ministers as the most suitable person due to his experience as a Secret Royal Inspector in Gyeongsang Province, his erudition, brilliance, and character.\n\nHe has completed preparations to go down to the provinces, investigate the causes of the uprising, propose various policies to resolve the situation and comfort the people, and collect public opinion."
 eafp_kor_mainline.221.oa: "I trust you entirely, so please take on this task."
 eafp_kor_mainline.221.ob: "In addition, I hope you will nurture younger scholars and advance academics."

 eafp_kor_mainline.222.mt: "Eradicating Corruption"
 eafp_kor_mainline.222.md: "Pleading for the punishment of corrupt officials"
 eafp_kor_mainline.222.mf: "Park Gyu-su investigated the causes of the uprising, listened to the voices of the people, and submitted a memorial concluding that the cruel exploitation by officials was the cause of the peasants' revolt.\n\nHe requested generous treatment for the majority of participants excluding the ringleaders, but asked for punishments for the officials who caused the uprising.\n\nHe stated that immediately dismissing those whose corruption had reached extremes, such as Baek Nak-sin, confiscating their property, and sending them into exile, is the way to soothe public sentiment."
 eafp_kor_mainline.222.oa: "Confiscate their property, dismiss them, and send them into exile!"

 eafp_kor_mainline.223.mt: "Expanding Inspections"
 eafp_kor_mainline.223.md: "Pleading to strengthen inspections of local officials"
 eafp_kor_mainline.223.mf: "Even before the uprising, there were several areas where officials were replaced at the people's request, but it failed to prevent the spread of the situation.\n\nPark Gyu-su noted that the moment they take office, they are rarely checked or monitored even if they mock the court or pursue personal gain.\n\nTherefore, he proposed dispatching Pacification Commissioners and Secret Royal Inspectors in large numbers to prevent the magistrates of each town from daring to smear the King's virtue."
 eafp_kor_mainline.223.oa: "Select upright individuals and dispatch them to every corner!"

 eafp_kor_mainline.224.mt: "Cause of the Disturbance"
 eafp_kor_mainline.224.md: "Asking about the suffering of the people in the province and the riot"
 eafp_kor_mainline.224.mf: "\"Tell me one by one about the good and bad governance of the magistrates in the province, the suffering of the people, and the disruptions caused by the rioters.\"\n\n\"It has been about 40 days since I received the order, and though I have traveled through several towns, I passed through hurriedly each time, so I do not know the details of the good and bad governance of the magistrates. As for the abuses in each town and the clues to the rioters causing the disturbance, I will detail their outlines and respectfully submit them in a booklet.\"\n\n\"Is the people's rioting all due to the abuses of the Three Administrations?\"\n\n\"The abuses of the grain loan system are the same everywhere, but even very small and poor towns and garrisons have large grain loan quotas. If distributed, one household might receive up to 100 seok. However, the distributed grain is all empty husks and stones, so how could the people not feel resentful?\"\n\n\"If so, how is this different from 'Baekjing' (extorting taxes even from the bones of the dead)? It is truly deplorable.\"\n\n\"It is even worse than Baekjing. Every year, the loss of principal grain is immeasurable, leaving the people with no way to live. The military administration also has no town without abuses, with overlapping collections of the military cloth tax reaching 4-5 times for one person and over 10 times for one household. This is because villages with academies or tombs of noble families are all exempted, so other poor people cannot avoid overlapping conscription duties.\"\n\n\"If collected equally, paying once per person would be enough; how did it get this severe?\"\n\n\"Your Majesty is absolutely correct. The execution of the land tax used to be 8-9 jeon at times, but recently, due to the cunning of petty officials and the lawlessness of magistrates, it has reached 14-15 jeon per gyeol.\"\n\n\"Then it has doubled compared to the original land price.\"\n\n\"That is correct. Because of this, the people appeal their grievances, and when a disturbance first occurs in one town, the people in surrounding towns imitate it, saying, 'If we don't correct it now, there will be no day of salvation,' gathering from everywhere to cause disturbances.\""
 eafp_kor_mainline.224.oa: "\"With disturbances breaking out in various towns everywhere, regardless of right and wrong, the hearts of all people will be fearful. My heart is uneasy.\""
 ##https://sillok.history.go.kr/id/kya_11308111_001

 eafp_kor_mainline.225.mt: "Samjeong Ijeongcheong (Office for the Rectification of the Three Administrations)"
 eafp_kor_mainline.225.md: "Setting up a special bureau at the Border Defense Council to investigate the Three Administrations of the Eight Provinces"
 eafp_kor_mainline.225.mf: "\"What kind of true anomaly is the recent popular disturbance? If we truly guide them with virtue and govern with propriety, so they can serve their parents above, raise their wives and children below, live peacefully and enjoy their livelihoods, how could even one or two stubborn and perverse individuals incite such acts? Because corrupt magistrates persecute them, and cunning local elites and sly clerks extort them, they suffer bone-cutting resentment and flesh-piercing pain, unable to live or die, without realizing they have resorted to overstepping their bounds and violating discipline. If we examine the real situation, it is also pitiful. Generally, the part that greatly needs to be removed concerning civilian affairs is solely the Three Administrations, and there has never been a time when the rioters did not use this as an excuse. Set up a special bureau at the Border Defense Council to investigate the Three Administrations of the Eight Provinces. Reform what can be reformed, correct what can be corrected, so that the poor and helpless crying multitude may all rest peacefully and equally receive the grace of being treated without discrimination.\""
 eafp_kor_mainline.225.oa: "We must carry out reforms decisively."

 eafp_kor_mainline.226.mt: "Rectification in Name Only"
 eafp_kor_mainline.226.md: "The Samjeong Ijeongcheong, established to rectify the disorder of the Three Administrations, closed its doors without distinct results."
 eafp_kor_mainline.226.mf: "\"We opened the special bureau and deliberated repeatedly, but documents remained documents, and the abuses remained upon the people's livelihoods. After the office disappears, who will speak of this matter again?\""
 eafp_kor_mainline.226.oa: "It was a reform loud only in name."
 eafp_kor_mainline.227.mt: "Unfinished Rectification"
 eafp_kor_mainline.227.md: "The Samjeong Ijeongcheong corrected some abuses, but lacked the power to uproot the disorder of the Three Administrations."
 eafp_kor_mainline.227.mf: "\"A few towns caught their breath, and a few ledgers were corrected. However, the tangled knots of the military cloth tax, grain loans, and land tax were not light enough to be completely untied by one special bureau.\""
 eafp_kor_mainline.227.oa: "Still, it's not as if nothing was done."
 eafp_kor_mainline.228.mt: "Rectifying the Three Administrations"
 eafp_kor_mainline.228.md: "The Samjeong Ijeongcheong achieved significant results within the set deadline, beginning to break the long-standing chain of exploitation and corruption."
 eafp_kor_mainline.228.mf: "\"The land administration reclaimed its ledgers, the military administration removed nameless cloth taxes, and the grain loans gradually broke free from the shackles choking the people. The court's orders finally began to reach the ends of the towns.\""
 eafp_kor_mainline.228.oa: "The reform left clear results."
 eafp_kor_mainline.229.mt: "Great Reform of the Three Administrations"
 eafp_kor_mainline.229.md: "The Samjeong Ijeongcheong achieved results exceeding expectations and established the foundation to fundamentally rectify Joseon's long-standing public livelihood issues."
 eafp_kor_mainline.229.mf: "\"The ledgers of the eight provinces were renewed, the long-standing resentment over the military cloth tax subsided, and the abuses of the grain loans were greatly suppressed. The people no longer remembered the name of the government office with resentment, but for the first time, remembered it as a name of salvation.\""
 eafp_kor_mainline.229.oa: "This is truly the abolition of the Three Administrations."
 eafp_kor_mainline.230.mt: "Death of the Patron"
 eafp_kor_mainline.230.md: "As the King who established and pushed for the Samjeong Ijeongcheong passed away, the reform institution lost its political patron and collapsed."
 eafp_kor_mainline.230.mf: "\"The government office established by the King's will was not solid enough to stand alone after the King's will vanished. The ministers assessed the new phase, and the officials began to read the room again.\""
 eafp_kor_mainline.230.oa: "The reform lost its master."
 #

 eafp_kor_mainline.298.mt: "Completion of Land Survey"
 eafp_kor_mainline.298.md: "As the government offices in the eight provinces of Joseon surveyed the land and issued land deeds accordingly, the land tax could be collected clearly."
 eafp_kor_mainline.298.mf: "1. The people of [ROOT.GetCountry.GetNameNoFormatting] who have fields and paddies must possess this official deed, while the old deeds shall be nullified and submitted to this office.\n\n1. If the owner of fields, paddies, or houses buys, sells, or transfers the said property, the official deed must be exchanged, or if mortgaged, it shall be implemented after obtaining permission from the relevant local government office.\n\n1. As no one other than the people of [ROOT.GetCountry.GetNameNoFormatting] has the right to own fields and paddies, anyone caught borrowing a name or privately buying, selling, mortgaging, or transferring will be punished to the maximum extent of the law, and the fields and paddies shall be entirely confiscated due to belonging to the originally registered person."
 eafp_kor_mainline.298.oa: "Things should get better with this."

 eafp_kor_mainline.299.mt: "Resurgence"
 eafp_kor_mainline.299.md: "The disorder of the Three Administrations, represented by the military administration, grain loans, and land administration, was finally abolished. The corruption and manipulation of officials were swept away, and the burden on the people was greatly reduced."
 eafp_kor_mainline.299.mf: "The King decreed,\n\n\"I am truly pleased to hear that the people's suffering has been reduced. This is indeed the grace of our ancestors and the loyalty of our ministers. Now that the people do not suffer from unjust collections, the storehouses become full, the land administration becomes fair, and the public sentiment is peaceful, how could it not be beautiful?\""
 eafp_kor_mainline.299.oa: "Governance for the people has been achieved."

 ##300번~399번 - 힘의 공유 관련 이벤트

 eafp_kor_mainline.301.mt: "Reinstating the Exiled?"
 eafp_kor_mainline.301.md: "Discussions arise about reinstating Kim Jeong-hui and others."
 eafp_kor_mainline.301.mf: "\"It cannot be, Your Majesty! Their crime of insulting the court was not light, so how can you call them back so quickly?\"\n\n\"They are not traitors, so if there was sufficient reflection, why not? It might be a thorn in the side for those families whose power seems to pierce the sky, though.\"\n\n\"Lord Jo! What kind of insolent remark is that! We must know the intention behind that slander!\"\n\n\"He must have drank too much yesterday, Your Majesty. Everyone here is a minister solely loyal to Your Majesty. So, how about suspending the discussion on this matter for a moment...\""
 eafp_kor_mainline.301.oa: "Just something I said."

 eafp_kor_mainline.302.mt: "Reinstating the Exiled"
 eafp_kor_mainline.302.md: "Ordering the release of Kim Jeong-hui."
 eafp_kor_mainline.302.mf: "\"...Thus, I have decided to release those who are alive, such as Kim Jeong-hui, Jo Byeong-hyeon, and Yi Ji-yeon, and reinstate those who have passed away.\"\n\n\"But Your Majesty...\"\n\n\"Enough! It is an already decided matter, so say no more.\""
 eafp_kor_mainline.302.oa: "With this, today's court session is over."
 eafp_kor_mainline.302.ob: "Ah! I should also give them suitable official posts!"

 eafp_kor_mainline.303.mt: "Minor Security Disturbance"
 eafp_kor_mainline.303.md: "A minor disturbance within the palace is reported."
 eafp_kor_mainline.303.mf: "\"...Thus, measures have been taken, and investigations show there is no additional damage.\"\n\n\"Is that so?\"\n\n\"Yes. Also, we have strictly instructed the soldiers in charge of guard duty, so please do not worry...\""
 eafp_kor_mainline.303.oa: "Perhaps... a more #V systematic countermeasure#! is needed...?"

 eafp_kor_mainline.304.mt: "New Military Camp"
 eafp_kor_mainline.304.md: "Decreeing the promotion of the Chongyungcheong to Chongwiyeong."
 eafp_kor_mainline.304.mf: "\"Thinking deeply about it, the incident that happened last time, no matter how much I think about it, the palace guard was too negligent.\"\n\n\"Your Majesty. We are deeply apologetic, but we have strictly instructed them so that the same thing will never happen again, so please rest assured.\"\n\n\"When did I say you didn't work hard! And how can you speak so comfortably as if it were someone else's business?\"\n\n\"I have nothing to say...\"\n\n\"So... from today, I have decided to have the Chongyungcheong newly take charge of palace guarding, and promote its status to Chongwiyeong.\"\n\n\"...Pardon?\""
 eafp_kor_mainline.304.oa: "Oh, and create the Chongwiyeong regulations to regularize this!"

 eafp_kor_mainline.305.mt: "Chogye Munsin System?"
 eafp_kor_mainline.305.md: "With the bureaucrats I discovered..."
 eafp_kor_mainline.305.mf: "It is said that the late King Jeongjo, due to his outstanding erudition, rather taught the ministers at the royal lectures, and ultimately selected and taught talents himself to handle state affairs together...\n\n...Could I do that too?"
 eafp_kor_mainline.305.oa: "I need to nurture those who will follow me."

 eafp_kor_mainline.306.mt: "Nurturing Talent"
 eafp_kor_mainline.306.md: "Reintroducing the Chogye Munsin system."
 eafp_kor_mainline.306.mf: "\"Therefore! I wish to follow the old precedents of the era of King Jeongjo and continue his excellent intentions.\"\n\n\"Your Majesty. But humbly considering, the current officials are already doing their jobs well enough in their places, so we entreat you to reconsider.\"\n\n\"Heo-heo... Even you, who was personally selected by King Jeongjo at that time and rose to this position, dare to say such words? But why do you oppose nurturing younger scholars? Are you trying to kick away the ladder? Or do you want to say that my erudition is too lacking???\"\n\n\"Th...that was not what I meant!\"\n\n\"Go ahead and keep talking!\""
 eafp_kor_mainline.306.oa: "Is Gwon Don-in here? I want to entrust this matter to you from now on..."

 eafp_kor_mainline.307.mt: "The King's Hands, the King's Feet"
 eafp_kor_mainline.307.md: "Local control comes from strict inspections..."
 eafp_kor_mainline.307.mf: "The reason we previously sent magistrates down to each town to govern was to exercise ruling power throughout the regions according to the court's will.\n\nHowever, today, the sent local officials collude with local powerful families to exact extortion, and even the censorate officials who should keep them in check are in league with them, causing endless worry.\n\nTo see if they are doing their jobs according to my words, I ultimately need to secretly send inspectors to observe, but who is trustworthy enough to do this job..."
 eafp_kor_mainline.307.oa: "Wait... don't I have the talents I selected?"

 eafp_kor_mainline.308.mt: "Secret Royal Inspector Appears!"
 eafp_kor_mainline.308.md: "Dispatching trustworthy inspectors to every corner."
 eafp_kor_mainline.308.mf: "\"The reason I previously reinstated the system of the late King and selected you was to recognize your talents and entrust you with important tasks.\"\n\n\"Your grace is boundless...!\"\n\n\"From tomorrow, you will go down to each region of the eight provinces, write down exactly what you see and hear in detail for me, and if there are abuses, strictly rectify them according to your conscience. Do you understand well?\""
 eafp_kor_mainline.308.oa: "I trust you very much, so do not betray this faith..."
 eafp_k308_event_tt: "Dispatch newly selected Secret Royal Inspectors nationwide.\nThe probability of #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! causing #V local exploitation#! is reduced by #P -50%#! for #V 2 years#!!"

 eafp_kor_mainline.309.mt: "Sammang (Three Recommendations)"
 eafp_kor_mainline.309.md: "A Broken Scale"
 eafp_kor_mainline.309.mf: "Sammang.\nAlso called Bisammang or Cheonmang, this is a long-implemented customary system, a form of personnel system where to prevent unqualified persons from taking on major tasks or the tyranny of officials, each institution recommends three suitable candidates, and the King selects one of them to appoint.\n\nHowever, this system for checking royal power is being abused today as a device for powerful families to monopolize personnel authority and only send up those who suit their family's tastes. We need a way to bypass this problem.\n\nActually... if I wanted to, there's no law saying I must choose from among them..."
 eafp_kor_mainline.309.oa: "Wait, there's no reason it can't be done, right?"

 eafp_kor_mainline.310.mt: "Jungbi (Direct Appointment)"
 eafp_kor_mainline.310.md: "Breakthrough for Check and Balance"
 eafp_kor_mainline.310.mf: "Jungbi.\nThe act of appointing an official by the special command of the King without having the three recommendations or going through screening.\n\nThis is a means called 'Teukji' (special directive) where I, as the King, directly appoint someone by bypassing the existing private official appointment procedures.\n\nSince the existing Sammang has lost its proper function and only served to cover my eyes and ears, it is appropriate to bring out such extraordinary means to nurture a loyal royal guard force..."
 eafp_kor_mainline.310.oa: "Seo Jwa-bo, this person is perfect for the Minister of War!"
 #eafp_kor_mainline.310.ob: "Should I also include Yun Jeong-hyeon as a royal decree? hmmmm..."

 # eafp_kor_mainline.311 없음
 # eafp_kor_mainline.312 없음

 eafp_kor_mainline.313.mt: "The Buglers"
 eafp_kor_mainline.313.md: "The Three Offices representing private interests, not national interests"
 eafp_kor_mainline.313.mf: "Expressing dissenting views against the intentions of the King and ministers according to one's convictions suppresses side effects and promotes right thoughts. Those who took charge of such inspections and public discourse in the past were separately placed and called the Three Offices of Public Discourse (Samsa).\n\n...However, the Office of Inspector General, which should be the eyes and ears of the nation, closes its eyes and blocks its ears to the tyranny of the Kim family, and the Office of Censors, which should be the mouth of the nation, chatters its tongue as a bugler representing the private desires of the Kim family. The functions of the Three Offices have long been broken."
 eafp_kor_mainline.313.oa: "Who watches the watchers?"

 eafp_kor_mainline.314.mt: "Purge of the Three Offices"
 eafp_kor_mainline.314.md: "Dismissing officials of the Three Offices who flatter the Andong Kim clan."
 eafp_kor_mainline.314.mf: "\"I clearly ordered not to mention that matter anymore, so what are these memorials piled up like a mountain before me this morning?\"\n\n\"Your Majesty. These are memorials submitted out of conviction by the officials of our Office of Censors, asking you to withdraw the release order you issued last time. And I also think...\"\n\n\"Heo-heo-heo... And I previously ordered the officials of the Office of Inspector General that intensive inspection seems necessary for several people including Kim Heung-geun, so why is there still no news?\"\n\n\"Pardon? Ah, that is.. I heard they concluded that even after meticulous investigation, no particular corruption was found. Instead, the Office of Inspector General strongly asserts that the execution by poison of Jo Byeong-hyeon is necessary..\"\n\n\"Heo-heo-heo-heo-heo\""
 eafp_kor_mainline.314.oa: "Seeing the censorate officials working day and night brings tears to my eyes.\nThis is a special order given as a reward, so #N go and take a good rest.#!"

 eafp_kor_mainline.315.mt: "Impeachment"
 eafp_kor_mainline.315.md: "Inspector General Seo Sang-gyo impeaches Kim Heung-geun."
 eafp_kor_mainline.315.mf: "\"An old saying goes, 'Seeing disrespect to the King, it is a subject's duty to act like a hawk chasing a sparrow.' Therefore, I beg to say a word..\"\n\"..We cannot help that his nature is extremely cruel and his conduct is cunning. Towards powerful figures, he outwardly seems displeased but inwardly truly covets it. He outwardly pretends not to interfere in state affairs but inwardly directs them himself. To entrap those with different views, he is skilled at deceiving the eyes, and to elevate those he likes, he is adept at borrowing others' hands. He enters and exits the royal presence without the slightest awe, and there are clear traces of him spying on the palace guards and forming ties..\"\n\"..So how could there not be flaws in the governance of clarifying likes and dislikes and strictly distinguishing good and evil? In my opinion, it is only proper to quickly implement the law of exile for Kim Heung-geun to make him a warning to those who betray grace as subjects and betray the country.\"\n\n\"This is a frame-up! Your Majesty, since he has served the country for so long, you cannot exile a loyal subject just by hearing rumors!\""
 eafp_kor_mainline.315.oa: "Calm down. Let's continue listening to the Inspector General first..."

 eafp_kor_mainline.316.mt: "Catching a Big Fish"
 eafp_kor_mainline.316.md: "Exiling Kim Heung-geun."
 eafp_kor_mainline.316.mf: "\"When I ordered the penalty of dismissal to be applied to Gyeongsang Governor [SCOPE.sCharacter('eafp_char_sedo_heunggeun').GetFullName] the other day, it was because his family has had profound merit for generations, and our recent care and treatment of him has been generous. So I questioned, 'If there was truly no wrongdoing, why would people talk?' Having heard such words about such a person, I could not help but rebuke him to be perfectly fitting to his reputation.\"\n\n\"But now... seeing Bak Hyo-muk, Yi Seung-bo, and others begging so earnestly today to exile him, I say that the previous measure also came from profound expectations and an earnest rebuke for perfection. Dismissal is not a light penalty, but preserving him in the end is also my agony. Even if your memorials come up one after another, you will never be able to change my mind.\"\n\n\"...However, considering that valuing the censorate is to respect the court, and unfolding public discourse is to treat the hereditary subjects well...\""
 eafp_kor_mainline.316.oa: "According to the special request, apply the penalty of exile to Gwangyang County to [SCOPE.sCharacter('eafp_char_sedo_heunggeun').GetFullName]."

 eafp_kor_mainline.317.mt: "Appointment to Important Post"
 eafp_kor_mainline.317.md: "Secretly calling Park Gyu-su to the palace."
 eafp_kor_mainline.317.mf: "\"I recognized you too late... I feel that I do not have much time left.\"\n\n\"Your grace is boundless, Your Majesty. These words are too much for me.\"\n\n\"I know well that my father, Crown Prince Hyomyeong, favored you. I will appoint you to an important post, so let us plan great things together in the future.\""
 eafp_kor_mainline.317.oa: "Keep today's matter a secret for now..."

 eafp_kor_mainline.318.mt: "Lonely Genius"
 eafp_kor_mainline.318.md: "Passing Time"
 eafp_kor_mainline.318.mf: "\"Did you hear? Park Gyu-su, someone who has lived in seclusion for over a decade, now?\"\n\n\"The King was probably just testing the waters. Don't take it too seriously.\"\n\n\"Aren't you being too complacent? He could be appointed to a high post overnight.\"\n\n\"Perhaps if he were of the Jo clan, but how could he, with no backing at all? No matter how much the King tries to favor him, there are things that can and cannot be done.\""
 eafp_kor_mainline.318.oa: "Yonggang Magistrate Park Gyu-su awaits the court's letter."

 eafp_kor_mainline.319.mt: "Good News"
 eafp_kor_mainline.319.md: "A letter of appointment arrives."
 eafp_kor_mainline.319.mf: "A letter from the court arrived for Park Gyu-su, who had been waiting endlessly at his provincial post.\n\nIt finally contained a message expressing the desire to entrust him with a high-ranking official position."
 eafp_kor_mainline.319.oa: "Welcome back to the central political arena."
 eafp_kor_mainline.319.ob: "I appoint him as the Daesaseong (Head) of Seonggyungwan!"

 eafp_kor_mainline.320.mt: "Sad News"
 eafp_kor_mainline.320.md: "The King has passed away."
 eafp_kor_mainline.320.mf: "A letter from the court arrived for Park Gyu-su, who had been waiting endlessly at his provincial post.\n\nRegrettably, it contained the news that the King, who intended to appoint him to an important post, passed away before overcoming the ministers' opposition."
 eafp_kor_mainline.320.oa: "It's a tragedy."

 eafp_kor_mainline.321.mt: "Treason"
 eafp_kor_mainline.321.md: "A treason plot is discovered through Seo Gwang-geun's tip-off!"
 eafp_kor_mainline.321.mf: "As a man named Seo Gwang-geun plotted an unlawful act, it was intended to set up a special bureau, but the police bureau was ordered to search and investigate first. It was revealed that four ringleaders, including Min Jin-yong, Bak Sun-su, and Yi Won-deok, were secretly hatching a treacherous plot for high treason.\n\nSince it was clearly confessed that their rebellion and high treason were undeniable, their crime warranted death by dismemberment. Regarding Yi Won-gyeong, who was suspected of being involved with the faction, a decision was made to quickly exile him to Ganghwa."
 eafp_kor_mainline.321.oa: "Continue interrogating to uncover other crimes and firmly identify those involved."

 eafp_kor_mainline.322.mt: "Execution by Poison"
 eafp_kor_mainline.322.md: "The purpose of installing [SCOPE.sCharacter('eafp_char_yi_wongyeong').GetFullName] is revealed during the interrogation!"
 eafp_kor_mainline.322.mf: "During the investigation of the tip-off, it was found that dozens of scholars had signed a document to install [SCOPE.sCharacter('eafp_char_yi_wongyeong').GetFullName], the grandson of Prince Euneon, the illegitimate eldest son of Crown Prince Sado. Suspicions were also found that he himself had written a pledge saying 'Having received my father's teachings, I will not forget them in my heart.'\n\nAccordingly, he was immediately recalled from Ganghwa for interrogation. Amidst a barrage of impeachments and memorials from the officials of the Three Offices and the State Tribunal, [SCOPE.sCharacter('eafp_char_yi_wongyeong').GetFullName] was exiled to Jeju and soon after executed by poison."
 eafp_kor_mainline.322.oa: "Also, exile Yi Won-gyeong's half-brother, Yi Gyeong-eung (#V Yi Won-beom#!), to Ganghwa."

 eafp_kor_mainline.323.mt: "Studies"
 eafp_kor_mainline.323.md: "The Queen Dowager grants an audience to current and former ministers to discuss the King's academic advancement."
 eafp_kor_mainline.323.mf: "\"Today the King has received the Great Mandate, which can be said to be the infinite blessing of the royal shrine. However, for the King, this is the beginning, and achieving royal virtue relies solely on studying. If the King does not learn, how can he govern?... The royal shrine is of utmost importance, and the King has newly succeeded to the throne, so I have called upon you ministers again to offer instruction.\"\n\nTo this, [SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName] and others said in unison,\n\"We will naturally exert our utmost sincerity and mental effort to be of some help, but we believe this matter also depends on Your Compassionate Highness guiding him from within.\"\n\nThe Queen Dowager said,\n\"Today is the first day the King ascends the throne. Therefore, I will first instruct him on several articles: to love the people, study diligently, practice frugality, treat the ministers with courtesy, and respect the high officials, and I have called the ministers to observe. If the King's future actions deviate even slightly from this admonition, the ministers should rightfully rebuke him using the words I have spoken today.\"\n\"If he is to read, which book should he start with?\"\n\nJeong Won-yong reported,\n\"It would be good to start with 'Saryak' (Brief History) and after he understands literacy a bit, continue to learn the classics.\""
 eafp_kor_mainline.323.oa: "I avoided books because I didn't want to die, but now I must learn to survive?"

 eafp_kor_mainline.324.mt: "Request"
 eafp_kor_mainline.324.md: "The Queen Dowager instructs the King to love the people and devote himself to his studies."
 eafp_kor_mainline.324.mf: "\"Even amidst such boundless sorrow, it is fortunate to have found someone to entrust the 500-year royal shrine to. As a blood descendant of King Yeongjo, you have faced many difficulties in the past and lived in the countryside for a long time. However, among the kings of old, there were those born and raised among the people, who fully understood the sufferings of the people and governed with 'loving the people' as their main principle, eventually becoming wise rulers. The King now must also be well aware of the people's affairs... You must focus your mind and never forget the two words 'loving the people'.\"\n\n\"Although I do not know how your past studies were, if a person does not learn, they remain ignorant of the past, and if ignorant of the past, they cannot govern the country. No matter how sorrowful and distracted you are, you must frequently meet with Confucian scholars, discuss the classics, and gradually familiarize yourself with the mindsets of sages and the governance strategies of kings before your handling of affairs becomes proper.\"\n\n\"Although the King is extremely noble, there is no rule to take the court officials lightly. Treat the ministers with courtesy, and as there will be no wrong words in what the ministers report, I hope you listen with sincerity and engrave them in your heart.\""
 eafp_kor_mainline.324.oa: "\"I respectfully... will obey.\""

 eafp_kor_mainline.325.mt: "Reversal of the Sinners' World"
 eafp_kor_mainline.325.md: "Inspector General Yi Gyeong-jae requests the punishment of Yun Chi-yeong and others following a memorial."
 eafp_kor_mainline.325.mf: "\"Reading the memorials of Gang Han-hyeok and Yi Jeong-du, they said the whole nation is collectively indignant and that he should rightfully be beheaded according to the royal law. Ah! Jo Byeong-hyeon's thousand sins and ten thousand evils were already concluded by the censorate's review years ago, and the late King visibly showed his intention to distance himself, yet he openly complained. It has been a long time since the whole world pointed fingers at him and the educated felt deplorable. When Seo Sang-gyo discussed Kim Heung-geun last year, he said, 'There were traces of spying on the palace guards and clearly attempting to form ties.' Just the two words 'palace guards' already violated the most strict place, and mentioning 'forming ties' is a sin of forcing oneself upon others. The one who advocated this was Yun Chi-yeong, and the one who instigated it was also Yun Chi-yeong. In my opinion, you should order the Royal Tribunal to strictly interrogate Yun Chi-yeong and Seo Sang-gyo and quickly rectify the penal law.\""
 eafp_kor_mainline.325.oa: "So... you're saying this Jo Byeong-hyeon is a bad guy that even the late King distanced himself from, and Kim Heung-geun was falsely accused by Seo Sang-gyo... Is that it?"

 eafp_kor_mainline.326.mt: "Revenge"
 eafp_kor_mainline.326.md: "Numerous censors and ministers request the punishment of Jo Byeong-hyeon."
 eafp_kor_mainline.326.mf: "Censor General Im Baek-su submitted a memorial requesting to grant permission regarding Jo Byeong-hyeon as the censors requested, and to strictly interrogate Yun Chi-yeong and others. Inspector Sin Jwa-mo submitted a memorial requesting the swift application of exile to an island for Jo Byeong-hyeon and others, and the strict interrogation of Seo Sang-gyo and others. Censor Mok In-bae submitted a memorial requesting the swift approval of the Office of Inspector General's request regarding Jo Byeong-hyeon and the strict interrogation of Yun Chi-yeong. Inspector General Yi Don-yeong submitted an appeal to quickly grant permission regarding Jo Byeong-hyeon as the censors requested, and to open a special bureau to uncover the truth about Yun Chi-yeong. Current and former ministers jointly requested the swift approval of the censors' request regarding Jo Byeong-hyeon.\n\nThe Queen Dowager ordered Jo Byeong-hyeon, a criminal exiled with a thorny hedge on an island, to be executed by poison."
 eafp_kor_mainline.326.oa: "It cannot be helped."
 eafp_kor_mainline.326.ob: "Wouldn't exile with a thorny hedge be enough punishment?"
 eafp_kor_mainline.326.oc: "Is he really a criminal?"

 eafp_kor_mainline.328.mt: "Erasing Records"
 eafp_kor_mainline.328.md: "The Queen Dowager orders the erasure of all documents related to Prince Euneon's family."
 eafp_kor_mainline.328.mf: "Since the Queen Dowager previously ordered the restoration of titles for Prince Sanggye and his wife, my grandfather's eldest son, today she ordered all past and present documents related to the family of my grandfather, Prince Euneon, to be completely erased.\n\n\"By resolving the unjust affairs of 50 years, there are no regrets left now, and all of this comes from the King's sincerity. Send a minister to hold a memorial service at the shrine of Prince Euneon and his wife.\""
 eafp_kor_mainline.328.oa: "At least now I no longer need to be bound by the shackle of a traitorous lineage."

 eafp_kor_mainline.330.mt: "Ritual Controversy"
 eafp_kor_mainline.330.md: "The Sinhae Ritual Controversy over Jocheon"
 eafp_kor_mainline.330.f1: "Although I succeeded to the great lineage of the late King, in the royal genealogy, I am registered as the son of King Sunjo. And eventually, this issue regarding lineage has caught up with me.\n\nThe spark began with the issue of titles for the late kings... but currently, it has escalated into a debate over whether to perform 'Jocheon' (removing the spirit tablet to a separate shrine) for King Jinjong from the Royal Shrine. The court is largely divided into two factions: the 'Bulcheon' (non-removal) faction arguing that Jinjong cannot be removed because he is my great-grandfather, and the 'Jocheon' (removal) faction arguing that due to the importance of the succession of the throne, the duty of father and son exists between me and the late King, so Jinjong must be removed.\n\nYou might ask what is the point of such trivial ritual disputes. That would be the me from my days living in Ganghwa Island... However, as someone who has now become King, I had to acknowledge that this issue ultimately affects my legitimacy and the foundation of the country.\n\nAfter numerous debates and discussions, the Andong Kim family persuaded many ministers to solidify the Jocheon faction as the overwhelming public opinion, and Gwon Don-in found himself in a position to take responsibility and go into exile.\n\n...And...\n\n\"We request further implementation of the applicable law against the banished criminal Gwon Don-in. Ah! Kim Jeong-hui is a cunning petty person... how can he be so atrocious? We request he be exiled to an island.\"\n\nCountless memorials are pouring in demanding the punishment of Kim Jeong-hui, who is pointed out as the mastermind behind it."
 eafp_kor_mainline.330.f2: "Although I succeeded to the great lineage of the late King, in the royal genealogy, I am registered as the son of King Sunjo. And eventually, this issue regarding lineage has caught up with me.\n\nThe spark began with the issue of titles for the late kings... but currently, it has escalated into a debate over whether to perform 'Jocheon' (removing the spirit tablet to a separate shrine) for King Jinjong from the Royal Shrine. The court is largely divided into two factions: the 'Bulcheon' (non-removal) faction arguing that Jinjong cannot be removed because he is my great-grandfather, and the 'Jocheon' (removal) faction arguing that due to the importance of the succession of the throne, the duty of father and son exists between me and the late King, so Jinjong must be removed.\n\nYou might ask what is the point of such trivial ritual disputes. That would be the me from my days living in Ganghwa Island... However, as someone who has now become King, I had to acknowledge that this issue ultimately affects my legitimacy and the foundation of the country.\n\nAfter numerous debates and discussions, the Andong Kim family persuaded many ministers to solidify the Jocheon faction as the overwhelming public opinion, and Gwon Don-in found himself in a position to take responsibility and go into exile."
 eafp_kor_mainline.330.oa: "As for matters related to rituals, ministers, please decide... well on your own."
 eafp_kor_mainline.330.ob: "I do not understand this. The words first spoken about Kim Jeong-hui are already cruel; how can it continue?"

 eafp_kor_mainline.331.mt: "Chae Hui-jae's Rebellion"
 eafp_kor_mainline.331.md: "Those attempting treason in Hwanghae Province are discovered!"
 eafp_kor_mainline.331.mf: "Fortunately, this incident, where all the ringleaders were caught due to a prior tip-off by a man named Go Seong-uk among the group, began with a man named Kim Eung-do residing in Yeonan-bu, Hwanghae Province.\n\nHe visited brothers Yi Myeong-seop and Yi Myeong-hyeok, descendants of Crown Prince Sohyeon living in Chodo, and incited them. Shortly after, a man named Chae Hui-jae also visited the brothers, handing them a treacherous plot to install them, making Myeong-seop the figurehead and Kim Eung-do and Chae Hui-jae the strategists to conspire together.\n\nAmong them, Myeong-seop died of illness while being escorted to Hanyang, his younger brother Myeong-hyeop was exiled to Hamgyeong Province, and the three ringleaders centered around Chae Hui-jae were executed by dismemberment."
 eafp_kor_mainline.331.oa: "When will my authority ever be firmly established..."

 eafp_kor_mainline.332.mt: "Selection of the Queen"
 eafp_kor_mainline.332.md: "The daughter of Kim Mun-geun from the Andong Kim family is selected, and the royal wedding is held."
 eafp_kor_mainline.332.mf: "In the royal decree written by Chief Scholar Jo Du-sun, it says,\n\"As heaven and earth combined their virtues, all things benefited from the merit of being sheltered and sustained, and as the sun and moon shone together, the royal transformation shone brightly to the eight bounds. Thinking of the heavy responsibility borne for a long time, we especially wait for the inner and outer to achieve it together. Ah! You, Lady Kim, grew up properly in a family of hereditary ministers, and your auspicious signs appeared. Leading the bright righteousness of four generations, you emulated the great integrity of Duke Munjeong above, and as a close relative of the same branch, you are of the same family as Empress Hyohyeon.\"\n\nAlso, in the jade book written by Minister Seo Gi-sun, it says,\n\n\"The Guanju became the foundation of the royal way, and the Queen's image harmonized with the origin of heaven. Thus, the beautiful virtue of a wise assistant is the beginning of human relations. You, Lady Kim, are a descendant of a loyal and brilliant distinguished family, and a prestigious family of poetry and rites. Your beautiful reputation for modesty was revealed early, and you thought to inherit the excellent sound of the Holy Mother. You are graceful and prudent, gentle and respectful. Everyone praises your broad virtue, so great blessings and prosperity will be eternally peaceful. Thus, we proclaim this, so all should know.\""
 eafp_kor_mainline.332.oa: "Must I even accept my companion exactly as given!"
 eafp_kor_mainline.332.ob: "But still, isn't this woman innocent..."

 eafp_kor_mainline.333.mt: "Pardon of Jo Byeong-hyeon"
 eafp_kor_mainline.333.md: "Ministers oppose the pardon of Jo Byeong-hyeon."
 eafp_kor_mainline.333.mf: "Left Royal Secretary Yi Won-jo reported,\n\"I respectfully examined the royal decree, and there was an order to quickly reinstate the criminal Jo Byeong-hyeon. What is the crime of betrayal committed by this criminal, and how grave are its implications? Last autumn's grace of pardon already misguided the punishment. Although Your Majesty's intention to preserve him is highly respectable, it is difficult to suddenly loosen the strict royal law. I humbly ask your holy brightness to immediately withdraw this command.\""
 eafp_kor_mainline.333.oa: "How could I have done so without any deliberation? Promulgate it immediately."
 eafp_kor_mainline.333.ob: "If that is what you ministers say..."

 eafp_kor_mainline.334.mt: "Envoy for the Winter Solstice and Thanksgiving"
 eafp_kor_mainline.334.md: "Prince Gyeongpyeong, Im Baek-su, and Kim Chang-su, bound for [SCOPE.sCountry('chi_scope').GetName], enter the palace for an audience."
 eafp_kor_mainline.334.mf: "The King said, \"Historians, sit divided to the left and right,\" and then ordered the three envoys to step forward. As the three envoys stepped forward, the King said, \"Return safely from your long journey without any trouble.\"\n\nTo this, the envoys reported, \"With lacking qualifications, we dared to receive your great command. Trembling with fear morning and evening, we could not help but exert our utmost sincerity. However, being young and lacking in talent, we do not know how we can handle this command and avoid sin.\""
 eafp_kor_mainline.334.oa: "Closely scout the public sentiment and the situation of bandits in that land, and also closely scout the public sentiment in various places along the route in our country."

 eafp_kor_mainline.335.mt: "Reinstatement of Kim No-gyeong"
 eafp_kor_mainline.335.md: "Ministers oppose the reinstatement of Kim No-gyeong."
 eafp_kor_mainline.335.mf: "Inspector General Kim Gyun, Censor General Im Baek-neung, Inspector Yi Pyo, Censor Kim Su-in, Censor Yi Hyeok-jun, Censor Yi Hu-seon, and Hyeon Pil-je and others memorialized,\n\n\"We respectfully examined the royal decree from the original intention, and there was an order to specially reinstate the official post and title of the criminal Kim No-gyeong. We look at each other in surprise and fear, beating our chests in bewilderment, not knowing how such an unexpected and excessive measure could occur in this enlightened era. Ah, what was the situation of this criminal, and what treatment did he receive? Speaking of his crime, the evidence is undeniable, and discussing his charge, the implications are very grave. Though forgiven during his lifetime and receiving special grace, having his post stripped after death was an unavoidable karma he brought upon himself. The clues still remain, and the records are not erased, so the strictness of public opinion can be roughly known. Now, this measure by Your Majesty is truly not what we have usually relied upon from our enlightened King. Therefore, we dare to jointly beseech and offend your high majesty. We humbly beg you to specially reconsider and quickly withdraw the command, to preserve the great defense and make it a way to unite everyone's will.\""
 eafp_kor_mainline.335.oa: "Do you only not consider the aftermath of the Gwi-ju family? Promulgate it immediately."
 eafp_kor_mainline.335.ob: "It seems I went too far in pitying the situation of an old minister, swayed by personal feelings."

 eafp_kor_mainline.337.mt: "Reinstatement of Hong In-han"
 eafp_kor_mainline.337.md: "Ministers oppose the reinstatement of Hong In-han."
 eafp_kor_mainline.337.mf: "\"We are not unaware of Your Majesty's infinitely benevolent and great virtue in broadly bestowing grace. However, what must be most strict is the royal law, and what is hardest to block is public opinion. If the royal law is not clear, the defense line will further collapse, and if public opinion is not expressed, righteousness and morality will gradually darken. This will lead to a state where the country is not like a country and the people are not like people, so how could we not be greatly afraid? For this reason, the censorate has continuously and strictly submitted reports and memorials, not daring to take a compliant attitude. We humbly beg Your Majesty's wisdom to think deeply and look far ahead, specially withdraw the lenient decision, and immediately revoke the command. We earnestly hope you will allow the national laws to maintain consistency and the people's hearts to be united.\""
 eafp_kor_mainline.337.oa: "The decision has already been made, so why do you continue to argue like this? Promulgate it immediately."
 eafp_kor_mainline.337.ob: "If that is what you ministers say, I will retract the order for now."

 eafp_kor_mainline.339.mt: "Memorial of Seo Dae-sun"
 eafp_kor_mainline.339.md: "Inspector General Seo Dae-sun submits a memorial to impeach Prince Gyeongpyeong."
 eafp_kor_mainline.339.mf: "Inspector General Seo Dae-sun memorialized,\n\n\"Ah, what is on the mind of that Prince Gyeongpyeong that he dares to fabricate words hard for a human to hear and tries to cover things up with them? He speaks of these without hesitation in public places within the palace, showing no qualms at all. One could say the world has changed and there is nothing that cannot happen. Your Majesty is wise and bright, so how could you be swayed by baseless rumors? However, the whispers and cunning tricks of petty people are very fearsome in their degree. What is the situation of the two families, and what of their loyalty and diligence? If they are framed with such infamy, there will be no way to report this to the late King, and if the officials in the court are anxious, is this not a matter greatly related to the safety of the nation?\""
 eafp_kor_mainline.339.oa: "Exile Prince Gyeongpyeong and abolish his entry to the palace."
 eafp_kor_mainline.339.ob: "Interrogate Prince Gyeongpyeong."
 eafp_kor_mainline.339.oc: "Do not bother me with this anymore."

 eafp_kor_mainline.340.mt: "Jonggye Byeonmu (Correction of the Royal Genealogy)"
 eafp_kor_mainline.340.md: "Administrator Yun Chi-su requests sending an envoy to correct the royal genealogy."
 eafp_kor_mainline.340.mf: "Administrator Yun Chi-su submitted a memorial, roughly stating,\n\n\"I happened to look at a book called 'Yisibilsa Yakpyeon' (Brief Compilation of the Twenty-One Histories) that I recently purchased and brought from Beijing. Seeing that the lineage and successions regarding our country's clause in it still follow the erroneous records to an endless extent, my heart pounded with shock and I felt such bone-cutting indignation that I did not wish to live. In my opinion, sending an envoy to fully report and request a swift correction is the righteousness that inherits the accumulated sincerity and earnest wishes of our ancestors, and it will comfort the collapsing, indignant feelings of all the subjects in the nation. I humbly beg you to first take this memorial of mine and send it down to the court as a basis for broad questioning and discussion.\""
 eafp_kor_mainline.340.oa: "Now seeing your memorial, it is so shocking and infuriating that I dare not feel at ease even for a moment. I shall appropriately consult the ministers."

 eafp_kor_mainline.341.mt: "Jonggye Byeonmu"
 eafp_kor_mainline.341.md: "A dispatch from Beijing reports that the Jinjusa (Envoy) has had the erroneous parts of the Yakpyeon corrected."
 eafp_kor_mainline.341.mf: "\"On the 22nd of last month, we sent an official inquiry to the Ministry of Rites. The relevant ministry held a meeting and had the erroneous parts in the 'Yakpyeon' corrected. When the matter is finalized, we plan to purchase one set of the original book and submit it on the day we report our return.\""
 eafp_kor_mainline.341.oa: "The envoy's mission was accomplished smoothly; it is an incomparable fortune."

 eafp_kor_mainline.342.mt: "Four Factions"
 eafp_kor_mainline.342.md: "Q&A between Daewongun and Kim Byeong-gi"
 eafp_kor_mainline.342.mf: "Daewongun said,\n\n\"I intend to compress a thousand li into a short distance, level Mount Tai into a plain, and raise Namdaemun to three stories. What are your thoughts on this?\"\n\nWhile many chancellors did not know what to answer, Kim Byeong-gi reported,\n\n\"If you try to compress a thousand li into a short distance, it will become a short distance, and if you raise Namdaemun to three stories, it will become three stories. What is there that Your Excellency cannot do now? However, Mount Tai is Mount Tai; how can it easily be made into a plain?\"\n\nAnd he went outside."
 eafp_kor_mainline.342.oa: "He is showing off by himself."

 eafp_kor_mainline.343.mt: "State Council and Border Defense Council"
 eafp_kor_mainline.343.md: "Ministers state the principles of righteous governance and various abuses."
 eafp_kor_mainline.343.mf: "The Queen Dowager said,\n\n\"Although both the State Council (Uijeongbu) and the Border Defense Council (Bibyeonsa) are called the 'Myodang' (Supreme Council), it is extremely strange that documents are only handled at the Border Defense Council. From now on, it would be better to handle them separately.\"\n\nTo this, Kim Jwa-geun reported,\n\n\"That the important affairs of the court are managed only at the Border Defense Council and the State Council cannot intervene is indeed as Your Highness has commanded. However, as this is a practice that has flowed down for hundreds of years, we will withdraw, discuss it, and make a decision.\"\n\nJo Du-sun reported,\n\n\"The late Chancellor Choe Myeong-gil mentioned several times that after the Border Defense Council was established, the State Council became an office that does nothing, and even mentioned it in a memorial. Now that we have received Your Highness's command, it is absolutely correct. We will withdraw, discuss it in many ways, and then report our decision.\""
 eafp_kor_mainline.343.oa: "Kim Jwa-geun reported,\n\"We will discuss and decide together, and then report.\""

 eafp_kor_mainline.344.mt: "Division of Power?"
 eafp_kor_mainline.344.md: "Ministers report on the status of the State Council."
 eafp_kor_mainline.344.mf: "Kim Jwa-geun reported,\n\n\"That the State Council became an idle office with the establishment of the Border Defense Council is something knowledgeable people have always lamented when considering its name and reality. After receiving the Queen Dowager's command last time, we withdrew and discussed with various colleagues to find a way to modify it. It has already been 300 years since the Border Defense Council was founded, so for now, we should appropriately divide tasks like reporting and recommending between the two offices, just as the Secretariat and the Privy Council did during the Song dynasty. It would be good to create regulations detailing the assignments of the relevant officials and various conditions, submit them for approval, and have them implemented.\"\n\nShe commanded, \"Let this be established as a rule.\""
 eafp_kor_mainline.344.oa: "Nonsense."

 eafp_kor_mainline.345.mt: "Abolition of the Border Defense Council"
 eafp_kor_mainline.345.md: "The Queen Dowager orders the Border Defense Council to be merged into the State Council."
 eafp_kor_mainline.345.mf: "The Queen Dowager commanded,\n\n\"The State Council is precisely the place where the ministers lead all officials and inspect all state affairs, so its importance is vastly different from other offices. I do not know since when all the affairs of the capital and provinces were delegated to the Border Defense Council, but logically, there are things that should not be so.\"\n\n\"Having documents distinguished last time was also out of a desire to restore old regulations. Now that the State Council has already been newly built, from now on, merge the State Council and the Border Defense Council into one office according to the precedent of merging the Court of the Imperial Clan and the Office of the Royal Relatives. Let the Border Defense Council remain as an advisory body to the State Council, engrave and hang its plaque above the main gate's frame, move the 'Myodang' plaque to the main hall, permanently melt down and destroy the seals of the Border Defense Council, and ensure that the opening words on all reports and documents read 'State Council'.\""
 eafp_kor_mainline.345.oa: "\"Generally, regarding issues related to dignity and history, the ministers and high officials of the State Council should refer to old regulations, deliberate in detail, and submit a separate list.\""
 eafp_kor_mainline.345.tt: "#P The Border Defense Council, which wielded absolute power for a long time, has faded into history.#!"

 eafp_kor_mainline.346.mt: "Birth of the First Son"
 eafp_kor_mainline.346.md: "The first son was born at the hour of the Rabbit."
 eafp_kor_mainline.346.mf: "\"Heaven has helped the royal shrine by granting the birth of the first son; this is truly an incomparable joyous event for our nation. The joy of the Queen Dowager must be unparalleled, so on the seventh day, I will personally offer a congratulatory address, a memorial, and garments to the Queen Dowager's pavilion. And then I will proceed to the hall to receive congratulations.\""
 eafp_kor_mainline.346.oa: "\"Pardon and reinstate all civil, minor, and military officials who were dismissed, and have the relevant ministry assign them to military posts.\""

 eafp_kor_mainline.347.mt: "Memorial"
 eafp_kor_mainline.347.md: "Choe Ik-hyeon submits a memorial."
 eafp_kor_mainline.347.mf: "\"Several issues that disrupt this holy constitution indeed occurred during the time Your Majesty was young and not yet personally handling state affairs, so they were not all brought about by Your Majesty yourself. It is just that the officials in charge blinded Your Majesty's brightness and wielded power arbitrarily, resulting in the total relaxation of national discipline and bringing about today's abuses.\n\nRespectfully, from now on, Your Majesty will exercise your authority, think deeply, and work diligently to the point of forgetting to eat and sleep. Thus, you will not be swayed by vulgar opinions and false theories, not be deceived by close associates or powerful officials, prevent the phenomenon of relying on temper, keep your original mind pure, exhaust your desires completely, and allow the principles of heaven to flow.\n\nWhen issuing orders and taking measures, what must be executed should be implemented as fiercely as a violent thunderstorm or wind, and what must be removed should be removed and cut off as decisively as cutting iron. Thus, you should issue orders frequently to make the courtiers alert, establish principles without doubt, entrust the responsibility of cultivating virtue to wise teachers, entrust the responsibility of appointing and dismissing officials and harmonizing Yin and Yang to the State Councillors, and entrust the responsibility of assisting the King's shortcomings and correcting mistakes to the Office of Inspector General and Office of Censors. The responsibility of discussing, thinking, and enlightening the King with righteous words for the King's sake should be entrusted to Confucian scholars. The tasks of training and selecting soldiers and defending against foreign enemies should be entrusted to military commanders. The receipts and disbursements of money and grain, and military expenses should be entrusted to the relevant officials. And the task of selecting filial and upright people and gathering scholars should be entrusted to the governors.\n\nHowever, those who are not in these positions but merely belong to the ranks of the royal relatives should only have their status elevated and be given generous stipends, while not being allowed to intervene in national politics. Do not violate or forget the lessons of the nine righteousnesses in the Doctrine of the Mean and the warnings in the Analects about discussing politics outside one's duties, so that you may renew yourself day by day.\""
 eafp_kor_mainline.347.oa: "\"Looking at the memorial of Vice Minister of Taxation Choe Ik-hyeon now, there are many phrases that oppress me. How can there be such a principle? It is a very bizarre matter, so apply the law of exile.\""

 eafp_kor_mainline.348.mt: "Memorial"
 eafp_kor_mainline.348.md: "Yi Hwi-rim submits a memorial."
 eafp_kor_mainline.348.mf: "\"Recently, I humbly hear that His Excellency the Daewongun moved his residence outside the palace and has no thoughts for the capital, so the people of the whole nation are suspicious and anxious. Since I am in a distant countryside, I do not know for what reason it has come to this, but is it that His Excellency the Daewongun abandoned the bustling place for a quiet one and does not return immediately, or is it that Your Majesty decided to compliantly follow the Daewongun's wishes and has not requested his prompt return?\n\nWith the profound heart of the Daewongun who loves his child, it is not proper to stay far away for a long time, and with Your Majesty who possesses profound filial piety, you cannot fail to visit him for a long time. Moreover, now the troubles at the borders do not cease, and foreign enemies are looking for a chance, so how much more must we emphasize vigilance and caution?\n\nEven if His Excellency the Daewongun went to a quiet place not merely to reside there but out of excessive behavior, Your Majesty should have been overwhelmingly apologetic, not knowing what to do, and should have turned your father's heart with gentle words to calm his excitement. Yet, though listening carefully for months, I have not yet heard of any measures taken to request his return. I truly do not understand. It is not only I who do not understand, but the entire court and country do not understand. Generally, such measures become one day more improper as one day passes, and two days more improper as two days pass, both publicly and privately. I humbly beg you to request him to set a date and return within a few days.\""
 eafp_kor_mainline.348.oa: "\"Daring to use confusing and anxious words to forcefully connect and fit things together, submitting a presumptuous writing, already blatantly violates justification and discipline, which is extremely shocking. Yi Hwi-rim must be arrested and interrogated to uncover the truth and clarify his crime, but for now, apply the penalty of exiling him far to an extreme border.\""

 eafp_kor_mainline.349.mt: "Memorializing Scholars"
 eafp_kor_mainline.349.md: "Warning the Confucian scholars who submitted memorials regarding the Daewongun's travel issue."
 eafp_kor_mainline.349.mf: "\"Lately, there has been a constant uproar regarding the memorializing scholars. What is the reason for this? Originally, the Daewongun's travel was simply to rest quietly, but outsiders perceived it as if something had happened. The words in the submitted memorials during this time have mostly been slanderous and oppressive, subtly attributing the Daewongun's travel to excessive behavior and also concluding that I have not done my utmost sincerity. This is all because these groups fabricate things that do not exist to mock as they please. Even between equals or subordinates, matters concerning ethics and discipline are difficult for people to speak of, so what more needs to be said for those who serve me as King today? Furthermore, even if the ministers speak of it, they must know that these groups are being disrespectful, yet they view it ordinarily and do not say a single word of reprimand, which is truly deplorable. This group frequently referring to 'moving the royal carriage' borders on threats. How can my moving the royal carriage or not be decided based on the words of this group?\n\nThe ministers should all know my intentions, so withdraw to the guest hall, summon the Confucian scholars who led the memorials, kindly persuade them, and send them back. After doing this, if anyone memorializes about this matter again, it will be an intentional offense, and I will absolutely apply the law against defying superiors.\""
 eafp_kor_mainline.349.oa: "\"The Daewongun was also anxious because of this matter, so I repeatedly tried to stop him, but making such an uproar is an even more extremely disrespectful act.\""

 je_korean_fading_power: "$eafp_kor_mainline.999.mt$"
 je_korean_fading_power_reason: "The noble (Yangban) families are failing to keep up with the rapidly changing times and are gradually losing their power and influence."

 eafp_kor_mainline.999.mt: "Fading Power"
 eafp_kor_mainline.999.md: "As the powerful families were purged and the disorder of the Three Administrations was abolished, the discipline of the court was established. However, in this process, the majority of the noble families are gradually losing their political influence."
 eafp_kor_mainline.999.mf: "One day, while Jinsa Gwan-ok was reading a book, he faced the candlelight and thought deeply. Realizing there was no longer a suitable plan to support his mother, he quietly called his wife, Lady Yu, and said,\n\"An ancient sage said, 'If a family is poor and parents are old, one may even take a job holding the whips.' I may not be a wise scholar, but I will sell myself for a high price to support my mother above and save my family below. Please attend to my mother and serve her sincerely, and do not breathe a word of this to anyone.\"\n\nLady Yu was greatly shocked and said,\n\"My lord, you are mistaken in your thoughts. As an imposing son of a nobleman, how can you intend to go somewhere and live as a servant? Please do not reconsider such a plan.\"\n\nThe Jinsa smiled and said,\n\"What can I do? Our mother is about to starve to death right now, and my brother and you are on the verge of being scattered; what is there left to be constrained by? In the past, Zilu carried rice from 100 li away, and Baili Xi drew water while fleeing, but later they achieved honor and held high offices. Though I cannot match them, how can I mind temporary lowliness and hardship?\""
 eafp_kor_mainline.999.oa: "Times have changed."
 je_korean_fading_power_modifier: "$eafp_kor_mainline.999.mt$"
