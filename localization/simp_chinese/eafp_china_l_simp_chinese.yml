 je_chinese_westernization_international_prestige_reason: "当今的天下已经无法与夏商周三代的天下相比。西方各国已经环伺大清，寻找可乘之机；现在可以说是亡国的危机。\n\n必须安抚大南和朝鲜等诸侯作为藩屏，巩固内外防御，不让中国的土地丧失一寸，防止夷狄蹂躏百姓。只有这样才能防止被瓜分。"
