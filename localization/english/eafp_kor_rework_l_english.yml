 concept_eafp_landlvl_mil: "Military Status"
 concept_eafp_landlvl_mil_desc: "Military Status represents the overall condition and discipline of the military camps and service system. It can be improved or worsened by the following activities or factors:\n\n#P •$eafp_progress_bar_land_problem_landexp_mil_from_military_wage_level$#!\n#P •$eafp_progress_bar_land_problem_landexp_mil_from_army$#!\n\nThe status changes according to the value as follows:\n\n[GetPlayer.MakeScope.ScriptValue('eafp_val_land_problem_threshold1')] or more: $land_problem_lvl_1$\n[GetPlayer.MakeScope.ScriptValue('eafp_val_land_problem_threshold2')] or more: $land_problem_lvl_2$\n[GetPlayer.MakeScope.ScriptValue('eafp_val_land_problem_threshold3')] or more: $land_problem_lvl_3$\n[GetPlayer.MakeScope.ScriptValue('eafp_val_land_problem_threshold4')] or more: $land_problem_lvl_4$\n[GetPlayer.MakeScope.ScriptValue('eafp_val_land_problem_threshold5')] or more: $land_problem_lvl_5$"
 concept_eafp_landlvl_adm: "Administrative Status"
 concept_eafp_landlvl_adm_desc: "Administrative Status represents the overall condition and discipline of the government offices and their officials. It can be improved or worsened by the following activities or factors:\n\n#P •$eafp_progress_bar_land_problem_landexp_adm_from_government_wage_level$#!\n#P •$eafp_progress_bar_land_problem_landexp_adm_from_bureaucracy$#!\n#P •$eafp_progress_bar_land_problem_landexp_adm_from_infrastructure$#!\n\nThe status changes according to the value as follows:\n\n[GetPlayer.MakeScope.ScriptValue('eafp_val_land_problem_threshold1')] or more: $land_problem_lvl_1$\n[GetPlayer.MakeScope.ScriptValue('eafp_val_land_problem_threshold2')] or more: $land_problem_lvl_2$\n[GetPlayer.MakeScope.ScriptValue('eafp_val_land_problem_threshold3')] or more: $land_problem_lvl_3$\n[GetPlayer.MakeScope.ScriptValue('eafp_val_land_problem_threshold4')] or more: $land_problem_lvl_4$\n[GetPlayer.MakeScope.ScriptValue('eafp_val_land_problem_threshold5')] or more: $land_problem_lvl_5$"
 concept_eafp_landlvl_civ: "Civilian Status"
 concept_eafp_landlvl_civ_desc: "Civilian Status represents the overall economic living standard of the people. It can be improved or worsened by the following activities or factors:\n\n#P •$eafp_progress_bar_land_problem_landexp_civ_from_agriculture$#!\n#P •$eafp_progress_bar_land_problem_landexp_civ_from_gdp_per_capita$#!\n#N •$eafp_progress_bar_land_problem_landexp_civ_from_radicals$#!\n\nThe status changes according to the value as follows:\n\n[GetPlayer.MakeScope.ScriptValue('eafp_val_land_problem_threshold1')] or more: $land_problem_lvl_1$\n[GetPlayer.MakeScope.ScriptValue('eafp_val_land_problem_threshold2')] or more: $land_problem_lvl_2$\n[GetPlayer.MakeScope.ScriptValue('eafp_val_land_problem_threshold3')] or more: $land_problem_lvl_3$\n[GetPlayer.MakeScope.ScriptValue('eafp_val_land_problem_threshold4')] or more: $land_problem_lvl_4$\n[GetPlayer.MakeScope.ScriptValue('eafp_val_land_problem_threshold5')] or more: $land_problem_lvl_5$"

