 je_eafp_joseon_qing_war_reason: "조선과 청 사이에 전쟁이 발발했습니다. 전황뿐 아니라 전쟁의 기간, 군수, 재정과 민심이 전후의 정치적 결말을 결정할 것입니다."
 je_eafp_joseon_qing_war_goal: "청과의 전쟁을 끝내고 청의 종속국이 되지 마십시오."

