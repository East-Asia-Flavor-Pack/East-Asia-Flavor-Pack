 chinese_westernization.239.t: "设立[SCOPE.sState('naval_academy_state').GetPortHubName]水师学堂失败" # chinese_westernization.139.t 참고
 chinese_westernization.239.d: "尽管他们尽了最大努力，[SCOPE.sState('naval_academy_state').GetPortHubName]水师学堂未能向学生敞开大门，被迫放弃了现代化计划。" # chinese_westernization.139.d 참고
 chinese_westernization.239.f: "学堂的大门紧锁，空荡荡的走廊里只有纸张的沙沙声和偶尔的叹息声。学堂的领导们坐在办公桌前，盯着他们的计划，想知道哪里出了问题。在外面，[SCOPE.sState('naval_academy_state').GetPortHubName]的街道上熙熙攘攘，但学堂内只有挫败感和失望感。清朝海军的未来看起来很黯淡。" # chinese_westernization.139.f 참고
 chinese_westernization.239.a: "$chinese_westernization.139.a$"

 chinese_westernization.240.t: "[SCOPE.sState('naval_academy_state').GetPortHubName]水师学堂开学" # chinese_westernization.140.t 참고
 chinese_westernization.240.d: "经过几个月的努力和奉献，[SCOPE.sState('naval_academy_state').GetPortHubName]水师学堂的领导们成功地向学生开放了该机构，并开始实施他们的现代化计划。" # chinese_westernization.140.d 참고
 chinese_westernization.240.f: "学堂的大门敞开，渴望学习的学生们一个接一个地涌入，手里拿着一捆捆书，脸上带着坚定的表情。学堂的领导站在入口处，自豪而满意地看着他们的梦想成为现实。空气中充满了闲聊声和笑声，以及刀剑相击和军靴行进的声音。清朝海军的未来看起来一片光明。" # chinese_westernization.140.f 참고
 chinese_westernization.240.a: "$chinese_westernization.140.a$"
 chiwes240a: "水师学堂开学"

 chinese_westernization.299.t: "海军完全现代化" # TODO
 chinese_westernization.299.d: "经过多年不知疲倦的工作，[ROOT.GetCountry.GetAdjectiveNoFormatting]海军的现代化终于完成。有了这支新舰队，我们站在了海洋时代的门槛上，不仅承诺增强军事实力，还承诺提供前所未有的贸易和探索机会。"
 # After years of tireless work, the modernization of [ROOT.GetCountry.GetAdjectiveNoFormatting] Navy has finally been completed. With this new fleet, we stand on the precipice of a maritime era, promising not only enhanced military prowess but also unprecedented opportunities for trade and exploration.
 chinese_westernization.299.f: "熙熙攘攘的港口充满了成就感和期待。黎明的第一缕曙光照耀在新建成的铁甲舰上，在其令人生畏的船体上投下灿烂的光芒。\n\n一位长年在海上风吹日晒、饱经风霜的老海军上将看着这支雄伟的舰队。“我们的祖先梦想过这样的力量，”他喃喃自语，他的声音在海浪的轰鸣声中几乎听不见。“曾经，我们不得不向大海和其他国家乞求怜悯。现在，我们成为了受人尊敬和敬畏的对象。”站在附近的一名年轻水手仰望着威风凛凛的铁甲。他的眼睛里充满了钦佩和希望。“看那个。”他惊叹道。\n\n随着太阳升起，温暖的金光照亮了舰队，这是[ROOT.GetCountry.GetAdjectiveNoFormatting]海军力量的象征，准备好迎接未来可能面临的任何挑战。"
 chinese_westernization.299.a: "是时候向大洋进发了！"
 chiwes299a: "海军完全现代化：海外扩张"
 chinese_westernization.299.b: "这些海洋属于[ROOT.GetCountry.GetName]！"
 chiwes299b: "海军完全现代化：海洋霸主"

 chinese_westernization.301.t: "第一条铁路"
 chinese_westernization.301.d: "[SCOPE.sCountry('chi_scope').GetName]的第一条铁路已在[SCOPE.sState('first_railroad_state').GetName]铺设。这台机器，无需马或骡子拉动，跑得像长了翅膀一样快，将节省大量的人力。"
 chinese_westernization.301.f: "到了下午一点钟，男女老少蜂拥而至，座位瞬间座无虚席。火车准备开动时，人们像波浪一样涌上前来。乘火车是一次旅行，住在[SCOPE.sState('first_railroad_state').GetCityHubName]一年都没出过远门的人们，带着一家老小来参观和乘坐这个稀奇的东西。\n\n由于火车是前所未有的奇观，自然没人知道它有多危险。因此，在出发前，会大声敲钟宣布出发，表示所有乘客必须就座，不能再上车了。然后汽笛响了几声，火车逐渐加速。乘客们的脸上充满了喜悦，火车两旁的人们一边看着一边发出惊叹的呼声。\n\n火车加速并迅速消失在远处。[SCOPE.sState('first_railroad_state').GetCityHubName]周边大部分是棉田，在那里工作的人们都停下了手中的活，张大嘴巴惊讶地看着。" # 王繼傑, 「淞滬鐵路通車」, 『舊上海社會百態』, 上海人民出版社, 1991.2, pp.2-3; 米澤秀夫, 『上海史話』   畝傍書房, 1942, pp.73-74 
 chinese_westernization.301.a: "真是一个奇妙的机器。"
 chi_first_railroad: "中国第一条铁路"

 chinese_westernization.302.t: "对铁路的恐惧"
 chinese_westernization.302.d: "目前正在[SCOPE.sState('first_railroad_state').GetName]修建的铁路遭到了很多反对。"
 chinese_westernization.302.f: "“修建铁路就像敞开大门招惹盗贼一样。一旦发生紧急情况，外国军队入侵将很方便；在和平时期，外国人也很容易带来他们的商品并运走廉价的中国商品，这样各省的各个角落都将留下西方人的足迹。”\n\n“西方人信奉主耶稣，不知道山川神灵，但中国历代都祭祀名山大川。因此，为了修建铁路而破坏它们、开凿隧道并摧毁它们，是扰乱山川神灵的不祥之举。”" # 宓汝成, 『中國近代鐵路史資料』 1冊, 中華書局; 曾鯤化, 『中國鐵路史』 1冊, 文海出版社, 1973, pp.38-39
 chinese_westernization.302.a: "停止建设。"
 chinese_westernization.302.b: "继续推进。"
 chiwes302b: "对铁路的恐惧"

 chinese_westernization.303.t: "[SCOPE.sState('first_modern_mine_state').GetMineHubName]矿山"
 chinese_westernization.303.d: "一家利用西方技术，借助机器力量开采更多矿石的矿山在[SCOPE.sState('first_modern_mine_state').GetMineHubName]开业了。"
 chinese_westernization.303.f: "矿工们从未见过这样的景象。巨大的机器发出叮当声和嗡嗡声，它们的齿轮和活塞不停地运转。机器比任何工人挖得都深都快，很快矿山生产的矿石比任何人想象的都要多。与机器一起工作，矿工们向它们学习并加以利用。证明技术力量的机器声在隧道中回荡。随着第一批矿石运出矿山，工人们不禁为他们所取得的成就感到自豪。"
 chinese_westernization.303.a: "这仅仅是个开始。"
 chi_first_modern_mine: "中国第一家现代矿山"

 chinese_westernization.304.t: "[SCOPE.sState('first_modern_mine_state').GetCityHubName]纺织厂"
 chinese_westernization.304.d: "中国第一家现代纺织厂的建设已完成，预示着织物生产新时代的到来。"
 chinese_westernization.304.f: "随着消息在城市中传播开来，街道上热闹非凡。各行各业的人们聚集在工厂大门周围，以瞥见这些来自遥远土地的新机器。期待的气氛在空气中弥漫，仿佛这些机器的到来预示着新时代的诞生。\n\n工厂里面，机器的轰鸣声填满了整个空间。无数的工厂工人排着队，目光盯着从织布机和纺纱机中流出的源源不断的棉纤维。对于第一次看到它的人来说，机器的节奏很难适应，但对于其他人来说，这是一个参与新创新的机会。"
 chinese_westernization.304.a: "真是一项了不起的成就。"
 chi_first_modern_cotton_mill: "机器织布局"

 chinese_westernization.305.t: "调任" # TODO 테스트
 chinese_westernization.305.d: "总督[SCOPE.sCharacter('viceroy_scope').GetFullName]积极接受西方技术并带头进行现代化建设。结果在[SCOPE.sState('former_post_state').GetName]建立了许多现代化设施。然而他最近被调往另一个地区。问题在于他试图将他建造的设施转移到[SCOPE.sState('state_scope').GetName]。"
 chinese_westernization.305.f: "“所有的[SCOPE.sBuilding('building_scope').GetName]都必须转移到我的新岗位。把那些设施留在[SCOPE.sState('former_post_state').GetName]太浪费了。”"
 chinese_westernization.305.a: "我们应该满足他的要求。毕竟这是他的心血。"
 chinese_westernization.305.b: "我们不能让他恣意妄为。"
 chiwes305a_building: "缺失的齿轮"
 chiwes305b: "消耗权威"

 chinese_westernization.399.t: "世界工厂"
 chinese_westernization.399.d: "经过不懈的努力、改革和投资，[ROOT.GetCountry.GetName]已经成功地实现了工业化。现在工厂全速运转，火车穿梭于风景中，经济繁荣。"
 chinese_westernization.399.f: "拂晓时分，当阳光洒在长江上时，一位脸被阳光晒黑的船夫凝视着祖国不断变化的风景。在这里，在生机勃勃的河流流淌的地方，现在矗立着高耸的工厂和烟囱。浓密的雾霾遮蔽了天空，在曾经熟悉的地平线上投下了一层灰色的阴霾。他用长满老茧的手抚摸着他那光滑磨损的桨，这件旧时代的遗物现在已经被机器所掩盖。\n\n在正午的阳光下，河流因汽船和驳船的热量而沸腾。这些钢铁巨兽的轰鸣声粗暴地用机械噪音淹没了河流宁静的交响乐。他怀念那段只有他的小木船和浩瀚长江的宁静岁月。\n\n当夜幕降临，散发着深红色的浓霾在天空中描绘出一幅吸引船夫目光的画面。[ROOT.GetCountry.GetName]现在是一个工业巨头，正随着新的生活而运转，但在进步的阴影下，船夫的世界已经永远改变了。然而，在船夫的眼中，他看到了自幼年起就奔流不息的长江。"
 chinese_westernization.399.a: "无边落木萧萧下，不尽长江滚滚来。"
 chiwes399a: "世界工厂"

 chinese_westernization.401.t: "设立同文馆"
 chinese_westernization.401.d: "在设立总理衙门之后，朝廷设立了京师同文馆，简称同文馆，这是一个致力于外语教育的学堂。同文馆的任务是培养新一代的外交官和官员，使他们能够与外国列强交流，并在世界舞台上代表[ROOT.GetCountry.GetName]的利益。"
 chinese_westernization.401.f: "皇帝下诏设立同文馆，教授夷人的语言。听到这个消息后，备受众多儒生尊敬的[SCOPE.sCharacter('devout_leader').GetFullName]这样想：\n\n‘这没什么大不了的。’\n\n自古以来，要与夷人打交道，难道不需要懂得他们的语言吗？虽然我们遭受了像上次那样的灾难，因为他们是瞎子，甚至不能通过书写来交流，但如果我们用他们自己的语言好好哄他们，我们将能够再次控制他们。"
 chinese_westernization.401.a: "我们终于能轻松地与西方人交流了。"

 chinese_westernization.402.t: "户部奏请设立中央银行"
 chinese_westernization.402.d: "户部向皇帝上奏，提议设立一家银行。这家仿照西方银行建立的银行，将作为管理帝国财政的中央机构。"
 chinese_westernization.402.f: "“随着货币制度的改革，迫切需要建立一个中央银行作为其执行的枢纽。经过慎重考虑，我们提议由户部引入银行、筹集资金，参考各国银行章程，权衡利弊，迅速启动该银行作为金融交易的总枢纽。”"
 # "As the currency system is being reformed, it is urgent to establish a central bank as the hub for its implementation. We have carefully considered it and propose that the Ministry of Revenue introduce a bank, raise capital, refer to the statutes of banks in various countries, consider the pros and cons, and promptly start the bank as the general hub for financial transactions."
 chinese_westernization.402.a: "建立大清银行！"
 # Found the Great Qing Bank!

 chinese_westernization.403.t: "调整同文馆课程"
 chinese_westernization.403.d: "朝廷决定将天文、算学等西方学科纳入同文馆课程，并要求五品及以下的官员去同文馆学习。此外，还指示翰林院的翰林们参与学习这些新学科。然而这一决定遭到了士大夫阶层的强烈反对。" #
 chinese_westernization.403.f: "“夷人是我们的仇敌。然而现在您却把这些国家本应培养并留作己用的聪明强健的人才，改变他们去追随夷人。正气不伸，邪气就会越发嚣张。过不了几年，全中国的人都会变成夷人了。请立即收回成命，维持大局。如果您能这样阻止这场无形的灾难，天下就真的太平了！”"
 chinese_westernization.403.a: "真是太吵了。"

 chinese_westernization.404.t: "落马"
 chinese_westernization.404.d: "坚决反对朝廷决定的[SCOPE.sCharacter('devout_leader').GetFullName]最终被设计陷害了。"
 chinese_westernization.404.f: "“天下之大，何必担心没有人才。只要广泛搜寻，一定能找到精通学问的人。为什么一定要拘泥于夷人呢？”谁知道这些话成了把柄？他竟然被要求自己带精通学问的人来建学校！\n\n就这样，[SCOPE.sCharacter('devout_leader').GetFullName]发现自己踏入了他如此鄙视的“洋务”这趟浑水。这真是太可怕了。每次回家，他都脸色苍白，茶饭不思。\n\n最终，[SCOPE.sCharacter('devout_leader').GetFullName]从马鞍上摔了下来。"
 chinese_westernization.404.a: "现在应该清静一些了。"
 chinese_westernization.404.tt: "士大夫们将会变得温和。"

 chinese_westernization.405.t: "铸币权收归中央完成"
 chinese_westernization.405.d: "经过艰苦的努力，我们完成了铸币权的中央集权化。"
 chinese_westernization.405.f: "长期以来，地方政府和大商人一直自行铸造货币，导致货币混乱，商业活动困难重重。但现在，各省市自行铸造货币的时代已经结束。\n\n借此我们可以统一我们的货币政策，尽管预计会遭到一些地方势力和大商人的反弹。"
 chinese_westernization.405.a: "终于！"

 chinese_westernization.406.t: "京师大学堂"
 chinese_westernization.406.d: "中国第一所基于西方教育体系而非传统教育的大学成立了。"
 chinese_westernization.406.f: "‘中学为体，西学为用；两者皆必需，缺一不可。体用残缺，如何培养人才？况且，不教理论而没有根基，对西学浅薄的模仿将无法获得任何理解，只会增加坏习惯。因此，必须中西并重，考察它们的联系，并且不能放弃任何一方。此外，西语应作为学堂的一门科目，但不能作为学堂的全部。西语只是西学的踏脚石，而不是其最终目标。这一意图必须清楚地理解并向各省公布。’"
 chinese_westernization.406.a: "以中国的伦常名教为根本，辅以各国的富强之术；这难道不是最好的方法吗？"
 chi_imperial_university: "京师大学堂"

 chinese_westernization.421.t: "关于治安未来的辩论"
 # Debate on the Future of Public Security
 chinese_westernization.421.d: "政府官员之间就保甲制度的未来展开了激烈的辩论，该制度几个世纪以来一直用于维持帝国的治安。一些人认为该制度已经过时，需要进行改革以创建现代警察部队，而另一些人则认为应该彻底废除它。"
 # A heated debate has arisen among officials in the government regarding the future of the Baojia system, which has been used for centuries to maintain public security in the empire. Some argue that the system is outdated and in need of reform to create a modern police force, while others believe that it should be abolished altogether.
 chinese_westernization.421.f: "辩论持续了几个小时，双方都在充满激情地陈述自己的观点。赞成改革保甲制度的人认为，面对时代的变化，它已经不再有效。他们指出它已经腐败，不再发挥其最初的作用。他们声称该制度被滥用，并提议效仿西方警察制度。\n\n辩论的另一方，强烈支持维持保甲制度的人认为，该制度已经实施了几个世纪，并被证明在维持公共秩序和安全方面是有效的。他们认为改善该制度的关键是为保甲长提供更好的培训，并加强保甲组织与地方当局之间的沟通。\n\n而最小的群体主张彻底废除保甲制度。他们认为保甲制度存在无法弥补的缺陷，需要废除。虽然承认向新制度的过渡将是困难的，但他们认为从长远来看，这是确保帝国安全和繁荣的必要条件。"
 # The debate raged on for hours, with each side passionately arguing their case. Those in favor of reforming the Baojia system argued that it was no longer effective in the face of the changing times. They pointed out that it had become corrupted and was no longer serving its original purpose. They claimed that the system had been abused and proposed to use the Western policing system as a model to emulate.\n\nOn another side of the debate, those passionately in favor of maintaining the Baojia system argued that this system had been in place for centuries and had proven to be effective in maintaining public order and safety. They believed that the key to improving the system was to provide better training to the Baojia leaders and to strengthen the communication between the Baojia groups and the local authorities.\n\nAnd, the smallest group advocated for the complete abolition of the Baojia system. They believed that the Baojia system was irreparably flawed and needed to be abolished. While acknowledging that the transition to a new system would be difficult, they believed that it was necessary to ensure the safety and prosperity of the empire in the long run.
 chinese_westernization.421.a: "顺其自然吧。我们两个都可以用。"
 baojia_system_retained_ig_landowners: "维持保甲制"
 baojia_system_retained_ig_intelligentsia: "维持保甲制"
 chinese_westernization.421.b: "为了高效征税而进行改革。"
 baojia_system_reformed_tax: "保甲制改革：税收征管"
 chinese_westernization.421.c: "为了高效防御乡村而进行改革。"
 baojia_system_reformed_military: "保甲制改革：乡村防御"
 chinese_westernization.421.e: "彻底废除它！"
 baojia_system_abolished: "废除保甲制"
 baojia_system_abolished_ig_landowners: "废除保甲制"
 baojia_system_abolished_ig_intelligentsia: "废除保甲制"

 chinese_westernization.422.t: "关于科举制未来的争论" # 
 chinese_westernization.422.d: "关于科举未来的讨论正在[ROOT.GetCountry.GetName]激烈进行。一些官员主张继续保留，另一些官员建议只修改部分科目，还有一些官员要求彻底废除它。"
 # The future of the imperial examination is being hotly debated in [ROOT.GetCountry.GetName]. Some officials argue for its continued use, others suggest modifying only some subjects, while others call for its complete abolition.
 chinese_westernization.422.f: "关于科举未来的争论非常激烈。许多人认识到了该制度的缺陷，并认为现在是改变的时候了。他们认为科举考试不是衡量能力的公平或可靠的标准，而且它已经过时，不能反映不断变化的社会需求。\n\n然而，其他官员的意见存在分歧。他们认为科举是中国治理体系的重要组成部分，尽管存在缺陷，但必须予以保留。他们认为科举考试几个世纪以来对帝国都有益，是一项需要保留的宝贵传统。\n\n不过，还有一些人认为，可以通过一些修改来改进该制度。他们建议调整科目或考试方式，使其更加公平可靠。他们声称，虽然科举考试是发现潜力的重要工具，但需要进行修改以反映当前的需求。"
 # The argument over the imperial examination's future is heated. Many leaders recognize the system's faults and argue that it is time to move on. They say that the exam is not a fair or trustworthy measure of aptitude, that it is out of date, and that it does not reflect the demands of a changing society.\n\nOther officials, however, are divided. They argue that the examination is an important aspect of the Chinese governance system and that it must be preserved, despite its flaws. They contend that the examination have been beneficial to the empire for centuries and that it is a valuable tradition that need to be preserved.\n\nStill others believe that the system can be improved with some modifications. They propose adjustments to the subjects or the manner the exam is conducted to make it more fair and reliable. They claim that while the examination is an important tool for finding potential, it need to be revised to reflect current demands.
 chinese_westernization.422.a: "保留科举制。"
 imperial_examination_retained_ig_devout: "维持科举制"
 imperial_examination_retained_country: "维持科举制"
 chinese_westernization.422.b: "可能需要一些改革。"
 imperial_examination_reformed: "改革科举制"
 imperial_examination_reformed_ig_devout: "改革科举制"
 imperial_examination_reformed_ig_landowners: "改革科举制"
 chinese_westernization.422.c: "彻底废除它！"
 imperial_examination_abolished_ig_devout: "废除科举制"
 imperial_examination_abolished_ig_landowners: "废除科举制"

 # chinese_westernization.423 TODO

 chinese_westernization.424.t: "儒学在新学校体系中的作用"
 # The Role of Confucianism in the New School System
 chinese_westernization.424.d: "[ROOT.GetCountry.GetName]面临着关于儒家思想在现代学校体系中作用的艰难决定。" # [ROOT.GetCountry.GetName] is faced with a difficult decision regarding the role of Confucianism in the modern school system.
 chinese_westernization.424.f: "关于儒家思想在新学校体系中地位的讨论非常激烈。支持废除儒家教育的人认为，儒家学说已经过时，与当今时代脱节。他们认为教育应该精心设计，以培养有助于国家现代化的专门人才，而儒家思想在这个过程中没有立足之地。\n\n然而，其他官员并不同意。他们认为儒家思想是中国文化的重要方面，应该予以保留。他们说儒家学说灌输了诸如尊老、服从和社会和谐等核心品质，所有这些都是帝国生存所必需的。"
 # The discussion about Confucianism's position in the new school system is intense. Those who support its abolition believe that Confucian teachings are out of date and irrelevant in current times. They believe that education should be carefully designed to develop talent that will aid in the country's modernization, and that Confucianism has no place in this process.\n\nOther officials, though, disagree. They believe Confucianism is an important aspect of Chinese culture and that it should be preserved. They say that Confucian teachings instill key qualities such as respect for elders, obedience, and social peace, all of which are necessary for the realm's survival.
 chinese_westernization.424.a: "确实有必要继续教授。"
 confucian_education_ig_devout: "儒学教育"
 chinese_westernization.424.b: "没有必要。"

 chinese_westernization.428.t: "内阁与军机处"
 chinese_westernization.428.d: "内阁和军机处长期以来一直是行政的支柱。然而，在权力走廊中低语着改革的声音，认为这些机构是陈旧的过去遗物，不再适应动态社会的需求。"
 # The Grand Secretariat and the Grand Council have long been pillars of our administration. However, voices of reform whisper in the corridors of power, arguing that these institutions are antiquated relics of the past, no longer suited to the needs of our dynamic society.
 chinese_westernization.428.f: "穿着华丽朝服的朝臣们在高高的穹顶下不安地窃窃私语。“传统是我们帝国的脊梁，”一位有着花白胡须和严肃眼神的睿智老者大学士说道，“我们不能轻易抛弃让我们走到今天的根基。”代表着日益高涨的改革呼声的对面官员回敬了老者的目光。“尽管如此，我们必须迈出第一步，”他用闪亮的眼神回答道。"
 # Courtiers in their opulent robes whispered uncomfortably beneath the imperial court's high-vaulted ceiling. "Tradition is the spine of our nation,\" remarked the Grand Secretary, a wise elder with a silver streaked beard and serious gaze. \"We cannot lightly throw away the foundations that have brought us this far.\"\n\nA bureaucrat across the room, representing the growing call for reform, returned the elder's stare. \"And yet,\" he answered with his shining eyes, \"we must take the first step."
 chinese_westernization.428.a: "像过去几个世纪那样继续运行。" # 
 retain_junji_chu_ig_landowners: "保留军机处"
 retain_junji_chu_ig_intelligentsia: "保留军机处"
 chinese_westernization.428.b: "解散内阁和军机处，组建责任内阁。"
 # Let us dismantle the Secretariat and the Council, and organize the Responsible Cabinet.
 abolish_junji_chu_ig_landowners: "废除军机处"
 abolish_junji_chu_ig_intelligentsia: "废除军机处"

 chinese_westernization.441.t: "探寻精英"
 # The Search for the Best and Brightest
 chinese_westernization.441.d: "倾向改革的官员主张应该派学生出国接受教育。"
 # Reform-minded officials argued that a group of students should be sent abroad for education.
 chinese_westernization.441.f: "“今日中国欲效法西方之精神，精通其方法。在如今这般变局之中，理应尽早选拔聪慧子弟赴洋留学，磨砺才干，以期不负我皇上自强求富之至意。”"
 chinese_westernization.441.a: "依议施行。"
 chinese_educational_mission_enabled_tt: "“派遣留学生”决议已激活。"

 chinese_educational_mission_decision: "派遣留学生"
 chinese_educational_mission_decision_reason: "亲身呼吸发达国家的空气，对掌握其技术将大有裨益。"
 je_chinese_educational_mission: "幼童留美"
 je_chinese_educational_mission_reason: "亲身呼吸发达国家的空气，对掌握其技术将大有裨益。"
 modifier_chinese_educational_mission_cost: "海外留学费用"

 chinese_westernization.442.t: "选拔"
 chinese_westernization.442.d: "为确保只有最有才华和前途的学生入选，全国范围内将进行严格的选拔程序。"
 # To ensure that only the most talented and promising students will be selected, a rigorous process will be instituted throughout the country.
 chinese_westernization.442.f: "‘在与叔伯、姑嫂、兄弟和乡亲们告别之后，我按照传统方式向母亲作了最后的告别。我没有拥抱母亲，也没有亲吻她。唉，这就是遵循中国传统礼节保全面子的方法。我能做的只是向母亲磕四个头。母亲假装很高兴，但我看到了，她眼里闪烁的泪花！母亲往我手里塞了几枚铜钱，并叮嘱我。’"
 chinese_westernization.442.a: "“孩子，要听话，常写信……”"

 chinese_westernization.443.t: "留学生选拔完毕"
 chinese_westernization.443.d: "出国留学的学生已经选拔完毕。现在是时候把他们送往国外了。"
 chinese_westernization.443.f: "‘我们穿着官服，乘坐着豪华马车，对道台和总领事进行了礼节性拜访。到了月初，我们做好了出海的准备。一想到出国留学几年后回来，朋友中可能有一半已经不在人世，我们都怀着沉重的心情告别。但离别的悲伤很快就过去了，随着汽船在江面上喷出蒸汽，祖国在暮色中渐渐模糊，取而代之的是乡愁和忧郁。’"
 # We paid visits of ceremony to the Tautai, chief officer of the department, and to the American consul-general, dressed in our official robes and carried in fine carriages. By the first part of June, we were ready for the ocean journey. We bade our friends farewell with due solemnity, for the thought that on our return after fifteen years of study abroad half of them might be dead, made us rather serious. But the sadness of parting was soon over and homesickness and dreariness took its place, as the steamer steamed out of the river and our native country grew indistinct in the twilight.
 chinese_westernization.443.a: "怀着沉重的心情，雄心勃勃的航程开始了。"

 chinese_westernization.444.t: "啊，新大陆！"
 chinese_westernization.444.d: "经过几万里的航行，留学生们终于抵达了[SCOPE.sState('destination_state').GetCityHubName]。"
 chinese_westernization.444.f: "‘[SCOPE.sState('destination_state').GetCityHubName]对我们这样血气方刚的十几岁男孩来说就是天堂。我以前从未见过如此高耸的摩天大楼。这里有煤气，有自来水，有门铃，还有电梯。这里的一切都满足了我们对这片新土地的好奇心。’"
 chinese_westernization.444.a: "真是一个神奇的城市！"

 chinese_westernization.445.t: "火车"
 chinese_westernization.445.d: "在前往留学事务局的路上，留学生们乘坐了火车。"
 chinese_westernization.445.f: "‘火车轮子一转，山川田野树林眨眼间就掠了过去。突然进了隧道，比黑夜还黑，一丝光亮都没有。到了傍晚六点左右，不知从哪儿冒出来一片白雪皑皑的景色。经过采金矿的山时，啊，那山色是多么美丽！’"
 chinese_westernization.445.a: "世界正在以火车般前所未有的速度变化。"

 chinese_westernization.446.t: "抵达"
 chinese_westernization.446.d: "最后，留学生们到了他们将要居住几年的寄宿家庭。"
 chinese_westernization.446.f: "‘我很幸运地被安排在一个温柔慈祥的夫人家里。夫人第一次见到我，就紧紧地抱住我，亲了又亲。其他男孩看到这一幕哈哈大笑，嘲笑我脸红得连耳垂都像火烧一样。这是我平生第一次被亲吻。’"
 chinese_westernization.446.a: "终于到了。"

 chinese_westernization.447.t: "主日学"
 chinese_westernization.447.d: "到达西方的中国留学生听说每个安息日都要去教堂的规定，掩饰不住他们的困惑。"
 chinese_westernization.447.f: "‘星期天吃过午饭，夫人让我们准备去主日学。那时候我们只懂一点点英语，所以只听懂了“学校”两个字，心里想：“哎呀，星期天还要上学！”我们正收拾课本准备出发，夫人说根本不用带书。于是我们就空着手出门了。\n\n到了“学校”，一个朋友低声嘟囔：“呃，这地方看起来像教堂……”我们仔细看了看四周，看到人们站着唱歌。没错，就是教堂，教堂！’"
 chinese_westernization.447.a: "我们窃窃私语，然后赶紧溜出教堂直接回家了。"
 chinese_westernization.447.b: "我们一直屏住呼吸待在那儿，直到结束后才离开教堂。"

 chinese_westernization.448.t: "自己的根"
 chinese_westernization.448.d: "一阵阵奇怪的、有节奏的读书声在留学事务局里回荡。"
 chinese_westernization.448.f: "‘考槃在涧，硕人之宽。\n独寐寤言，永矢弗谖。’\n\n‘颜渊问仁。子曰，克己复礼为仁。一日克己复礼，天下归仁焉。为仁由己，而由人乎哉？’" # 시경, 국풍, 위풍, 고반, 考槃在㵎、碩人之寬。獨寐寤言、永矢弗諼。, 논어, 안연제십이, 顏淵問仁。子曰、克己復禮爲仁、一日克己復禮、天下歸仁焉、爲仁由己、而由人乎哉。중 앞부분
 chinese_westernization.448.a: "即使身在万里之外，也不应忘记自己的根。"

 chinese_westernization.449.t: "谕示" # 諭示
 chinese_westernization.449.d: "留学生监督向学生们发布谕示：“身在万里之外，也要严格遵守圣贤的教诲和中国的礼仪。”"
 chinese_westernization.449.f: "“晓谕诸生：\n\n派尔等出洋留学，本意是让尔等学习外国学问，并非让尔等忘却本国规矩。因此，首要任务是发愤读书，且绝不可违反规矩。尔等在外国学校读书，先生也是外国人，故必须自己觉悟。尔等在外国的日子短，在中国生活的日子长。到那时再想纠正心思和态度，就已经是亡羊补牢了。”"
 chinese_westernization.449.a: "他们还是血气方刚的年轻人，希望他们不要一时冲动坏了事。"

 chinese_westernization.450.t: "御史的奏折"
 chinese_westernization.450.d: "视察了留学事务局的御史提交了一份负面报告。"
 chinese_westernization.450.f: "“外国的风俗有很多恶劣之处。学生们不读儒家经典，品性也不够坚实。更何况，他们不但没有学到必要的技能，反而逐渐染上了坏习惯。臣恳请，必须对此进行严厉纠正。”"
 chinese_westernization.450.a: "朕让他们学习夷人的技艺，什么时候让他们学夷人的习俗了！真是世风日下！"

 chinese_westernization.451.t: "《中国的未来》"
 chinese_westernization.451.d: "在高中举行的一场演讲比赛中，留学生们发表了充满激情的演讲。"
 chinese_westernization.451.f: "“中国没有死。她只是睡着了。中国很快就会从睡梦中醒来，并必将昂首屹立于世界！”"
 chinese_westernization.451.a: "观众爆发出了雷鸣般的掌声。"

 chinese_westernization.452.t: "赢得比赛"
 chinese_westernization.452.d: "由留学生担任舵手的队伍赢得了赛艇比赛的冠军。"
 chinese_westernization.452.f: "当船桨如脉搏般划破如镜的水面时，每一次呼吸我都能感受到船员们的团结。前方是开阔的水域——那是我们通向荣誉的门户。每一次划桨都让我们更近一步，而竞争对手的呼喊声在我们的不懈推进下渐渐远去。\n\n红色浮标掠过的身影，就像催促我们前进的鼓点。我的声音穿透了呼吸声和海浪声。不久，终点线逼近了，那不仅仅是一个标记，更是胜利的预言者。伴随着最后一次全力以赴的冲刺，我们将自己的一切都倾注在那个瞬间，终于越过了它——我们赢了。"
 # I could feel the unity of my crew with every breath as the pulse of the oars cut through the glassy water. Ahead lay open water - our gateway to glory. Each stroke brought us closer, while the cries of the competitors faded against our relentless advance.\n\nGlimpses of red buoys flashed by; they were like fleeting beats of a drum urging us on. My voice cut through the noise of breaths and waves. The finish line loomed; it was no mere marker but a herald of triumph. With one final heave, surrendering all that we were to that singular moment, we surged across it – victorious at last. 변형
 chinese_westernization.452.a: "我们挫败了他们的锐气。"

 chinese_westernization.460.t: "归来"
 chinese_westernization.460.d: "留学生们回到了祖国。带着从世界顶尖学府学到的知识，这些学者带回了新思想、技术见解和全球视野。"
 chinese_westernization.460.f: "熙熙攘攘的港口，家属和高级官员们聚在一起，目光盯着地平线。一艘载着清朝未来的船缓缓驶入视线。人群中，一位母亲攥着手帕，流下了眼泪。\n\n学生们满脸坚毅地走下船。这个将改变国家的新一代，受到了欢呼和张开双臂的欢迎。一位年轻学者望着这座曾经显得那么庞大的城市，说道：“我们离开是为了向世界学习，但现在我们回来是为了报效祖国。”"
 chinese_westernization.460.a: "欢迎归来！"

 chinese_westernization.462.t: "货币标准化努力"
 # Currency Standardization Efforts
 chinese_westernization.462.d: "朝廷宣布了货币标准化计划，以改善贸易和稳定经济。然而，这需要回收所有已发行的货币并替换为新货币。这一过程既昂贵又耗时，但对于帝国未来的繁荣是必要的。"
 # The imperial court has announced plans to standardize its currency, to improve trade and stabilize the economy. However, this will require collecting all the currency already issued and replacing it with a new standardized version. This process will be expensive and time-consuming, but many believe it is necessary for the future prosperity of the empire.
 chinese_westernization.462.f: "“天哪，这已经发行了多少货币了？而且每个省份似乎都有些不同！收集所有的旧货币将是一项无止境的工作。”"
 chinese_westernization.462.a: "这是绝对必要的……"
 chi_currency_standardization_alone: "货币标准化：不借助外援"
