 boxer_rebellion_events.101.t: "Spread of the Boxer Rebellion"
 boxer_rebellion_events.101.d: "The Boxer Rebellion has spread beyond its starting area to [SCOPE.sState('boxer_appeared_state').GetName]. Boxer banners are already seen everywhere, and foreign powers and their local allies are alarmed by the growing unrest and violence."
 boxer_rebellion_events.101.a: "I hope nothing happens."
 boxer_rebellion_events.102.t: "Attacks on Foreigners in [SCOPE.sState('boxer_state').GetName]"
 boxer_rebellion_events.102.d: "The Boxers are attacking Western influence throughout [SCOPE.sState('boxer_state').GetName]. Smugglers, missionaries, opium dealers—anyone targeted by them is either killed or forced to flee for their lives."
 boxer_rebellion_events.102.f: "\"God helps the Boxers because the monstrous ones are messing up China. They spread Christianity, blaspheme Heaven, do not revere Buddha, and do not honor ancestors. Let's smash the railways, cut the telegraph lines, and destroy the large steamships. Then France will be terrified, and Britain and Russia will fall silent. Let's kill all the monsters and enjoy peace in [ROOT.GetCountry.GetName].\""
 boxer_rebellion_events.102.a: "Pretend not to see."
 boxer_rebellion_events.102.b: "Suppress them. Westerners are harmless."
 boxer_rebellion_events.103.t: "Attack on the Legation Quarter"
 boxer_rebellion_events.103.d: "The Boxers have reached [ROOT.GetCountry.GetCapital.GetCityHubName]. And they are attacking foreigners on sight. Even more alarming is that they are surrounding the Legation Quarter, which houses hundreds of foreign dignitaries and merchants. If [ROOT.GetCountry.GetName] does not intervene to protect these foreigners, it could be seen as a declaration of support for the Boxers and an act of war against the Great Powers. However, if we do intervene, the Boxers may see it as a betrayal of their cause and stage a rebellion."
 boxer_rebellion_events.103.f: "\"As the disciples train hard with one mind, the grass and trees of the land turn into soldiers.\n\nHaving mastered immortal martial arts in a foolish body, we will surely exterminate the Westerners and sweep them away in one fell swoop.\""
 boxer_rebellion_events.103.a: "Declare [ROOT.GetCountry.GetName]'s support for the Boxers."
 boxer_rebellion_events.103.b: "Protect the Legations."
 boxer_rebellion_events.105.t: "The Boxer Rebellion"
 boxer_rebellion_events.105.d: "Enraged by [ROOT.GetCountry.GetName]'s betrayal, the Boxers have risen up in rebellion against the government."
 boxer_rebellion_events.105.f: "\"We have made a pact with our compatriots. By driving out the invading Manchus who despise us, suppressing the Manchus who oppress us, executing the Manchus who massacre us, and punishing the Manchus who play with us, we will strive to restore our culture and traditions, reclaim our inherent rights, regain our freedom, and allow everyone to find happiness equally.\""
 boxer_rebellion_events.105.a: "Execute the traitors!"
 boxer_rebellion_events.106.t: "Fall of the Boxers"
 boxer_rebellion_events.106.d: "The activities of the so-called Boxers have ceased."
 boxer_rebellion_events.106.f: "\"These are merely rioting commoners; their crimes are worthy of death and they must be strictly suppressed.\""
 boxer_rebellion_events.106.a: "TODO"
 # Chinese Westernization
 je_chinese_westernization: "Dragon's Transformation"
 je_chinese_westernization_reason: "Alas, how has the world come to this? Since the late Qianlong era, officials are all addicted to opium, the common people are deluded by cults and at a loss, while the cunning Westerners spread cults, distribute opium, extort China's silver, and swarm from both east and west to encroach upon the Emperor's realm. How did the Great Qing come to this? Where has the prosperous era of Kangxi and Qianlong gone?\n\nThis cannot continue. The old Ming Dynasty withstood the northern barbarians and southern pirates solely because of Zhang Juzheng's reforms. The situation of the Great Qing is already critical; if we cannot change, the events of the old Yuan Dynasty will only repeat themselves. To survive, we must change."
 je_chinese_westernization_goal: "Complete 5 Dragon's Transformation [Concept('concept_journal_entry', '$concept_journal_entries$')]"
 je_chinese_westernization_army: "Dragon's Transformation: Army Modernization"
 je_chinese_westernization_army_reason: "The once-proud Eight Banners have all fallen behind, showing only disgraceful behavior in the past rebellions. As the mighty Russia invades the Western Regions, our army remains intoxicated by past glories with rusty spearheads; the defense of the northwestern borders depends solely on the rebuilding of the army.\n\nWe must build enough academies to introduce Western military technology, acquire sufficient military skills, and then apply them to the army. In doing so, we will deter Russia and stabilize the frontier; this is Frontier Defense (Saifang)."
 je_chinese_westernization_navy: "Dragon's Transformation: Navy Modernization"
 je_chinese_westernization_navy_reason: "In the past, those who discussed controlling barbarians knew the enemy's situation like the back of their hand. Now, there is no place across the 90,000 li of the globe where ships cannot go, and Westerners are invading China through the sea. How can we not learn the barbarians' strengths to suppress them?\n\nBy manufacturing sturdy cannons and ships to form a fleet and stationing it in the southeastern seas, the country will be peaceful, the coastal people will sleep soundly, and the barbarians will not dare to covet the Emperor. This is Maritime Defense (Haifang)."
 je_chinese_westernization_industry: "Dragon's Transformation: Industrialization"
 je_chinese_westernization_industry_reason: "Today, the manufacture of machinery is the foundation for fending off the challenges of the Westerners, and the root of self-strengthening. When the skills of craftsmen are organized, palaces and instruments are manufactured, the systems of city walls and ships become sturdy, and the utilization of resources and the livelihood of the people are both enriched. Why shouldn't we adopt the strengths of foreigners to make them China's strengths?\n\nBy using Western steam machinery, the work of a thousand craftsmen can be finished in a single day, manufacturing textiles, paper, and porcelain, mining iron to make weapons. When we become strong, who could dare invade us? This is Self-Strengthening (Ziqiang)."
 je_chinese_westernization_government_reform: "Dragon's Transformation: Government Reform"
 je_chinese_westernization_government_reform_reason: "Why must laws change? Change is a universal truth of all times; as the I Ching says, 'When exhausted, one changes; having changed, one passes through; having passed through, one endures.'\n\nTimes have changed, and nations compete with one another daily. If we sit idly clinging only to the old laws without a thought, we will end up like India, stubbornly sticking to the old ways until we become a colony. Therefore, we must change the laws ourselves; this is Institutional Reform (Bianfa)."
 country_acceptance_shared_cultural_trait_add_above_30: "$country_acceptance_shared_cultural_trait_add$ is 30 or higher"
 country_political_strength_full_acceptance_mult_below_625: "$country_political_strength_full_acceptance_mult$ is 625% or lower"
 je_chinese_westernization_international_prestige: "Dragon's Transformation: Establishing International Prestige"
 je_chinese_westernization_international_prestige_reason: "The world today can no longer be compared to the world of the Xia, Shang, and Zhou dynasties. The Western nations have already surrounded the Great Qing, looking for an opening; we are on the brink of national ruin.\n\nWe must comfort and placate vassals like Dai Nam and Joseon to serve as border guards, solidify internal and external defenses so as not to lose even an inch of Chinese territory, and prevent barbarians from trampling on the people. That is the only way to prevent partition."
