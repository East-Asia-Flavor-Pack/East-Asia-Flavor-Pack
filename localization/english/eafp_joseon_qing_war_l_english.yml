 je_eafp_joseon_qing_war_reason: "War has broken out between Joseon and the Qing. The course of the war, its duration, logistics, finances, and public morale will shape the postwar political settlement."
 je_eafp_joseon_qing_war_goal: "End the war with the Qing without becoming a Qing subject."

