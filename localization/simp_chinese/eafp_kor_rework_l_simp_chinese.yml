 concept_eafp_regent_lv1_desc: "#V 效果#!\n• #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!可[concept_eafp_sedo_politics_pocket_money]@coin3!小部分[concept_treasury]资金。\n• #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!可[concept_eafp_sedo_politics_pocket_money]@coin3!小部分[concept_investment_pool]资金。\n• 若[GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant]不在[concept_in_government]中，[concept_ruler]每月增加@eafp_stress_gain!#N +1#!点[concept_kor_stress]。\n• 每次改组[concept_in_government]时，[concept_ruler]增加@eafp_stress_gain!#N +5#!点[concept_kor_stress]。\n• #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!可暂时增强[GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant]的政治力量。\n• #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!可消耗侵吞的财产以拉拢[concept_eafp_sedo_politics_balance]。"
