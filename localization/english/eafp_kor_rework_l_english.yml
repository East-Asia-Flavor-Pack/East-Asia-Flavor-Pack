 concept_kor_stress: "Stress"
 concept_kor_stress_desc: "$concept_kor_stress$ represents Monarch's health level, a measure of the physical burden applied to both mind and body.\n\n$je_korean_kings_health_goal$\n\n#title Conditions for #r #b Increasing#! $concept_kor_stress$:#! #indent_newline:3 \n• $eafp_progress_bar_kings_health_base_add$: #r #b +1.6/month#!#!\n• $eafp_progress_bar_kings_health_alcoholic$: #r #b +0.3/month#!#!\n• $eafp_progress_bar_kings_health_psychological_affliction$: #r #b +0.5/month#!#!\n• $eafp_progress_bar_kings_health_opium_addiction$: #r #b +0.3/month#!#!\n• $eafp_progress_bar_kings_health_cocaine_addiction$: #r #b +0.3/month#!#!\n• $eafp_progress_bar_kings_health_cancer$: #r #b +1.5/month#!#!\n• $eafp_progress_bar_kings_health_wounded$: #r #b +0.8/month#!#!\n• $eafp_progress_bar_kings_health_kidney_stones$: #r #b +0.7/month#!#!\n• $eafp_progress_bar_kings_health_syphilis$: #r #b +0.8/month#!#!\n• $eafp_progress_bar_kings_health_reckless$: #r #b +0.3/month#!#!\n• $eafp_progress_bar_kings_health_wrathful$: #r #b +0.1/month#!#!\n• $eafp_progress_bar_kings_health_brave$: #r #b +0.1/month#!#!\n• Events and $concept_modifiers$#!\n\n#title Conditions for #g #b Decreasing#! $concept_kor_stress$:#! #indent_newline:3 \n• $eafp_progress_bar_kings_health_persistent$: #g #b -0.3/month#!#!\n• $eafp_progress_bar_kings_health_cautious$: #g #b -0.4/month#!#!\n• $eafp_progress_bar_kings_health_reserved$: #g #b -0.2/month#!#!\n• Events and $concept_modifiers$#!"

