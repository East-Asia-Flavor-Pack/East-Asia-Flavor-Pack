 chinese_water_system.1.t: "Completion of Flood Control"
 chinese_water_system.1.d: "As the threat of flooding disappeared and the waterways stabilized, the riverside and floodplain areas that had been devastated for decades were transformed into fertile farmland."
 chinese_water_system.1.f: "Yu the Great dredged the Nine Rivers, cleared the Ji and Ta rivers, and let their waters flow into the sea. He breached the dikes of the Ru and Han rivers, drained the Huai and Si rivers, and let their waters flow into the Yangtze. After that, China was able to obtain food."
 chinese_water_system.1.a: "We have achieved the deeds of the ancient sages."
 chinese_water_system.2.t: "Yellow River Management"
 chinese_water_system.2.d: "The massive management project for the Yellow River has finally been successfully completed."
 chinese_water_system.2.f: "The yellow river roared madly, and its water level rose to just a few feet below the top of the embankment. Yet, the river water did not stray from its designated path.\n\nWhen night passed and morning broke, the river water began to recede as if it were a lie. The embankments held firm. Even more remarkably, the unflooded river water flowed at incredible speed, washing away the silt from the riverbed on its own.\n\nIn the villages beyond the embankments, the smell of fresh earth filled the air, and sorghum swayed in the wind."
 chinese_water_system.2.a: "Vast and wide is the Yellow River,\nFlowing endlessly eastward forever."
 chinese_water_system.3.t: "Artery of the Continent"
 chinese_water_system.3.d: "The large-scale management project for the Yangtze River has finally borne fruit."
 chinese_water_system.3.f: "A massive steamboat, densely studded with steel rivets, sounded its dull horn and docked at the Hankou pier. From beneath the giant ship's deck poured bundles of silk and boxes of medicinal herbs brought from Sichuan. Soon after, cotton fabrics and machine parts that had just arrived from the downstream industrial zones were loaded into its place.\n\nAcross the river, a procession of barges piled high with mountains of coal headed ceaselessly upstream. It was a blood vessel carrying power deep inland through newly built canals and locks. The pier's steam cranes roared as they lifted sacks of grain transported by train from the north and moved them into the ship's cargo hold."
 chinese_water_system.3.a: "The endless Yangtze rolls on."
 chinese_water_system.4.t: "Pearl River Management"
 chinese_water_system.4.d: "The extensive management project for the Pearl River basin has been successfully concluded."
 chinese_water_system.4.f: "In the distance, where there was once a muddy quagmire, the outline of a new city could be seen. The endlessly stretching rice paddies were turning golden, receiving a stable supply of water. On the river, which had deepened and whose currents had stabilized, steamboats puffing white smoke bustled back and forth, carrying goods."
 chinese_water_system.4.a: "After enjoying three cups of wine, I fall into a deep sleep on my pillow."
 chinese_water_system.5.t: "Revival of the Grand Canal"
 chinese_water_system.5.d: "The reconstruction project of the Grand Canal, which had been in ruins for centuries, is finally complete."
 chinese_water_system.5.f: "The boat glided away from the pier, sounding a heavy steam whistle. It was not the narrow, dirty waterway he remembered. The river was wider, and both banks were reinforced with solid stone.\n\nThey passed by old cities. Vitality had returned along the waterway. The latest steam excavators that had been deployed for dredging operations were now loading and unloading coal and grain at the piers."
 chinese_water_system.5.a: "Flutes and drums echo from painted boats, the Han River is bustling,\nTen thousand tribute grain ships gather at Tongzhou."
