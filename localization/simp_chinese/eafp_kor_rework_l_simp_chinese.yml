 je_sedo_politics: "势道政治"
 je_sedo_politics_reason: "自年幼的国王登基以来，国政已脱离君主之手，落入特定的#bold 外戚家族#!掌控之中。以安东金氏为首的少数家族垄断了#bold 备边司#!的要职，实际上将国政私有化。\n\n王权已名存实亡，公论之门紧闭，买官卖官盛行，导致国政瘫痪。苛酷的#bold “三政紊乱”#!使百姓的苦难达到了极点，而被权力#bold 边缘化的两班士大夫#!们的不满也日益加深。\n\n只要$je_sedo_politics$ [concept_journal_entry]存在，[GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant]的[concept_leader]就会由势道家族的首领担任。\n\n#bold 终结势道政治#!\n当[concept_eafp_sedo_politics_balance]达到#bold 0#!时，势道政治便会结束，国家纲纪得以重塑。当然，[concept_eafp_sedo_family]的[Concept('concept_eafp_sedo_politics_pocket_money', '贪污腐败')]也将画上句号。"
