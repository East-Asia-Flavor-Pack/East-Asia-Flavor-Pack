 concept_eafp_sedo_politics_pocket_money: "侵吞"
 concept_eafp_sedo_politics_pocket_money_desc: "这是可能因与[concept_eafp_sedo_family]的政治交易，或[concept_eafp_sedo_family]的独断专横等行为而产生的效果。\n\n被侵吞的资金将记录为[concept_eafp_sedo_family]的财产，通过此过程积累的财富可反过来被[concept_eafp_sedo_family]用于将国家财产私有化，或与君主进行政治交易。"


 je_korean_seowon: "书院的弊端"
 je_korean_seowon_reason: "书院以免税特权和土地兼并侵蚀国家财政。如果根除书院的弊端，就能同时实现强化王室权力和稳定税收体系。"
 je_korean_seowon_goal: "完成所有改革。"

 ##

 je_korean_confu: "儒学王国"
 je_korean_confu_reason: "朝鲜以儒教治理海东，以礼教化百姓，以乐匡正风俗。朱子的道理成为社稷的根本，圣贤的教诲治理着万民。然而，异邦的怪异之风以“西学”之名试图越过门槛。\n\n士大夫们争相说道，“蛮夷的技术虽然巧妙，但其道却暴虐，不可取”，又有人说“蛮夷的工具便利，可以取来造福百姓，但礼仪的根本不可动摇”，朝廷混乱，难以确定方向。国脉处于危殆之际，通晓天下变化难道不是明智之举吗？然而，如果不警惕扰乱士林的西学之害，恐怕五百年宗社的根基将会崩溃。\n\n#bold $eafp_modi_catholic_plague$#!\n$eafp_modi_catholic_plague_desc$"

