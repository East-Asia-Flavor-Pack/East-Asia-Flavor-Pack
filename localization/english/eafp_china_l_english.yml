 unify_military_training_button: "Unify Military Training"
 unify_military_training_button_desc: "By centralizing the military training that has been conducted independently until now, we will be able to grasp the leash of the army. Of course, there will be pushback..."
 establish_tongwenguan_button: "Establish Tongwenguan"
 establish_tongwenguan_button_desc: "To properly handle the rampant Westerners, we must first understand their habits. Setting up an institution dedicated to this will be helpful."
 expand_tongwenguan_button: "Expand Tongwenguan"
 expand_tongwenguan_button_desc: "What has been done so far is not enough. More officials must learn Western knowledge in the future."
 establish_taching_government_bank_button: "Establish Ta-Ching Government Bank"
 establish_taching_government_bank_button_desc: "A new central bank must be established to oversee currency production."
 start_currency_standardization_button: "Start Currency Standardization"
 start_currency_standardization_button_desc: "We will recall the currency issued so far to unify it into a single currency."
 abolish_private_mints_button: "Abolish Private Mints"
 abolish_private_mints_button_desc: "In order to unify the empire's currency, private minting must be stopped."
