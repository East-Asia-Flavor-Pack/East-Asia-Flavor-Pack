 je_boxer_rebellion_western: "$je_boxer_rebellion$"
 je_boxer_rebellion_western_reason: "As the xenophobic riots spread like wildfire within its borders, [SCOPE.sCountry('chi_scope').GetName] designated the group calling themselves the 'Boxers' as bandits and chose to cooperate with the Western powers. Now, the armies of nations around the world have formed a temporary alliance and decided to begin suppressing the fanatics."
 je_boxer_rebellion_bxr: "$je_boxer_rebellion$"
 je_boxer_rebellion_bxr_reason: "[SCOPE.sCountry('chi_scope').GetName] has colluded with the 'Boxers' to physically root out foreign influence. In response, Western nations have decided to form an allied force."
