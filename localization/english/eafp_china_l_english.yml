 chinese_westernization.424.t: "The Role of Confucianism in the New School System"
 # The Role of Confucianism in the New School System
 chinese_westernization.424.d: "[ROOT.GetCountry.GetName] is faced with a difficult decision regarding the role of Confucianism in the modern school system."
 # [ROOT.GetCountry.GetName] is faced with a difficult decision regarding the role of Confucianism in the modern school system.
 chinese_westernization.424.f: "The discussion about Confucianism's position in the new school system is intense. Those who support the abolition of Confucian education believe that Confucian teachings are out of date and irrelevant in current times. They believe that education should be carefully designed to develop talent that will aid in the country's modernization, and that Confucianism has no place in this process.\n\nOther officials, though, disagree. They believe Confucianism is an important aspect of Chinese culture and that it should be preserved. They say that Confucian teachings instill key qualities such as respect for elders, obedience, and social peace, all of which are necessary for the realm's survival."
 # The discussion about Confucianism's position in the new school system is intense. Those who support its abolition believe that Confucian teachings are out of date and irrelevant in current times. They believe that education should be carefully designed to develop talent that will aid in the country's modernization, and that Confucianism has no place in this process.\n\nOther officials, though, disagree. They believe Confucianism is an important aspect of Chinese culture and that it should be preserved. They say that Confucian teachings instill key qualities such as respect for elders, obedience, and social peace, all of which are necessary for the realm's survival.
 chinese_westernization.424.a: "We need to continue teaching it."
 confucian_education_ig_devout: "Confucian Education"
 chinese_westernization.424.b: "That is unnecessary."
 chinese_westernization.428.t: "The Grand Secretariat and the Grand Council"
 chinese_westernization.428.d: "The Grand Secretariat and the Grand Council have long been pillars of the administration. However, voices of reform whisper in the corridors of power, arguing that these institutions are antiquated relics of the past, no longer suited to the needs of a dynamic society."
 # The Grand Secretariat and the Grand Council have long been pillars of our administration. However, voices of reform whisper in the corridors of power, arguing that these institutions are antiquated relics of the past, no longer suited to the needs of our dynamic society.
 chinese_westernization.428.f: "Courtiers in their opulent robes whispered uncomfortably beneath the high-vaulted ceiling. \"Tradition is the spine of our empire,\" remarked a Grand Secretary, a wise elder with a silver-streaked beard and serious gaze. \"We cannot lightly throw away the foundations that have brought us this far.\"\n\nA bureaucrat across the room, representing the growing call for reform, returned the elder's stare. \"And yet,\" he answered with his shining eyes, \"we must take the first step.\""
 # Courtiers in their opulent robes whispered uncomfortably beneath the imperial court's high-vaulted ceiling. "Tradition is the spine of our nation,\" remarked the Grand Secretary, a wise elder with a silver streaked beard and serious gaze. \"We cannot lightly throw away the foundations that have brought us this far.\"\n\nA bureaucrat across the room, representing the growing call for reform, returned the elder's stare. \"And yet,\" he answered with his shining eyes, \"we must take the first step."
 chinese_westernization.428.a: "Let us continue to operate as we have for centuries past."
 retain_junji_chu_ig_landowners: "Retain the Grand Council"
 retain_junji_chu_ig_intelligentsia: "Retain the Grand Council"
 chinese_westernization.428.b: "Let us dismantle the Secretariat and the Council, and organize a Responsible Cabinet."
 abolish_junji_chu_ig_landowners: "Abolish the Grand Council"
 abolish_junji_chu_ig_intelligentsia: "Abolish the Grand Council"
 # Let us dismantle the Secretariat and the Council, and organize the Responsible Cabinet.
 chinese_westernization.441.t: "The Search for the Best and Brightest"
 # The Search for the Best and Brightest
 chinese_westernization.441.d: "Reform-minded officials argued that students should be sent abroad for education."
 # Reform-minded officials argued that a group of students should be sent abroad for education.
 chinese_westernization.441.f: "\"Today, China seeks to emulate the spirit of the West and master its methods. In this already changing environment, we should quickly select intelligent youths to study abroad, honing their skills to fulfill Our Emperor's utmost desire for self-strengthening.\""
 chinese_westernization.441.a: "Implement it after deliberation."
 chinese_educational_mission_enabled_tt: "The 'Send Students Abroad' decision is activated."
 chinese_educational_mission_decision: "Send Students Abroad"
 chinese_educational_mission_decision_reason: "Breathing the air of advanced nations directly will be a great help in mastering their technology."
 je_chinese_educational_mission: "Chinese Educational Mission"
 je_chinese_educational_mission_reason: "Breathing the air of advanced nations directly will be a great help in mastering their technology."
 modifier_chinese_educational_mission_cost: "Study Abroad Expenses"
 chinese_westernization.442.t: "Selection"
 chinese_westernization.442.d: "A rigorous selection process will be conducted nationwide to ensure that only the most talented and promising students are chosen."
 # To ensure that only the most talented and promising students will be selected, a rigorous process will be instituted throughout the country.
 chinese_westernization.442.f: "'After parting with my uncles, aunts, brothers, and fellow villagers, I bade my final farewell to my mother in the traditional manner. I neither hugged nor kissed her. Ah, this was how one saved face according to traditional Chinese etiquette. All I could do was kowtow four times to my mother. She pretended to be very cheerful, but I saw the teardrops welling up in her eyes! She pressed a few coins into my hand and urged me on.'"
 chinese_westernization.442.a: "\"My child, be a good boy. Write often...\""
 chinese_westernization.443.t: "Completion of Selection"
 chinese_westernization.443.d: "The students to study abroad have been selected. Now it is time to send them to foreign lands."
 chinese_westernization.443.f: "'We paid ceremonial visits to the governor and consul general, dressed in our official robes and riding in fine carriages. By the beginning of the month, we were ready to set off on our ocean voyage. We bade a solemn farewell to our friends, thinking that half of them might be dead by the time we returned after years of studying abroad. But the sorrow of parting soon ended, and homesickness and melancholy took its place as the steamer puffed steam on the river and our native country grew indistinct in the twilight.'"
 # We paid visits of ceremony to the Tautai, chief officer of the department, and to the American consul-general, dressed in our official robes and carried in fine carriages. By the first part of June, we were ready for the ocean journey. We bade our friends farewell with due solemnity, for the thought that on our return after fifteen years of study abroad half of them might be dead, made us rather serious. But the sadness of parting was soon over and homesickness and dreariness took its place, as the steamer steamed out of the river and our native country grew indistinct in the twilight.
 chinese_westernization.443.a: "With heavy hearts, the ambitious voyage begins."
 chinese_westernization.444.t: "Ah, the New World!"
 chinese_westernization.444.d: "After sailing for tens of thousands of miles, the international students have finally arrived in [SCOPE.sState('destination_state').GetCityHubName]."
 chinese_westernization.444.f: "'[SCOPE.sState('destination_state').GetCityHubName] was a paradise for vigorous teenage boys like us. I had never seen such towering skyscrapers before. There was gas, running water, doorbells, and escalators. Everything here satisfied our curiosity about the new land.'"
 chinese_westernization.444.a: "What a wondrous city!"
 chinese_westernization.445.t: "Fire Chariot"
 chinese_westernization.445.d: "During their journey to the Educational Mission Office, the international students took a train."
 chinese_westernization.445.f: "'As soon as the train wheels turned, mountains, rivers, fields, and forests flashed by in the blink of an eye. Suddenly we entered a tunnel, and it became darker than night with no light at all. Around 6 PM, out of nowhere, we saw a landscape covered in snow. As we passed mountains where gold was mined, ah, how beautiful the mountain scenery was!'"
 chinese_westernization.445.a: "The world is changing at unprecedented speeds, like a train."
 chinese_westernization.446.t: "Arrival"
 chinese_westernization.446.d: "The international students finally arrived at the host families where they would stay for several years."
 chinese_westernization.446.f: "'I was very lucky to be assigned to the home of a gentle and caring lady. The moment the lady first saw me, she hugged me tightly and kissed me repeatedly. Seeing this, the other boys burst into laughter and teased me as my face turned so red that even my earlobes burned. This was the first kiss of my life.'"
 chinese_westernization.446.a: "We have finally arrived."
 chinese_westernization.447.t: "Sunday School"
 chinese_westernization.447.d: "The Chinese international students arriving in the West cannot hide their bewilderment upon hearing the rule that they must go to chapel every Sabbath."
 chinese_westernization.447.f: "'On Sunday, after lunch, the lady told us to get ready to go to Sunday school. At that time, we could only understand a little English, so we barely caught the word 'school' and thought to ourselves, 'Oh my, we have to go to school on Sundays too!' As we packed our textbooks and were about to leave, the lady said there was no need to bring books at all. So we left empty-handed.\n\nAfter arriving at the 'school', a friend muttered softly, \"Uh, this looks like a church...\" We looked around carefully and saw people standing and singing. That's right, a church, it's a church!'"
 chinese_westernization.447.a: "We whispered among ourselves, then hurried out of the church and went straight home."
 chinese_westernization.447.b: "We stayed quiet and still, leaving the church only after it was over."
 chinese_westernization.448.t: "One's Roots"
 chinese_westernization.448.d: "A strange, rhythmic sound of reciting books echoes through the Educational Mission Office."
 chinese_westernization.448.f: "'Building a hut by the mountain stream, reflecting the magnanimous heart of a wise hermit.\nSleeping and waking alone, speaking alone; swearing forever to remember, forever not to forget.'\n\n'Yan Yuan asked Confucius about benevolence. Confucius replied, 'To subdue one's self and return to propriety is benevolence.''"
 chinese_westernization.448.a: "Even ten thousand miles away, one must not forget one's roots."
 chinese_westernization.449.t: "Directive"
 chinese_westernization.449.d: "The supervisor of the international students issues a directive: 'Even thousands of miles away, strictly observe the teachings of the sages and Chinese etiquette.'"
 chinese_westernization.449.f: "\"Notice to students.\n\nThe purpose of sending you to study abroad was originally to let you learn foreign knowledge, not to tell you to forget the rules of your home country. Therefore, above all else, study hard, and never break the rules. You are studying in a foreign school, and the teachers are foreigners, so you must realize things on your own. The days you spend abroad are few, and the days you will live in China are many. Trying to correct your heart and attitude then will be like locking the stable door after the horse has bolted.\""
 chinese_westernization.449.a: "They are still young men in their prime; I hope they don't ruin things in a fit of youthful vigor."
 chinese_westernization.450.t: "Memorial from the Censor"
 chinese_westernization.450.d: "A censor who inspected the Educational Mission Office submitted a negative report."
 chinese_westernization.450.f: "\"Foreign customs have many wicked aspects. The students do not study Confucian texts, and their character is not steadfast. Moreover, far from acquiring necessary skills, they are gradually becoming tainted with bad habits. I beseech you, this must be strictly corrected.\""
 chinese_westernization.450.a: "I told them to learn the barbarians' skills, when did I ever tell them to learn the barbarians' habits! The end times!"
 chinese_westernization.451.t: "'China's Future'"
 chinese_westernization.451.d: "At a speech contest held at a high school, the international students delivered passionate speeches."
 chinese_westernization.451.f: "\"China is not dead. It is merely asleep. China will soon awaken from its slumber and undoubtedly stand tall in the world!\""
 chinese_westernization.451.a: "The audience gave thunderous applause."
 chinese_westernization.452.t: "Winning the Tournament"
 chinese_westernization.452.d: "The team, with an international student serving as coxswain, won the rowing tournament."
 chinese_westernization.452.f: "I could feel the unity of my crew with every breath as the pulse of the oars cut through the glassy water. Ahead lay open water - our gateway to glory. Each stroke brought us closer, while the cries of the competitors faded against our relentless advance.\n\nGlimpses of red buoys flashed by; they were like fleeting beats of a drum urging us on. My voice cut through the noise of breaths and waves. The finish line loomed; it was no mere marker but a herald of triumph. With one final heave, surrendering all that we were to that singular moment, we surged across it – victorious at last."
 # I could feel the unity of my crew with every breath as the pulse of the oars cut through the glassy water. Ahead lay open water - our gateway to glory. Each stroke brought us closer, while the cries of the competitors faded against our relentless advance.\n\nGlimpses of red buoys flashed by; they were like fleeting beats of a drum urging us on. My voice cut through the noise of breaths and waves. The finish line loomed; it was no mere marker but a herald of triumph. With one final heave, surrendering all that we were to that singular moment, we surged across it – victorious at last. 변형
 chinese_westernization.452.a: "We broke their pride."
 chinese_westernization.460.t: "Return"
 chinese_westernization.460.d: "The international students have returned to their homeland. With knowledge gained from the world's leading institutions, these scholars have brought back new ideas, technological insights, and a global perspective."
 chinese_westernization.460.f: "Families and high-ranking officials gather at the bustling port, their eyes fixed on the horizon. A ship carrying the future of the Qing glides into view. In the crowd, a mother clutches her handkerchief and sheds tears.\n\nThe students disembark with faces full of determination. This new generation, set to transform the nation, is welcomed with cheers and open arms. A young scholar, looking at the city that once seemed so large, says, \"We left to learn from the world, but now we have returned to serve our country.\""
 chinese_westernization.460.a: "Welcome back!"
 chinese_westernization.462.t: "Currency Standardization Efforts"
 # Currency Standardization Efforts
 chinese_westernization.462.d: "The imperial court has announced plans to standardize its currency to improve trade and stabilize the economy. However, this will require collecting all the currency already issued and replacing it with a new currency. This process will be expensive and time-consuming, but is necessary for the future prosperity of the empire."
 # The imperial court has announced plans to standardize its currency, to improve trade and stabilize the economy. However, this will require collecting all the currency already issued and replacing it with a new standardized version. This process will be expensive and time-consuming, but many believe it is necessary for the future prosperity of the empire.
 chinese_westernization.462.f: "\"Good heavens, how much currency has already been issued? It seems slightly different in each province! Gathering all the old currency will be an endless task.\""
 chinese_westernization.462.a: "It is absolutely necessary..."
