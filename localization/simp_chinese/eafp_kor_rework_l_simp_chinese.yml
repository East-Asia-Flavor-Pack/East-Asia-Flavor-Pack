 eafp_modi_catholic_plague_desc: "所谓西学的思念东进可能会蚕食现有性理学基础的哲学秩序的危机感正在朝廷上下蔓延。此 [concept_modifier] 的系数以国家的天主教信徒比例为基础计算，最初即使是小比例变动也会急剧增加，但值越大增加率越慢。"

 ### concept_bio

 concept_bio_yi_hong: "李玜"
 concept_bio_yi_hong_desc: "#tooltip_header 纯宗，文安武靖献敬成孝大王#!\n$TOOLTIP_DELIMITER$\n#v 1790年7月29日#! 出生于汉城府昌庆宫集福轩\n#v 1834年12月13日#! 薨逝于汉城府庆熙宫会祥殿\n\n朝鲜第23代国王纯宗因先王正宗突然升遐，年仅11岁便继承大统。他天性温和聪慧，但因年幼即位且毕生为病痛所苦，难以行使强有力的王权。\n其在位期间，特定家族垄断国政的所谓“势道政治”开始扎根。先王为保护幼主而向金祖淳托孤之举，讽刺地成为了安东金氏一族掌控国政、酿成悲剧的祸根。"

 ########이하 이벤트라인

 eafp_kor_mainline.1.mt: "幼王"
 eafp_kor_mainline.1.md: "[ROOT.GetCountry.GetRuler.GetFullName] 仍然清晰地记得即位那年冬天的凛冽寒风，以及臣僚们那坚毅的眼神。"
 eafp_kor_mainline.1.mf: "我至今仍记得那年冬天，我送走祖父、登上龙座时的彻骨寒冷。那时，大臣们来见我，说了这样一番话：\n\n“臣等思忖，我殿下以幼龄承受重托，我慈圣殿下以女尧之盛德[Concept('concept_eafp_korean_regent', '举行垂帘听政之典礼')]，众人无不拭目以待，期望新的政化。臣等愚钝苟活至今，洒泪以待，恳请先简要呈奏今日最紧迫且急切之事。\n\n以谨慎起居为勤学之根本，以肃穆宫闱为杜绝幸门之根本，以体察民隐为节约财用之根本，而其大本，则全在于殿下之实心。唯愿圣意深置于此，勿有所忽。”\n\n所以，或许我说了：\n\n“所奏各项，皆恳切而切中时弊，寡人怎敢不铭记于心？”"
 eafp_kor_mainline.1.oa: "总有一天我会成为一位伟大的国王。"
 eafp_kor_mainline.1.ob: "好无聊啊……一会儿去后花园玩吗？"
 eafp_kor_mainline.1.ta: "#lore 那些文件是送给奶奶的吗？#!"
 eafp_kor_mainline.1.tb: "#lore 想再吃一块刚才吃的蜂蜜药果#!"

 eafp_kor_mainline.2.mt: "病弱之气"
 eafp_kor_mainline.2.md: "凛冽的寒风侵袭着国王的龙体。"
 eafp_kor_mainline.2.mf: "*咳咳*\n\n“殿下，您没事吧？”\n\n“冬风凛冽，快把殿下扶进去。”\n\n“殿下，我命宫女们准备蜂蜜水。”\n\n啊……*咳咳*"
 eafp_kor_mainline.2.oa: "今天有点冷啊……"
 eafp_kor_mainline.2.ob: "我……没事……"
 eafp_kor_mainline.2.ta: "#lore 必须快点进去才行。#!"
 eafp_kor_mainline.2.tb: "#lore 这种程度我还能忍受！#!"

 eafp_kor_mainline.3.mt: "不成熟的王权"
 eafp_kor_mainline.3.md: "审问南应中·南庆中并处以死刑"
 eafp_kor_mainline.3.mf: "审问南应中(南膺中)·南庆中(南慶中)并处以死刑，告发人千玑英(千璣英)赏赐为五卫将。\n\n南应中的族党都是名门望族，但生性奸诈，喜欢骗取他人财物，图谋不轨，在京城内外活动，尽是些欺骗手段。\n\n事情败露后，知道难逃一死，便逃到东莱的倭馆，极尽凶恶不道之言，投书挑拨两国关系，但倭人也不相信他，将他抓住交给了我国。\n\n至此进行审问，与南庆中一同认罪。"
 eafp_kor_mainline.3.oa: "哎呀，好疼啊..."

 eafp_kor_mainline.6.mt: "不安的病情"
 eafp_kor_mainline.6.md: "药院进行入诊。"
 eafp_kor_mainline.6.mf: "在观物轩进行药院的入诊，[SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName]说道，\n“最近入诊的医官说，面部有浮肿。现在仰望，确实有些浮肿，下官的心情非常不安。大小便如何，一日的节制又如何？”\n\n国王说道，\n“大小便还算顺畅，只是稍微有些浮肿，还没有完全痊愈。”\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName]说道，\n“小便的量如何？”\n\n国王说道，\n“昨晚一保时器已经足够了。”\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName]再次说道，\n“寝食和水饭如何？”\n\n皇上说道，\n“寝食还算安稳，饮食也和往常一样，只是吃完后肚子稍微有些不舒服。”"
 eafp_kor_mainline.6.oa: "“虽然有些浮肿，但除此之外，比之前好了一些……”"

 eafp_kor_mainline.7.mt: "大渐"
 eafp_kor_mainline.7.md: "药院全体入直。"
 eafp_kor_mainline.7.mf: "下教旨道，\n“药房的三位提调和时任、原任大臣以及各臣入侍。”\n\n于是全体入直，在宗庙、社稷、各宫、山川进行祈祷，但国王的病情非常危急。"
 eafp_kor_mainline.7.oa: "此后护卫宫城。"

 eafp_kor_mainline.8.mt: "不安的病情"
 eafp_kor_mainline.8.md: "王驾临熙政堂。药房入诊时，都提调、提调、副提调、假注书、记事官依次上前俯伏。医官等退至柱外俯伏。"
 eafp_kor_mainline.8.mf: "王说道：“史官左右分开。”\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName]上前问候后禀告道：“医官们正在待命，是否让他们入诊？”\n\n王允许了。洪南等依次诊脉后退至柱外俯伏。\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName]说道：“禀告脉候。”\n\n洪南等起身俯伏禀告道：“脉候左右三部都平稳顺畅。”\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName]禀告道：“近日服用的汤药果然有效吗？”\n\n王说道：“汤药顺利服用，但尚未知晓显著效果。”\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName]禀告道：“这与消导的药物不同，需长期服用后才能看到效果。”\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName]禀告道：“病情稍有好转后的警戒在于饮食起居的节制，务必十分谨慎，千万祈愿。”"
 eafp_kor_mainline.8.oa: "“遵照所奏。”"

 eafp_kor_mainline.9.mt: "大渐"
 eafp_kor_mainline.9.md: "王的身体已经万分危急，脉搏已经没有希望，众臣列队侍奉，痛哭流涕。"
 eafp_kor_mainline.9.mf: "[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName]回头看着致阳说道：“迅速撰写祈祷传教。”\n\n致阳写道：“宗庙·社稷·殿阁·宫阙·山川的祈祷祭祀，无需择日，当日举行。”\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName]走到病床前，请求写下遗教。\n\n致阳写道：“将大宝献给大王大妃殿。”\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFirstName]宣布遗教，致阳读后禀告。\n\n日佑写下“上大渐”三个字，海辙捧着出去，在外面庭院里展示。"
 eafp_kor_mainline.9.oa: "大王大妃殿通过承传色口头下教旨说：\n“护卫宫城。”"

 eafp_kor_mainline.19.mt: "元子的诞生"
 eafp_kor_mainline.19.md: "今日，中宫殿下顺利产下将继承皇室大统的元子。由此，宗庙社稷的根基更加稳固，天下再无比这更大的喜事。"
 eafp_kor_mainline.19.mf: "拂晓时分，婴儿的第一声啼哭打破了宫中的寂静。随即，内官用颤抖的声音高呼：“是王子殿下！”在正殿中焦急等待消息的百官之间，安慰的叹息与喜悦的低语顿时传遍全场。"
 eafp_kor_mainline.19.oa: "宗庙社稷的根基已然稳固。"

 eafp_kor_mainline.20.mt: "状启"
 eafp_kor_mainline.20.md: "王读了关于执行死刑的状启，陷入苦恼。"
 eafp_kor_mainline.20.mf: "王读着提交的状启，心情复杂。状启中写着给军务带来巨大危害的人的害处，以及对其执行死刑是理所当然的内容。"
 eafp_kor_mainline.20.oa: "重新审视是否是罪该致死之人。"
 eafp_kor_mainline.20.ob: "最好亲自见一面。"
 eafp_kor_mainline.20.oc: "此事就交给大王大妃处理吧。"

 eafp_kor_mainline.21.mt: "感谢"
 eafp_kor_mainline.21.md: "大臣们向王提议体察百姓的安危。"
 eafp_kor_mainline.21.mf: "奉朝贺、领府事、领议政、左议政、右议政启奏道，\n\n“请体察百姓的隐痛。人主的职责在于保全百姓。 凡是从外地来的臣僚和因事而来的守宰，务必引见并询问，引导他们畅所欲言。 如果上位者的耳目始终关注百姓，百姓的心腹之事毫无保留地告知上位者，那么怎么会有无法消除的弊端呢？”"
 eafp_kor_mainline.21.oa: "就照你说的办。"
 eafp_kor_mainline.21.ob: "虽然令人惋惜，但还有更多紧迫的事情。"

 eafp_kor_mainline.22.mt: "财用"
 eafp_kor_mainline.22.md: "国库见底，大臣们向王恳请。"
 eafp_kor_mainline.22.mf: "领议政、左议政、右议政启奏道，\n\n“请节约财用。财物是百姓的性命，也是他们的膏血。 我国立国的规模就在于‘节俭’二字。 然而，近世以来，或许未能免除过度装饰的弊端，从衣服、饮食的礼节到居处、帷帐的器具，甚至妇寺和仆隶的数量都超过了旧制。 殿下如果认为如今的凡百事原本就是如此，那就严重违背了首先树立圣志的道理。”"
 eafp_kor_mainline.22.oa: "你们说得对。寡人将率先致力于节约。"
 eafp_kor_mainline.22.ob: "王室也有王室的法度和体面，大臣们怎能干涉王室？"

 eafp_kor_mainline.23.mt: "起居"
 eafp_kor_mainline.23.md: "大臣们担忧国王年幼且健康状况不佳，建议他注重保养和稳定。"
 eafp_kor_mainline.23.mf: "奉朝贺、领府事启奏道，\n\n“请谨慎起居。殿下以幼年即位，圣体尚未完全康宁。在起居方面尤需节制。况且强行读书可能会损伤元气，过度忧虑容易劳神。虽然学问不可荒废，国政亦属重任，但也应调理得当，切不可过度劳累而损伤圣体。”"
 eafp_kor_mainline.23.oa: "寡人会照办的。"
 eafp_kor_mainline.23.ob: "重要的事情还很多……"

 eafp_kor_mainline.24.mt: "勉学"
 eafp_kor_mainline.24.md: "大臣们恳请王专心致志于学问。"
 eafp_kor_mainline.24.mf: "奉朝贺、领府事、领议政、左议政、右议政启奏道，\n\n“请勤勉于学问。治理国家和平定天下的根本，全在于人主的学问。人主的学问端正，则万事皆端正；人主的学问偏颇，则万事皆偏颇。怎能不谨慎呢？殿下应每日研读六经和史书，深思其深奥的道理，并付诸实践，使圣德日渐增长。”"
 eafp_kor_mainline.24.oa: "做学问的根本就在于此。"
 eafp_kor_mainline.24.ob: "那些书我都看腻了……"

 eafp_kor_mainline.25.mt: "宫闱"
 eafp_kor_mainline.25.md: "大臣们建议王阻断阿谀奉承之人的途径。"
 eafp_kor_mainline.25.mf: "领议政、左议政、右议政启奏道，\n\n“请保持宫廷内部的严肃。自古以来，国家衰败的开端，无不源于后宫干政和宦官专权。宫廷深远，其严肃性必须如天地一般。怎能允许阿谀奉承之人的途径敞开，从而埋下未来的祸患呢？”"
 eafp_kor_mainline.25.oa: "寡人会参考的。"
 eafp_kor_mainline.25.ob: "谁会蠢到被宦官的话蒙骗？"

 eafp_kor_mainline.26.mt: "实心"
 eafp_kor_mainline.26.md: "大臣们结束了漫长的进言，请求王以真诚的心治国。"
 eafp_kor_mainline.26.mf: "领议政、左议政、右议政最后启奏道，\n\n“所有这些的根本，全在于殿下的实心。即使起居谨慎，如果没有实心，那只是虚有其表；即使勤勉于学问，如果没有实心，那只是死记硬背。宫廷内部的严肃、财政的节约、体察百姓的隐痛，也是如此。恳切希望殿下深立圣意，以真诚的心去实践。”"
 eafp_kor_mainline.26.oa: "寡人会照办的。"

 # eafp_kor_mainline.27.mt: "정순왕후 김씨 승하"
 # eafp_kor_mainline.27.md: ""
 eafp_kor_mainline.28.mt: "收帘"
 eafp_kor_mainline.28.md: "漫长的垂帘听政终于结束了。"
 eafp_kor_mainline.28.mf: "大臣们的奏折中写道：\n\n“啊！大王大妃殿下代幼主历经重重艰难，稳定了国家政局，如今将政权交还给殿下。这是宗庙社稷的福气，也是臣民的幸运。愿殿下以大王大妃殿下的高尚品德为榜样，建立仁德之政。”\n\n现在，朝鲜的重担完全落在了[ROOT.GetCountry.GetRuler.GetFullName]的肩上。"
 eafp_kor_mainline.28.oa: "一个新的时代开始了。"

 # eafp_kor_mainline.29.mt: ""
 # eafp_kor_mainline.29.md: ""
 eafp_kor_mainline.30.mt: "洪景来之乱"
 eafp_kor_mainline.30.md: "在西北地区爆发了洪景来之乱。"
 eafp_kor_mainline.30.mf: "平安道的百姓们由于不堪忍受朝廷的苛捐杂税和对西北地区的歧视，终于起义了。在洪景来的领导下，起义军自称‘平壤军’，迅速占领了清川江以北的多个城镇，并获得了农民们的支持。\n\n“朝廷抛弃了我们！我们要用自己的双手开创一个新世界！”他们的呐喊声震动了整个西北地区。朝廷必须立即制定镇压的对策。"
 eafp_kor_mainline.30.oa: "立即派遣镇压军！"
 eafp_kor_mainline.30.ob: "能否通过谈判来安抚他们？"

 eafp_kor_mainline.31.mt: "镇压洪景来之乱"
 eafp_kor_mainline.31.md: "朝廷的镇压军击败了起义军，恢复了西北地区的秩序。"
 eafp_kor_mainline.31.mf: "朝廷的镇压军在定州城与洪景来的起义军展开了激烈的战斗。尽管起义军拼死抵抗，但最终寡不敌众，败于官军的优势火力和兵力。洪景来战死，残余势力被俘或溃散。\n\n“叛乱已被平息，西北地区恢复了和平。殿下的恩典无量。”镇压军指挥官的奏折让人松了一口气，但叛乱留下的创伤很深，抚慰西北百姓的心仍是一项艰巨的任务。"
 eafp_kor_mainline.31.oa: "叛乱结束了，真是万幸。"
 eafp_kor_mainline.31.ob: "西北地区的根本问题必须得到解决……"

 eafp_kor_mainline.32.mt: "镇压军战败"
 eafp_kor_mainline.32.md: "朝廷的镇压军被洪景来的起义军击败了。"
 eafp_kor_mainline.32.mf: "朝廷的镇压军与洪景来的起义军交战，却遭受了惨败。起义军乘胜追击，士气高涨，势如破竹地扩大着势力范围。\n\n“官军败退，起义军势不可挡。”这封紧急奏报让朝廷陷入了恐慌。西北地区已落入起义军手中，他们的矛头可能会指向首都汉阳。必须尽快重整军队，派遣新的镇压军。"
 eafp_kor_mainline.32.oa: "立即重整军队！"
 eafp_kor_mainline.32.ob: "看来别无选择，只能谈判了……"

 eafp_kor_mainline.33.mt: "返回汉阳"
 eafp_kor_mainline.33.md: "王结束了视察，返回汉阳。"
 eafp_kor_mainline.33.mf: "在目睹了百姓的艰难生活后，王带着新的决心踏上了返回汉阳的路。\n\n“百姓的苦难深重。我必须实施仁政。”[ROOT.GetCountry.GetRuler.GetFullName]决心根除朝廷的腐败，改革国政。"
 eafp_kor_mainline.33.oa: "还有很多事情要做。"

 eafp_kor_mainline.34.mt: "微弱的哭声"
 eafp_kor_mainline.34.md: "孝明世子诞生了。"
 eafp_kor_mainline.34.mf: "今天，中殿娘娘平安产下了将继承王室血统的元子。这样一来，宗庙社稷的基础就更加稳固了，全国上下没有比这更大的喜事了。\n\n黎明时分，婴儿的第一声啼哭打破了宫殿的宁静。当内官用颤抖的声音宣布“是王子！”时，焦急等待消息的官员们松了一口气，喜悦的低语在他们之间传开。"
 eafp_kor_mainline.34.oa: "宗庙社稷的基础已经稳固了。"

 eafp_kor_mainline.35.mt: "册封孝明世子"
 eafp_kor_mainline.35.md: "孝明世子虽然年幼，但展现出非凡的智慧和品格。"
 eafp_kor_mainline.35.mf: "王非常看重王子的资质，决定比平时更早地册封他为世子。\n\n“王子虽然年幼，但已经懂得了世间的道理，并且具备了美德。册封他为世子将确保国家的延续，并安抚百姓的心。”\n\n大臣们都祝贺世子的册封，对他的未来充满期待。"
 eafp_kor_mainline.35.oa: "这是朝鲜的大幸。"

 eafp_kor_mainline.36.mt: "孝明世子代理听政"
 eafp_kor_mainline.36.md: "健康状况恶化的王将国政委托给孝明世子。"
 eafp_kor_mainline.36.mf: "孝明世子开始代理听政，代替生病的父亲处理国政。\n\n“我将秉承父王的意愿，公正地治理国家。”世子展现出了强烈的决心。他的代理听政给停滞的朝鲜政治带来了一股新风，百姓们对这位年轻的世子寄予了厚望。"
 eafp_kor_mainline.36.oa: "请减轻您父亲的负担。"

 eafp_kor_mainline.37.mt: "孝明世子的改革"
 eafp_kor_mainline.37.md: "孝明世子着手进行大胆的改革。"
 eafp_kor_mainline.37.mf: "孝明世子发起了强有力的改革，以加强王权，消除势道政治的弊端。他广泛任用有才能的人，不分派系，严厉惩罚腐败官员，努力恢复国家的纪律。\n\n“国家是为百姓存在的。剥削百姓的国家不能长久。”他的改革获得了百姓的支持，但不可避免地与保守的势道家族发生了冲突。"
 eafp_kor_mainline.37.oa: "他的抱负真是远大。"
 eafp_kor_mainline.37.ob: "他与势道家族的对立令人担忧……"

 eafp_kor_mainline.38.mt: "改革失败"
 eafp_kor_mainline.38.md: "孝明世子的改革因势道家族的抵抗而受挫。"
 eafp_kor_mainline.38.mf: "感到孝明世子激进改革受到威胁的势道家族联合起来，有组织地阻挠他的政策。他们动员在朝廷中的关系，阻止世子的命令，并捏造罪名罢免他的亲信。\n\n“世子的改革正在动摇国家的根基。”势道家族的抵抗非常顽固，世子的改革势头逐渐失去了动力。"
 eafp_kor_mainline.38.oa: "真是太可惜了。"

 eafp_kor_mainline.39.mt: "孝明世子薨逝"
 eafp_kor_mainline.39.md: "孝明世子突然离世。"
 eafp_kor_mainline.39.mf: "倾注了全部热情进行改革的孝明世子突然病倒，英年早逝。\n\n“啊，苍天无眼！你怎么能夺走朝鲜的未来！”王悲痛欲绝，举国上下沉浸在悲痛之中。随着他的离世，改革的希望破灭了，朝鲜再次陷入了势道政治的黑暗泥潭中。"
 eafp_kor_mainline.39.oa: "朝鲜的希望破灭了……"
 eafp_kor_mainline.39.ob: "这就是国家的命运吗……"

 eafp_kor_mainline.40.mt: "宪宗诞生"
 eafp_kor_mainline.40.md: "世子嫔生下了一名男婴。"
 eafp_kor_mainline.40.mf: "即使在失去孝明世子的深深悲痛中，一个新的生命诞生了。世子嫔平安产下了已故世子的儿子。\n\n“这个孩子是世子留下的唯一血脉。必须好好抚养他，以继承王室的血统。”看着刚出生的孙子，王流下了眼泪。这个幼小生命的诞生，给悲伤的王室带来了一丝安慰。"
 eafp_kor_mainline.40.oa: "他必须继承父亲的遗志。"

 eafp_kor_mainline.41.mt: "宪宗即位"
 eafp_kor_mainline.41.md: "继纯祖之后，年幼的宪宗登基。"
 eafp_kor_mainline.41.mf: "随着纯祖的离世，他年幼的孙子宪宗继承了王位。由于宪宗年幼，大王大妃纯元王后开始垂帘听政。\n\n“主上年幼，国事艰难。大王大妃必须辅佐主上，稳定国家。”随着年幼的国王和大王大妃主导国政，势道家族的影响力变得更加强大。"
 eafp_kor_mainline.41.oa: "又一位年幼的国王……"

 eafp_kor_mainline.42.mt: "己亥迫害"
 eafp_kor_mainline.42.md: "一场针对天主教徒的大规模迫害开始了。"
 eafp_kor_mainline.42.mf: "朝廷认为天主教的传播威胁到了国家的根基，发起了大规模的迫害。\n\n“西学是无父无君的邪教。必须根除所有信徒。”在朝廷的严厉命令下，无数天主教徒被逮捕、拷问并殉教。己亥迫害在朝鲜天主教历史上留下了深深的伤痕。"
 eafp_kor_mainline.42.oa: "一个悲惨的历史事件。"

 eafp_kor_mainline.43.mt: "法国舰队出现"
 eafp_kor_mainline.43.md: "一支法国舰队出现在朝鲜海域。"
 eafp_kor_mainline.43.mf: "为了追究己亥迫害的责任，一支法国舰队出现在朝鲜海域，要求开放港口和宗教自由。\n\n“西洋夷狄入侵了我们的海域！必须立即加强防御！”外国舰队的突然出现让朝廷陷入了恐慌。这一事件预示着朝鲜正被卷入国际关系的波澜之中。"
 eafp_kor_mainline.43.oa: "时代的浪潮正在逼近。"

 eafp_kor_mainline.44.mt: "宪宗升遐"
 eafp_kor_mainline.44.md: "宪宗英年早逝，没有留下子嗣。"
 eafp_kor_mainline.44.mf: "一生受健康问题困扰的宪宗最终离世，没有留下子嗣。\n\n“主上没有留下子嗣就升遐了。国家的未来该怎么办？”朝廷对王位继承问题陷入了深深的担忧。势道家族开始在幕后操纵，企图拥立一位符合他们利益的国王。"
 eafp_kor_mainline.44.oa: "王室的血脉断绝了……"

 eafp_kor_mainline.45.mt: "哲宗即位"
 eafp_kor_mainline.45.md: "被称为‘江华岛樵夫’的哲宗登基。"
 eafp_kor_mainline.45.mf: "宪宗离世后，作为平民在江华岛生活的王室远亲哲宗被戏剧性地拥立为王。\n\n“一夜之间从樵夫变成了国王……这是天意吗？”哲宗在没有接受过正规王室教育的情况下突然登基，纯元王后开始了第二次垂帘听政。势道家族的专权在哲宗时期达到了顶峰。"
 eafp_kor_mainline.45.oa: "一个傀儡国王出现了。"

 eafp_kor_mainline.46.mt: "壬戌农民起义"
 eafp_kor_mainline.46.md: "全国各地同时爆发了农民起义。"
 eafp_kor_mainline.46.mf: "农民们无法忍受势道家族和贪官污吏对‘三政’的严重剥削，在全国各地同时起义。\n\n“我们再也活不下去了！推翻贪官污吏！”愤怒的农民袭击了官府，惩罚了贪官污吏。壬戌农民起义生动地展示了势道政治的彻底失败，严重动摇了朝鲜的根基。"
 eafp_kor_mainline.46.oa: "百姓的愤怒爆发了！"

 eafp_kor_mainline.47.mt: "东学创立"
 eafp_kor_mainline.47.md: "崔济愚创立了东学。"
 eafp_kor_mainline.47.mf: "在社会动荡和西学传播的背景下，崔济愚创立了‘东学’，主张‘人乃天’。\n\n“天心即人心。人人平等。”东学的教义强调平等和民族主义，迅速在受压迫的农民中获得了共鸣。东学后来发展成为一场大规模的社会运动，给朝鲜带来了巨大的风暴。"
 eafp_kor_mainline.47.oa: "一种新的思想出现了。"

 eafp_kor_mainline.48.mt: "哲宗升遐"
 eafp_kor_mainline.48.md: "哲宗没有留下子嗣就离世了。"
 eafp_kor_mainline.48.mf: "作为傀儡国王度过了悲惨一生的哲宗没有留下子嗣就离世了。\n\n“主上再次没有留下子嗣就升遐了。我们必须紧急寻找下一位国王。”朝廷再次卷入了王位继承的漩涡中。在这个过程中，兴宣大院君李昰应的影响力开始显现。"
 eafp_kor_mainline.48.oa: "谁将成为下一位国王？"

 eafp_kor_mainline.49.mt: "高宗即位"
 eafp_kor_mainline.49.md: "年幼的高宗登基，兴宣大院君掌握了权力。"
 eafp_kor_mainline.49.mf: "哲宗离世后，年幼的高宗登基，他的父亲兴宣大院君掌握了实权。\n\n“我将根除势道家族，恢复王权！”兴宣大院君挥舞着强大的改革之剑，摧毁了势道家族的势力，推行了各项加强王权的改革政策。朝鲜迎来了新的转折点。"
 eafp_kor_mainline.49.oa: "大院君的时代开始了。"

 eafp_kor_mainline.50.mt: "大院君的改革"
 eafp_kor_mainline.50.md: "兴宣大院君推行强有力的改革。"
 eafp_kor_mainline.50.mf: "兴宣大院君实施了废除书院、实行户布制、重建景福宫等强有力的改革政策，以加强王权和稳定国家财政。\n\n“我将彻底根除困扰国家的弊端！”他的改革最初受到了百姓的欢迎，但强制重建景福宫和发行当百钱逐渐引起了百姓的怨恨。"
 eafp_kor_mainline.50.oa: "改革不可避免的阵痛。"
 eafp_kor_mainline.50.ob: "他的方法太激烈了……"

 eafp_kor_mainline.51.mt: "闭关锁国政策"
 eafp_kor_mainline.51.md: "兴宣大院君实行严格的闭关锁国政策。"
 eafp_kor_mainline.51.mf: "面对西方列强开放港口的要求，兴宣大院君坚决拒绝，实行了严格的闭关锁国政策。\n\n“我们不会向西洋夷狄让出寸土！”他在全国各地竖立了‘斥和碑’，表明了他保卫国家的坚定意志。然而，这一政策最终导致朝鲜落后于不断变化的国际局势。"
 eafp_kor_mainline.51.oa: "我们必须保护朝鲜的独立！"
 eafp_kor_mainline.51.ob: "我们难道不应该向世界开放吗？"

 eafp_kor_mainline.52.mt: "丙寅洋扰"
 eafp_kor_mainline.52.md: "法国舰队袭击了江华岛。"
 eafp_kor_mainline.52.mf: "以丙寅迫害为借口，一支法国舰队袭击了江华岛。\n\n“西洋夷狄入侵了！我们必须血战到底！”朝鲜军队虽然武器落后，但勇敢地对抗法军，最终迫使他们撤退。然而，在这个过程中，外奎章阁被洗劫，给国家造成了巨大的损失。"
 eafp_kor_mainline.52.oa: "我们成功地抵御了外国的入侵！"

 eafp_kor_mainline.53.mt: "奥佩尔特盗墓事件"
 eafp_kor_mainline.53.md: "德国商人奥佩尔特企图盗掘南延君墓。"
 eafp_kor_mainline.53.mf: "德国商人奥佩尔特企图盗掘兴宣大院君父亲南延君的坟墓，以此要挟开放港口，但失败了。\n\n“他们竟敢做出如此令人发指的行径！”这一事件深深地激怒了兴宣大院君和朝鲜百姓，进一步巩固了闭关锁国政策。"
 eafp_kor_mainline.53.oa: "不可饶恕的暴行！"

 eafp_kor_mainline.54.mt: "辛未洋扰"
 eafp_kor_mainline.54.md: "美国舰队袭击了江华岛。"
 eafp_kor_mainline.54.mf: "以舍门将军号事件为借口，一支美国舰队袭击了江华岛。\n\n“我们将战斗到最后一刻！”由鱼在渊将军率领的朝鲜军队在广城堡英勇奋战，但最终惨败。然而，美军意识到单靠武力无法迫使朝鲜开放港口，最终撤退了。"
 eafp_kor_mainline.54.oa: "我们流下了高贵的鲜血……"

 eafp_kor_mainline.55.mt: "大院君下台"
 eafp_kor_mainline.55.md: "高宗亲政，兴宣大院君被迫下台。"
 eafp_kor_mainline.55.mf: "随着高宗成年并开始亲政，在明成皇后和改革派的压力下，兴宣大院君被迫下台。\n\n“现在，我将亲自治理国家。”随着高宗的亲政，朝鲜改变了路线，从闭关锁国政策转向了开放，迎来了新的时代。"
 eafp_kor_mainline.55.oa: "大院君的时代结束了。"

 eafp_kor_mainline.56.mt: "江华岛条约"
 kor_king_biography_6: "君主的圣德与至善，区区文字连万分之一都难以描绘，但若说天地之道也能用一句话概括，那便是子思所言：‘唯有天下至诚，方能聪明睿智以临天下，宽裕温柔以容万物，发强刚毅以断大事，齐庄中正以敬重，文理密察以明辨。’用这五点来表现君主的纯一之德，或许能得其仿佛。\n\n啊！今日天崩地裂，百姓该如何是好？如尧舜般的圣人，却未能让百姓成为尧舜之民，这难道也是气数使然吗？回想君主为了宗庙和百姓，日夜不息地忧虑，感动了上苍，让圣人即位，继承了大命，使我国亿万年的宏大基业再次如泰山磐石般安稳，这确实是君主的诚心所开启的。啊！何等伟大！"

 kor_king_biography_7: "《周礼》有云：‘太平之国的刑罚，适用符合中道的法律。’君主确实如此。其深厚仁恩广布八道，宏大的纲领与条款将永远流传万世，这皆源于《周易》所说的‘富有之谓大业，日新之谓盛德’。\n\n《中庸》有云：‘大德必得其位，必得其禄，必得其名，必得其寿。’以我国君主之德来看，有应验的，也有未应验的，臣不敢断言上天是必定可期，还是必定不可期。苍天啊！何其可恨！\n\n尽管如此，君子动而为天下道，行而为天下法，言而为天下则，为后王所亲近推崇，为后民所乐于受益，至死不能忘怀。这正是君主以自身为本，在百姓身上印证的盛大功勋与德化。啊！何等美好！"

 kor_king_biography_8: "众多百姓没有福分，只能在穷乡僻壤抚摸着弓剑悲叹，实在令人不忍言说。苍天也变得不可信赖，即使在朱色台阶上献上玉璧也无济于事。如太虚中的一片云般逝去，怎能慰藉这一生的思念？就连居住在偏远海滨和深山的百姓，也都如丧考妣般哀痛。\n\n朱色台阶将永远空虚，哀叹声音与容貌的消逝；大行仪仗即将启程，感叹光阴不留。晨云在新的山脊上诚挚交融，这确实是圣人的安息之地；瑞雪飘落在陵寝附近，神道将依附于此。"

 kor_king_biography_9: "君主继承了先世施以仁德的太平国运，成就了一代宏大的政治。辉煌灿烂的政治使众多百姓深受熏陶，恩泽广布八方。其至善与圣德，百姓无法用言语表达；其宏大美好的规范，史书也无法一一记录。\n\n《易经》有云：‘天之所助者，顺也；人之所助者，信也。’这就是君主接受大命、迎来大喜的原因。"

 kor_king_biography_10: "吉日已至，即将牵引雕刻的灵车，严霜冷冷地凝结在白色的挽索上，悲凉的旋风凄惨地混杂在哀伤的挽歌中。彩旗飘扬，绵延不绝；神道肃穆，深远幽静。漫漫长夜何时是尽头，怎能忍受这永久的诀别？啊！何等悲伤。\n\n那郁郁葱葱的东陵，充满了美好的气象。顺着先祖的陵寝，连接着山脊；伴着这极佳的宝地，共享着山丘。香火将在寝殿中共同接受，衣冠将在松柏间近侍。石像守护着玄色的殓衣，青乌经契合着这珠丘。深感幽明本是一理，千秋万代将归依于此。啊！何等悲伤。\n\n长短不一，造化之神也无法预知；大运不息，如流水般日日逝去，有什么是有尽头却能长存的呢？唯有德音不辍。远去的灵车虽然无法挽留，但优秀的后嗣将继承大业。将这一切镌刻在美玉上，即使宇宙走到尽头也不会磨灭。啊！何等悲伤。"

 eafp_kor_mainline.100.mt1: "升遐"
 eafp_kor_mainline.100.mt2: "驾崩"
 eafp_kor_mainline.100.md11: "国王在昌德宫重熙堂升遐。"
 eafp_kor_mainline.100.md12: "国王在昌德宫大造殿升遐。"
 eafp_kor_mainline.100.md13: "国王在景福宫康宁殿升遐。"
 eafp_kor_mainline.100.md21: "国王在昌德宫重熙堂驾崩。"
 eafp_kor_mainline.100.md22: "国王在昌德宫大造殿驾崩。"
 eafp_kor_mainline.100.md23: "国王在景福宫康宁殿驾崩。"
 eafp_kor_mainline.100.mf: ""

 eafp_kor_mainline.100.o1: "博闻多能曰‘宪’，\n尊上庙号为 #V 宪宗#!。"
 eafp_kor_mainline.100.o2: "法度大明曰‘章’，\n尊上庙号为 #V 章宗#!。"
 eafp_kor_mainline.100.o3: "怀柔远近、安抚远近曰‘和’，\n尊上庙号为 #V 和宗#!。"

 eafp_kor_mainline.100.o4: "知人则哲、明智深远曰‘哲’，\n尊上庙号为 #V 哲宗#!。"
 eafp_kor_mainline.100.o5: "圣善周闻曰‘宣’，\n尊上庙号为 #V 宣宗#!。"

 eafp_kor_mainline.100.o6: "肇基立极、确立标准曰‘高’，\n尊上庙号为 #V 高宗#!。"
 eafp_kor_mainline.100.o7: "民无能名曰‘神’，\n尊上庙号为 #V 神宗#!。"
 eafp_kor_mainline.100.o8: "夙夜警戒、谨慎戒惧曰‘敬’，\n尊上庙号为 #V 敬宗#!。"

 eafp_kor_mainline.100.o9: "安乐抚民曰‘康’，\n尊上庙号为 #V 康宗#!。"
 eafp_kor_mainline.100.o10: "敬德光辉曰‘熙’，\n尊上庙号为 #V 熙宗#!。"
 eafp_kor_mainline.100.o11: "能绍前业曰‘光’，\n尊上庙号为 #V 光宗#!。"
 eafp_kor_mainline.100.o12: "行义悦民曰‘元’，\n尊上庙号为 #V 元宗#!。"
 eafp_kor_mainline.100.o13: "辟土服远曰‘桓’，\n尊上庙号为 #V 桓宗#!。"
 eafp_kor_mainline.100.o14: "柔质慈民曰‘惠’，\n尊上庙号为 #V 惠宗#!。"

 eafp_kor_mainline.100.o99: ""

 eafp_kor_mainline.101.mt: "江华岛公子"
 eafp_kor_mainline.101.md: "前往江华岛的队伍返回汉阳。"
 eafp_kor_mainline.101.mf: "从那天起，一切都变了。\n\n当无数大臣成群结队来到岛上接我时，由于我家族的逆贼血统，我还以为那是我的末日。\n\n然而，我现在不再属于祖父恩彦君的家系，而是被过继为先王的儿子。名字也改为了单字，从 #V 元范#! 变成了 #V 昪#!。\n\n如今，我一夜之间登上了龙座，肩负起处理国政、延续宗庙社稷的沉重担子。\n\n虽然我早年读过两卷《通鉴》和两卷《小学》……"
 eafp_kor_mainline.101.oa: "……但近几年连书都没怎么读过……"

 eafp_kor_mainline.102.mt: "入宫"
 eafp_kor_mainline.102.md: "国王前往殡殿，接受大宝并举行即位典礼。"
 eafp_kor_mainline.102.mf: "进入宫殿，沉重的肩膀感觉被压得更紧了。无数臣子向我跪拜，但我只觉得他们的眼神令人恐惧。父亲曾说：‘现在你必须肩负起朝鲜的国运’，但我怎么知道那重量有多沉？\n\n接获玉册的手在颤抖。在远处，我看到了大王大妃。"
 eafp_kor_mainline.102.oa: "宫殿的寒气让我浑身发抖……"

 eafp_kor_mainline.105.mt: "收帘"
 eafp_kor_mainline.105.md: "大王大妃下旨结束[concept_eafp_korean_regent]。"
 eafp_kor_mainline.105.mf: "大王大妃召见时任及原任大臣，下达旨意：\n\n“今日结束垂帘听政，是我当初勉强接受请求时就已决定好的，为了等到今天，真是度日如年。主上正值盛年，圣学成熟，足以应对万机，我的初衷得以实现，还有什么比这更令人高兴的呢？”\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName]说道：\n\n“主上殿下正值盛年，圣德日进，现在必须亲自总理所有国政。您的慈旨因此下达。您当初勉强接受众人的请求，完全是为了宗庙社稷的大计；今日您对众人广施慈旨，是天地间永恒的法则。我们恭敬地赞颂，齐心协力地庆祝，没有其他话可以再禀报了。”\n\n判府事和右议政等也轮流表达了恭敬赞颂之意。"
 eafp_kor_mainline.105.oa: "“从今日起，结束垂帘。”"

 eafp_kor_mainline.106.mt: "收帘"
 eafp_kor_mainline.106.md: "大王大妃结束[concept_eafp_korean_regent]。"
 eafp_kor_mainline.106.mf: "“既然从今日起理应停止垂帘听政，我不能不下达谕旨。世间哪里还有像我这样遭遇的人？我只是为了宗庙社稷的计策，才压抑心情，忍受悲痛。主上现在正值盛年，足以总揽所有政事，还有什么比这更令人高兴和庆幸的呢？主上亲政是国家的巨大喜事，我的喜悦怎会有尽头？我的垂帘和谕旨到今日为止，各位大臣必须好好辅佐我们的主上。”\n\n“我等待今天，难道是徒劳的吗？各位务必不要推辞，只要心系百姓和国家，小心谨慎地做好工作，不仅我会感到高兴，在天之灵的祖宗也一定会高兴。想到主上现在年纪已经成熟，与以前不可同日而语，还有什么事不能亲自总揽呢？这是我深思熟虑的事，所以务必好好治理。主上请想想。这些百姓都是仰望大殿的人；国家依靠百姓，百姓依靠国家。如果每次想到他们受严寒、酷暑或风雨折磨的痛苦，怎么能忘记呢？请把心思放在这上面，好好爱护和照顾他们。”"
 eafp_kor_mainline.106.oa: "“从今日起，结束垂帘。”"

 eafp_kor_mainline.107.mt: "收帘"
 eafp_kor_mainline.107.md: "大王大妃停止[concept_eafp_korean_regent]。"
 eafp_kor_mainline.107.mf: "“自古以来，王后亲自处理朝政就是国家的不幸。何况像我这样缺乏德行、见识浅薄的人，怎敢与过去的贤明王后相提并论？然而，当先王离世、遭遇巨大悲痛时，各位大臣引用历代先王的先例，流着泪恳求我，我也为了宗庙社稷的大计才勉强答应。”\n\n“近来，国家的局势更加混乱，百姓艰难困苦的生活日益严重。然而，之所以无法收拾局面，是因为我坐在了不该坐的位置上。对上无法顺应天意，对下无法振奋世道人心，才逐渐落到这步田地。”\n\n“就现在而言，主上已经到了血气方刚的年纪，天资聪颖，智慧日渐成熟，对重要公务已能明察秋毫，学问也十分扎实。他完全能够总揽所有政事，亲自处理复杂的事务。他能永远继承王业，将来对后世也能坦然述说。”"
 eafp_kor_mainline.107.oa: "“从今日起，结束垂帘听政，让主上总揽大小一切公务。”"

 # eafp_kor_mainline.108
 # eafp_kor_mainline.109

 eafp_kor_mainline.111.mt: "召见"
 eafp_kor_mainline.111.md: "大王大妃召见大臣们。"
 eafp_kor_mainline.111.mf: "“上天为何如此忍心？上天为何如此忍心？这悲痛为何如此之深？”\n\n大王大妃说着，[SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName]哭泣着说道：\n\n“五百年的宗庙社稷，怎么会想到今天突然变成这样？恳请您宽心克制。”\n\n郑元容说道：\n\n“宗庙社稷的大计十分紧急。恳请您宽心克制，明确下达旨意，让臣等详细听闻。这是极其重大的事情，不能仅仅口头传达。恳请您写下文字交给我们。”\n\n大王大妃说道：\n\n“我这里有写好的文字。”\n\n郑元容又问：\n\n“现在多大年纪了？”\n\n大王大妃回答：\n\n“是[SCOPE.GetValue('cheoljong_age')]岁。”\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName]等人说道：\n\n“宗庙社稷的大计现在已经确定，真是万幸。这是极其重大的事情，似乎最好先指派几名禁军前往他的私第护卫迎接。”"
 eafp_kor_mainline.111.oa: "“英祖的血脉只有今上和居住在江华的‘李元范’，因此将宗庙社稷托付给他，他是㼅的第三子。”"

 eafp_kor_mainline.112.mt: "奉迎"
 eafp_kor_mainline.112.md: "大王大妃下令按照先例举行奉迎仪式。"
 eafp_kor_mainline.112.mf: "下达旨意：\n\n“奉迎的队伍迟早会进宫，让相关部门立即办理封爵事宜，拟定德完君的称号。”\n\n“另外，让相关部门在今日内办理恢复恩彦君夫妇爵位的事宜。”\n\n左议政金道喜禀报：\n\n“如今接到您的旨意，宗庙社稷的托付已经确定，真是万分庆幸。臣等恭敬地认为，新王熟悉国政的途径，全在于殿下[Concept('concept_eafp_korean_regent', '垂帘')]听政的教导。恳请您尽快下达旨意，回应众人的心声。”\n\n大王大妃下旨：\n\n“我已经过了六十岁，而且神智已经有些昏聩，现在怎么还能再讨论这件事呢，但是……”"
 eafp_kor_mainline.112.oa: "“……国家大事极其重要，已经没有推辞的余地了，我只好勉强答应。”"
 #

 eafp_kor_mainline.114.t: "嗣位"
 eafp_kor_mainline.114.d: "大王大妃殿下令由兴宣君的嫡次子嗣位，并派领议政[SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName]和都承旨闵致庠前往私邸奉迎。"
 eafp_kor_mainline.114.f: "大王大妃说道：\n\n“我决定由兴宣君的嫡次子李命福继承翼宗大王的统绪。”\n\n大王大妃从帘后递出一份谚文教书。都承旨闵致庠接过来，大臣们将其翻译成汉文并向大王大妃朗读后，拿出来颁布。郑元容禀报：\n“在国家面临如此危急的时刻，恭敬地看到您在帘后做出的决策，亿万年如泰山磐石般的基业由此开启，臣等不禁感到庆幸和喜悦。”\n\n领议政[SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName]禀报：\n\n“翼成君今年多大了？”\n\n大王大妃说道：\n\n“应该是[SCOPE.GetValue('gojong_age')]岁。”\n\n郑元容禀报：\n“在恭敬迎接之前，似乎最好先派各军营的士兵守卫他私邸的四周。”\n\n大王大妃说道："
 eafp_kor_mainline.114.o: "“就这么办吧。”"

 eafp_kor_mainline.115.t: "入宫"
 eafp_kor_mainline.115.d: "奉迎嗣王入宫。"
 eafp_kor_mainline.115.f: "领中枢府事郑元容禀报：\n\n“当国家局势危急、人心不稳时，幸好慈圣殿下在帘后下达了果断的旨意，迎来了太平盛世。仰望您如天上太阳般的气魄，众人无不感到喜悦。”\n\n大王大妃说道：\n\n“在这样无尽的悲痛中，大计已经确定。而且翼成君虽然年幼，但举止成熟，十分聪慧，这对宗庙社稷来说真是万幸。”\n\n[SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName]禀报：\n\n“国王年幼继承王位时，以前曾有[Concept('concept_eafp_korean_regent', '垂帘听政')]的先例。这次也按照规定办理如何？”\n\n大王大妃说道：\n\n“我怎么忍心这么做呢？但今天国家的局势如此孤立和危险，似乎连一天都无法保全，所以没有时间考虑其他事情。我只能勉强同意。”"
 eafp_kor_mainline.115.o: "随后，她下令按照先例举行垂帘听政的程序。"

 # 역사적 박해 이벤트

 eafp_kor_mainline.120.mt: "李趾渊的上疏"
 eafp_kor_mainline.120.md: "右议政李趾渊上奏，要求彻底调查邪学一事。"
 eafp_kor_mainline.120.mf: "“最近听说两个捕盗厅抓获的邪学罪犯达数十人。有些已移交刑曹，但几乎所有人都视死如归，执迷不悟，能被感动而悔改的人极少。即使只看那些已经暴露的人，也无法知道那些凶恶丑陋的暴徒聚集并秘密制造巢穴的数量。正常的伦理关系崩溃，习俗逐渐被污染自不必说，人们不禁担心黄巾军或白莲教那样的祸患。目前的局势要求更严格的调查和彻底的惩罚，但出于救人的意图，我们不能只以杀人为目的。”"
 eafp_kor_mainline.120.oa: "必须纠正那些无父无君的混乱暴徒。"
 eafp_kor_mainline.120.ob: "将以大王大妃的名义发布根除邪学的诏书。"
 eafp_kor_mainline.120.oc: "这……是正确的做法吗？"
 large_scale_christian_persecution_modifier: "迫害基督徒"
 ruler_protect_christians_modifier: "国王保护基督徒"

 eafp_kor_mainline.121.mt: "迫害的终结？"
 eafp_kor_mainline.121.md: "颁布《斥邪纶音》。"
 eafp_kor_mainline.121.mf: "‘为什么放弃这个国家共同追求的平坦道路，而甘愿接受几万里之外的异端邪说，自己走进陷阱呢？啊！我不知道那些还未被发现的人接下来会策划什么，他们的傲慢会变成什么样。父亲必须告诫儿子，哥哥必须告诫弟弟。让人们知道，被误导的人必须被开导，还未堕落的人必须被警告。’\n\n通过处决几个月来扰乱风俗的西洋神父并教化百姓，此事暂时告一段落。\n\n与此同时，在朝鲜的某个地方，有传言说金大建和崔良业已经踏上了去中国留学的旅程……"
 eafp_kor_mainline.121.oa: "这应该能让事情平息一段时间。"

 eafp_kor_mainline.122.mt: "尹尚度之狱"
 eafp_kor_mainline.122.md: "怀疑金正喜参与其中。"
 eafp_kor_mainline.122.mf: "最近，尹尚度叛国案的故事再次被提起，秋史金正喜被牵连其中，据说他起草了尹尚度强烈批评安东金氏派系的上疏。\n\n与他关系密切的丰壤赵氏的右议政赵寅永提交了一份恳切的呼吁。看来秋史的性命可能会被保住，但艰苦的流放之旅似乎不可避免。"
 eafp_kor_mainline.122.oa: "这也是无可奈何的事。"
 eafp_kor_mainline.122.ob: "不，他是一个不可或缺的人才！"

 eafp_kor_mainline.123.mt: "弹劾李在学"
 eafp_kor_mainline.123.md: "李趾渊遭到台谏弹劾。"
 eafp_kor_mainline.123.mf: "以大司谏李在学和大司宪李义骏为首，提交了一份弹劾上疏，强烈谴责李在学不合理地处理事务及其对权力的垄断。\n\n目前，咸镜北道的明川等地正被讨论为可能的流放目的地，考虑到朝廷的氛围，他被流放似乎已成定局。"
 eafp_kor_mainline.123.oa: "他的手上确实沾满了鲜血。"
 eafp_kor_mainline.123.ob: "但谁能否定他的清廉！"

 eafp_kor_mainline.124.mt: "牧灵活动被发现"
 eafp_kor_mainline.124.md: "在白翎岛港口被捕。"
 eafp_kor_mainline.124.mf: "据说他的名字叫金大建。15岁时逃到清朝，进入广东学习西洋宗教，在癸卯年与玄锡文等人勾结秘密返回，并在首都成为宗教领袖……\n\n今年春天被海西地区的人抓获，他坚持说自己是中国人，直到最后从头到尾交代了真相……\n\n担任他们称之为‘神父’的职位，这对于朝鲜出身的人来说是前所未有的，与以前的案例不同……\n\n考虑到此事不可轻视，已决定将他押送到汉阳。请朝廷做出明智的判断。\n-海州监营-"
 eafp_kor_mainline.124.oa: "此事非同小可。"

 eafp_kor_mainline.125.mt: "不祥之船"
 eafp_kor_mainline.125.md: "收到法国派遣舰队让-巴蒂斯特·塞西尔海军少将的以下信件。"
 eafp_kor_mainline.125.mf: "‘我国的几位高贵人物，范世亨主教、郑牙各伯神父和罗伯多禄神父，不幸被你们处决。现在我们来问你们，为什么要杀他们。你们可能会说，你们国家的法律禁止外国人擅自入境，因为这三人违反了这项法律，所以被处决了。然而，当中国人、满洲人或日本人进入朝鲜时，你们不敢杀他们，而是将他们遣返回各自的国家。为什么你们不把我国的这三个人像中国人、满洲人或日本人那样对待？如果他们犯了谋杀、纵火或类似令人发指的罪行，逮捕并惩罚他们是适当的，我们会保持沉默并默许。但他们是无辜的，你们不公正地处决他们是对法兰西国家的严重侮辱。’"
 eafp_kor_mainline.125.oa: "蛮夷的傲慢竟到了这种地步。"

 eafp_kor_mainline.126.mt: "决定的时刻"
 eafp_kor_mainline.126.md: "讨论金大建的问题。"
 eafp_kor_mainline.126.mf: "国王问道：\n“金大建的事该怎么处理？”\n\n权敦仁回答说：\n“金大建的事一刻也不能宽恕。他自愿依靠邪教来欺骗和迷惑民心。如果查明他的所作所为，完全是出于欺骗、迷惑、煽动和破坏的阴谋。此外，除了他的邪术，他作为一个朝鲜人，背叛了自己的国家，侵犯了他国的边界，自称是邪学的一部分，他说的话似乎还有同谋。想想就让人不寒而栗。如果我们不依法惩处他，只会给别人留下找茬的借口，我们也无法避免暴露出软弱。”"
 eafp_kor_mainline.126.oa: "处决他。"
 eafp_kor_mainline.126.ob: "将他流放。"
 eafp_kor_mainline.126.oc: "释放他。"

 eafp_kor_mainline.127.mt: "追捕西学信徒"
 eafp_kor_mainline.127.md: "捕盗大将未经朝廷允许就开展了追捕西学信徒的行动。他们不分青红皂白地逮捕信徒，在此过程中，捕吏们参与了抢劫，引起了骚动。"
 eafp_kor_mainline.127.mf: "右捕盗大将申命淳和左捕盗大将任泰瑛逮捕了约30名西学信徒并将他们押送到汉阳。有报告称，在逮捕过程中，捕吏们犯下了抢劫财产和纵火等令人厌恶的暴行。因此，训炼大将兼户曹判书金炳冀和刑曹判书金炳云主张，应释放被捕的信徒，捕盗大将应辞职。"
 eafp_kor_mainline.127.oa: "简直是暴行。命令他们立即辞职。"
 eafp_kor_mainline.127.ob: "难道他们不是因为有罪才被逮捕的吗？"

 eafp_kor_mainline.128.mt: "大南的悲报"
 eafp_kor_mainline.128.md: "消息传到朝廷，大南（越南）以镇压天主教为借口遭到入侵。随着朝鲜也可能成为西洋蛮夷入侵目标的恐惧蔓延，要求先发制人镇压天主教的上疏如雪片般飞来。"
 eafp_kor_mainline.128.mf: "“自古以来，如果说异端邪说侵蚀和危害人心，怎么数得清呢？但没有什么比西洋宗教更糟糕的了。在给其他国家带来灾难的蛮夷中，怎么数得清呢？但同样，没有比西洋蛮夷更糟糕的了。一般来说，他们秘密潜入我国并广泛传播邪学的目的，是为了增加他们的派系，内外呼应，刺探我国的局势，带领军队入侵，破坏我们的文化制度，掠夺我们国家的财富和妇女，从而满足他们无尽的贪婪。”"
 eafp_kor_mainline.128.oa: "处决并消灭所有的间谍。"

 # 以下是儒学王国事件

 eafp_kor_mainline.170.mt: "[GetCurrentGameDate.Format('y')]年的教化"
 eafp_kor_mainline.170.md: "大规模逮捕追随邪学的暴徒。"
 eafp_kor_mainline.170.mf: "最近，各道不断有报告称有暴徒追随颠覆性意识形态，并且有西洋人鼓励他们，因此文武官员不禁感到担忧。当朝廷下令严厉打击时，果然证实有许多暴徒在秘密活动。其中，还证实有西洋人未经允许伪装成丧主秘密潜入国内。\n\n许多被他们误导的可怜百姓选择放弃错误信仰，回归生活。然而，一些信徒仍然拒绝教化，外国头目在宽大处理面前也全部拒绝遣返并选择死亡，因此别无选择，只能将他们全部斩首。"
 eafp_kor_mainline.170.oa: "时代越混乱，我们越必须端正正学。"
 eafp_kor_mainline.170.tt: "所有活跃的传教士 #N 死亡#!。"

 eafp_kor_mainline.171.mt: "新浪潮"
 eafp_kor_mainline.171.md: "经历了最近的动荡时期，对外国意识形态和哲学的理解加深了。现在，各种信仰和哲学可以在我们社会共存的观念正在蔓延，这些变化为国内学术和艺术的发展开辟了新天地。"
 eafp_kor_mainline.171.mf: "“在这个广阔的世界里，存在着各种各样的道理。儒家思想毫无疑问是宗庙社稷的基石，但我们必须承认，其他国家的思想中也有很多值得学习的地方。”"
 eafp_kor_mainline.171.oa: "我们的智慧将进一步加深。"

 #

 eafp_kor_mainline.200.mt: "腐败的土壤"
 eafp_kor_mainline.200.md: "责备大臣们不惩罚守令。"
 eafp_kor_mainline.200.mf: "国王前往重熙堂，召见大臣和备边司堂上。大王大妃下旨说：\n“现在八道没有哪个城镇的还谷没有亏空，这些亏空完全是由下吏造成的。如果当观察使或守令的人稍微贪婪一点，带头犯罪，怎么能禁止呢？又怎么能说设立观察使和守令是有意义的呢？而且，有权势的人即使屡次犯下重罪也从不受到惩罚，只有无权无势的荫官和武官受到责备。不仅是观察使和守令，难道你们这些大臣也能说自己在每件事上都完全正直吗？我垂帘听政已经三年了，却没听说过哪个观察使或守令被惩罚过。”\n\n对此，右议政朴宗薰说：\n“像臣这样无能的人接到这样的旨意，实在没有什么可以禀报的。”\n\n然后大王大妃下旨说……\n“我不是光说你，而是整个世界都是这样。”"
 eafp_kor_mainline.200.oa: "（可是……他们不都是奶奶您家里的人吗……？）"

 eafp_kor_mainline.206.mt: "逋欠（亏空）"
 eafp_kor_mainline.206.md: "晋州的税收没有被正确上缴。"
 eafp_kor_mainline.206.mf: "根据《户口总数》，晋州本来土地肥沃、人口众多，所以每年应该上缴大约4万石的税粮。然而，由于腐败官吏挪用粮食的习惯由来已久，无法控制的累积亏空达到了6万石的规模。\n\n随着朝廷的催促，地方官府将立即准备上缴税收的负担转嫁给了百姓。在原有税收的基础上，额外征收的铜钱和布匹日益增加，使百姓的生活陷入了水深火热之中。"
 eafp_kor_mainline.206.oa: "贪污这么多可能吗？？？"

 eafp_kor_mainline.207.mt: "吏逋征民（向百姓征收官吏的亏空）"
 eafp_kor_mainline.207.md: "上汉阳的百姓诉说他们的委屈。"
 eafp_kor_mainline.207.mf: "‘吏逋征民’这个词开始在公众中流传，意思是从无辜百姓那里征收被腐败官员挪用的粮食。晋州的百姓再也无法忍受，成群结队地涌向汉阳，向备边司诉说他们的委屈。\n\n中央政府深刻认识到事态的严重性，命令那些挪用税粮的人补足，同时讨论了对高级官员的惩罚。\n\n百姓们欢欣鼓舞地回到了地方，但与承诺的相反，情况几乎没有改变。因此，无助的百姓开始一个接一个地决定逃往其他道，以逃避暴政。\n\n在朝鲜国家的体制下，这潭死水已经腐烂透顶，上面的一纸空文根本无法纠正。"
 eafp_kor_mainline.207.oa: "所以……换个牧使就行了？"

 eafp_kor_mainline.208.mt: "解雇官员"
 eafp_kor_mainline.208.md: "下令解雇牧使（地方官）。"
 eafp_kor_mainline.208.mf: "由于晋州的局势严重，朝廷内部要求更换牧使的呼声高涨，因此决定派一名新官员来安抚群众并解决问题……"
 eafp_kor_mainline.208.oa: "这应该能稍微安抚一下民心。"
 eafp_kor_mainline.208.ob: "又换？"

 eafp_kor_mainline.209.mt: "都结（统收税）"
 eafp_kor_mainline.209.md: "决定征收未缴的税款。"
 eafp_kor_mainline.209.mf: "“牧使大人，这到底是什么意思？我们怎么可能现在立刻凑齐几万石粮食！”\n\n“我也不想这么说，但这也是我好不容易和朝廷协商下来的命令，让他们把8000石作为亏空注销。”\n\n“这次迫不得已决定在都结上每结增加6两5钱，所以把大家召集来，希望得到大家的配合。”\n\n“分期付款听起来不错，但我们去哪里一次性拿到那么多收入？我们到现在交的已经损失惨重了……”\n\n“洪牧使，金大人的反应也在情理之中。我们也不想被当成守财奴。但是要凑齐这么大一笔钱，我们得卖掉好几块地和几栋房子。但在这种时候，谁买得起？这地方买得起的人不都在这儿了吗？”\n\n“那我们之前交的那些都去哪儿了？进了谁的肚子？如果我们再提高地租，那些人会死的。坦白说，真正负责任的人早就贪了一大笔，装模作样地调查了一下就被放了，在远方过着奢侈的生活。你把我们这些软柿子捏在一起，不是来要什么‘配合’的吧？”"
 eafp_kor_mainline.209.oa: "每个人的处境都很可怜，但朝廷必须运转下去。"

 eafp_kor_mainline.210.mt: "密谋"
 eafp_kor_mainline.210.md: "反抗的火花。"
 eafp_kor_mainline.210.mf: "“听说了吗？官府又要收税了？”\n\n“这算什么晴天霹雳！我们还有什么能被榨干的！”\n\n“那些住瓦房的两班贵族至少还有房子和地，但对于我们这些过一天算一天的人来说，这简直就是让我们去死。”\n\n“不仅如此。有传言说，兵营也趁机加入，还要额外征收几万两的还谷税。如果这是真的，谁来承担这一切！”\n\n“我们不能这样活下去了，是时候采取集体行动了！”\n\n“嘿伙计，就凭我们能干什么？”\n\n“我们当然不能单干。但有传言说，这地方一个有点文化的贵族最近正在市场上召集人手……？”\n\n“真的吗？我们去听听……”"
 eafp_kor_mainline.210.oa: "天哪。"

 eafp_kor_mainline.211.mt.1: "晋州农民起义"
 eafp_kor_mainline.211.mt.2: "华城农民起义"
 eafp_kor_mainline.211.mt.3: "益山农民起义"
 eafp_kor_mainline.211.mt.4: "定州农民起义"
 eafp_kor_mainline.211.mt.5: "北青农民起义"
 eafp_kor_mainline.211.mt.e: "错误：未正确指定州"
 eafp_kor_mainline.211.md: "#N 举事！#!"
 eafp_kor_mainline.211.mf.1: "当晋州一位有声望的没落贵族柳继春充当农民的精神领袖时，当地政府认为这很危险，于是走了一步错棋，将他逮捕了。\n\n结果，在一个叫水清街的地方举行了一场群众集会，大批由樵夫、劳工等组成的‘樵军’聚集在一起。惊恐的官府释放了他。\n\n然而，群众认为和平谈判已经没有意义了。最终，当以柳继春为中心的群众决定全面反抗时，无数势力如云般以市场为中心聚集起来，人数达到了数千……"
 eafp_kor_mainline.211.mf.2: "当地一位有声望的没落贵族自然而然地代表农民发声并成为他们的核心，当地政府认为这很危险，于是走了一步错棋，将他逮捕了。\n\n结果，当地街道上举行了一场群众集会，大批由樵夫、劳工等组成的‘樵军’聚集在一起。惊恐的官府释放了他。\n\n然而，群众认为和平谈判已经没有意义了。最终，当以被释放的贵族为中心的群众决定全面反抗时，无数势力如云般以市场为中心聚集起来，人数达到了数千……"
 eafp_kor_mainline.211.oa: "不"

 eafp_kor_mainline.212.mt: "罢市！"
 eafp_kor_mainline.212.md: "大批群众聚集并组织起来，他们通过关闭市场大门进行罢市。"
 eafp_kor_mainline.212.mf: "街道上流传着不忠的檄文，曾经热闹的氛围变成了愤怒。\n\n在镇上，打破这可怕死寂的火花正在落下……"
 eafp_kor_mainline.212.oa: "不"

 eafp_kor_mainline.213.mt: "放火！"
 eafp_kor_mainline.213.md: "从半夜爆发的骚乱开始，凝聚的愤怒很快变成了绚丽的火焰燃烧起来。"
 eafp_kor_mainline.213.mf: "群众在街道上游荡，烧毁了那些残酷迫害百姓的贪官污吏、对百姓苦难视而不见并忘记社会责任的富豪和贵族、以及依仗权势与腐败官员勾结的无耻之徒的房屋。\n\n那些曾经骑在百姓头上作威作福的吸血鬼，只有少数人勉强保住性命逃脱了。"
 eafp_kor_mainline.213.oa: "不"

 eafp_kor_mainline.214.mt: "万众一心"
 eafp_kor_mainline.214.md: "长期压抑的不满终于爆发，无数居民，包括老人和妇女，都响应了。"
 eafp_kor_mainline.214.mf: "人们提供食物和饮料来喂养壮丁，把他们藏起来躲避官差和士兵，在物质和精神上支持他们。\n\n随着时间的推移，失去的民心甚至从邻近的村庄聚集了更多的群众，樵军们气势汹汹地向牧使所在的官府进军。"
 eafp_kor_mainline.214.oa: "不"

 eafp_kor_mainline.215.mt: "宣告罪行！"
 eafp_kor_mainline.215.md: "群众排成队列袭击了官府，并高呼口号举行武装示威。"
 eafp_kor_mainline.215.mf: "只有奉王命从中央派来的牧使本人才能得到安全保障。在废除都结的严厉要求下，连他也吓得发抖，写下了文书。\n\n然而，那些刚才还在眼前专横跋扈的吏役却无法逃脱惩罚。他们被拖到群众面前，被殴打和咒骂，为他们的报应付出了代价并受到谴责。百姓们欢呼着，分享了官府的粮食，烧毁了成为弊端源头的土地和奴婢文书。\n\n然而，其中最恶毒的人像泥鳅一样溜走，逃到了兵营。确认这一点后，群众开始进军追击。"
 eafp_kor_mainline.215.oa: "不"

 eafp_kor_mainline.216.mt: "把他们全打死！"
 eafp_kor_mainline.216.md: "数以万计的人群头戴头巾，手持木棍和农具，来到兵营，要求交出恶吏。当群众当面严厉斥责他们，历数他们侵吞百姓财产和逃税的所有暴行时，听到这些的士兵集体抗命，加入了起义。"
 eafp_kor_mainline.216.mf: "那些竟敢相信自己能保住性命的吸血鬼，被守卫他们的士兵拖了出来，一个接一个地找到并杀死。那些积怨特别深的人被群众打死，甚至连尸体也被烧毁了。"
 eafp_kor_mainline.216.oa: "不"

 eafp_kor_mainline.217.mt: "反抗的浪潮"
 eafp_kor_mainline.217.md.1.a: "丹城加入起义"
 eafp_kor_mainline.217.md.1.b: "昌原加入起义"
 eafp_kor_mainline.217.md.2.a: "平泽加入起义"
 eafp_kor_mainline.217.md.2.b: "振威加入起义"
 eafp_kor_mainline.217.md.3.a: "公州加入起义"
 eafp_kor_mainline.217.md.3.b: "顺天加入起义"
 eafp_kor_mainline.217.md.4.a: "松林加入起义"
 eafp_kor_mainline.217.md.4.b: "泰川加入起义"
 eafp_kor_mainline.217.md.5.a: "咸兴加入起义"
 eafp_kor_mainline.217.md.5.b: "新浦加入起义"
 eafp_kor_mainline.217.md.e: "错误：未正确指定蔓延的州"
 eafp_kor_mainline.217.mf.a: "自从[ROOT.GetState.GetName]燃起混乱的火焰以来，又一个村庄最终加入了起义的队伍。\n\n听到邻近地区的消息后，这里的居民也倾泻出长期压抑的愤怒，袭击了官府并砸毁了吏役的房屋。\n\n无数房屋燃烧，富豪和官员经常在逃跑时被抓住并杀死，群众威胁牧使，要求减税！"
 eafp_kor_mainline.217.mf.b: "愤怒的洪水正在吞没整个[ROOT.GetState.GetName]，更多的村庄相继起义。\n\n如果一个地区被镇压，不久之后就会有两个地区起义，已经有无数的官府和兵营沦陷并失去了作用。\n\n在一些地区，甚至连前任郡守都成了头目发动了起义；在另一些地区，烧毁了所有现有政府文书的农民组建了自己的自治组织，并拒绝沟通！"
 eafp_kor_mainline.217.mf.e: "错误：变量 eafp_var_imsul_on_state 的值不是 2 或 3，或者变量不存在"
 eafp_kor_mainline.217.oa: "不"

 eafp_kor_mainline.218.mt.1: "起义蔓延至庆尚道！"
 eafp_kor_mainline.218.mt.2: "起义蔓延至京畿道！"
 eafp_kor_mainline.218.mt.3: "起义蔓延至全罗道！"
 eafp_kor_mainline.218.mt.4: "起义蔓延至平安道！"
 eafp_kor_mainline.218.mt.5: "起义蔓延至咸镜道！"
 eafp_kor_mainline.218.mt.e: "错误：未正确指定蔓延的州"
 eafp_kor_mainline.218.md.1: "晋州燃起反抗的火焰"
 eafp_kor_mainline.218.md.2: "华城燃起反抗的火焰"
 eafp_kor_mainline.218.md.3: "益山燃起反抗的火焰"
 eafp_kor_mainline.218.md.4: "定州燃起反抗的火焰"
 eafp_kor_mainline.218.md.5: "北青燃起反抗的火焰"
 eafp_kor_mainline.218.md.e: "错误：未正确指定蔓延的州"
 eafp_kor_mainline.218.mf: "从地方发来了紧急报告。\n\n据报告，农民起义的动荡消息已经流入邻道，[ROOT.GetState.GetName]的百姓正在聚集加入起义！\n\n如果这样下去，八道都将陷入混乱！"
 eafp_kor_mainline.218.oa: "不"

 eafp_kor_mainline.219.mt: "混乱的蔓延"
 eafp_kor_mainline.219.md: "失控的愤怒"
 eafp_kor_mainline.219.mf: "随着各地起义的加剧和规模的扩大，越来越多的团体各自为战。\n\n越来越分散的暴徒蔓延到各地，加剧了地区的混乱，其中一些人甚至抢劫民宅，其行为与土匪无异！"
 eafp_kor_mainline.219.oa: "不"

 eafp_kor_mainline.220.mt: "熄灭的火焰"
 eafp_kor_mainline.220.md: "平息"
 eafp_kor_mainline.220.mf: "即使是猛烈燃烧的火焰也不会永远持续下去。\n\n无论是百姓的愤怒已经充分消散，还是我们的诚意被接受了，起义现在正逐渐进入平息阶段。\n\n不久，如果行政体系在一定程度上得到恢复，我们就可以任命一位有能力的按核使来安抚百姓，并正式讨论解决局势的办法。"
 eafp_kor_mainline.220.oa: "谢天谢地……"

 eafp_kor_mainline.221.mt: "善后"
 eafp_kor_mainline.221.md: "[SCOPE.sCharacter('eafp_char_park_gyusu').GetFullName]成为按核使的候选人"
 eafp_kor_mainline.221.mf: "随着局势的平息，为了开始重建和善后工作，正在讨论派谁作为按核使最合适。\n\n因此，前不久从热河回来的[SCOPE.sCharacter('eafp_char_park_gyusu').GetFullName]，因为他曾担任庆尚道暗行御史的经历、学识、聪明才智和人品，被大臣们一致认为是最合适的人选。\n\n他已经做好了下地方调查起义原因、提出解决局势和安抚百姓的各项政策建议以及收集民意的准备。"
 eafp_kor_mainline.221.oa: "我完全信任你，所以请你承担这项任务。"
 eafp_kor_mainline.221.ob: "此外，我希望你能培养后辈学者，促进学术发展。"

 eafp_kor_mainline.222.mt: "根除腐败"
 eafp_kor_mainline.222.md: "请求惩罚贪官污吏"
 eafp_kor_mainline.222.mf: "朴珪寿调查了起义的原因，听取了百姓的声音，并提交了一份上疏，结论是官员的残酷剥削是农民起义的原因。\n\n他请求对除头目外的大多数参与者宽大处理，但要求惩罚导致起义的官员。\n\n他表示，立即将白乐臣等腐败到极点的人罢职、没收财产并流放，是安抚民心的方法。"
 eafp_kor_mainline.222.oa: "没收他们的财产，罢免并流放！"

 eafp_kor_mainline.223.mt: "扩大监察"
 eafp_kor_mainline.223.md: "请求加强对地方官的监察"
 eafp_kor_mainline.223.mf: "甚至在起义之前，就有几个地区应百姓要求更换了官员，但未能阻止事态的蔓延。\n\n朴珪寿指出，他们上任的那一刻起，即使他们蔑视朝廷或追求私利，也几乎不受任何牵制或监视。\n\n因此，他建议大量派遣宣抚使和暗行御史，以防止各镇的守令胆敢抹黑国王的恩德。"
 eafp_kor_mainline.223.oa: "挑选正直的人，派往每一个角落！"

 eafp_kor_mainline.224.mt: "骚乱的原因"
 eafp_kor_mainline.224.md: "询问省内百姓的苦难和暴乱"
 eafp_kor_mainline.224.mf: "“逐一告诉我省内守令的善政与恶政、百姓的苦难以及暴民造成的破坏。”\n\n“臣受命至今已约40天，虽然走访了几个城镇，但每次都匆匆路过，所以对守令治理的好坏并不详细了解。至于各镇的弊端和暴民引起骚乱的线索，臣将详细列出其概要，并恭敬地整理成册呈上。”\n\n“百姓的暴乱都是因为三政的弊端引起的吗？”\n\n“还谷的弊端到处都一样，但即使是非常小和贫穷的城镇和兵营也有很大的还谷额度。如果分配下去，一户人家可能会收到多达100石。然而，分配的粮食都是空壳和石头，百姓怎么会不感到冤枉呢？”\n\n“如果是这样，这和‘白骨征布’（向死人征税）有什么区别？真是令人痛心。”\n\n“这比白骨征布还要糟糕。每年本金粮食的损失不可估量，让百姓没有活路。军政也没有哪个城镇没有弊端，军布的重复征收对一个人达到4-5次，对一户人家超过10次。这是因为有书院和士大夫家族墓地的村庄都被免除了，所以其他贫苦百姓无法避免重复的兵役。”\n\n“如果平均征收，每人交一次就够了；怎么会变得这么严重？”\n\n“圣明鉴察。结钱的执行过去有时是8-9钱，但近来由于吏役的狡猾和官员的不守法，每结达到了14-15钱。”\n\n“那么和原来的地价相比翻了一倍。”\n\n“正是如此。因此，百姓诉说冤屈，当一个城镇首先发生骚乱时，周围城镇的百姓就会效仿，说‘如果现在不纠正，就没有得救的日子了’，从而从四面八方聚集起来引起骚乱。”"
 eafp_kor_mainline.224.oa: "“各处城镇爆发骚乱，无论是非对错，所有人的心都会感到恐惧。我的心很不安。”"
 ##https://sillok.history.go.kr/id/kya_11308111_001

 eafp_kor_mainline.225.mt: "三政理整厅"
 eafp_kor_mainline.225.md: "在备边司设立专门机构调查八道的三政"
 eafp_kor_mainline.225.mf: "“最近发生的民变到底是什么样的怪事？如果我们真的用德行引导他们，用礼仪治理他们，让他们能上事父母，下养妻子，安居乐业，即使有一两个顽固乖戾的人，又怎么能煽动做出这种事呢？因为贪官污吏的迫害，狡猾的乡绅和奸吏的敲诈勒索，让他们遭受刻骨铭心的怨恨和剜肉般的痛苦，生不如死，所以他们才没有意识到自己已经到了越权和违反纪律的地步。如果考察实际情况，也是令人悲哀的。一般来说，关系到民事必须大力根除的部分只有三政，暴民们也从来都是以此为借口。在备边司设立专门机构，调查八道的三政。改革可以改革的，纠正可以纠正的，让那些贫穷无助、哭泣的群众都能安息，都能平等地感受到一视同仁的恩典。”"
 eafp_kor_mainline.225.oa: "必须果断地进行改革。"

 eafp_kor_mainline.226.mt: "有名无实的理整"
 eafp_kor_mainline.226.md: "为纠正三政的混乱而设立的三政理整厅，在没有明显成效的情况下关门了。"
 eafp_kor_mainline.226.mf: "“我们设立了专门机构并反复讨论，但文书只是文书，弊端依然留在百姓的生活中。官府消失后，谁还会再提起这件事？”"
 eafp_kor_mainline.226.oa: "这是一场只有响亮名字的改革。"
 eafp_kor_mainline.227.mt: "未竟的理整"
 eafp_kor_mainline.227.md: "三政理整厅纠正了一些弊端，但缺乏根除三政混乱的力量。"
 eafp_kor_mainline.227.mf: "“几个城镇喘了口气，几本账本被纠正了。然而，军布、还谷和田税的复杂症结并没有轻到可以被一个专门机构完全解开。”"
 eafp_kor_mainline.227.oa: "不过，这也不是说什么都没做。"
 eafp_kor_mainline.228.mt: "理整三政"
 eafp_kor_mainline.228.md: "三政理整厅在规定期限内取得了显著成果，开始打破长期的剥削和腐败链条。"
 eafp_kor_mainline.228.mf: "“田政收回了账本，军政取消了无名军布，还谷也逐渐摆脱了扼杀百姓的枷锁。朝廷的命令终于开始传达到城镇的各个角落。”"
 eafp_kor_mainline.228.oa: "改革留下了明显的成果。"
 eafp_kor_mainline.229.mt: "三政大改革"
 eafp_kor_mainline.229.md: "三政理整厅取得了超出预期的成果，为从根本上纠正朝鲜长期存在的民生问题奠定了基础。"
 eafp_kor_mainline.229.mf: "“八道的账本更新了，长期以来对军布的怨恨平息了，还谷的弊端也得到了极大的遏制。百姓不再带着怨恨记住官府的名字，而是第一次将其作为救赎的名字记住。”"
 eafp_kor_mainline.229.oa: "这才是真正的革除三政。"
 eafp_kor_mainline.230.mt: "庇护者的死亡"
 eafp_kor_mainline.230.md: "随着设立并推动三政理整厅的国王离世，改革机构失去了政治庇护者并瓦解了。"
 eafp_kor_mainline.230.mf: "“根据国王意愿设立的官府，在国王的意愿消失后，并没有坚固到能够独立存在。大臣们评估了新局面，官员们又开始看眼色行事。”"
 eafp_kor_mainline.230.oa: "改革失去了主人。"
 #

 eafp_kor_mainline.298.mt: "完成量田"
 eafp_kor_mainline.298.md: "随着朝鲜八道的官府测量土地并据此发放地契，田税可以明确地征收了。"
 eafp_kor_mainline.298.mf: "1. 拥有田地的 [ROOT.GetCountry.GetNameNoFormatting] 人民必须持有此官契，旧契作废并上交本衙门。\n\n1. 田地或房屋所有者买卖、转让该房产时，必须换领官契，若是典当，必须在获得相关地方官府许可后进行。\n\n1. 除 [ROOT.GetCountry.GetNameNoFormatting] 人民外，任何人都没有拥有田地的权利。因此，任何借名或私自买卖、典当、转让的人都将受到法律的最高惩罚，由于田地属于原登记人，所有田地将全部没收充公。"
 eafp_kor_mainline.298.oa: "这样情况应该会好转。"

 eafp_kor_mainline.299.mt: "中兴"
 eafp_kor_mainline.299.md: "以军政、还谷、田政为代表的三政混乱终于被革除。官员的腐败和操纵被扫除，百姓的负担大大减轻。"
 eafp_kor_mainline.299.mf: "国王下旨说：\n\n“听说百姓的苦难减轻了，我感到非常高兴。这确实是祖宗的恩德和臣子们的忠诚。现在百姓免受不合理的征收，仓库充实了，田政公平了，民心太平了，这难道不美好吗？”"
 eafp_kor_mainline.299.oa: "实现了为民之政。"

 ##300号~399号 - 权力分享相关事件

 eafp_kor_mainline.301.mt: "恢复流放者？"
 eafp_kor_mainline.301.md: "出现了关于恢复金正喜等人职务的讨论。"
 eafp_kor_mainline.301.mf: "“万万不可，殿下！他们侮辱朝廷的罪过不轻，怎么能这么快就把他们召回来？”\n\n“他们又不是逆贼，如果已经充分反省了，有何不可？不过对于那些权势滔天的家族来说，这可能是个眼中钉吧。”\n\n“赵大人！这是什么狂言！我倒想知道这番诽谤背后是什么意图！”\n\n“他昨天肯定喝多了，殿下。这里的所有人都是只忠于殿下的大臣。所以，暂时搁置对此事的讨论如何……”"
 eafp_kor_mainline.301.oa: "我只是随口一说。"

 eafp_kor_mainline.302.mt: "恢复流放者"
 eafp_kor_mainline.302.md: "下令释放金正喜。"
 eafp_kor_mainline.302.mf: "“……因此，我决定释放金正喜、赵秉铉和李趾渊等还活着的人，并恢复死者的名誉。”\n\n“但是殿下……”\n\n“够了！这是已经决定的事情，不要再说了。”"
 eafp_kor_mainline.302.oa: "今天的朝会到此结束。"
 eafp_kor_mainline.302.ob: "啊！我还应该给他们合适的官职！"

 eafp_kor_mainline.303.mt: "小小的安保骚动"
 eafp_kor_mainline.303.md: "报告了宫内的一起小骚乱。"
 eafp_kor_mainline.303.mf: "“……因此已经采取了措施，调查显示没有造成额外损失。”\n\n“是吗？”\n\n“是的。此外，我们已经严格指示了负责警卫的士兵，所以请您不要担心……”"
 eafp_kor_mainline.303.oa: "也许……需要更 #V 系统的对策#!……？"

 eafp_kor_mainline.304.mt: "新军营"
 eafp_kor_mainline.304.md: "下旨将总戎厅升格为总卫营。"
 eafp_kor_mainline.304.mf: "“我仔细想了想上次发生的事，怎么想都觉得宫廷警卫太疏忽了。”\n\n“殿下。我们深感抱歉，但我们已经严厉训诫过他们，绝不会再发生同样的事，请您放心。”\n\n“我什么时候说你们不努力了！你们怎么能说得像事不关己一样轻松？”\n\n“臣无话可说……”\n\n“所以……从今天起，我决定由总戎厅重新负责宫廷警卫，并将其地位升格为总卫营。”\n\n“……什么？”"
 eafp_kor_mainline.304.oa: "哦，还有，制定总卫营的条例，将其制度化！"

 eafp_kor_mainline.305.mt: "抄启文臣制度？"
 eafp_kor_mainline.305.md: "与我发掘的官僚一起……"
 eafp_kor_mainline.305.mf: "据说先王正祖大王因为其卓越的学识，在经筵上反而教导臣子，并亲自选拔和教导人才，与他们共同处理国政……\n\n……我也能那样做吗？"
 eafp_kor_mainline.305.oa: "我需要培养追随我的人。"

 eafp_kor_mainline.306.mt: "培养人才"
 eafp_kor_mainline.306.md: "重新引入抄启文臣制度。"
 eafp_kor_mainline.306.mf: "“因此！我希望遵循正祖大王时代的旧例，延续他美好的初衷。”\n\n“殿下。但臣恭敬地认为，现在的官员在各自的岗位上已经做得够好了，所以恳请您重新考虑。”\n\n“呵呵……连你这个当年被正祖大王亲自拔擢才坐到今天这个位置上的人，也敢说出这种话？你为什么要反对培养后辈学者？你想过河拆桥吗？还是你想说我的学识太差了？？？”\n\n“不……不是那个意思！”\n\n“你接着说！”"
 eafp_kor_mainline.306.oa: "权敦仁在吗？今后这件事我想交给你……"

 eafp_kor_mainline.307.mt: "国王的手，国王的脚"
 eafp_kor_mainline.307.md: "对地方的控制力来自严格的监察……"
 eafp_kor_mainline.307.mf: "我们之前派守令到各镇去治理，是为了根据朝廷的意愿在各地行使统治权。\n\n然而，如今派下去的地方官与地方豪族勾结进行勒索，甚至本应牵制他们的谏官也和他们沆瀣一气，真是令人忧心忡忡。\n\n为了看他们是否按照我的话做事，最终我需要秘密派御史去视察，但谁可靠到能胜任这项工作……"
 eafp_kor_mainline.307.oa: "等等……我不是有选拔出来的人才吗？"

 eafp_kor_mainline.308.mt: "暗行御史出动！"
 eafp_kor_mainline.308.md: "向每一个角落派遣可靠的御史。"
 eafp_kor_mainline.308.mf: "“我之前恢复先王的制度并选拔你们，是为了认可你们的才干并委托你们重任。”\n\n“圣恩浩荡……！”\n\n“从明天起，你们将下到八道的各个地区，把你们所见所闻详细地写下来报告给我，如果有弊端，就凭良心严厉纠正。听明白了吗？”"
 eafp_kor_mainline.308.oa: "我非常信任你们，所以不要辜负这份信任……"
 eafp_k308_event_tt: "向全国派遣新选拔的暗行御史。\n#color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#! 引起 #V 地方剥削#! 的概率降低 #P -50%#!，持续 #V 2年#!！"

 eafp_kor_mainline.309.mt: "三望"
 eafp_kor_mainline.309.md: "损坏的天平"
 eafp_kor_mainline.309.mf: "三望。\n也称为备三望或荐望，这是一种长期实施的惯例制度，一种人事制度的形式。为了防止不合格的人承担重大任务或官员的专横，每个机构推荐三名合适的人选，由国王选择其中一人任命。\n\n然而，这个牵制王权的制度如今被滥用为权贵家族垄断人事权并只推荐符合他们家族口味的人的工具。我们需要一种方法来绕过这个问题。\n\n其实……如果我想的话，并没有法律规定我必须从他们之中选择……"
 eafp_kor_mainline.309.oa: "等等，没有什么是不可能的，对吧？"

 eafp_kor_mainline.310.mt: "中批"
 eafp_kor_mainline.310.md: "牵制的突破口"
 eafp_kor_mainline.310.mf: "中批。\n不经过三望或选拔，由国王特命任命官员的行为。\n\n这是一种被称为‘特旨’的手段，由我作为国王直接任命，绕过现有的私人官员任命程序。\n\n既然现有的三望已经失去了它应有的功能，只起到了蒙蔽我视听的作用，那么拿出这种非常手段来培养忠诚的亲卫势力是合适的……"
 eafp_kor_mainline.310.oa: "徐左辅，这个人很适合当兵曹判书！"
 #eafp_kor_mainline.310.ob: "我也应该用特旨把尹定铉包括进来吗？嗯……"

 # eafp_kor_mainline.311 없음
 # eafp_kor_mainline.312 없음

 eafp_kor_mainline.313.mt: "号手们"
 eafp_kor_mainline.313.md: "代表私利而非国家利益的三司"
 eafp_kor_mainline.313.mf: "根据自己的信念，表达与国王和大臣意愿相反的意见，可以抑制副作用并促进正确的思想。过去负责这种监察和言论的人被单独设立，称为言论三司。\n\n……然而，本应成为国家耳目的司宪府对金氏家族的专横闭眼塞听；本应成为国家喉舌的司谏院，却像号手一样代表金氏家族的私欲喋喋不休。三司的功能早就名存实亡了。"
 eafp_kor_mainline.313.oa: "谁来监视监视者？"

 eafp_kor_mainline.314.mt: "清洗三司"
 eafp_kor_mainline.314.md: "罢免阿谀安东金氏的三司官员。"
 eafp_kor_mainline.314.mf: "“我明确下令不要再提那件事了，今天早上堆积如山的这些上疏是怎么回事？”\n\n“殿下。这是我们司谏院的官员出于信念提交的上疏，要求您撤回上次下达的释放命令。而且臣也认为……”\n\n“呵呵呵……我之前命令司宪府的官员对包括金兴根在内的几个人进行集中监察，为什么到现在还没有消息？”\n\n“什么？啊，那个……我听说他们得出结论，即使经过了细致的调查，也没有发现什么特别的贪污腐败。相反，司宪府强烈主张必须赐死赵秉铉……”\n\n“呵呵呵呵呵”"
 eafp_kor_mainline.314.oa: "看到台谏官员日夜劳作，我感动得流下了眼泪。\n这是作为奖赏下达的特命，所以 #N 你们去好好休息一下吧。#!"

 eafp_kor_mainline.315.mt: "弹劾"
 eafp_kor_mainline.315.md: "大司谏徐相乔弹劾金兴根。"
 eafp_kor_mainline.315.mf: "“古语有云，‘见对国王不敬，臣子当如鹰逐雀。’因此，臣请求说一句话……”\n“……他的本性极其残忍，行为狡诈，这是没有办法的事。对于权贵，他表面上似乎不乐意，但内心却实实在在地觊觎着。他表面上装作不干涉国事，但内心却亲自指挥。为了陷害意见不同的人，他擅长蒙蔽视听；为了提拔他喜欢的人，他善于借刀杀人。他进出宫廷，没有丝毫敬畏之心，而且有明显的迹象表明他在监视宫廷警卫并结党营私……”\n“……那么，在明辨好恶、严格区分善恶的治理中，怎么会没有瑕疵呢？在臣看来，理应迅速对金兴根执行流放之法，让他成为那些作为臣子背弃恩典、背叛国家的人的戒样。”\n\n“这是诬陷！殿下，他为国家效力了这么久，您不能只听信传言就流放一位忠臣！”"
 eafp_kor_mainline.315.oa: "冷静点。我们先继续听大司宪说……"

 eafp_kor_mainline.316.mt: "钓到大鱼"
 eafp_kor_mainline.316.md: "流放金兴根。"
 eafp_kor_mainline.316.mf: "“我前几天命令对庆尚监司[SCOPE.sCharacter('eafp_char_sedo_heunggeun').GetFullName]执行罢职的刑罚，是因为他家世代功劳深厚，近来对他的照顾和待遇也很优厚。所以我质问，‘如果真的没有做错事，别人怎么会说闲话？’听到关于这种人的这种话，我不得不责备他，要求他做到与其名声相符的完美。”\n\n“但现在……看到朴孝默、李胜辅等人今天如此恳切地请求流放他，我要说，之前的措施也是出于深厚的期望和对完美的恳切责备。罢职并不是轻罚，但最终保全他也是我的苦恼。即使你们的上疏接连不断，也绝不能改变我的主意。”\n\n“……然而，考虑到重视台谏是为了尊重朝廷，开展公论是为了优待世臣……”"
 eafp_kor_mainline.316.oa: "根据特别请求，对[SCOPE.sCharacter('eafp_char_sedo_heunggeun').GetFullName]执行流放光阳县的刑罚。"

 eafp_kor_mainline.317.mt: "委以重任"
 eafp_kor_mainline.317.md: "秘密将朴珪寿召入宫中。"
 eafp_kor_mainline.317.mf: "“我太晚认出你了……我感觉自己剩下的时间不多了。”\n\n“圣恩浩荡，殿下。这些话对臣来说太不敢当了。”\n\n“我深知我的父亲孝明世子很赏识你。我将委你以重任，以后我们一起共谋大事吧。”"
 eafp_kor_mainline.317.oa: "今天的事暂时保密……"

 eafp_kor_mainline.318.mt: "孤独的天才"
 eafp_kor_mainline.318.md: "流逝的时光"
 eafp_kor_mainline.318.mf: "“你听说了吗？朴珪寿，那个隐居了十几年的人，现在？”\n\n“皇上可能只是在试探，别太当真了。”\n\n“你是不是太安逸了？他可能一夜之间被委以重任。”\n\n“如果是赵家的人倒也罢了，但他毫无背景，怎么可能？不管皇上怎么想宠幸他，凡事都有能做和不能做的。”"
 eafp_kor_mainline.318.oa: "龙冈县令朴珪寿等待着朝廷的信件。"

 eafp_kor_mainline.319.mt: "喜讯"
 eafp_kor_mainline.319.md: "任命书送达。"
 eafp_kor_mainline.319.mf: "在地方官任上苦苦等待的朴珪寿收到了朝廷的信件。\n\n里面终于传达了希望委他以高官重任的消息。"
 eafp_kor_mainline.319.oa: "欢迎回到中央政界。"
 eafp_kor_mainline.319.ob: "我任命他为成均馆大司成！"

 eafp_kor_mainline.320.mt: "悲报"
 eafp_kor_mainline.320.md: "主上驾崩了。"
 eafp_kor_mainline.320.mf: "在地方官任上苦苦等待的朴珪寿收到了朝廷的信件。\n\n遗憾的是，信中说，那位打算重用他的国王，在克服大臣们的反对之前就驾崩了。"
 eafp_kor_mainline.320.oa: "真是个悲剧。"

 eafp_kor_mainline.321.mt: "谋反"
 eafp_kor_mainline.321.md: "徐光近的告发揭露了一起谋反阴谋！"
 eafp_kor_mainline.321.mf: "由于一个叫徐光近的人密谋不法行为，本打算设立一个特别机构，但命令捕盗厅先进行搜查和核实。结果发现，以闵晋镛为首的四名主谋，包括朴顺寿和李元德，正在秘密策划大逆不道的阴谋。\n\n既然已经明确供认了他们的谋反和大逆不道，他们的罪行理应凌迟处死。关于被怀疑与该团伙有牵连的李元庆，决定迅速将他流放到江华岛并施以围篱安置。"
 eafp_kor_mainline.321.oa: "继续审问以揭露其他罪行，并坚定地查明涉案人员。"

 eafp_kor_mainline.322.mt: "赐死"
 eafp_kor_mainline.322.md: "在审问过程中，拥立[SCOPE.sCharacter('eafp_char_yi_wongyeong').GetFullName]的目的暴露了！"
 eafp_kor_mainline.322.mf: "在对告发的调查中发现，数十名学者签署了一份文件，旨在拥立思悼世子的庶长子恩彦君的孙子[SCOPE.sCharacter('eafp_char_yi_wongyeong').GetFullName]。还发现了他本人写下‘既承父教不忘于心’的手书的嫌疑。\n\n因此，立即将他从江华岛召回进行审问。在三司和义禁府官员连篇累牍的弹劾和上疏中，[SCOPE.sCharacter('eafp_char_yi_wongyeong').GetFullName]被流放到济州并施以围篱安置，不久后被赐死。"
 eafp_kor_mainline.322.oa: "另外，将李元庆的同父异母弟弟李景应（#V 李元范#!）流放到江华岛并围篱安置。"

 eafp_kor_mainline.323.mt: "学习"
 eafp_kor_mainline.323.md: "大王大妃召见时任和原任大臣，讨论国王的学业进展。"
 eafp_kor_mainline.323.mf: "“今天主上接受了大命，这可以说是宗庙社稷的无量之福。但是，对于主上来说，这只是个开始，成就君德完全在于学习。如果国王不学习，怎么治理国家？……宗庙社稷至关重要，主上又是新即位，所以我再次召见你们各位大臣来提供教导。”\n\n对此，[SCOPE.sCharacter('eafp_char_yangban_leader').GetFullName]等人齐声禀报：\n“臣等理当竭尽诚心和心力，努力提供一些帮助，但臣等认为这件事也取决于慈圣殿下在内廷的引导。”\n\n大王大妃说：\n“今天是主上登基的第一天。因此，我将首先就几个条款教导他：爱护百姓、勤奋学习、勤俭节约、礼遇群臣、尊敬大臣等，并召集各位大臣旁听。如果主上日后的一举一动稍微违背了这些告诫，大臣们理应今天我所说的话来责备他。”\n“如果要读书，应该从哪本书开始？”\n\n郑元容禀报：\n“最好从《史略》开始，稍微理解了文理之后，再继续学习经书。”"
 eafp_kor_mainline.323.oa: "我为了不想死而远离书本，现在却必须为了活下去而学习？"

 eafp_kor_mainline.324.mt: "嘱托"
 eafp_kor_mainline.324.md: "大王大妃下旨要求国王爱护百姓，专心学问。"
 eafp_kor_mainline.324.mf: "“即使在这样无尽的悲痛中，能找到一个人来托付五百年的宗庙社稷也是幸运的。作为英祖的血脉，你过去面临了许多困难，长期生活在乡下。然而，在古代的帝王中，也有生长在民间的人，他们充分了解百姓的疾苦，以‘爱民’为施政的主要原则，最终成为了明君。现在的你也必须熟知百姓的事务……你必须专心致志，永远不要忘记‘爱民’这两个字。”\n\n“虽然我不知道你过去的学业如何，但如果一个人不学习，就会对过去一无所知；如果对过去一无所知，就无法治理国家。无论你多么悲伤和心神不宁，你必须经常接见儒臣，讨论经书，逐渐熟悉圣贤的心法和帝王的治国方略，然后你处理事务才能得当。”\n\n“虽然国王极其尊贵，但绝没有轻视朝廷官员的道理。以礼相待大臣，大臣们禀报的话中不会有错，所以我希望你能真诚地倾听并铭记在心。”"
 eafp_kor_mainline.324.oa: "“我恭敬地……遵命。”"

 eafp_kor_mainline.325.mt: "罪人逆转的世界"
 eafp_kor_mainline.325.md: "大司宪李景在根据上疏请求惩罚尹致英等人。"
 eafp_kor_mainline.325.mf: "“阅读姜汉赫和李正斗的上疏，他们说全国上下群情激愤，根据王法理应将他斩首。啊！赵秉铉的千罪万恶，几年前台谏的评论就已经定案，大行大王也明显表现出疏远他的意思，他却还公然抱怨。全世界指责他、有识之士感到心寒已经很久了。去年徐相乔评论金兴根时，他说，‘有偷窥宫廷警卫并明显企图结党营私的迹象。’仅仅‘宫廷警卫’这四个字就已经侵犯了最严密的地方，而提到‘结党营私’则是犯了强加于人的罪过。主张这一点的是尹致英，指使的也是尹致英。在臣看来，您应该命令王府严厉审问尹致英和徐相乔，并迅速纠正刑法。”"
 eafp_kor_mainline.325.oa: "所以……你的意思是这个赵秉铉是个连先王都疏远的坏人，而金兴根是被徐相乔诬陷的……是这样吗？"

 eafp_kor_mainline.326.mt: "复仇"
 eafp_kor_mainline.326.md: "众多台谏和大臣请求惩罚赵秉铉。"
 eafp_kor_mainline.326.mf: "大司谏任百秀提交上疏，请求按照台官的请求批准关于赵秉铉的事情，并严厉审问尹致英等人。执义申佐模提交上疏，请求迅速对赵秉铉等人执行流放海岛绝岛的刑罚，并严厉审问徐相乔等人。司谏睦仁培提交上疏，请求迅速批准司宪府关于赵秉铉等人的请求，并严厉审问尹致英等人。大司宪李敦荣提交上疏，请求按照台官的请求迅速批准关于赵秉铉等人的事情，并设立特别机构查明尹致英等人的真相。时任和原任大臣联名请求迅速批准台官关于赵秉铉等人的请求。\n\n大王大妃下令将流放绝岛并施以围篱安置的罪人赵秉铉赐死。"
 eafp_kor_mainline.326.oa: "这是无可奈何的事。"
 eafp_kor_mainline.326.ob: "围篱安置难道还不够惩罚吗？"
 eafp_kor_mainline.326.oc: "他真的是罪犯吗？"

 eafp_kor_mainline.328.mt: "销毁记录"
 eafp_kor_mainline.328.md: "大王大妃下令销毁属于恩彦君家族的所有文书。"
 eafp_kor_mainline.328.mf: "既然大王大妃之前下令恢复我祖父的长子常溪君夫妇的爵位，今天她又下令彻底销毁属于我祖父恩彦君家族的前后所有文书。\n\n“通过解决50年来的冤案，现在已经没有遗憾了，这一切都出自国王的诚心。派一位大臣去恩彦君夫妇的祠堂举行祭祀。”"
 eafp_kor_mainline.328.oa: "至少现在我不再需要被逆贼家族的枷锁所束缚了。"

 eafp_kor_mainline.330.mt: "礼讼"
 eafp_kor_mainline.330.md: "辛亥祧迁礼讼"
 eafp_kor_mainline.330.f1: "虽然我继承了先王的大统，但在王室的谱系中，我被登记为纯祖大王的儿子。最终，这个关于血统的问题还是找上了我。\n\n事情的起因是关于先王们的称呼问题……但目前已经升级为是否将真宗从宗庙中‘祧迁’（移出神主牌位到单独的祠堂）的问题。朝廷主要分为两派：‘不祧派’认为真宗是我的曾祖父，所以不能移出；‘祧迁派’则认为由于王位继承的重要性，我和先王之间存在父子之义，所以真宗必须被移出。\n\n你可能会问这种琐碎的礼法争议有什么意义。那是在江华岛生活的我……然而，作为现在已经成为国王的人，我不得不承认，这个问题最终影响了我的正统性和国家的根基。\n\n经过无数次的辩论和讨论，安东金氏家族说服了许多大臣，巩固了祧迁派作为压倒性的公众舆论，权敦仁则发现自己处于必须承担责任并被流放的境地。\n\n……然后……\n\n“我们请求对被流放的罪人权敦仁进一步执行适用的法律。啊！金正喜是个狡猾的小人……他怎么能这么残忍？我们请求将他流放到岛上。”\n\n无数的上疏如雪片般飞来，要求惩罚被指为幕后黑手的金正喜。"
 eafp_kor_mainline.330.f2: "虽然我继承了先王的大统，但在王室的谱系中，我被登记为纯祖大王的儿子。最终，这个关于血统的问题还是找上了我。\n\n事情的起因是关于先王们的称呼问题……但目前已经升级为是否将真宗从宗庙中‘祧迁’（移出神主牌位到单独的祠堂）的问题。朝廷主要分为两派：‘不祧派’认为真宗是我的曾祖父，所以不能移出；‘祧迁派’则认为由于王位继承的重要性，我和先王之间存在父子之义，所以真宗必须被移出。\n\n你可能会问这种琐碎的礼法争议有什么意义。那是在江华岛生活的我……然而，作为现在已经成为国王的人，我不得不承认，这个问题最终影响了我的正统性和国家的根基。\n\n经过无数次的辩论和讨论，安东金氏家族说服了许多大臣，巩固了祧迁派作为压倒性的公众舆论，权敦仁则发现自己处于必须承担责任并被流放的境地。"
 eafp_kor_mainline.330.oa: "关于礼法的事情，各位大臣……你们自己决定吧。"
 eafp_kor_mainline.330.ob: "我不明白。最初关于金正喜的话就已经够残酷了，怎么还能继续下去？"

 eafp_kor_mainline.331.mt: "蔡喜载之乱"
 eafp_kor_mainline.331.md: "在黄海道企图谋反的人被发现了！"
 eafp_kor_mainline.331.mf: "幸运的是，这次事件的所有主谋都因为团伙中一个叫高成郁的人事先告发而被捕。事件始于一个居住在黄海道延安府的叫金应道的人。\n\n他拜访了居住在椒岛的思明世子的后代李明燮、李明赫兄弟，并煽动他们。不久之后，一个叫蔡喜载的人也拜访了兄弟俩，交给他们一个拥立他们的险恶计划，让明燮成为傀儡，金应道和蔡喜载作为谋士共同策划。\n\n其中，明燮在押送汉阳的途中病死，他的弟弟明协被流放到咸镜道，以蔡喜载为中心的三个主谋被凌迟处死。"
 eafp_kor_mainline.331.oa: "我的权威什么时候才能稳固确立啊……"

 eafp_kor_mainline.332.mt: "王妃拣择"
 eafp_kor_mainline.332.md: "安东金氏家族金汶根的女儿被选中，举行了嘉礼。"
 eafp_kor_mainline.332.mf: "在大提学赵斗淳撰写的教命文中写道：\n“乾坤合德，万物赖覆载之功；日月齐明，八表被王化之光。念久荷之重任，特待内外之同成。啊！尔金氏，端长于乔木世臣之家，著徵祥之符瑞。首倡四世之明义，上效文正公之大节，作为同宗之近属，中与孝显后为一家。”\n\n此外，在知中枢府事徐箕淳撰写的玉册文中写道：\n\n“关雎为王道之基，坤象协乾元之始，是以贤辅之美德，乃人伦之肇端。尔金氏，乃忠良华阀之后，诗礼世家之门。早彰谦抑之美名，思继圣母之徽音。端庄谨饬，柔顺温恭。群情咸颂其宽仁，巨禄将永绥于无疆。是用告诫，咸使闻知。”"
 eafp_kor_mainline.332.oa: "难道连我的伴侣也必须照单全收吗！"
 eafp_kor_mainline.332.ob: "不过，这个女人难道不是无辜的吗……"

 eafp_kor_mainline.333.mt: "赦免赵秉铉"
 eafp_kor_mainline.333.md: "大臣们反对赦免赵秉铉。"
 eafp_kor_mainline.333.mf: "左副承旨李源祚禀报：\n“臣恭敬地查看了传教，其中有迅速释放罪人赵秉铉的命令。这个罪人犯下的背叛罪恶是什么，关系有多么重大？去年秋天的赦免恩典已经误导了刑罚。虽然殿下想要保全他的心意极其令人尊敬，但严厉的王法很难突然放松。恳请圣明立即收回这个命令。”"
 eafp_kor_mainline.333.oa: "我怎么会不加深思熟虑就这么做呢？立即颁布。"
 eafp_kor_mainline.333.ob: "既然各位大臣这么说……"

 eafp_kor_mainline.334.mt: "冬至谢恩正使"
 eafp_kor_mainline.334.md: "前往[SCOPE.sCountry('chi_scope').GetName]的庆平君、任百秀和金昌洙入宫觐见。"
 eafp_kor_mainline.334.mf: "国王说：“史官分坐左右”，然后命令三位使臣上前。三位使臣走上前，国王说：“去远方平安归来。”\n\n对此，使臣们禀报：“臣等以不足的资格竟敢接受这伟大的命令。早晚战战兢兢，不敢不竭尽诚心。然而，臣等年幼且才学不足，不知道如何能担当此命并免于罪责。”"
 eafp_kor_mainline.334.oa: "仔细探查那片土地的民心和土匪的情况，同时仔细探查我国沿途各地的民心。"

 eafp_kor_mainline.335.mt: "恢复金鲁敬职务"
 eafp_kor_mainline.335.md: "大臣们反对恢复金鲁敬的职务。"
 eafp_kor_mainline.335.mf: "大司宪金鏔、大司谏任百能、掌令李杓、持平金寿仁、献纳李赫渊、正言李厚善、玄必济等人上疏说：\n\n“臣等恭敬地查看了原意的批旨，其中有特别恢复罪人金鲁敬官职和爵位的命令。臣等面面相觑，惊恐万分，捶胸顿足，不知所措，不知道在这清明之世怎么会有这种出人意料的过分措施。啊，这个罪人的处境如何，他受到的待遇又如何？说起他的罪行，证据确凿无法掩盖；论起他的罪名，关系极其重大。生前被宽恕虽然蒙受了特别的恩典，但死后被削去官职是他自己造的孽，难以逃避。线索依然存在，百篇上疏也未被抹去，公论的严厉程度可想而知。现在殿下的这个措施，实在不是臣等平时所依赖的圣明殿下。因此，我们斗胆共同恳求，冒犯您的威严，恭敬地恳求您特别考虑并迅速收回命令，以保全防备大计，并将其作为凝聚众人意志的方法。”"
 eafp_kor_mainline.335.oa: "难道你们就不考虑龟州家族的后果吗？立即颁布。"
 eafp_kor_mainline.335.ob: "寡人被个人感情所牵动，怜悯老臣的处境，确实太过分了。"

 eafp_kor_mainline.337.mt: "恢复洪麟汉职务"
 eafp_kor_mainline.337.md: "大臣们反对恢复洪麟汉的职务。"
 eafp_kor_mainline.337.mf: "“臣等并非不知道殿下广施恩惠的极其仁慈和伟大的美德。然而，最应该严格的是王法，最难以阻挡的是公论。如果王法不明确，防线将进一步崩溃；如果公论不展开，道义和伦理将逐渐暗淡。这将导致国家不像国家，百姓不像百姓的状态，怎么能不让人深感恐惧呢？因此，台谏接连不断地严厉提交启辞和箚子，不敢采取顺从的态度。恭敬地恳求圣明的智慧深思熟虑，高瞻远瞩，特别撤回宽大的决定，立即收回命令。我们恳切地希望您能让国家的法度保持一致性，让百姓的心能够凝聚在一起。”"
 eafp_kor_mainline.337.oa: "决定已经做出了，为什么还要这样争论不休？立即颁布。"
 eafp_kor_mainline.337.ob: "既然各位大臣这么说，传教暂且收回。"

 eafp_kor_mainline.339.mt: "徐大淳的上疏"
 eafp_kor_mainline.339.md: "大司宪徐大淳上疏弹劾庆平君。"
 eafp_kor_mainline.339.mf: "大司宪徐大淳上疏说：\n\n“啊，那个庆平君到底安的什么心，竟敢捏造人类难以入耳的话，并试图用它们来掩饰？他在宫廷的公共场合毫不避讳地说这些话，完全没有顾忌。人们可以说世界变了，没有什么是不可能发生的。殿下智慧明亮，怎么会被毫无根据的谣言所动摇？然而，小人的窃窃私语和狡猾的诡计，其程度是非常可怕的。两个家族的处境如何，他们的忠诚和勤奋又如何？如果他们背负着这样的恶名，将无法向先王报告这件事，如果朝廷的官员感到不安，这难道不是与国家安全密切相关的事情吗？”"
 eafp_kor_mainline.339.oa: "流放庆平君，废除他入宫的权利。"
 eafp_kor_mainline.339.ob: "审问庆平君。"
 eafp_kor_mainline.339.oc: "别再拿这事烦我了。"

 eafp_kor_mainline.340.mt: "宗系辨诬"
 eafp_kor_mainline.340.md: "知事尹致秀请求派使臣纠正王室谱系。"
 eafp_kor_mainline.340.mf: "知事尹致秀上疏，大致说道：\n\n“臣偶然看了最近在从北京购买并带回来的一本名为《二十一史约编》的书。看到其中关于我国条款的宗系和传承仍然沿袭着无休止的错误记录，臣的心因为震惊而狂跳，感到刺骨的愤慨，以至于不想活了。在臣看来，派使臣全面报告并请求迅速纠正，是继承祖宗积累的诚心和殷切期望的正义之举，这将安抚全国臣民崩溃和愤慨的心情。恭敬地恳求您首先将臣的这份上疏发往朝廷，作为广泛询问和讨论的基础。”"
 eafp_kor_mainline.340.oa: "现在看到你的上疏，实在太令人震惊和气愤了，我一刻也不敢心安。理当向大臣们询问。"

 eafp_kor_mainline.341.mt: "宗系辨诬"
 eafp_kor_mainline.341.md: "从燕京发来的报告称，陈奏使已将《约编》中的错误部分更正。"
 eafp_kor_mainline.341.mf: "“臣等上个月22日向礼部呈递了公文，相关部门举行了会议，将《约编》中错误的部分进行了更正。事情结束后，计划购买一套原书，在复命的那天呈上。”"
 eafp_kor_mainline.341.oa: "使臣的任务顺利完成，真是无上的幸运。"

 eafp_kor_mainline.342.mt: "四色党派"
 eafp_kor_mainline.342.md: "大院君与金炳冀的问答"
 eafp_kor_mainline.342.mf: "大院君说：\n\n“我打算把千里压缩成咫尺，把泰山削成平地，把南大门加高到三层。各位意下如何？”\n\n当许多宰相不知道该怎么回答时，金炳冀禀报：\n\n“如果要把千里压缩成咫尺，它就会变成咫尺；如果把南大门加高到三层，它就会变成三层。现在大监您有什么做不到的？但是，泰山就是泰山；怎么能轻易把它变成平地呢？”\n\n然后他走了出去。"
 eafp_kor_mainline.342.oa: "他在自吹自擂。"

 eafp_kor_mainline.343.mt: "议政府与备边司"
 eafp_kor_mainline.343.md: "大臣们陈述了正确施政的原则和各种弊端。"
 eafp_kor_mainline.343.mf: "大王大妃说：\n\n“虽然议政府和备边司都叫‘庙堂’，但文书只在备边司处理，这是极其奇怪的。从现在开始，最好分开处理。”\n\n对此，金左根禀报：\n\n“朝廷的重大事务只在备边司管理，而议政府不能干预，确实如慈圣殿下所言。然而，由于这是流传了数百年的做法，我们将退下去讨论并做出决定。”\n\n赵斗淳禀报：\n\n“前相臣崔鸣吉曾多次说过，备边司成立后，议政府变成了一个无所事事的机构，甚至在奏折中也提到了这一点。现在既然接到了慈圣殿下的命令，这是非常正确的。我们将退下去从多方面进行讨论，然后再次禀报。”"
 eafp_kor_mainline.343.oa: "金左根禀报：\n“我们将共同讨论决定后，再行禀报。”"

 eafp_kor_mainline.344.mt: "权力分割？"
 eafp_kor_mainline.344.md: "大臣们报告了议政府的地位。"
 eafp_kor_mainline.344.mf: "金左根禀报：\n\n“随着备边司的设立，议政府变成了一个闲散的机构，这是有识之士在衡量其名与实时一直感叹的事情。上次接到大王大妃的命令后，我们退下去和各位同僚一起衡量并讨论了变通的方法。备边司成立已经300年了，所以目前我们应该在这两个机构之间适当地分配报告和推荐等任务，就像宋朝时的中书省和枢密院那样。最好制定详细规定相关官员的分配和各种条件的条例，提交批准并执行。”\n\n下旨说，“以此作为定式。”"
 eafp_kor_mainline.344.oa: "一派胡言。"

 eafp_kor_mainline.345.mt: "废除备边司"
 eafp_kor_mainline.345.md: "大王大妃下令将备边司并入议政府。"
 eafp_kor_mainline.345.mf: "大王大妃下旨：\n\n“议政府正是大臣们统帅百官、纠察所有政事的地方，它的重要性与其他官署截然不同。我不知道从什么时候开始，首尔和地方的所有事务都委托给了备边司，但从道理上看，有些事情是不能这样的。”\n\n“上次区分文书也是出于恢复旧规矩的愿望。既然议政府已经新建，从现在起，按照合并宗簿寺和宗亲府的先例，将议政府和备边司合并为一个机构。让备边司原样保留为议政府的咨询机构，将它的匾额雕刻并挂在大门的门框上，把‘庙堂’的匾额移到大厅挂起来，永远熔毁并销毁备边司的印章，并确保所有报告和文书的开头文字都写成‘议政府’。”"
 eafp_kor_mainline.345.oa: "“一般来说，关于体统或历史沿革的问题，大臣和议政府的堂上官应该参考旧规矩，详细商议并提交一份单独的清单。”"
 eafp_kor_mainline.345.tt: "#P 长期挥舞绝对权力的备边司退出了历史舞台。#!"

 eafp_kor_mainline.346.mt: "元子诞生"
 eafp_kor_mainline.346.md: "元子在卯时诞生了。"
 eafp_kor_mainline.346.mf: "“上天保佑宗庙社稷，赐予了元子的诞生；这确实是我国无上的喜事。慈圣殿下的喜悦想必是无与伦比的，所以到了第七天，我将亲自向大王大妃殿呈上致辞、笺文和衣物。然后，我将前往正殿接受祝贺。”"
 eafp_kor_mainline.346.oa: "“赦免并恢复所有被罢免的文官、荫官和武官的职务，并让相关部门将他们分配到军职。”"

 eafp_kor_mainline.347.mt: "上疏"
 eafp_kor_mainline.347.md: "崔益铉提交上疏。"
 eafp_kor_mainline.347.mf: "“这几个扰乱神圣宪法的问题，确实发生在殿下年幼尚未亲理国政的时期，所以并不都是殿下自己造成的。只是负责的官员蒙蔽了殿下的聪明，肆意弄权，导致国家纪律完全松懈，造成了今天的弊端。\n\n恭敬地，从今以后，殿下将行使您的权力，深思熟虑，勤勉工作，甚至废寝忘食。因此，您不会被世俗的意见和虚假的理论所左右，不会被亲信或有权势的官员欺骗，防止意气用事的现象，保持本心的纯洁，彻底消除欲望，让天理流行。\n\n在发布命令和采取措施时，应该执行的要像狂风暴雨一样猛烈地执行，应该消除的要像切断铁器一样果断地消除。因此，您应该经常发布命令，让朝臣们保持警惕，建立不容置疑的原则。将培养品德的责任交给贤明的老师，将任免官员和调和阴阳的责任交给政丞，将协助国王弥补不足和纠正错误的责任交给司宪府和司谏院。为了国王而讨论、思考和用正义之言启发国王的责任，应该交给儒臣。训练和选拔士兵以及防御外敌的任务，应该交给节度使。钱粮的收支和军事开支，应该交给相关官员。选拔孝顺正直的人和招揽学者的任务，应该交给监司。\n\n然而，对于那些不在这些位置上，仅仅属于宗亲行列的人，只应提高他们的地位并给予丰厚的俸禄，而不允许他们干预国家政治。不要违背或忘记《中庸》中关于九经的教导，以及《论语》中关于不在其位不谋其政的警告，以便您能日日自新。”"
 eafp_kor_mainline.347.oa: "“现在看户曹参判崔益铉的上疏，其中有很多逼迫我的句子。怎么能有这样的道理？这是非常荒唐的事，所以执行流放的法律。”"

 eafp_kor_mainline.348.mt: "上疏"
 eafp_kor_mainline.348.md: "李汇林提交上疏。"
 eafp_kor_mainline.348.mf: "“最近臣恭敬地听说，大院君阖下将居所搬到了宫外，对都城毫不关心，所以全国上下都感到怀疑和不安。因为臣在偏远的乡下，不知道是什么原因导致了这样的局面。是大院君阖下抛弃了繁华的地方去了安静的地方并且不马上回来，还是殿下决定顺从大院君的意愿，没有请求他早日归来？\n\n以大院君慈爱孩子的深厚感情，长期呆在遥远的地方是不合适的，而殿下拥有至深的孝心，也不能长时间不去拜访他。更何况现在边境的麻烦不断，外敌在寻找机会，我们不是更应该强调警惕和谨慎吗？\n\n即使大院君阖下去一个安静的地方不仅仅是为了居住，而是出于过分的行为，殿下也应该感到无比的惶恐，不知所措，并且应该用温和的话语来挽回父亲的心，平息他的激动。然而，虽然几个月来仔细倾听，但臣还没有听说采取了任何请求他回来的措施。臣实在不明白。不仅臣不明白，朝野上下都不明白。一般来说，这种措施无论从公从私来说，过了一天就多了一分不妥，过了两天就多了两分不妥。恭敬地恳求您，在几天内请求他定个日期回来。”"
 eafp_kor_mainline.348.oa: "“竟敢用迷惑和不安的话语强行牵扯附会，提交放肆的文章，这已经公然违反了名分和纪律，极其令人震惊。李汇林必须被逮捕和审问，以查明真相并明确他的罪行，但目前，先执行将他流放到极远边疆的刑罚。”"

 eafp_kor_mainline.349.mt: "疏儒"
 eafp_kor_mainline.349.md: "警告就大院君出行问题提交上疏的儒生。"
 eafp_kor_mainline.349.mf: "“最近，关于上疏的儒生一直吵吵闹闹的，这是什么原因？本来，大院君的出行只是为了安静地休息，但外面的人却认为好像发生了什么事。这段时间提交的上疏中的话大多是诽谤和逼迫的，暗中将大院君的出行归结为过分的行为，也断定我没有尽到诚心。这都是因为这些群体捏造不存在的事情，随心所欲地戏弄。即使是在平级或上下级之间，涉及伦理和纪律的事情人们也很难说出口，更何况是今天尊我为王的那些人呢？此外，即使大臣们谈论此事，他们也必定知道这些群体是不敬的，但他们却习以为常地看待它，不说一句谴责的话，这真是令人痛心。这个群体动不动就称‘动驾’，这近乎威胁。我动不动驾怎么能由这个群体的话来决定呢？\n\n大臣们都应该知道我的意图，所以退到宾厅，把带头上疏的儒生叫来，好好劝导他们，然后把他们送回去。这样做之后，如果还有人就此事上疏，那就是故意冒犯，我将坚决执行违抗上级的法律。”"
 eafp_kor_mainline.349.oa: "“大院君也因为这件事感到不安，所以我一再试图阻止他，但这样吵闹更是极其不敬的行为。”"

 je_korean_fading_power: "$eafp_kor_mainline.999.mt$"
 je_korean_fading_power_reason: "两班家族无法跟上瞬息万变的时代，正逐渐失去权力和影响力。"

 eafp_kor_mainline.999.mt: "逝去的权力"
 eafp_kor_mainline.999.md: "随着势道家族被清洗，三政的混乱被废除，朝廷的纪律得以确立。然而，在这个过程中，大多数两班家族正逐渐失去他们的政治影响力。"
 eafp_kor_mainline.999.mf: "有一天，当进士官玉正在看书时，他面对着烛光深思。意识到再也没有合适的办法来赡养母亲了，他悄悄地把妻子柳夫人叫来，说：\n“古圣人说，‘家贫亲老，不择官而仕’。我可能算不上什么贤士，但我打算把自己卖个好价钱，上以赡养母亲，下以救济家人。请你好好照顾母亲，真心侍奉她，这件事不要对任何人说。”\n\n柳夫人大惊失色，说：\n“夫君，您想错了。堂堂两班子弟，怎么能打算去哪里做奴仆呢？请您不要再考虑这种办法了。”\n\n进士笑着说：\n“我能怎么办？母亲眼看就要饿死了，弟弟和你们也面临着流离失所的境地，还有什么可顾忌的？过去，子路从百里之外背米，百里奚在逃亡途中打水，但后来他们都获得了荣誉并担任了高官。虽然我比不上他们，但怎么能介意一时的卑微和艰辛呢？”"
 eafp_kor_mainline.999.oa: "时代变了。"
 je_korean_fading_power_modifier: "$eafp_kor_mainline.999.mt$"
