 concept_eafp_regent_lv3_desc: "#V 效果#!\n• #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!可[concept_eafp_sedo_politics_pocket_money]@coin7!中等规模的[concept_treasury]资金。\n• #color:{0.5,0.8,1.0} [concept_eafp_sedo_family]#!可[concept_eafp_sedo_politics_pocket_money]@coin7!中等规模的[concept_investment_pool]资金。\n• 每当[Concept('concept_mobilize_army', '$concept_mobilize_army_mobilize$')]一支[concept_army]时，[concept_ruler]增加@eafp_stress_gain!#N +5#!点[concept_kor_stress]。\n#weak 同样适用所有先前阶段的效果。#!"
