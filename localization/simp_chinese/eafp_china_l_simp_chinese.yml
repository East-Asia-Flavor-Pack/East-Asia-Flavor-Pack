 chinese_westernization.102.t: "[SCOPE.sState('first_modern_arsenal_state').GetCityHubName]兵工厂"
 chinese_westernization.102.d: "应用了西方技术的最新武器工厂在[SCOPE.sState('first_modern_arsenal_state').GetCityHubName]开业了。"
 chinese_westernization.102.f: "随着新武器工厂的开业，军官们露出了自豪的神情。负责的西方工程师说：“我们将生产最好的武器。”\n\n[SCOPE.sCharacter('intelligentsia_leader').GetFullName]也表示同意，强调需要向西方学习。穿着蓝色工作服的工人们以精确和奉献精神开始了他们的工作。机器轰鸣声充斥着空气，标志着清朝的新起点。"
 # As the new weapons factory opened, officers looked on with pride. The Western engineer in charge spoke, \We'll produce the best weapons.\ \n\n[SCOPE.sCharacter('intelligentsia_leader').GetFullName] agreed, emphasizing the need to learn from the West. Workers in blue overalls began their tasks with precision and dedication. The sound of machinery filled the air, marking a new beginning for Qing.
 chinese_westernization.102.a: "师夷长技以制夷，这正是以夷制夷！"
 chi_first_modern_arsenal: "中国第一家近代兵工厂"

 chinese_westernization.103.t: "统一军事训练"
 # Unifying Military Training
 chinese_westernization.103.d: "目前，[ROOT.GetCountry.GetName]的军事训练由各省各自进行，导致军纪不一，部队之间缺乏协调。为了解决这个问题，政府提出了一项统一军事训练并由中央实施的计划。然而，许多总督和巡抚反对这项计划，认为它侵犯了他们的自治权，可能导致权力丧失。"
 # Currently, military training of [ROOT.GetCountry.GetName] is conducted separately in each province, leading to inconsistent standards and a lack of coordination between troops. To address this issue, the government has proposed a plan to unify military training and conduct it centrally. However, many provincial governors are against this plan, arguing that it infringes upon their autonomy and could lead to a loss of power.
 chinese_westernization.103.f: "清朝内部围绕军事训练中央集权化的争论引发了激烈的政治冲突。支持者认为，统一的军队对于抵御外部攻击和维护内部稳定是必要的。他们认为军事训练中央集权化可以确保统一的军纪并改善部队之间的协调。另一方面，反对者担心该计划破坏各省自治并可能导致权力集中在中央政府。他们担心他们省的军事资源会被耗尽，权力会被削弱。"
 # Within the Qing Dynasty, the dispute over centralizing military training has sparked a bitter political conflict. On the one hand, supporters of the idea claim that a unified army is required to safeguard the country from outside assault while also maintaining internal stability. They see centralizing military training as a way to ensure consistent standards and improve troop coordination. Opponents, on the other hand, worry that the plan undermines provincial autonomy and could lead to a concentration of power in the central government. They are concerned that their provinces' military resources would be drained and their power will be undermined.
 chinese_westernization.103.a: "强行推进。"
 military_training_unified_ig_landowners: "统一军事训练"
 chinese_westernization.103.b: "哄骗他们。"
 military_training_unified_country: "统一军事训练"
 chinese_westernization.103.c: "时机未到。"

 chinese_westernization.121.t1: "尝试在[SCOPE.sState('military_academy_state').GetPortHubName]设立武备学堂"
 chinese_westernization.121.t2: "尝试在[SCOPE.sState('military_academy_state').GetCityHubName]设立武备学堂"
 chinese_westernization.121.d1: "为了陆军现代化，在[SCOPE.sState('military_academy_state').GetPortHubName]设立武备学堂。"
 chinese_westernization.121.d2: "为了陆军现代化，在[SCOPE.sState('military_academy_state').GetCityHubName]设立武备学堂。"
 chinese_westernization.121.f: "“中国临敌才选将，西方选将则基于学堂。”"
 chinese_westernization.121.a: "这是绝对必要的。"

 chinese_westernization.122.t: "官僚的反对"
 chinese_westernization.122.d1: "保守的官僚们反对在[SCOPE.sState('military_academy_state').GetPortHubName]设立武备学堂的尝试。"
 chinese_westernization.122.d2: "保守的官僚们反对在[SCOPE.sState('military_academy_state').GetCityHubName]设立武备学堂的尝试。"
 chinese_westernization.122.f: "“我们有圣贤的经典，怎么能效仿西方呢？这种所谓的‘武备学堂’只适合西方，不适合我们。”"
 chinese_westernization.122.a: "难道他们忘记了上次战争中的教训吗？"
 chinese_westernization.122.b: "我得想个办法哄哄他们。"

 chinese_westernization.123.t: "士兵的反对"
 chinese_westernization.123.d1: "士兵们反对在[SCOPE.sState('military_academy_state').GetPortHubName]设立武备学堂的尝试。"
 chinese_westernization.123.d2: "士兵们反对在[SCOPE.sState('military_academy_state').GetCityHubName]设立武备学堂的尝试。"
 chinese_westernization.123.f: "“精锐的八旗军支撑着皇朝，我不知道为什么要把注意力放在这种奇怪的事情上。祖先入关为建立皇朝做出了贡献，你是想动摇这个基础吗？”"
 chinese_westernization.123.a: "难道他们忘记了上次战争中的教训吗？"
 chinese_westernization.123.b: "我得想个办法哄哄他们。"

 chinese_westernization.124.t: "税收和贿赂"
 chinese_westernization.124.d: "地方官员说，为了建造学堂，必须交税……或者贿赂。"
 chinese_westernization.124.f: "“做任何事都需要钱。特别是如果我们要追随这些夷人的方式，就会有很多阻碍。”"
 chinese_westernization.124.a: "交税。"
 chinese_westernization.124.b: "不交税。"
 chiwes124a: "贿赂"

 chinese_westernization.125.t: "外国军官团的支持"
 chinese_westernization.125.d: "因上次战争来到国内的一些外国军官自愿担任学堂的教官。"
 chinese_westernization.125.f: "“训练有素的军队对于任何国家的稳定与繁荣都是必不可少的。有了我的专业知识，将有助于建立一支强大的军队。”"
 chinese_westernization.125.a: "我们欢迎这种支持。"
 chinese_westernization.125.b: "我们不能吸引更多军官吗？"
 chinese_westernization.125.c: "很遗憾，我们没什么能给的……"
 chiwes125a: "微薄的报酬"
 chiwes125b: "更多报酬"

 chinese_westernization.126.t: "地方总督的支持"
 chinese_westernization.126.d: "几位总督表达了对学堂的支持。"
 chinese_westernization.126.f: "总督们和穿着华丽制服的士兵乘坐着华丽的马车队伍抵达。“我们来自不同的地方，但我们都希望看到清朝变得更加强大和现代化，”其中一位总督说道。"
 chinese_westernization.126.a: "真是个好消息！"

 chinese_westernization.127.t: "犯罪指控"
 chinese_westernization.127.d: "有传言说参与建立学堂的其中一人卷入了一桩犯罪。"
 chinese_westernization.127.f: "“听说了吗？那个在建学堂的人竟然心怀鬼胎。”\n\n“哎呀，我怎么没看出来，那是真的吗？”\n\n“我也不知道，反正大家都在这么传。”"
 chinese_westernization.127.a: "不可能。他不是那种人。"
 chinese_westernization.127.b: "如果不划清界限，可能会有麻烦……"

 chinese_westernization.128.t: "只是谣言"
 chinese_westernization.128.d: "谣言被证明只是谣言。然而，这似乎引起了政府的注意。"
 chinese_westernization.128.f: "“为什么那个传言还在传？托它的福，我被盯得死死的，差点没命。呼，一不小心就死定了。”"
 chinese_westernization.128.a: "幸好只是谣言。"

 chinese_westernization.129.t: "感激"
 chinese_westernization.129.d: "谣言被证明只是谣言。被传言卷入犯罪的人表达了感激之情。"
 chinese_westernization.129.f: "“多亏了您的庇护，谣言才平息下来，没有惹出事端。虽然不多，但我会为学堂的建设多出一份力。”"
 chinese_westernization.129.a: "幸好只是谣言。"

 chinese_westernization.130.t: "无底洞"
 chinese_westernization.130.d: "资金不断投入学堂的建设中，但似乎没什么进展。"
 chinese_westernization.130.f: "监工衣服上沾满了灰尘和汗水，沮丧地环顾着杂乱的建筑工地。“真感觉像个无底洞，”他看着另一辆材料车卸货时喃喃自语。钱币的叮当声在他耳边回响。"
 chinese_westernization.130.a: "为什么花钱这么大手大脚？"
 chinese_westernization.130.b: "我们需要更多支持。"
 chiwes130b: "额外支持"

 chinese_westernization.131.t: "暴雨"
 chinese_westernization.131.d: "一场罕见的倾盆大雨把建筑工地变成了一片泥泞的沼泽。工人们正在尽最大努力，但老天似乎有自己的安排。"
 chinese_westernization.131.f: "在被雨水浸透的建筑工地的喧闹中，一群满身泥水和雨水的工人蹲在一个临时避难所下。在他们旁边，一位被无数次延误弄得筋疲力尽的学者站着放哨。他看着无情的雨叹了口气。“看来今天是老天爷来教训我们了。”"
 chinese_westernization.131.a: "施工要延误了。"
 chinese_westernization.131.b: "我们需要更多支持。"
 chiwes131b: "额外支持"

 chinese_westernization.132.t: "慷慨捐款"
 chinese_westernization.132.d: "一位富有的赞助人为学堂捐赠了一大笔钱，使得购买新设备和资源成为可能。"
 # A wealthy patron has made a substantial donation to the academy, allowing for the purchase of new equipment and resources.
 chinese_westernization.132.f: "当一辆马车停下时，学堂前聚集了一群人，马蹄在鹅卵石上发出的声音宣告了这位富有赞助人的到来。赞助人拿着一大袋银币走出马车。“我听说你们在这里做着伟大的工作，”赞助人说，“我希望能提供我的支持。”这笔慷慨的捐款将被妥善利用。"
 # A crowd has gathered in front of the academy as a carriage pulls up, the wealthy patron's arrival heralded by the sound of horses' hooves on cobblestones. The patron steps out of the carriage, holding a large bag of silver coins. "I have heard of the great work you are doing here,\" the patron says, \"and I wish to offer my support." The coins are counted, and the patron's generous donation will be put to good use.
 chinese_westernization.132.a: "我们欢迎所有的支持！"
 # We welcome all support!
 chinese_westernization.132.b: "我觉得有些可疑……"
 # I'm suspicious of something...

 chinese_westernization.133.t: "削减预算"
 chinese_westernization.133.d: "由于财政困难，朝廷决定削减对学堂的拨款，这可能会大大推迟甚至终止改革努力。"
 # Due to financial difficulties, the imperial court has decided to cut funding to the academy, which could significantly delay or even halt the reform efforts.
 chinese_westernization.133.f1: "信使传来了削减[SCOPE.sState('military_academy_state').GetPortHubName]武备学堂预算的消息。你难以置信地看着这封信。如果没有额外的资源，计划将被无限期推迟。“我们该怎么继续下去？”你问自己。“我们需要资金才能继续。”"
 # The messenger delivers the news that the funding for [SCOPE.sState('military_academy_state').GetPortHubName] Military Academy has been cut. You stare at the letter in disbelief. Without additional resources, the plan will be delayed indefinitely. \How are we supposed to proceed?" you ask yourself. \"We need funding to continue."
 chinese_westernization.133.f2: "信使传来了削减[SCOPE.sState('military_academy_state').GetCityHubName]武备学堂预算的消息。你难以置信地看着这封信。如果没有额外的资源，计划将被无限期推迟。“我们该怎么继续下去？”你问自己。“我们需要资金才能继续。”"
 # The messenger delivers the news that the funding for [SCOPE.sState('military_academy_state').GetCityHubName] Military Academy has been cut. You stare at the letter in disbelief. Without additional resources, the plan will be delayed indefinitely. \How are we supposed to proceed?" you ask yourself. \"We need funding to continue."
 chinese_westernization.133.a: "游说政府争取额外资金。"
 # Lobby the government for additional funding.
 chiwes133a: "游说活动"
 chinese_westernization.133.b: "削减开支，尝试在现有预算下运作。"
 # Cut back on expenses and try to make the existing budget work.

 chinese_westernization.134.t: "官僚障碍"
 chinese_westernization.134.d: "由于官僚主义的繁文缛节和保守官员的反对，学堂遇到了阻碍。"
 # The academy have hit a roadblock due to bureaucratic red tape and opposition from conservative officials.
 chinese_westernization.134.f: "官员们坐在办公桌后，都板着脸。“我们理解你们对改革有想法，”一位官员说，“但我们必须告知你们，所有事情都必须通过适当的方式获得批准。”"
 chinese_westernization.134.a: "努力克服障碍并推动改革。"
 # Try to work to overcome the obstacles and push through the reforms.
 chinese_westernization.134.b: "采取更强硬的方法并直接挑战官员。"
 # Take a more confrontational approach and challenge the officials directly.
 chiwes134b: "克服逆境"

 chinese_westernization.135.t: "慈善传教士"
 chinese_westernization.135.d: "一群基督教传教士提出为学堂提供财政和物资支持。"
 # A group of Christian missionaries have offered to provide financial and material support to the academy.
 chinese_westernization.135.f: "传教士们穿着便服，只带着一个小包。“我们可能拥有的不多，”其中一位说，“但我们相信教育的力量以及这所学堂改变生活的潜力。”"
 # The missionaries are dressed in plain clothes and carry only small bags with them. \We may not have much," one of them says, \but we believe in the power of education and the potential of this academy to change lives."
 chinese_westernization.135.a: "接受传教士的提议。"
 # Accept the missionaries' offer.
 chinese_westernization.135.b: "以潜在的宗教冲突为由拒绝该提议。"
 # Decline the offer, citing concerns over potential religious conflicts.
 chiwes135a: "儒生的不满"

 chinese_westernization.136.t: "可怕的谣言"
 chinese_westernization.136.d: "京城里到处流传着学堂的计划实际上是掩盖反对政府的秘密阴谋的谣言。"
 # Rumors have spread throughout the capital that the academy's plans are actually a cover for a secret conspiracy against the government.
 chinese_westernization.136.f: "随着时间的推移，学堂门外的人群声音越来越大，也越来越焦躁。“我听说他们在这里训练革命者，”一个旁观者说。“我听说他们想推翻清政府。”"
 # The crowd outside the academy gates grows louder and more agitated by the minute. \I've heard that they're training revolutionaries here,\ one of the bystanders says. \I heard they want to overthrow the Qing government.\
 chinese_westernization.136.a: "努力平息谣言。"
 # Work to dispel the rumors.
 chinese_westernization.136.b: "让谣言传播吧。它会自动消失的。"
 # Let the rumor spread. It will disappear on its own.
 chiwes136a: "平息谣言"

 chinese_westernization.137.t: "皇帝的圣旨"
 chinese_westernization.137.d: "清廷颁布了一道圣旨，支持武备学堂进行军队现代化的任务。圣旨承诺提供资金和资源来支持武备学堂。"
 chinese_westernization.137.f: "圣旨由官员和御林军组成的代表团装在一个仪式盒子里送达学堂。圣旨用华丽的书法写成，并盖有玉玺。圣旨承诺提供额外的资金和资源来支持学堂的任务，并重申了朝廷实现军队现代化的承诺。"
 chinese_westernization.137.a: "全世界都仰望皇上的恩典。"

 chinese_westernization.138.t: "蓄意破坏"
 chinese_westernization.138.d: "有人企图破坏学堂的设备和设施。"
 # An anonymous saboteur has attempted to damage the academy's equipment and facilities.
 chinese_westernization.138.f: "人们聚集在院子里，看着受损的设备，互相低声耳语。“这是懦夫的行为，”一位将军说。“但他们以为这样就能阻止我们吗？我们必须找出是谁干的，并确保他们被绳之以法。”"
 chinese_westernization.138.a: "进行彻底的调查以确定罪魁祸首。"
 # Conduct a thorough investigation to identify the culprit.

 chinese_westernization.139.t1: "设立[SCOPE.sState('military_academy_state').GetPortHubName]武备学堂失败"
 chinese_westernization.139.t2: "设立[SCOPE.sState('military_academy_state').GetCityHubName]武备学堂失败"
 chinese_westernization.139.d1: "尽管他们尽了最大努力，[SCOPE.sState('military_academy_state').GetPortHubName]武备学堂未能向学生敞开大门，被迫放弃了现代化计划。"
 # Despite the best efforts of the academy's leaders, the [SCOPE.sState('military_academy_state').GetPortHubName] Military Academy failed to open its doors to students and was forced to abandon its modernization plans.
 chinese_westernization.139.d2: "尽管他们尽了最大努力，[SCOPE.sState('military_academy_state').GetCityHubName]武备学堂未能向学生敞开大门，被迫放弃了现代化计划。"
 # Despite the best efforts of the academy's leaders, the [SCOPE.sState('military_academy_state').GetCityHubName] Military Academy failed to open its doors to students and was forced to abandon its modernization plans.
 chinese_westernization.139.f1: "学堂的大门紧锁，空荡荡的走廊里只有纸张的沙沙声和偶尔的叹息声。学堂的领导们坐在办公桌前，盯着他们的计划，想知道哪里出了问题。在外面，[SCOPE.sState('military_academy_state').GetPortHubName]的街道上熙熙攘攘，但学堂内只有挫败感和失望感。清军的未来看起来很黯淡。"
 # The doors of the academy remained locked and barred, the only sound coming from within the empty halls was the rustling of papers and the occasional sigh. The leaders of the academy sat at their desks, staring at their plans and wondering where they went wrong. Outside, the streets of [SCOPE.sState('military_academy_state').GetPortHubName] were bustling with activity, but inside the academy, there was only a sense of defeat and disappointment. The future of the Qing army looked bleak.
 chinese_westernization.139.f2: "学堂的大门紧锁，空荡荡的走廊里只有纸张的沙沙声和偶尔的叹息声。学堂的领导们坐在办公桌前，盯着他们的计划，想知道哪里出了问题。在外面，[SCOPE.sState('military_academy_state').GetCityHubName]的街道上熙熙攘攘，但学堂内只有挫败感和失望感。清军的未来看起来很黯淡。"
 # The doors of the academy remained locked and barred, the only sound coming from within the empty halls was the rustling of papers and the occasional sigh. The leaders of the academy sat at their desks, staring at their plans and wondering where they went wrong. Outside, the streets of [SCOPE.sState('military_academy_state').GetCityHubName] were bustling with activity, but inside the academy, there was only a sense of defeat and disappointment. The future of the Qing army looked bleak.
 chinese_westernization.139.a: "怎么会这样。"

 chinese_westernization.140.t1: "[SCOPE.sState('military_academy_state').GetPortHubName]武备学堂开学"
 chinese_westernization.140.t2: "[SCOPE.sState('military_academy_state').GetCityHubName]武备学堂开学"
 chinese_westernization.140.d1: "经过几个月的努力和奉献，[SCOPE.sState('military_academy_state').GetPortHubName]武备学堂的领导们成功地向学生开放了该机构，并开始实施他们的现代化计划。"
 # After months of hard work and dedication, the leaders of the [SCOPE.sState('military_academy_state').GetPortHubName] Military Academy successfully opened the institution to students and began implementing their modernization plans.
 chinese_westernization.140.d2: "经过几个月的努力和奉献，[SCOPE.sState('military_academy_state').GetCityHubName]武备学堂的领导们成功地向学生开放了该机构，并开始实施他们的现代化计划。"
 # After months of hard work and dedication, the leaders of the [SCOPE.sState('military_academy_state').GetCityHubName] Military Academy successfully opened the institution to students and began implementing their modernization plans.
 chinese_westernization.140.f: "学堂的大门敞开，渴望学习的学生们一个接一个地涌入，手里拿着一捆捆书，脸上带着坚定的表情。学堂的领导站在入口处，自豪而满意地看着他们的梦想成为现实。空气中充满了闲聊声和笑声，以及刀剑相击和军靴行进的声音。清军的未来看起来一片光明。"
 # The doors of the academy opened wide, and a crowd of eager students flooded in, each one carrying a bundle of books and a sense of determination. The leaders of the academy stood at the entrance, watching with pride and satisfaction as their dream became a reality. The air was filled with the sounds of chatter and laughter, as well as the clanging of swords and the marching of boots. The future of the Qing army looked bright.
 chinese_westernization.140.a: "伟大的成就。"
 chiwes140a: "武备学堂开学"

 chinese_westernization.181.t: "新建陆军"
 chinese_westernization.181.d: "为了军队现代化并应对外国帝国主义的威胁，组建了新建陆军，也称新军。"
 chinese_westernization.181.f: "在[ROOT.GetCountry.GetCapital.GetCityHubName]郊外，为了应对外国帝国主义的威胁和现代化的需要，组建了一支新军队。经过数月的训练并配备了现代武器的士兵们穿着新军服挺立着，准备好保卫中国免受那些试图压迫他们的人的侵害。\n\n由太平天国起义的退伍军人带领，这些士兵代表了新一代的中国爱国者，决心保卫他们的祖国并确保其独立。当他们向军营行进时，他们知道前方的道路将充满困难，但他们准备好面对任何挑战。他们是中国的保卫者，准备尽一切努力确保国家的主权和力量。"
 chinese_westernization.181.a: "一个可见的成就。"
 chinese_westernization.181.tt: "[SCOPE.gsInterestGroup('armed_forces').GetName]的名称更名为#variable 北洋军#!" # SET_INTEREST_GROUP_NAME 참고해서 번역
 chi_triumphant_armed_forces: "趾高气昂的军队"
 chiwes181a: "新建陆军"

 chinese_westernization.199.t: "陆军完全现代化"
 chinese_westernization.199.d: "[ROOT.GetCountry.GetName]完成了使其军队完全现代化的非凡壮举，达到了西方列强的水平。这项努力是一个漫长而艰难的过程，但[ROOT.GetCountry.GetNameNoFlag]最终成功地为其军队配备了最新的武器和技术。"
 chinese_westernization.199.f: "夕阳在[ROOT.GetCountry.GetCapital.GetCityHubName]落下，行军部队的声音在城市中回荡。人们聚集在街道上见证这支新现代化的[ROOT.GetCountry.GetAdjectiveNoFormatting]军队的游行。穿着新军服和携带先进武器的部队景象令人印象深刻，这反映了[ROOT.GetCountry.GetNameNoFlag]对进步和现代化的承诺。\n\n这一结果是一个重要的里程碑，反映了中国跟上快速变化的世界的能力。装备了最新技术和武器的军队现在更有准备保卫中原免受任何威胁。这一成就是中国人民巨大骄傲的源泉，他们带着对未来的热情和乐观来庆祝这一成就。\n\n这一成就是中国历史上的一个转折点。通过这些努力，[ROOT.GetCountry.GetNameNoFlag]展示了其适应时代变化和迎接新挑战的意愿。中国人民可以期待一个更加光明的未来，因为他们知道中国已经准备好迎接未来的挑战。"
 chinese_westernization.199.a: "没有人能侵犯[ROOT.GetCountry.GetAdjectiveNoFormatting]的土地！"
 chiwes199a: "陆军完全现代化：铜墙铁壁"
 chinese_westernization.199.b: "全世界都将见证[ROOT.GetCountry.GetAdjectiveNoFormatting]军队的威严！"
 chiwes199b: "陆军完全现代化：东亚霸主"

 chinese_westernization.201.t: "[SCOPE.sState('first_modern_shipyard_state').GetPortHubName]造船厂"
 chinese_westernization.201.d: "一家应用西方技术建造钢壳船的造船厂在[SCOPE.sState('first_modern_shipyard_state').GetPortHubName]开业了。"
 chinese_westernization.201.f: "太阳刚从地平线升起，造船厂的工人们就为新的一天做准备。锤子和锯子的声音，以及金属碰撞的声音充满了空气。一个由政府官员组成的代表团穿着最讲究的长袍到达，工人们停下来鞠躬。官员们微笑着点头，对取得的进展印象深刻。他们离开时想知道这家新的西式造船厂未来会怎样。"
 chinese_westernization.201.a: "我们终于能看到像样的船了。"
 chi_first_modern_shipyard: "中国第一家现代造船厂"

