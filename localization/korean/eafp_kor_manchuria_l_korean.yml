l_korean:
 eafp_manchuria_outcome_manchurian_settlement_tt: "만주 경영의 최종 정착 이벤트가 발생합니다"

 je_eafp_manchurian_policy: "만주 정책"
 je_eafp_manchurian_policy_reason: "압록강 너머의 북방을 더 이상 두고볼 수만은 없다. 장차 그 땅을 차지할 준비를 시작해야 한다."

 je_eafp_manchurian_management: "만주 경영"
 je_eafp_manchurian_management_reason: "옛 강역이 수백 년 만에 돌아왔지만 지도 위에 새로 그은 국경선만으로는 이 영토를 온전히 다스릴 수 없다. 저 아득한 만주벌판을 개조하는 중대한 과업이 우리 앞에 놓여 있다."

 button_je_eafp_manchuria_settlement: "조선인 이주 장려"
 button_je_eafp_manchuria_settlement_desc: "한반도 내 조선인 농민 또는 노동자 POP 일부를 만주의 한 주로 이주시킵니다."
 button_je_eafp_manchuria_expand_arable_land: "만주 개척"
 button_je_eafp_manchuria_expand_arable_land_desc: "성경, 남만주, 북만주의 경작 가능 토지를 각각 10씩 늘립니다. 최대 5회 가능합니다."

 eafp_manchuria.1.t: "북방 정책의 제기"
 eafp_manchuria.1.d: "압록강 너머 만주에 대한 조선의 권리를 공식적으로 제기했다."
 eafp_manchuria.1.f: "\"이 몸은 어디로 해서 왔는지 듣지도 보지도 못하던 크나큰 무궁화 몇만 길 되는 가지 위 넓기가 큰 방만한 꽃송이에 앉았더라. 이 꽃이 어이해 오늘은 이 꼴이 되었느냐. 한 잎은 황해, 발해를 건너 대륙을 덮고 한 잎은 만주를 지나 우수리에 늘어졌더니, 어이해 오늘날은 이 꽃이 이다지 여위었느냐.\"" # 신채호의 '꿈하늘' 중
 eafp_manchuria.1.a: "만주에 대한 명분을 세워라."

 eafp_manchuria.2.t: "천부금탕의 땅"
 eafp_manchuria.2.d: "만주 일대를 모두 영토로 편입하는 데 성공했다."
 eafp_manchuria.2.f: "\"간도는 천부금탕이다. 기름진 땅이 흔하여 어디를 가든지 농사를 지을 수 있고 농사를 지으면 쌀도 흔할 것이다. 삼림이 많으니 나무 걱정도 될 것이 없다. 농사를 지어서 배불리 먹고 뜨뜻이 지내자. 그리고 깨끗한 초가나 지어 놓고 글도 읽고 무지한 농민들을 가르쳐서 이상촌을 건설하리라.\"" # 최서해의 '탈출기' 중
 eafp_manchuria.2.a: "새로운 영토를 다스릴 방도를 모색하라."

 eafp_manchuria.3.t: "새로운 지붕"
 eafp_manchuria.3.d: "만주의 황량했던 벌판 위로 웅장한 도시가 그 모습을 드러내고 있다."
 eafp_manchuria.3.f: "\"아직도 건설 도중이라는 느낌은 있었으나 갓 나온 연녹색 버들 사이로 깨끗한 콘크리트의 주택들이 깔리고, 멀리 보이는 큰 건축물들의 동양적인 지붕도 눈에 새로웠다. 이 건축의 새로운 양식도 동양이 서양의 영향에서 벗어나서 자기의 것을 창조하려는 노력의 한 나타남일까 하고 철은 생각하였다.\"" # 유진오의 '신경' 중
 eafp_manchuria.3.a: "새로운 대지 위에 새로운 질서."

 eafp_manchurian_settlement_state: "만주 정착촌"
 eafp_manchurian_settlement_state_desc: "조선인 마을과 시장길이 인구와 생활을 통해 북방 통치를 받치고 있습니다."
 eafp_manchurian_integrated_state: "편입된 만주 행정"
 eafp_manchurian_integrated_state_desc: "관청, 호적, 세금, 재판이 만주를 조선의 행정 질서 안으로 끌어들이고 있습니다."
