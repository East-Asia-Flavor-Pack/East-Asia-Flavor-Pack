 concept_eafp_sedo_politics_pocket_money: "Embezzlement"
 concept_eafp_sedo_politics_pocket_money_desc: "This is an effect that can arise from political dealings with the [concept_eafp_sedo_family], or from their arbitrary abuse of power.\n\nEmbezzled funds are recorded as the fortune of the [concept_eafp_sedo_family]. The wealth accumulated through this process can in turn be used by the [concept_eafp_sedo_family] to privatize state assets or to conduct political transactions with the monarch."

